name: PR Gate

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  checks: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  pr_gate:
    name: PR Gate
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Wait for required checks
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          required_checks=("Omar Gate" "Quality Summary")
          deadline=$((SECONDS + 1200))
          while (( SECONDS < deadline )); do
            response="$(gh api "repos/${REPO}/commits/${SHA}/check-runs" -H "Accept: application/vnd.github+json")"
            all_success=true

            for check in "${required_checks[@]}"; do
              status="$(echo "${response}" | jq -r --arg name "${check}" '[.check_runs[] | select(.name == $name) | .status] | last // empty')"
              conclusion="$(echo "${response}" | jq -r --arg name "${check}" '[.check_runs[] | select(.name == $name) | .conclusion] | last // empty')"

              if [[ -z "${status}" ]]; then
                all_success=false
                continue
              fi

              if [[ "${status}" != "completed" ]]; then
                all_success=false
                continue
              fi

              if [[ "${conclusion}" != "success" ]]; then
                echo "::error::Required check '${check}' concluded '${conclusion}'."
                exit 1
              fi
            done

            if [[ "${all_success}" == "true" ]]; then
              echo "All required checks succeeded for ${SHA}."
              exit 0
            fi

            sleep 10
          done

          echo "::error::Timed out waiting for required checks for ${SHA}."
          exit 1
