name: Release Publish

on:
  workflow_run:
    workflows:
      - Release
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Semver tag to publish (vX.Y.Z)"
        required: true
        type: string
      dry_run:
        description: "Run npm publish --dry-run"
        required: false
        default: false
        type: boolean
      break_glass:
        description: "Require explicit break-glass confirmation for manual publish dispatch"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: read
  checks: read
  id-token: write
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NPM_VERSION_PIN: "10.8.2"

concurrency:
  group: release-publish-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event_name == 'workflow_run' && format('run-{0}', github.event.workflow_run.id) || github.ref }}
  cancel-in-progress: false

jobs:
  resolve-release-bundle:
    name: Resolve Release Bundle
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    environment: release-management
    permissions:
      contents: read
      actions: read
      checks: read
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      target_sha: ${{ steps.resolve.outputs.target_sha }}
      release_run_id: ${{ steps.resolve.outputs.release_run_id }}
      dry_run: ${{ steps.resolve.outputs.dry_run }}
    steps:
      - name: Verify release-management environment protections
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          env_json="$(timeout --preserve-status 30s gh api "repos/${REPO}/environments/release-management" -H "Accept: application/vnd.github+json")"
          reviewer_count="$(echo "${env_json}" | jq -r '[.protection_rules[]? | select(.type == "required_reviewers") | ((.reviewers // []) | length)] | add // 0')"
          if [[ "${reviewer_count}" -lt 1 ]]; then
            echo "::error::release-management environment must require at least one reviewer."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Resolve publish target and verify release baseline
        id: resolve
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          RAW_RELEASE_TAG: ${{ inputs.release_tag || '' }}
          RAW_DRY_RUN: ${{ inputs.dry_run || 'false' }}
          RAW_BREAK_GLASS: ${{ inputs.break_glass || 'false' }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id || '' }}
          WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion || '' }}
          WORKFLOW_RUN_EVENT: ${{ github.event.workflow_run.event || '' }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha || '' }}
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch || '' }}
          WORKFLOW_RUN_HEAD_REPO: ${{ github.event.workflow_run.head_repository.full_name || '' }}
          WORKFLOW_RUN_PATH: ${{ github.event.workflow_run.path || '' }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin >/dev/null 2>&1 || true
          normalize_bool() {
            local raw
            raw="$(echo "${1:-false}" | tr -d '\r' | xargs || true)"
            case "$(echo "${raw}" | tr '[:upper:]' '[:lower:]')" in
              1|true|yes|on) echo "true" ;;
              0|false|no|off|'') echo "false" ;;
              *) echo "::error::Invalid boolean value '${raw}'." ; exit 1 ;;
            esac
          }
          resolve_release_tag_from_sha() {
            local target_sha="$1"
            git tag --points-at "${target_sha}" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$' | sort -V | tail -n 1 || true
          }

          release_tag=""
          target_sha=""
          release_run_id=""
          dry_run="false"

          case "${EVENT_NAME}" in
            workflow_dispatch)
              release_tag="$(echo "${RAW_RELEASE_TAG}" | tr -d '\r' | xargs || true)"
              if [[ -z "${release_tag}" ]]; then
                echo "::error::workflow_dispatch requires release_tag."
                exit 1
              fi
              if [[ ! "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
                echo "::error::release_tag '${release_tag}' must match vX.Y.Z semver format."
                exit 1
              fi
              break_glass="$(normalize_bool "${RAW_BREAK_GLASS}")"
              if [[ "${break_glass}" != "true" ]]; then
                echo "::error::Manual workflow_dispatch publish requires break_glass=true."
                exit 1
              fi
              dry_run="$(normalize_bool "${RAW_DRY_RUN}")"
              permission="$(timeout --preserve-status 30s gh api "repos/${REPO}/collaborators/${ACTOR}/permission" --jq '.permission // ""' 2>/dev/null || true)"
              case "${permission}" in
                admin|maintain) ;;
                *)
                  echo "::error::Actor '${ACTOR}' is not authorized to publish releases (permission='${permission}')."
                  exit 1
                  ;;
              esac
              tag_ref_json="$(timeout --preserve-status 30s gh api "repos/${REPO}/git/ref/tags/${release_tag}" -H "Accept: application/vnd.github+json")"
              ref_type="$(echo "${tag_ref_json}" | jq -r '.object.type // ""')"
              ref_sha="$(echo "${tag_ref_json}" | jq -r '.object.sha // ""')"
              test -n "${ref_sha}" || (echo "::error::Unable to resolve tag object SHA for '${release_tag}'." && exit 1)
              target_sha="${ref_sha}"
              if [[ "${ref_type}" == "tag" ]]; then
                tag_json="$(timeout --preserve-status 30s gh api "repos/${REPO}/git/tags/${ref_sha}" -H "Accept: application/vnd.github+json")"
                target_sha="$(echo "${tag_json}" | jq -r '.object.sha // ""')"
              elif [[ "${ref_type}" != "commit" ]]; then
                echo "::error::Tag '${release_tag}' points to unsupported object type '${ref_type}'."
                exit 1
              fi
              ;;
            workflow_run)
              if [[ "${WORKFLOW_RUN_CONCLUSION}" != "success" ]]; then
                echo "::error::workflow_run trigger requires successful upstream Release conclusion."
                exit 1
              fi
              default_branch="$(echo "${DEFAULT_BRANCH:-main}" | tr -d '\r' | xargs || true)"
              if [[ -z "${default_branch}" ]]; then
                default_branch="main"
              fi
              workflow_run_head_branch="$(echo "${WORKFLOW_RUN_HEAD_BRANCH:-}" | tr -d '\r' | xargs || true)"
              if [[ -z "${workflow_run_head_branch}" ]]; then
                echo "::error::workflow_run source must include a resolved head branch."
                exit 1
              fi
              if [[ "${workflow_run_head_branch}" != "${default_branch}" ]]; then
                echo "::error::workflow_run source branch '${workflow_run_head_branch}' is not the protected default branch '${default_branch}'."
                exit 1
              fi
              normalized_run_path="$(echo "${WORKFLOW_RUN_PATH}" | sed -E 's/@.*$//')"
              if [[ "${normalized_run_path}" != ".github/workflows/release.yml" ]]; then
                echo "::error::workflow_run source path must be .github/workflows/release.yml (received '${WORKFLOW_RUN_PATH}')."
                exit 1
              fi
              if [[ "${WORKFLOW_RUN_HEAD_REPO}" != "${REPO}" ]]; then
                echo "::error::workflow_run head repository mismatch (expected '${REPO}', received '${WORKFLOW_RUN_HEAD_REPO}')."
                exit 1
              fi
              if [[ "${WORKFLOW_RUN_EVENT}" != "push" && "${WORKFLOW_RUN_EVENT}" != "workflow_dispatch" ]]; then
                echo "::error::workflow_run source event must be push or workflow_dispatch (received '${WORKFLOW_RUN_EVENT}')."
                exit 1
              fi
              target_sha="$(echo "${WORKFLOW_RUN_HEAD_SHA}" | tr -d '\r' | xargs || true)"
              test -n "${target_sha}" || (echo "::error::workflow_run head_sha is required." && exit 1)
              release_tag="$(resolve_release_tag_from_sha "${target_sha}")"
              if [[ -z "${release_tag}" ]]; then
                echo "::error::Unable to resolve semver tag pointing at release head sha '${target_sha}'."
                exit 1
              fi
              dry_run="false"
              release_run_id="$(echo "${WORKFLOW_RUN_ID}" | tr -d '\r' | xargs || true)"
              ;;
            *)
              echo "::error::Unsupported trigger '${EVENT_NAME}' for release-publish workflow."
              exit 1
              ;;
          esac

          test -n "${target_sha}" || (echo "::error::Unable to resolve target release commit SHA." && exit 1)
          release_runs_json="$(timeout --preserve-status 30s gh api "repos/${REPO}/actions/workflows/release.yml/runs?head_sha=${target_sha}&per_page=30" -H "Accept: application/vnd.github+json")"
          resolved_release_run_id="$(echo "${release_runs_json}" | jq -r --arg sha "${target_sha}" --arg path ".github/workflows/release.yml" --arg repo "${REPO}" '
            [.workflow_runs[]
              | select((.head_sha // "") == $sha)
              | select(((.path // "") | split("@")[0]) == $path)
              | select((.status // "") == "completed")
              | select((.conclusion // "") == "success")
              | select((.event // "") == "push" or (.event // "") == "workflow_dispatch")
              | select(((.head_repository.full_name // .repository.full_name // "") == $repo))
            ] | sort_by((.run_number // 0), (.run_attempt // 0), (.created_at // "")) | last | .id // empty
          ')"
          test -n "${resolved_release_run_id}" || (echo "::error::No successful release.yml run found for tag '${release_tag}' (${target_sha})." && exit 1)
          if [[ -z "${release_run_id}" ]]; then
            release_run_id="${resolved_release_run_id}"
          fi
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "target_sha=${target_sha}" >> "$GITHUB_OUTPUT"
          echo "release_run_id=${release_run_id}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${dry_run}" >> "$GITHUB_OUTPUT"
          echo "Resolved release run ${release_run_id} for ${release_tag} (${target_sha}), dry_run=${dry_run}, trigger=${EVENT_NAME}."

      - name: Verify branch protection and required contexts for publish target
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
          TARGET_SHA: ${{ steps.resolve.outputs.target_sha }}
        run: |
          set -euo pipefail
          target_sha="$(echo "${TARGET_SHA:-}" | tr -d '\r' | xargs || true)"
          test -n "${target_sha}" || (echo "::error::Missing target SHA for publish target governance checks." && exit 1)
          branch_name="$(echo "${DEFAULT_BRANCH:-main}" | tr -d '\r' | xargs || true)"
          if [[ -z "${branch_name}" ]]; then
            branch_name="main"
          fi

          protection_json="$(timeout --preserve-status 30s gh api "repos/${REPO}/branches/${branch_name}/protection" -H "Accept: application/vnd.github+json")"
          strict_checks="$(echo "${protection_json}" | jq -r '.required_status_checks.strict // false')"
          if [[ "${strict_checks}" != "true" ]]; then
            echo "::error::Branch protection for '${branch_name}' must enforce strict required checks."
            exit 1
          fi
          required_review_count="$(echo "${protection_json}" | jq -r '.required_pull_request_reviews.required_approving_review_count // 0')"
          if [[ "${required_review_count}" -lt 1 ]]; then
            echo "::error::Branch protection for '${branch_name}' must require at least one approving review."
            exit 1
          fi

          required_context_manifest=".github/security/required-check-contexts.json"
          test -f "${required_context_manifest}" || (echo "::error::Missing ${required_context_manifest}." && exit 1)
          mapfile -t required_contexts < <(jq -r '.requiredContexts[]?.name // empty' "${required_context_manifest}")
          if [[ "${#required_contexts[@]}" -eq 0 ]]; then
            echo "::error::No required contexts defined in ${required_context_manifest}."
            exit 1
          fi
          configured_contexts="$(echo "${protection_json}" | jq -c '(((.required_status_checks.checks // []) | map(.context)) + (.required_status_checks.contexts // [])) | unique')"
          for required_context in "${required_contexts[@]}"; do
            if ! echo "${configured_contexts}" | jq -e --arg context "${required_context}" 'index($context) != null' >/dev/null; then
              echo "::error::Branch protection for '${branch_name}' is missing required status context '${required_context}'."
              exit 1
            fi
          done

          check_runs_json="$(timeout --preserve-status 30s gh api "repos/${REPO}/commits/${target_sha}/check-runs?per_page=100" -H "Accept: application/vnd.github+json")"
          for required_context in "${required_contexts[@]}"; do
            matched_check="$(echo "${check_runs_json}" | jq -c --arg name "${required_context}" '
              [.check_runs[]
                | select((.name // "") == $name)
                | select((.status // "") == "completed")
                | select((.conclusion // "") == "success")
                | select((.app.slug // "") == "github-actions")
                | select(((.details_url // "") | contains("/actions/runs/")))
              ] | sort_by((.completed_at // ""), (.id // 0)) | last // empty
            ')"
            if [[ -z "${matched_check}" ]]; then
              echo "::error::Required context '${required_context}' is missing a successful check run on commit ${target_sha}."
              exit 1
            fi
          done
          echo "Publish target ${target_sha} satisfies branch-protection required context checks."

  prepare-release-bundle:
    name: Prepare Release Bundle
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: [resolve-release-bundle]
    environment: release-management
    permissions:
      contents: read
      actions: read
      id-token: write
      attestations: write
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      RELEASE_TAG: ${{ needs.resolve-release-bundle.outputs.release_tag }}
      TARGET_SHA: ${{ needs.resolve-release-bundle.outputs.target_sha }}
      RELEASE_RUN_ID: ${{ needs.resolve-release-bundle.outputs.release_run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20.11.1"
          registry-url: "https://registry.npmjs.org"

      - name: Pin npm CLI version
        shell: bash
        run: |
          set -euo pipefail
          npm install --global "npm@${NPM_VERSION_PIN}"
          npm --version

      - name: Download immutable release artifact bundle
        shell: bash
        run: |
          set -euo pipefail
          test -n "${RELEASE_RUN_ID}" || (echo "::error::Missing release workflow run id." && exit 1)
          timeout --preserve-status 120s gh run download "${RELEASE_RUN_ID}" --name create-sentinelayer-release-bundle --dir release-bundle

      - name: Verify immutable artifact promotion lineage
        shell: bash
        run: |
          set -euo pipefail
          manifest_path="release-bundle/quality-proof/quality-build.manifest.json"
          lock_path="release-bundle/quality-proof/quality-release-input.lock.json"
          test -f "${manifest_path}" || (echo "::error::Missing quality manifest ${manifest_path} in release artifact bundle." && exit 1)
          test -f "${lock_path}" || (echo "::error::Missing quality release-input lock ${lock_path} in release artifact bundle." && exit 1)
          tarball_name="$(tr -d '\r\n' < release-bundle/create-sentinelayer.tarball)"
          expected_sha="$(awk 'NF {print $1; exit}' release-bundle/create-sentinelayer.sha256)"
          test -n "${tarball_name}" || (echo "::error::Missing promoted release tarball name." && exit 1)
          test -n "${expected_sha}" || (echo "::error::Missing promoted release tarball digest." && exit 1)
          manifest_artifact="$(jq -r '.artifactName // ""' "${manifest_path}")"
          manifest_sha="$(jq -r '.sha256 // ""' "${manifest_path}")"
          manifest_commit="$(jq -r '.commitSha // ""' "${manifest_path}")"
          manifest_run_id="$(jq -r '.runId // ""' "${manifest_path}")"
          lock_artifact="$(jq -r '.artifactName // ""' "${lock_path}")"
          lock_sha="$(jq -r '.artifactSha256 // ""' "${lock_path}")"
          lock_rebuild_sha="$(jq -r '.artifactRebuildSha256 // ""' "${lock_path}")"
          lock_commit="$(jq -r '.sourceCommitSha // ""' "${lock_path}")"
          lock_run_id="$(jq -r '.sourceRunId // ""' "${lock_path}")"
          if [[ "${manifest_artifact}" != "${tarball_name}" ]] || [[ "${manifest_sha}" != "${expected_sha}" ]]; then
            echo "::error::Release artifact lineage mismatch between promoted files and quality manifest."
            exit 1
          fi
          if [[ "${lock_artifact}" != "${manifest_artifact}" ]] || [[ "${lock_sha}" != "${manifest_sha}" ]] || [[ "${lock_rebuild_sha}" != "${manifest_sha}" ]]; then
            echo "::error::Release-input lock mismatch with quality manifest."
            exit 1
          fi
          if [[ "${lock_commit}" != "${manifest_commit}" ]] || [[ "${manifest_commit}" != "${TARGET_SHA}" ]]; then
            echo "::error::Release commit mismatch (lock=${lock_commit}, manifest=${manifest_commit}, target=${TARGET_SHA})."
            exit 1
          fi
          if [[ "${lock_run_id}" != "${manifest_run_id}" ]] || [[ "${manifest_run_id}" != "${RELEASE_RUN_ID}" ]]; then
            echo "::error::Release run mismatch (lock=${lock_run_id}, manifest=${manifest_run_id}, release=${RELEASE_RUN_ID})."
            exit 1
          fi

      - name: Verify promoted quality artifact attestation provenance
        shell: bash
        run: |
          set -euo pipefail
          TARBALL_NAME="$(cat release-bundle/create-sentinelayer.tarball)"
          TARBALL_PATH="release-bundle/${TARBALL_NAME}"
          test -f "${TARBALL_PATH}" || (echo "::error::Tarball '${TARBALL_NAME}' missing from release artifact bundle." && exit 1)
          expected_sha="$(awk 'NF {print $1; exit}' release-bundle/create-sentinelayer.sha256)"
          test -n "${expected_sha}" || (echo "::error::Unable to parse expected release tarball digest." && exit 1)
          timeout --preserve-status 90s gh attestation verify "${TARBALL_PATH}" \
            --repo "${REPO}" \
            --signer-workflow "${REPO}/.github/workflows/quality-gates.yml" \
            --format json > release-bundle/release-attestation.verify.json
          if ! jq -e --arg expectedSha "${expected_sha}" '[.[].verificationResult.statement.subject[]?.digest.sha256 // empty] | index($expectedSha) != null' release-bundle/release-attestation.verify.json >/dev/null; then
            echo "::error::Release artifact attestation does not include expected digest ${expected_sha}."
            exit 1
          fi

      - name: Verify artifact digest and deterministic rebuild proof
        shell: bash
        run: |
          set -euo pipefail
          (cd release-bundle && sha256sum -c create-sentinelayer.sha256)
          baseline_hash="$(awk 'NF {print $1; exit}' release-bundle/create-sentinelayer.sha256)"
          rebuild_hash="$(awk 'NF {print $1; exit}' release-bundle/create-sentinelayer.rebuild.sha256)"
          if [[ "${baseline_hash}" != "${rebuild_hash}" ]]; then
            echo "::error::Deterministic rebuild proof failed (baseline=${baseline_hash}, rebuild=${rebuild_hash})."
            exit 1
          fi

      - name: Validate packaged CLI install
        shell: bash
        run: |
          set -euo pipefail
          TARBALL_NAME="$(cat release-bundle/create-sentinelayer.tarball)"
          TARBALL_PATH="release-bundle/${TARBALL_NAME}"
          prefix_dir="$(mktemp -d)"
          npm install --prefix "${prefix_dir}" "${TARBALL_PATH}" --ignore-scripts
          PATH="${prefix_dir}/node_modules/.bin:${PATH}" create-sentinelayer --version
          PATH="${prefix_dir}/node_modules/.bin:${PATH}" sentinel --version

      - name: Upload validated release bundle
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: validated-release-bundle
          path: release-bundle
          if-no-files-found: error

  publish-dry-run:
    name: Publish Dry Run
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [resolve-release-bundle, prepare-release-bundle]
    if: ${{ needs.resolve-release-bundle.outputs.dry_run == 'true' }}
    environment: release-management
    permissions:
      contents: read
    steps:
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20.11.1"
          registry-url: "https://registry.npmjs.org"

      - name: Pin npm CLI version
        shell: bash
        run: |
          set -euo pipefail
          npm install --global "npm@${NPM_VERSION_PIN}"
          npm --version

      - name: Download validated release bundle
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: validated-release-bundle
          path: validated-release-bundle

      - name: Execute npm publish dry-run
        shell: bash
        run: |
          set -euo pipefail
          tarball_name="$(tr -d '\r\n' < validated-release-bundle/release-bundle/create-sentinelayer.tarball)"
          npm publish "validated-release-bundle/release-bundle/${tarball_name}" --access public --provenance --dry-run

  authorize-production-publish:
    name: Authorize Production Publish
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    needs: [resolve-release-bundle, prepare-release-bundle]
    if: ${{ needs.resolve-release-bundle.outputs.dry_run != 'true' }}
    environment: production
    permissions:
      contents: read
    steps:
      - name: Confirm protected publish approval
        shell: bash
        run: |
          set -euo pipefail
          echo "Production publish authorization approved."

  publish:
    name: Publish
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: [resolve-release-bundle, prepare-release-bundle, authorize-production-publish]
    if: ${{ needs.resolve-release-bundle.outputs.dry_run != 'true' }}
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20.11.1"
          registry-url: "https://registry.npmjs.org"

      - name: Pin npm CLI version
        shell: bash
        run: |
          set -euo pipefail
          npm install --global "npm@${NPM_VERSION_PIN}"
          npm --version

      - name: Download validated release bundle
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: validated-release-bundle
          path: validated-release-bundle

      - name: Publish to npm
        shell: bash
        run: |
          set -euo pipefail
          tarball_name="$(tr -d '\r\n' < validated-release-bundle/release-bundle/create-sentinelayer.tarball)"
          npm publish "validated-release-bundle/release-bundle/${tarball_name}" --access public --provenance
