name: Quality Gates

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax-matrix:
    name: Syntax & Sanity (Node ${{ matrix.node }})
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate CLI syntax
        run: npm run check

      - name: Run unit tests
        run: npm run test:unit

  security-scan:
    name: Security Scan
    runs-on: ubuntu-22.04
    timeout-minutes: 12
    needs: [test_gate]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run dependency audit gate
        run: npm audit --audit-level=high

      - name: Run secret pattern scan gate
        shell: bash
        run: |
          set -euo pipefail
          if rg -n --hidden --glob '!.git' --glob '!package-lock.json' \
            -- '-----BEGIN (RSA|EC|OPENSSH|PGP|PRIVATE) KEY-----|AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{36,}' .; then
            echo "::error::Potential hardcoded secret material detected."
            exit 1
          fi

  unit-coverage:
    name: Unit Coverage (>=80%)
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [syntax-matrix]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Enforce unit coverage thresholds
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: error

  e2e-packaging:
    name: E2E & Package
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: [syntax-matrix]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Validate package tarball
        run: npm pack --dry-run

  lint_gate:
    name: Lint Stage Gate
    runs-on: ubuntu-22.04
    needs: [syntax-matrix]
    steps:
      - name: Confirm lint stage
        run: echo "Lint stage passed."

  test_gate:
    name: Test Stage Gate
    runs-on: ubuntu-22.04
    needs: [lint_gate, unit-coverage, e2e-packaging]
    steps:
      - name: Confirm test stage
        run: echo "Test stage passed."

  security_gate:
    name: Security Stage Gate
    runs-on: ubuntu-22.04
    needs: [security-scan]
    steps:
      - name: Confirm security stage
        run: echo "Security stage passed."

  build-release-artifact:
    name: Build Release Artifact
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: [security_gate]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build release tarball artifact
        shell: bash
        run: |
          set -euo pipefail
          npm pack
          TARBALL="$(ls -1 create-sentinelayer-*.tgz | head -n 1)"
          test -n "${TARBALL}" || (echo "Missing packed tarball" && exit 1)
          sha256sum "${TARBALL}" | tee release-sha256.txt
          echo "${GITHUB_SHA}" > release-commit-sha.txt

      - name: Upload release tarball artifact
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: create-sentinelayer-release-${{ github.sha }}
          path: |
            create-sentinelayer-*.tgz
            release-sha256.txt
            release-commit-sha.txt
          if-no-files-found: error

  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-22.04
    needs: [lint_gate, test_gate, security_gate]
    if: >-
      ${{
        always() &&
        needs.lint_gate.result == 'success' &&
        needs.test_gate.result == 'success' &&
        needs.security_gate.result == 'success'
      }}
    steps:
      - name: Confirm all quality gates passed
        run: echo "All quality checks passed."
