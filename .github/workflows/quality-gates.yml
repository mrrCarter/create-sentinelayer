name: Quality Gates

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run lint/syntax gate
        run: npm run check

  eval-impact:
    name: Eval Impact Gate
    runs-on: ubuntu-22.04
    needs: [lint]
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Evaluate AI-impacting changes
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            base_sha="${PR_BASE_SHA}"
            head_sha="${PR_HEAD_SHA}"
          else
            base_sha="${PUSH_BEFORE_SHA}"
            head_sha="${PUSH_HEAD_SHA}"
          fi
          if [ -z "${head_sha}" ]; then
            head_sha="HEAD"
          fi
          if [ -z "${base_sha}" ] || [ "${base_sha}" = "0000000000000000000000000000000000000000" ]; then
            base_sha="HEAD~1"
          fi
          bash scripts/eval/eval-check.sh "${base_sha}" "${head_sha}"

  syntax-matrix:
    name: Syntax & Sanity (Node ${{ matrix.node }})
    runs-on: ubuntu-22.04
    needs: [lint]
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node: ["18.20.8", "20.11.1"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate CLI syntax
        run: npm run check

      - name: Run unit tests
        run: npm run test:unit

  unit-coverage:
    name: Unit Coverage (>=80%)
    runs-on: ubuntu-22.04
    needs: [lint]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Enforce unit coverage thresholds
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: error

  e2e-packaging:
    name: E2E & Package
    runs-on: ubuntu-22.04
    needs: [security-scan]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Validate package tarball
        run: npm pack --dry-run

  security-scan:
    name: Security Scan
    runs-on: ubuntu-22.04
    timeout-minutes: 12
    needs: [eval-impact, syntax-matrix, unit-coverage]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run npm audit (prod deps only)
        run: npm audit --omit=dev --audit-level=high

      - name: Run gitleaks secret scan gate
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_SUMMARY: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-22.04
    needs: [lint, eval-impact, syntax-matrix, unit-coverage, security-scan, e2e-packaging]
    if: ${{ always() }}
    steps:
      - name: Evaluate gate outcomes
        shell: bash
        env:
          RESULT_EVAL_IMPACT: ${{ needs.eval-impact.result }}
          RESULT_LINT: ${{ needs.lint.result }}
          RESULT_SYNTAX_MATRIX: ${{ needs.syntax-matrix.result }}
          RESULT_UNIT_COVERAGE: ${{ needs.unit-coverage.result }}
          RESULT_E2E_PACKAGING: ${{ needs.e2e-packaging.result }}
          RESULT_SECURITY_SCAN: ${{ needs.security-scan.result }}
        run: |
          set -euo pipefail
          failures=0
          for gate in RESULT_LINT RESULT_EVAL_IMPACT RESULT_SYNTAX_MATRIX RESULT_UNIT_COVERAGE RESULT_SECURITY_SCAN RESULT_E2E_PACKAGING; do
            result="${!gate}"
            name="$(echo "${gate}" | sed 's/^RESULT_//; s/_/ /g')"
            echo "${name}: ${result}"
            if [[ "${result}" != "success" ]]; then
              echo "::error::${name} did not succeed (result=${result})."
              failures=$((failures + 1))
            fi
          done

          if (( failures > 0 )); then
            echo "::error::Quality Summary failing due to ${failures} upstream gate(s)."
            exit 1
          fi

          echo "All quality checks passed."
