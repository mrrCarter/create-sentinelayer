name: Quality Gates
# Release-safety deploy simulation gate chain (no external deployment mutation) is enforced in this workflow:
# lint/eval/syntax/unit/e2e/security -> build-artifact -> release-readiness + deploy-readiness -> deploy-stage -> deploy -> quality-summary

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NPM_VERSION_PIN: "10.8.2"
  NODE_VERSION_PIN: "20.11.1"
  NODE_VERSION_LEGACY_PIN: "18.20.4"

concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    timeout-minutes: 8
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Assert deploy gate-chain contract is present
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("node:fs");
          const content = fs.readFileSync(".github/workflows/quality-gates.yml", "utf8");
          const requiredJobKeys = ["deploy-readiness:", "deploy-stage:", "deploy:", "quality-summary:"];
          for (const key of requiredJobKeys) {
            if (!content.includes(`\n  ${key}`)) {
              console.error(`::error::Missing required quality gate job definition '${key}'.`);
              process.exit(1);
            }
          }
          const summaryNeedsMatch = content.match(/quality-summary:\s*\n[\s\S]*?needs:\s*\[([^\]]+)\]/m);
          if (!summaryNeedsMatch) {
            console.error("::error::Unable to resolve quality-summary needs graph in quality-gates workflow.");
            process.exit(1);
          }
          const needsList = summaryNeedsMatch[1]
            .split(",")
            .map((entry) => entry.trim())
            .filter(Boolean);
          for (const expectedNeed of ["deploy-readiness", "deploy-stage", "deploy"]) {
            if (!needsList.includes(expectedNeed)) {
              console.error(`::error::quality-summary must depend on '${expectedNeed}' to enforce deploy gate chain.`);
              process.exit(1);
            }
          }
          NODE

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION_PIN }}
          cache: npm

      - name: Install dependencies (lockfile immutable)
        shell: bash
        run: |
          set -euo pipefail
          lock_hash_before="$(sha256sum package-lock.json | awk '{print $1}')"
          timeout --preserve-status 8m npm ci --ignore-scripts
          lock_hash_after="$(sha256sum package-lock.json | awk '{print $1}')"
          if [[ "${lock_hash_before}" != "${lock_hash_after}" ]]; then
            echo "::error::package-lock.json mutated during dependency installation."
            exit 1
          fi

      - name: Run lint/syntax gate
        run: npm run check

  eval-impact:
    name: Eval Impact Gate
    runs-on: ubuntu-22.04
    needs: [lint]
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Evaluate AI-impacting changes
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            base_sha="${PR_BASE_SHA}"
            head_sha="${PR_HEAD_SHA}"
            target_branch="${PR_BASE_REF}"
          else
            base_sha="${PUSH_BEFORE_SHA}"
            head_sha="${PUSH_HEAD_SHA}"
            target_branch="${DEFAULT_BRANCH}"
          fi
          if [ -z "${head_sha}" ]; then
            head_sha="${PUSH_HEAD_SHA:-HEAD}"
          fi
          if [ -z "${base_sha}" ] || [ "${base_sha}" = "0000000000000000000000000000000000000000" ]; then
            target_branch="${target_branch:-main}"
            git fetch --no-tags --prune --depth=200 origin "${target_branch}"
            base_sha="$(git merge-base "origin/${target_branch}" "${head_sha}")"
            if [ -z "${base_sha}" ]; then
              echo "::error::Unable to resolve deterministic merge-base for eval-impact (target=${target_branch}, head=${head_sha})."
              exit 1
            fi
          fi
          bash scripts/eval/eval-check.sh "${base_sha}" "${head_sha}"

  syntax-matrix:
    name: Syntax & Sanity (Node ${{ matrix.node }})
    runs-on: ubuntu-22.04
    needs: [lint]
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node: ["18.20.4", "20.11.1"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: timeout --preserve-status 8m npm ci --ignore-scripts

      - name: Validate CLI syntax
        run: npm run check

      - name: Run unit tests
        run: npm run test:unit

  unit-coverage:
    name: Unit Coverage (>=80%)
    runs-on: ubuntu-22.04
    needs: [lint]
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION_PIN }}
          cache: npm

      - name: Install dependencies
        run: timeout --preserve-status 8m npm ci --ignore-scripts

      - name: Enforce unit coverage thresholds
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: error

  e2e-packaging:
    name: E2E Tests
    runs-on: ubuntu-22.04
    needs: [lint]
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION_PIN }}
          cache: npm

      - name: Install dependencies
        run: timeout --preserve-status 8m npm ci --ignore-scripts

      - name: Run E2E tests
        run: npm run test:e2e

  security-scan:
    name: Security Scan
    runs-on: ubuntu-22.04
    timeout-minutes: 12
    needs: [eval-impact, syntax-matrix, unit-coverage, e2e-packaging]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION_PIN }}
          cache: npm

      - name: Install dependencies
        run: timeout --preserve-status 8m npm ci --ignore-scripts

      - name: Run npm audit (prod deps only)
        run: timeout --preserve-status 5m npm audit --omit=dev --audit-level=high

      - name: Run npm audit (full dependency graph)
        run: timeout --preserve-status 5m npm audit --audit-level=high

      - name: Enforce workflow action SHA allowlist policy
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci/verify-action-shas.sh .github/workflows/quality-gates.yml

      - name: Run gitleaks secret scan gate
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.6 (sha pinned)
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_SUMMARY: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  build-artifact:
    name: Build Artifact
    runs-on: ubuntu-22.04
    timeout-minutes: 12
    needs: [security-scan]
    env:
      TZ: UTC
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION_PIN }}
          cache: npm

      - name: Pin npm CLI version
        shell: bash
        run: |
          set -euo pipefail
          cache_dir="${RUNNER_TEMP}/npm-cache-quality"
          echo "NPM_CACHE_DIR=${cache_dir}" >> "$GITHUB_ENV"
          npm install --global "npm@${NPM_VERSION_PIN}"
          npm config set cache "${cache_dir}"
          npm --version

      - name: Validate lockfile dependency provenance metadata
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("node:fs");
          const lockfile = JSON.parse(fs.readFileSync("package-lock.json", "utf8"));
          const packages = lockfile && typeof lockfile === "object" ? lockfile.packages || {} : {};
          const missingIntegrity = [];
          const missingResolved = [];
          const nonRegistryResolved = [];
          for (const [pkgPath, pkg] of Object.entries(packages)) {
            if (pkgPath === "" || !pkg || typeof pkg !== "object") {
              continue;
            }
            if (pkg.link === true) {
              continue;
            }
            const resolved = String(pkg.resolved || "").trim();
            if (!resolved) {
              missingResolved.push(pkgPath);
            } else if (!resolved.startsWith("https://registry.npmjs.org/")) {
              nonRegistryResolved.push(`${pkgPath}:${resolved}`);
            }
            const integrity = String(pkg.integrity || "").trim();
            if (!integrity) {
              missingIntegrity.push(pkgPath);
            }
          }
          const formatPreview = (entries) => entries.slice(0, 10).join(", ");
          if (missingIntegrity.length > 0) {
            console.error(`::error::Missing lockfile integrity metadata for ${missingIntegrity.length} package(s): ${formatPreview(missingIntegrity)}`);
            process.exit(1);
          }
          if (missingResolved.length > 0) {
            console.error(`::error::Missing lockfile resolved metadata for ${missingResolved.length} package(s): ${formatPreview(missingResolved)}`);
            process.exit(1);
          }
          if (nonRegistryResolved.length > 0) {
            console.error(`::error::Detected non-registry lockfile sources (${nonRegistryResolved.length}): ${formatPreview(nonRegistryResolved)}`);
            process.exit(1);
          }
          NODE

      - name: Build package tarball and digest
        shell: bash
        run: |
          set -euo pipefail
          lock_hash_expected="$(sha256sum package-lock.json | awk '{print $1}')"
          baseline_dir="$(mktemp -d)"
          rebuild_dir="$(mktemp -d)"
          baseline_cache_dir="$(mktemp -d)"
          rebuild_cache_dir="$(mktemp -d)"
          git clone --local --quiet "." "${baseline_dir}"
          git -C "${baseline_dir}" checkout --detach "${GITHUB_SHA}" >/dev/null
          git -C "${baseline_dir}" clean -ffdqx
          git clone --local --quiet "." "${rebuild_dir}"
          git -C "${rebuild_dir}" checkout --detach "${GITHUB_SHA}" >/dev/null
          git -C "${rebuild_dir}" clean -ffdqx
          pushd "${baseline_dir}" >/dev/null
          npm config set registry "https://registry.npmjs.org/"
          npm config set cache "${baseline_cache_dir}"
          timeout --preserve-status 8m npm ci --ignore-scripts
          baseline_lock_hash="$(sha256sum package-lock.json | awk '{print $1}')"
          if [[ "${baseline_lock_hash}" != "${lock_hash_expected}" ]]; then
            echo "::error::Lockfile drift detected during baseline clean-tree build (expected=${lock_hash_expected}, actual=${baseline_lock_hash})."
            exit 1
          fi
          baseline_pack_json="$(npm pack --json)"
          baseline_tarball="$(echo "${baseline_pack_json}" | jq -r '.[0].filename')"
          test -n "${baseline_tarball}" || (echo "::error::Unable to resolve baseline packed tarball filename." && exit 1)
          baseline_hash="$(sha256sum "${baseline_tarball}" | awk '{print $1}')"
          tar -tf "${baseline_tarball}" | LC_ALL=C sort > "${GITHUB_WORKSPACE}/quality-build.files.baseline.txt"
          popd >/dev/null
          pushd "${rebuild_dir}" >/dev/null
          npm config set registry "https://registry.npmjs.org/"
          npm config set cache "${rebuild_cache_dir}"
          timeout --preserve-status 8m npm ci --ignore-scripts
          rebuild_lock_hash="$(sha256sum package-lock.json | awk '{print $1}')"
          if [[ "${rebuild_lock_hash}" != "${lock_hash_expected}" ]]; then
            echo "::error::Lockfile drift detected during clean-room rebuild (expected=${lock_hash_expected}, actual=${rebuild_lock_hash})."
            exit 1
          fi
          rebuild_pack_json="$(npm pack --json)"
          rebuild_tarball="$(echo "${rebuild_pack_json}" | jq -r '.[0].filename')"
          test -n "${rebuild_tarball}" || (echo "::error::Unable to resolve rebuild tarball filename." && exit 1)
          rebuild_hash="$(sha256sum "${rebuild_tarball}" | awk '{print $1}')"
          tar -tf "${rebuild_tarball}" | LC_ALL=C sort > "${GITHUB_WORKSPACE}/quality-build.files.rebuild.txt"
          popd >/dev/null
          if [[ "${baseline_tarball}" != "${rebuild_tarball}" ]]; then
            echo "::error::Tarball identity mismatch across clean trees (baseline=${baseline_tarball}, rebuild=${rebuild_tarball})."
            exit 1
          fi
          if ! cmp -s "${baseline_dir}/${baseline_tarball}" "${rebuild_dir}/${rebuild_tarball}"; then
            echo "::error::Tarball byte mismatch across clean-tree builds."
            exit 1
          fi
          if ! cmp -s quality-build.files.baseline.txt quality-build.files.rebuild.txt; then
            echo "::error::Packed file list drift detected across clean-tree builds."
            exit 1
          fi
          cp "${baseline_dir}/${baseline_tarball}" "./${baseline_tarball}"
          printf "%s\n" "${baseline_hash}" > quality-build.sha256
          printf "%s\n" "${baseline_tarball}" > quality-build.tarball
          printf "%s\n" "${rebuild_hash}" > quality-build.rebuild.sha256
          if [[ "${baseline_hash}" != "${rebuild_hash}" ]]; then
            echo "::error::Non-deterministic quality build hash detected (baseline=${baseline_hash}, rebuild=${rebuild_hash})."
            exit 1
          fi
          cat > quality-build.manifest.json <<EOF
          {
            "schemaVersion": "1.0.0",
            "workflow": "quality-gates",
            "runId": "${GITHUB_RUN_ID}",
            "commitSha": "${GITHUB_SHA}",
            "artifactName": "${baseline_tarball}",
            "sha256": "${baseline_hash}",
            "rebuildSha256": "${rebuild_hash}"
          }
          EOF

      - name: Upload build artifact
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: quality-build-package
          path: |
            create-sentinelayer-*.tgz
            quality-build.sha256
            quality-build.rebuild.sha256
            quality-build.tarball
            quality-build.manifest.json
            quality-build.files.baseline.txt
            quality-build.files.rebuild.txt
          if-no-files-found: error

      - name: Attest quality build provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: create-sentinelayer-*.tgz

  release-readiness:
    name: Release Readiness
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [build-artifact]
    if: ${{ always() }}
    permissions:
      contents: read
    steps:
      - name: Enforce build-artifact success
        shell: bash
        env:
          RESULT_BUILD_ARTIFACT: ${{ needs.build-artifact.result }}
        run: |
          set -euo pipefail
          if [[ "${RESULT_BUILD_ARTIFACT}" != "success" ]]; then
            echo "::error::build-artifact must succeed before release-readiness (result=${RESULT_BUILD_ARTIFACT})."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION_PIN }}
          cache: npm

      - name: Download quality build package
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: quality-build-package
          path: quality-readiness

      - name: Verify CLI package smoke install from quality artifact
        shell: bash
        run: |
          set -euo pipefail
          tarball="$(tr -d '\r\n' < quality-readiness/quality-build.tarball)"
          test -n "${tarball}" || (echo "::error::Unable to resolve quality tarball path." && exit 1)
          test -f "quality-readiness/${tarball}" || (echo "::error::Missing quality tarball quality-readiness/${tarball}." && exit 1)
          prefix_dir="$(mktemp -d)"
          npm install --prefix "${prefix_dir}" "./quality-readiness/${tarball}" --ignore-scripts
          PATH="${prefix_dir}/node_modules/.bin:${PATH}" create-sentinelayer --version | tee quality-readiness/create-sentinelayer.version.txt
          PATH="${prefix_dir}/node_modules/.bin:${PATH}" sl --version | tee quality-readiness/sl.version.txt
          sha256="$(awk 'NF {print $1; exit}' quality-readiness/quality-build.sha256)"
          cat > quality-readiness/release-readiness.summary.json <<EOF
          {
            "schemaVersion": "1.0.0",
            "workflow": "quality-gates",
            "runId": "${GITHUB_RUN_ID}",
            "commitSha": "${GITHUB_SHA}",
            "artifactName": "${tarball}",
            "artifactSha256": "${sha256}",
            "smokeChecks": ["create-sentinelayer --version", "sl --version"]
          }
          EOF

      - name: Upload release-readiness proof
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: release-readiness-proof
          path: |
            quality-readiness/release-readiness.summary.json
            quality-readiness/create-sentinelayer.version.txt
            quality-readiness/sl.version.txt
          if-no-files-found: error

  deploy-readiness:
    name: Deploy Readiness
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [build-artifact]
    if: ${{ always() }}
    permissions:
      contents: read
      id-token: write
      attestations: read
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
    steps:
      - name: Enforce build-artifact success
        shell: bash
        env:
          RESULT_BUILD_ARTIFACT: ${{ needs.build-artifact.result }}
        run: |
          set -euo pipefail
          if [[ "${RESULT_BUILD_ARTIFACT}" != "success" ]]; then
            echo "::error::build-artifact must succeed before deploy-readiness (result=${RESULT_BUILD_ARTIFACT})."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION_PIN }}
          cache: npm

      - name: Download quality build package
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: quality-build-package
          path: quality-deploy

      - name: Run staging deployment smoke gate
        shell: bash
        run: |
          set -euo pipefail
          tarball="$(tr -d '\r\n' < quality-deploy/quality-build.tarball)"
          test -n "${tarball}" || (echo "::error::Unable to resolve quality tarball identity for deploy-readiness gate." && exit 1)
          artifact_path="quality-deploy/${tarball}"
          test -f "${artifact_path}" || (echo "::error::Missing quality tarball ${artifact_path}." && exit 1)
          expected_sha="$(awk 'NF {print $1; exit}' quality-deploy/quality-build.sha256)"
          test -n "${expected_sha}" || (echo "::error::Missing quality-build.sha256 digest for deploy-readiness gate." && exit 1)
          actual_sha="$(sha256sum "${artifact_path}" | awk '{print $1}')"
          if [[ "${expected_sha}" != "${actual_sha}" ]]; then
            echo "::error::Deploy-readiness artifact digest mismatch (expected=${expected_sha}, actual=${actual_sha})."
            exit 1
          fi
          gh attestation verify "${artifact_path}" \
            --repo "${REPO}" \
            --signer-workflow "${REPO}/.github/workflows/quality-gates.yml" \
            --format json > quality-deploy/deploy-readiness.attestation.json
          if ! jq -e --arg expectedSha "${expected_sha}" '[.[].verificationResult.statement.subject[]?.digest.sha256 // empty] | index($expectedSha) != null' quality-deploy/deploy-readiness.attestation.json >/dev/null; then
            echo "::error::Deploy-readiness attestation verification is missing expected digest ${expected_sha}."
            exit 1
          fi
          npm publish "./${artifact_path}" --dry-run --access public >/dev/null
          staging_prefix="$(mktemp -d)"
          npm install --prefix "${staging_prefix}" "./${artifact_path}" --ignore-scripts
          PATH="${staging_prefix}/node_modules/.bin:${PATH}" create-sentinelayer --version | tee quality-deploy/deploy-readiness.version.txt
          cat > quality-deploy/deploy-readiness.summary.json <<EOF
          {
            "schemaVersion": "1.0.0",
            "workflow": "quality-gates",
            "runId": "${GITHUB_RUN_ID}",
            "commitSha": "${GITHUB_SHA}",
            "stage": "deploy-readiness",
            "artifactName": "${tarball}",
            "artifactSha256": "${actual_sha}",
            "checks": ["sha256 parity", "attestation verify", "npm publish --dry-run", "create-sentinelayer --version"]
          }
          EOF

      - name: Upload deploy-readiness proof
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: deploy-readiness-proof
          path: |
            quality-deploy/deploy-readiness.summary.json
            quality-deploy/deploy-readiness.version.txt
            quality-deploy/deploy-readiness.attestation.json
          if-no-files-found: error

  deploy-stage:
    name: Deploy Stage
    runs-on: ubuntu-22.04
    timeout-minutes: 8
    needs: [build-artifact, release-readiness, deploy-readiness]
    if: ${{ always() }}
    environment: quality-deploy
    permissions:
      contents: read
      actions: read
    steps:
      - name: Enforce readiness-gate success
        shell: bash
        env:
          RESULT_BUILD_ARTIFACT: ${{ needs.build-artifact.result }}
          RESULT_RELEASE_READINESS: ${{ needs.release-readiness.result }}
          RESULT_DEPLOY_READINESS: ${{ needs.deploy-readiness.result }}
        run: |
          set -euo pipefail
          for gate in RESULT_BUILD_ARTIFACT RESULT_RELEASE_READINESS RESULT_DEPLOY_READINESS; do
            result="${!gate}"
            if [[ "${result}" != "success" ]]; then
              echo "::error::Deploy stage prerequisite ${gate} did not succeed (result=${result})."
              exit 1
            fi
          done

      - name: Download quality build package
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: quality-build-package
          path: quality-deploy-stage/build-artifact

      - name: Download release-readiness proof
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: release-readiness-proof
          path: quality-deploy-stage/release-readiness

      - name: Download deploy-readiness proof
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: deploy-readiness-proof
          path: quality-deploy-stage/deploy-readiness

      - name: Validate terminal deploy gate artifacts
        shell: bash
        run: |
          set -euo pipefail
          release_summary="quality-deploy-stage/release-readiness/release-readiness.summary.json"
          deploy_summary="quality-deploy-stage/deploy-readiness/deploy-readiness.summary.json"
          artifact_manifest="quality-deploy-stage/build-artifact/quality-build.manifest.json"
          test -f "${release_summary}" || (echo "::error::Missing ${release_summary}." && exit 1)
          test -f "${deploy_summary}" || (echo "::error::Missing ${deploy_summary}." && exit 1)
          test -f "${artifact_manifest}" || (echo "::error::Missing ${artifact_manifest}." && exit 1)
          release_commit="$(jq -r '.commitSha // ""' "${release_summary}")"
          deploy_commit="$(jq -r '.commitSha // ""' "${deploy_summary}")"
          build_commit="$(jq -r '.commitSha // ""' "${artifact_manifest}")"
          release_artifact_name="$(jq -r '.artifactName // ""' "${release_summary}")"
          release_artifact_sha="$(jq -r '.artifactSha256 // ""' "${release_summary}")"
          deploy_artifact_name="$(jq -r '.artifactName // ""' "${deploy_summary}")"
          deploy_artifact_sha="$(jq -r '.artifactSha256 // ""' "${deploy_summary}")"
          build_artifact_name="$(jq -r '.artifactName // ""' "${artifact_manifest}")"
          build_artifact_sha="$(jq -r '.sha256 // ""' "${artifact_manifest}")"
          if [[ "${release_commit}" != "${GITHUB_SHA}" ]] || [[ "${deploy_commit}" != "${GITHUB_SHA}" ]] || [[ "${build_commit}" != "${GITHUB_SHA}" ]]; then
            echo "::error::Deploy gate artifact commit mismatch (release=${release_commit}, deploy=${deploy_commit}, build=${build_commit}, expected=${GITHUB_SHA})."
            exit 1
          fi
          test -n "${build_artifact_name}" || (echo "::error::Missing artifactName in ${artifact_manifest}." && exit 1)
          test -n "${build_artifact_sha}" || (echo "::error::Missing sha256 in ${artifact_manifest}." && exit 1)
          if [[ "${release_artifact_name}" != "${build_artifact_name}" ]] || [[ "${deploy_artifact_name}" != "${build_artifact_name}" ]]; then
            echo "::error::Deploy gate artifact identity mismatch (release=${release_artifact_name}, deploy=${deploy_artifact_name}, build=${build_artifact_name})."
            exit 1
          fi
          if [[ "${release_artifact_sha}" != "${build_artifact_sha}" ]] || [[ "${deploy_artifact_sha}" != "${build_artifact_sha}" ]]; then
            echo "::error::Deploy gate artifact digest mismatch (release=${release_artifact_sha}, deploy=${deploy_artifact_sha}, build=${build_artifact_sha})."
            exit 1
          fi
          cat > quality-deploy-stage/deploy.summary.json <<EOF
          {
            "schemaVersion": "1.0.0",
            "workflow": "quality-gates",
            "runId": "${GITHUB_RUN_ID}",
            "commitSha": "${GITHUB_SHA}",
            "stage": "deploy-stage-promotion-gate",
            "artifactName": "${build_artifact_name}",
            "artifactSha256": "${build_artifact_sha}",
            "inputs": [
              "release-readiness.summary.json",
              "deploy-readiness.summary.json"
            ]
          }
          EOF

      - name: Upload deploy-stage proof
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: deploy-stage-proof
          path: quality-deploy-stage/deploy.summary.json
          if-no-files-found: error

  deploy:
    name: Deploy
    runs-on: ubuntu-22.04
    needs: [deploy-stage]
    if: ${{ always() }}
    steps:
      - name: Enforce deploy-stage success
        shell: bash
        env:
          RESULT_DEPLOY_STAGE: ${{ needs.deploy-stage.result }}
        run: |
          set -euo pipefail
          if [[ "${RESULT_DEPLOY_STAGE}" != "success" ]]; then
            echo "::error::deploy-stage must succeed before deploy (result=${RESULT_DEPLOY_STAGE})."
            exit 1
          fi
          echo "Deploy gate passed (no external deployment executed in Quality Gates workflow)."

  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-22.04
    needs: [lint, eval-impact, syntax-matrix, unit-coverage, e2e-packaging, security-scan, build-artifact, release-readiness, deploy-readiness, deploy-stage, deploy]
    if: ${{ always() }}
    steps:
      - name: Evaluate gate outcomes
        shell: bash
        env:
          RESULT_EVAL_IMPACT: ${{ needs.eval-impact.result }}
          RESULT_LINT: ${{ needs.lint.result }}
          RESULT_SYNTAX_MATRIX: ${{ needs.syntax-matrix.result }}
          RESULT_UNIT_COVERAGE: ${{ needs.unit-coverage.result }}
          RESULT_E2E_PACKAGING: ${{ needs.e2e-packaging.result }}
          RESULT_SECURITY_SCAN: ${{ needs.security-scan.result }}
          RESULT_BUILD_ARTIFACT: ${{ needs.build-artifact.result }}
          RESULT_RELEASE_READINESS: ${{ needs.release-readiness.result }}
          RESULT_DEPLOY_READINESS: ${{ needs.deploy-readiness.result }}
          RESULT_DEPLOY_STAGE: ${{ needs.deploy-stage.result }}
          RESULT_DEPLOY: ${{ needs.deploy.result }}
        run: |
          set -euo pipefail
          failures=0
          for gate in RESULT_LINT RESULT_EVAL_IMPACT RESULT_SYNTAX_MATRIX RESULT_UNIT_COVERAGE RESULT_E2E_PACKAGING RESULT_SECURITY_SCAN RESULT_BUILD_ARTIFACT RESULT_RELEASE_READINESS RESULT_DEPLOY_READINESS RESULT_DEPLOY_STAGE RESULT_DEPLOY; do
            result="${!gate}"
            name="$(echo "${gate}" | sed 's/^RESULT_//; s/_/ /g')"
            echo "${name}: ${result}"
            if [[ "${result}" != "success" ]]; then
              echo "::error::${name} did not succeed (result=${result})."
              failures=$((failures + 1))
            fi
          done

          if (( failures > 0 )); then
            echo "::error::Quality Summary failing due to ${failures} upstream gate(s)."
            exit 1
          fi

          echo "All quality checks passed."

  verify-gate-graph:
    name: Verify Gate Graph
    runs-on: ubuntu-22.04
    needs: [quality-summary]
    if: ${{ always() }}
    permissions:
      actions: read
    steps:
      - name: Validate gate graph completion for this run
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          jobs_json="$(timeout --preserve-status 30s gh api "repos/${REPO}/actions/runs/${RUN_ID}/jobs?per_page=100" -H "Accept: application/vnd.github+json")"
          assert_exact_success() {
            local job_name="${1}"
            local total_count
            total_count="$(echo "${jobs_json}" | jq -r --arg name "${job_name}" '[.jobs[] | select((.name // "") == $name)] | length')"
            if [[ "${total_count}" -lt 1 ]]; then
              echo "::error::Missing required gate job '${job_name}' in run ${RUN_ID}."
              exit 1
            fi
            local success_count
            success_count="$(echo "${jobs_json}" | jq -r --arg name "${job_name}" '[.jobs[] | select((.name // "") == $name) | select((.status // "") == "completed") | select((.conclusion // "") == "success")] | length')"
            if [[ "${success_count}" != "${total_count}" ]]; then
              echo "::error::Gate job '${job_name}' did not complete successfully in run ${RUN_ID} (success=${success_count}, total=${total_count})."
              exit 1
            fi
          }
          assert_regex_success() {
            local job_name_pattern="${1}"
            local min_count="${2}"
            local total_count
            total_count="$(echo "${jobs_json}" | jq -r --arg pattern "${job_name_pattern}" '[.jobs[] | select(((.name // "") | test($pattern)))] | length')"
            if [[ "${total_count}" -lt "${min_count}" ]]; then
              echo "::error::Expected at least ${min_count} jobs matching /${job_name_pattern}/ in run ${RUN_ID}, found ${total_count}."
              exit 1
            fi
            local success_count
            success_count="$(echo "${jobs_json}" | jq -r --arg pattern "${job_name_pattern}" '[.jobs[] | select(((.name // "") | test($pattern))) | select((.status // "") == "completed") | select((.conclusion // "") == "success")] | length')"
            if [[ "${success_count}" != "${total_count}" ]]; then
              echo "::error::One or more jobs matching /${job_name_pattern}/ did not succeed in run ${RUN_ID} (success=${success_count}, total=${total_count})."
              exit 1
            fi
          }
          assert_exact_success "Lint"
          assert_exact_success "Eval Impact Gate"
          assert_regex_success "^Syntax & Sanity \\(Node .+\\)$" 2
          assert_exact_success "Unit Coverage (>=80%)"
          assert_exact_success "E2E Tests"
          assert_exact_success "Security Scan"
          assert_exact_success "Build Artifact"
          assert_exact_success "Release Readiness"
          assert_exact_success "Deploy Readiness"
          assert_exact_success "Deploy Stage"
          assert_exact_success "Deploy"
          assert_exact_success "Quality Summary"
          echo "Gate graph verification passed for run ${RUN_ID}."

