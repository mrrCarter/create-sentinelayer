name: Quality Gates

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      emergency_eval_skip:
        description: "Allow eval-impact skip when base commit is unavailable (requires approval)"
        required: false
        default: false
        type: boolean

concurrency:
  group: >-
    ${{
      github.event_name == 'pull_request' && format('quality-gates-pr-{0}', github.event.pull_request.number) ||
      (github.ref == 'refs/heads/main' && 'quality-gates-main') ||
      format('quality-gates-ref-{0}', github.ref)
    }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  checks: read
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CANONICAL_NODE_VERSION: "22"
  SECURITY_SCAN_P0_MAX: "0"
  SECURITY_SCAN_P1_MAX: "0"

jobs:
  eval-impact:
    name: Eval Impact Gate
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    outputs:
      eval_resolution: ${{ steps.eval.outputs.eval_resolution }}
      eval_required: ${{ steps.eval.outputs.eval_required }}
      eval_evidence_found: ${{ steps.eval.outputs.eval_evidence_found }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Evaluate AI-impacting changes
        id: eval
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
          EMERGENCY_EVAL_SKIP: ${{ github.event_name == 'workflow_dispatch' && inputs.emergency_eval_skip || 'false' }}
        run: |
          set -euo pipefail
          append_output() {
            local line="$1"
            if [ -n "${GITHUB_OUTPUT:-}" ]; then
              echo "${line}" >> "${GITHUB_OUTPUT}"
            fi
          }
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            base_sha="${PR_BASE_SHA}"
            head_sha="${PR_HEAD_SHA}"
          else
            base_sha="${PUSH_BEFORE_SHA}"
            head_sha="${PUSH_HEAD_SHA}"
          fi
          if [ -z "${head_sha}" ]; then
            head_sha="HEAD"
          fi
          if [ -z "${base_sha}" ] || [ "${base_sha}" = "0000000000000000000000000000000000000000" ]; then
            if git rev-parse "${head_sha}^" >/dev/null 2>&1; then
              base_sha="$(git rev-parse "${head_sha}^")"
              echo "::notice::Eval impact gate resolved base from ${head_sha} parent commit ${base_sha}."
            else
              emergency_skip="$(echo "${EMERGENCY_EVAL_SKIP}" | tr '[:upper:]' '[:lower:]' | xargs || true)"
              if [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ "${emergency_skip}" = "true" ]; then
                echo "::notice::No parent commit available for ${head_sha}; approved skip for workflow_dispatch with emergency_eval_skip=true."
                if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
                  {
                    echo "## Eval Impact Gate"
                    echo "- status: \`approved_skip\`"
                    echo "- event: \`${EVENT_NAME}\`"
                    echo "- reason: no parent commit available and emergency_eval_skip=true."
                  } >> "${GITHUB_STEP_SUMMARY}"
                fi
                append_output "eval_resolution=approved_skip"
                append_output "eval_required=false"
                append_output "eval_evidence_found=false"
                exit 0
              fi
              echo "::error::Eval impact gate could not resolve base commit for ${EVENT_NAME} (head=${head_sha}); emergency_eval_skip is not enabled."
              exit 1
            fi
          fi
          bash scripts/eval/eval-check.sh "${base_sha}" "${head_sha}"
          append_output "eval_resolution=resolved"

  eval-skip-approval:
    name: Eval Skip Approval
    runs-on: ubuntu-22.04
    needs: [eval-impact]
    if: needs.eval-impact.outputs.eval_resolution == 'approved_skip'
    environment: eval-impact-override
    steps:
      - name: Require reviewer approval for eval skip
        run: echo "Eval impact skip approved by environment reviewers."

  eval-enforce:
    name: Eval Impact Enforcement
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    needs: [eval-impact, eval-skip-approval]
    if: always()
    outputs:
      eval_resolution: ${{ needs.eval-impact.outputs.eval_resolution }}
      eval_required: ${{ needs.eval-impact.outputs.eval_required }}
      eval_evidence_found: ${{ needs.eval-impact.outputs.eval_evidence_found }}
    steps:
      - name: Enforce eval-impact policy for protected events
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVAL_JOB_RESULT: ${{ needs.eval-impact.result }}
          EVAL_RESOLUTION: ${{ needs.eval-impact.outputs.eval_resolution }}
          EVAL_REQUIRED: ${{ needs.eval-impact.outputs.eval_required }}
          EVAL_EVIDENCE_FOUND: ${{ needs.eval-impact.outputs.eval_evidence_found }}
          GITHUB_REF_PROTECTED: ${{ github.ref_protected }}
          EMERGENCY_EVAL_SKIP: ${{ github.event_name == 'workflow_dispatch' && inputs.emergency_eval_skip || 'false' }}
        run: |
          set -euo pipefail
          ref_protected="$(echo "${GITHUB_REF_PROTECTED}" | tr '[:upper:]' '[:lower:]' | xargs || true)"
          emergency_skip="$(echo "${EMERGENCY_EVAL_SKIP}" | tr '[:upper:]' '[:lower:]' | xargs || true)"
          if [ "${EVAL_JOB_RESULT}" != "success" ]; then
            echo "::error::eval-impact job did not succeed (result=${EVAL_JOB_RESULT})."
            exit 1
          fi
          case "${EVAL_RESOLUTION}" in
            resolved|approved_skip) ;;
            *)
              echo "::error::Unsupported eval_resolution '${EVAL_RESOLUTION}'."
              exit 1
              ;;
          esac
          if [ "${EVAL_RESOLUTION}" = "approved_skip" ] && [ "${EVENT_NAME}" != "workflow_dispatch" ]; then
            echo "::error::approved_skip is only allowed for workflow_dispatch events."
            exit 1
          fi
          if [ "${EVAL_RESOLUTION}" = "approved_skip" ] && [ "${emergency_skip}" != "true" ]; then
            echo "::error::approved_skip requires emergency_eval_skip=true."
            exit 1
          fi
          if [ "${EVAL_RESOLUTION}" = "approved_skip" ] && [ "${ref_protected}" = "true" ]; then
            echo "::error::approved_skip is not allowed on protected refs."
            exit 1
          fi
          if [ "${EVAL_REQUIRED}" = "true" ] && [ "${EVAL_EVIDENCE_FOUND}" != "true" ]; then
            echo "::error::Eval evidence required but not found."
            exit 1
          fi

  action-pin-policy:
    name: Action Pin Policy
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    needs: [eval-enforce]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Enforce locked action pin policy
        shell: bash
        run: bash .github/scripts/verify-workflow-action-pins.sh

  lint:
    name: Lint
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [eval-enforce, action-pin-policy]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.CANONICAL_NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Assert lockfile immutability after install
        shell: bash
        run: |
          set -euo pipefail
          git update-index -q --refresh
          git diff --exit-code -- package-lock.json package.json

      - name: Run lint gate
        run: npm run check

  syntax-matrix:
    name: Syntax & Sanity (Node ${{ matrix.node }})
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [eval-enforce, action-pin-policy]
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Assert lockfile immutability after install
        shell: bash
        run: |
          set -euo pipefail
          git update-index -q --refresh
          git diff --exit-code -- package-lock.json package.json

      - name: Validate CLI runtime entrypoints
        shell: bash
        run: |
          set -euo pipefail
          node --version
          node bin/sentinelayer-cli.js --version
          node bin/create-sentinelayer.js --version
          node bin/sl.js --version

  test:
    name: Test
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    needs: [eval-enforce, lint, syntax-matrix]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.CANONICAL_NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Assert lockfile immutability after install
        shell: bash
        run: |
          set -euo pipefail
          git update-index -q --refresh
          git diff --exit-code -- package-lock.json package.json

      - name: Run test suite
        run: npm test

  security-scan:
    name: Deterministic Security Scan
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [test]
    outputs:
      scan_path: ${{ steps.scan.outputs.scan_path }}
      scan_sha256: ${{ steps.scan.outputs.scan_sha256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.CANONICAL_NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Assert lockfile immutability after install
        shell: bash
        run: |
          set -euo pipefail
          git update-index -q --refresh
          git diff --exit-code -- package-lock.json package.json

      - name: Run deterministic security scan
        id: scan
        shell: bash
        run: |
          set -euo pipefail
          node bin/sl.js review scan --path . --json --refresh > security-scan.json
          scan_sha256="$(sha256sum security-scan.json | awk '{print $1}')"
          printf '%s  %s\n' "${scan_sha256}" "security-scan.json" > security-scan.sha256
          p0="$(jq -r '.p0 // 0' security-scan.json)"
          p1="$(jq -r '.p1 // 0' security-scan.json)"
          case "${p0}" in ''|*[!0-9]*) echo "::error::Invalid P0 count in security-scan.json: ${p0}" ; exit 1 ;; esac
          case "${p1}" in ''|*[!0-9]*) echo "::error::Invalid P1 count in security-scan.json: ${p1}" ; exit 1 ;; esac
          max_p0="$(echo "${SECURITY_SCAN_P0_MAX}" | xargs || true)"
          max_p1="$(echo "${SECURITY_SCAN_P1_MAX}" | xargs || true)"
          case "${max_p0}" in ''|*[!0-9]*) echo "::error::Invalid SECURITY_SCAN_P0_MAX value: ${max_p0}" ; exit 1 ;; esac
          case "${max_p1}" in ''|*[!0-9]*) echo "::error::Invalid SECURITY_SCAN_P1_MAX value: ${max_p1}" ; exit 1 ;; esac
          if [ "${p0}" -gt "${max_p0}" ] || [ "${p1}" -gt "${max_p1}" ]; then
            echo "::error::Deterministic security scan gate failed (P0=${p0}, P1=${p1}, max_p0=${max_p0}, max_p1=${max_p1})."
            exit 1
          fi
          echo "scan_path=security-scan.json" >> "$GITHUB_OUTPUT"
          echo "scan_sha256=${scan_sha256}" >> "$GITHUB_OUTPUT"

      - name: Upload security scan artifact
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: security-scan-artifacts
          path: |
            security-scan.json
            security-scan.sha256
          if-no-files-found: error
          retention-days: 7

  unit-coverage:
    name: Unit Coverage (>=80%, Node ${{ matrix.node }})
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [security-scan]
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Assert lockfile immutability after install
        shell: bash
        run: |
          set -euo pipefail
          git update-index -q --refresh
          git diff --exit-code -- package-lock.json package.json

      - name: Enforce unit coverage thresholds
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: coverage-lcov-node-${{ matrix.node }}
          path: coverage/lcov.info
          if-no-files-found: error

  e2e-packaging:
    name: E2E & Package (Node ${{ matrix.node }})
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: [unit-coverage]
    if: ${{ needs.unit-coverage.result == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        node: ["22"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Assert lockfile immutability after install
        shell: bash
        run: |
          set -euo pipefail
          git update-index -q --refresh
          git diff --exit-code -- package-lock.json package.json

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Validate package tarball
        if: ${{ matrix.node == '22' }}
        run: npm pack --dry-run

  reproducible-build:
    name: Reproducible Build Check
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [e2e-packaging]
    outputs:
      tarball_name: ${{ steps.pack.outputs.tarball_name }}
      sha256: ${{ steps.pack.outputs.sha256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.CANONICAL_NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Assert lockfile immutability after install
        shell: bash
        run: |
          set -euo pipefail
          git update-index -q --refresh
          git diff --exit-code -- package-lock.json package.json

      - name: Verify reproducible npm pack output
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          tmp_one="$(mktemp -d)"
          tmp_two="$(mktemp -d)"
          cleanup_tmp() {
            rm -rf "${tmp_one}" "${tmp_two}"
          }
          trap cleanup_tmp EXIT
          npm pack --ignore-scripts --json --pack-destination "${tmp_one}" > "${tmp_one}/pack.json"
          first_tarball_name="$(jq -r '.[0].filename' "${tmp_one}/pack.json")"
          first_tarball_path="${tmp_one}/${first_tarball_name}"
          test -f "${first_tarball_path}"
          first_sha256="$(sha256sum "${first_tarball_path}" | awk '{print $1}')"
          npm pack --ignore-scripts --json --pack-destination "${tmp_two}" > "${tmp_two}/pack.json"
          second_tarball_name="$(jq -r '.[0].filename' "${tmp_two}/pack.json")"
          second_tarball_path="${tmp_two}/${second_tarball_name}"
          test -f "${second_tarball_path}"
          second_sha256="$(sha256sum "${second_tarball_path}" | awk '{print $1}')"
          if [ "${first_tarball_name}" != "${second_tarball_name}" ]; then
            echo "::error::Non-deterministic tarball name detected: ${first_tarball_name} vs ${second_tarball_name}."
            exit 1
          fi
          if [ "${first_sha256}" != "${second_sha256}" ]; then
            echo "::error::Non-deterministic npm pack output detected. first=${first_sha256} second=${second_sha256}."
            exit 1
          fi
          echo "tarball_name=${first_tarball_name}" >> "$GITHUB_OUTPUT"
          echo "sha256=${first_sha256}" >> "$GITHUB_OUTPUT"

  build-artifact:
    name: Build Artifact
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [reproducible-build]
    if: ${{ needs.reproducible-build.result == 'success' }}
    outputs:
      tarball: ${{ steps.pack.outputs.tarball }}
      sha256: ${{ steps.pack.outputs.sha256 }}
      integrity: ${{ steps.pack.outputs.integrity }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.CANONICAL_NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Assert lockfile immutability after install
        shell: bash
        run: |
          set -euo pipefail
          git update-index -q --refresh
          git diff --exit-code -- package-lock.json package.json

      - name: Build deterministic package artifact
        id: pack
        shell: bash
        env:
          TARGET_COMMIT_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          REPRODUCIBLE_SHA256: ${{ needs.reproducible-build.outputs.sha256 }}
        run: |
          set -euo pipefail
          npm pack --ignore-scripts --json > pack.json
          tarball="$(jq -r '.[0].filename' pack.json)"
          test -n "${tarball}"
          test -f "${tarball}"
          sha256="$(sha256sum "${tarball}" | awk '{print $1}')"
          if [ -n "${REPRODUCIBLE_SHA256}" ] && [ "${sha256}" != "${REPRODUCIBLE_SHA256}" ]; then
            echo "::error::Build tarball sha256 mismatch with reproducible-build output. expected=${REPRODUCIBLE_SHA256} actual=${sha256}."
            exit 1
          fi
          integrity="sha512-$(openssl dgst -sha512 -binary "${tarball}" | openssl base64 -A)"
          lockfile_sha256="$(sha256sum package-lock.json | awk '{print $1}')"
          node_version="$(node --version)"
          npm_version="$(npm --version)"
          toolchain_fingerprint="$(printf '%s|%s|%s|%s' "${node_version}" "${npm_version}" "${RUNNER_OS}" "${RUNNER_ARCH}" | sha256sum | awk '{print $1}')"
          workflow_path=".github/workflows/quality-gates.yml"
          workflow_sha256="$(sha256sum "${workflow_path}" | awk '{print $1}')"
          jq -n \
            --arg tarball "${tarball}" \
            --arg sha256 "${sha256}" \
            --arg integrity "${integrity}" \
            --arg lockfile_sha256 "${lockfile_sha256}" \
            --arg workflow_path "${workflow_path}" \
            --arg workflow_sha256 "${workflow_sha256}" \
            --arg node_version "${node_version}" \
            --arg npm_version "${npm_version}" \
            --arg runner_os "${RUNNER_OS}" \
            --arg runner_arch "${RUNNER_ARCH}" \
            --arg toolchain_fingerprint "${toolchain_fingerprint}" \
            --arg commit_sha "${TARGET_COMMIT_SHA}" \
            --arg workflow_ref "${GITHUB_WORKFLOW_REF}" \
            --arg workflow_name "${GITHUB_WORKFLOW}" \
            --arg run_id "${GITHUB_RUN_ID}" \
            --arg run_attempt "${GITHUB_RUN_ATTEMPT}" \
            '{
              tarball: $tarball,
              sha256: $sha256,
              integrity: $integrity,
              lockfile_sha256: $lockfile_sha256,
              workflow_path: $workflow_path,
              workflow_sha256: $workflow_sha256,
              node_version: $node_version,
              npm_version: $npm_version,
              runner_os: $runner_os,
              runner_arch: $runner_arch,
              toolchain_fingerprint: $toolchain_fingerprint,
              commit_sha: $commit_sha,
              workflow_ref: $workflow_ref,
              workflow_name: $workflow_name,
              run_id: $run_id,
              run_attempt: $run_attempt
            }' > quality-build-manifest.json
          echo "tarball=${tarball}" >> "$GITHUB_OUTPUT"
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"
          echo "integrity=${integrity}" >> "$GITHUB_OUTPUT"

      - name: Upload deterministic build artifact
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: quality-build-artifacts
          path: |
            pack.json
            quality-build-manifest.json
            ${{ steps.pack.outputs.tarball }}
          if-no-files-found: error
          retention-days: 7

  build-package:
    name: Build Package Artifact
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [build-artifact, reproducible-build]
    if: >-
      ${{
        (github.event_name != 'workflow_dispatch' || github.ref_protected == true) &&
        needs.build-artifact.result == 'success' &&
        needs.reproducible-build.result == 'success'
      }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      tarball: ${{ steps.resolve.outputs.tarball }}
      sha256: ${{ steps.resolve.outputs.sha256 }}
    steps:
      - name: Download deterministic build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # digest-pinned (actions/download-artifact)
        with:
          name: quality-build-artifacts
          path: build-artifact

      - name: Resolve build artifact manifest
        id: resolve
        shell: bash
        env:
          REPRODUCIBLE_SHA256: ${{ needs.reproducible-build.outputs.sha256 }}
        run: |
          set -euo pipefail
          manifest="build-artifact/quality-build-manifest.json"
          test -f "${manifest}"
          tarball="$(jq -r '.tarball // empty' "${manifest}")"
          sha256="$(jq -r '.sha256 // empty' "${manifest}")"
          integrity="$(jq -r '.integrity // empty' "${manifest}")"
          if [ -z "${tarball}" ] || [ -z "${sha256}" ]; then
            echo "::error::Build manifest missing tarball or sha256."
            exit 1
          fi
          tarball_path="build-artifact/${tarball}"
          test -f "${tarball_path}"
          actual_sha256="$(sha256sum "${tarball_path}" | awk '{print $1}')"
          if [ "${actual_sha256}" != "${sha256}" ]; then
            echo "::error::Build artifact checksum mismatch. manifest=${sha256} actual=${actual_sha256}."
            exit 1
          fi
          if [ -n "${REPRODUCIBLE_SHA256}" ] && [ "${sha256}" != "${REPRODUCIBLE_SHA256}" ]; then
            echo "::error::Build artifact sha256 mismatch with reproducible-build output. expected=${REPRODUCIBLE_SHA256} actual=${sha256}."
            exit 1
          fi
          cp "${manifest}" quality-build-manifest.json
          cp "${manifest}" quality-package-manifest.json
          echo "tarball=${tarball_path}" >> "$GITHUB_OUTPUT"
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"
          echo "integrity=${integrity}" >> "$GITHUB_OUTPUT"

      - name: Upload quality package artifact
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: quality-package-artifacts
          path: |
            quality-build-manifest.json
            quality-package-manifest.json
            ${{ steps.resolve.outputs.tarball }}
          if-no-files-found: error
          retention-days: 7

      - name: Generate quality artifact provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # digest-pinned (actions/attest-build-provenance)
        with:
          subject-path: ${{ steps.resolve.outputs.tarball }}

  deploy-readiness:
    name: Deploy Readiness
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    needs: [build-package]
    if: >-
      ${{
        always() &&
        (github.event_name != 'workflow_dispatch' || github.ref_protected == true) &&
        needs.build-package.result == 'success'
      }}
    steps:
      - name: Validate deploy-ready artifact contract
        shell: bash
        env:
          TARBALL: ${{ needs.build-package.outputs.tarball }}
          SHA256: ${{ needs.build-package.outputs.sha256 }}
        run: |
          set -euo pipefail
          if [ -z "${TARBALL}" ]; then
            echo "::error::Missing build tarball output."
            exit 1
          fi
          if [ -z "${SHA256}" ] || ! echo "${SHA256}" | grep -Eq '^[a-f0-9]{64}$'; then
            echo "::error::Invalid build sha256 output."
            exit 1
          fi
          echo "deploy-ready tarball: ${TARBALL} (${SHA256})"

  promote-candidate:
    name: Promote Candidate
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    needs: [security-scan, build-package, deploy-readiness]
    if: >-
      ${{
        always() &&
        needs.security-scan.result == 'success' &&
        needs.build-package.result == 'success' &&
        needs.deploy-readiness.result == 'success'
      }}
    steps:
      - name: Generate promotion manifest
        shell: bash
        env:
          TAR_BALL: ${{ needs.build-package.outputs.tarball }}
          SHA256: ${{ needs.build-package.outputs.sha256 }}
          SECURITY_SCAN_PATH: ${{ needs.security-scan.outputs.scan_path }}
          SECURITY_SCAN_SHA256: ${{ needs.security-scan.outputs.scan_sha256 }}
        run: |
          set -euo pipefail
          if [ -z "${TAR_BALL}" ] || [ -z "${SHA256}" ]; then
            echo "::error::Missing build-package outputs for promotion manifest."
            exit 1
          fi
          if [ -z "${SECURITY_SCAN_PATH}" ] || [ -z "${SECURITY_SCAN_SHA256}" ]; then
            echo "::error::Missing security scan outputs for promotion manifest."
            exit 1
          fi
          jq -n \
            --arg commit_sha "${GITHUB_SHA}" \
            --arg tarball "${TAR_BALL}" \
            --arg sha256 "${SHA256}" \
            --arg security_scan_path "${SECURITY_SCAN_PATH}" \
            --arg security_scan_sha256 "${SECURITY_SCAN_SHA256}" \
            --arg run_id "${GITHUB_RUN_ID}" \
            --arg run_attempt "${GITHUB_RUN_ATTEMPT}" \
            --arg workflow_ref "${GITHUB_WORKFLOW_REF}" \
            '{
              commit_sha: $commit_sha,
              tarball: $tarball,
              sha256: $sha256,
              security_scan_path: $security_scan_path,
              security_scan_sha256: $security_scan_sha256,
              run_id: $run_id,
              run_attempt: $run_attempt,
              workflow_ref: $workflow_ref
            }' > promotion-manifest.json
          echo "Promotion manifest generated."

      - name: Upload promotion manifest
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: promotion-manifest
          path: promotion-manifest.json
          if-no-files-found: error
          retention-days: 7

  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-22.04
    needs: [eval-enforce, action-pin-policy, lint, syntax-matrix, test, security-scan, unit-coverage, e2e-packaging, reproducible-build, build-package, deploy-readiness, promote-candidate]
    if: ${{ always() }}
    steps:
      - name: Confirm all quality gates passed
        shell: bash
        env:
          EVAL_RESOLUTION: ${{ needs.eval-enforce.outputs.eval_resolution }}
        run: |
          set -euo pipefail
          eval_resolution="$(echo "${EVAL_RESOLUTION}" | xargs || true)"
          if ! echo "${eval_resolution}" | grep -Eq '^(resolved|approved_skip)$'; then
            echo "::error::eval-enforce produced invalid resolution '${eval_resolution}'."
            exit 1
          fi
          failed=0
          if [ "${{ needs.eval-enforce.result }}" != "success" ]; then
            echo "::error::eval-enforce failed."
            failed=1
          fi
          if [ "${{ needs.action-pin-policy.result }}" != "success" ]; then
            echo "::error::action-pin-policy failed."
            failed=1
          fi
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "::error::lint failed."
            failed=1
          fi
          if [ "${{ needs.syntax-matrix.result }}" != "success" ]; then
            echo "::error::syntax-matrix failed."
            failed=1
          fi
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "::error::test failed."
            failed=1
          fi
          if [ "${{ needs.security-scan.result }}" != "success" ]; then
            echo "::error::security-scan failed."
            failed=1
          fi
          if [ "${{ needs.unit-coverage.result }}" != "success" ]; then
            echo "::error::unit-coverage failed."
            failed=1
          fi
          if [ "${{ needs.e2e-packaging.result }}" != "success" ]; then
            echo "::error::e2e-packaging failed."
            failed=1
          fi
          if [ "${{ needs.reproducible-build.result }}" != "success" ]; then
            echo "::error::reproducible-build failed."
            failed=1
          fi
          if [ "${{ needs.build-package.result }}" != "success" ]; then
            echo "::error::build-package failed."
            failed=1
          fi
          if [ "${{ needs.deploy-readiness.result }}" != "success" ]; then
            echo "::error::deploy-readiness failed."
            failed=1
          fi
          if [ "${{ needs.promote-candidate.result }}" != "success" ]; then
            echo "::error::promote-candidate failed."
            failed=1
          fi
          if [ "${failed}" -ne 0 ]; then
            echo "::error::Quality gates failed; see job logs above."
            exit 1
          fi
          echo "All quality checks passed."
          echo "Canonical package tarball: ${{ needs.build-package.outputs.tarball }}"
          echo "Canonical package sha256: ${{ needs.build-package.outputs.sha256 }}"
      - name: Emit quality summary manifest
        shell: bash
        env:
          TAR_BALL: ${{ needs.build-package.outputs.tarball }}
          SHA256: ${{ needs.build-package.outputs.sha256 }}
          SECURITY_SCAN_PATH: ${{ needs.security-scan.outputs.scan_path }}
          SECURITY_SCAN_SHA256: ${{ needs.security-scan.outputs.scan_sha256 }}
          REPRODUCIBLE_SHA256: ${{ needs.reproducible-build.outputs.sha256 }}
        run: |
          set -euo pipefail
          if [ -z "${TAR_BALL}" ] || [ -z "${SHA256}" ]; then
            echo "::error::Missing build-package outputs for summary manifest."
            exit 1
          fi
          if [ -z "${REPRODUCIBLE_SHA256}" ]; then
            echo "::error::Missing reproducible-build sha256 output for summary manifest."
            exit 1
          fi
          if [ -z "${SECURITY_SCAN_PATH}" ] || [ -z "${SECURITY_SCAN_SHA256}" ]; then
            echo "::error::Missing security scan outputs for summary manifest."
            exit 1
          fi
          jq -n \
            --arg commit_sha "${GITHUB_SHA}" \
            --arg tarball "${TAR_BALL}" \
            --arg sha256 "${SHA256}" \
            --arg reproducible_sha256 "${REPRODUCIBLE_SHA256}" \
            --arg security_scan_path "${SECURITY_SCAN_PATH}" \
            --arg security_scan_sha256 "${SECURITY_SCAN_SHA256}" \
            --arg run_id "${GITHUB_RUN_ID}" \
            --arg run_attempt "${GITHUB_RUN_ATTEMPT}" \
            --arg workflow_ref "${GITHUB_WORKFLOW_REF}" \
            '{
              commit_sha: $commit_sha,
              tarball: $tarball,
              sha256: $sha256,
              reproducible_sha256: $reproducible_sha256,
              security_scan_path: $security_scan_path,
              security_scan_sha256: $security_scan_sha256,
              run_id: $run_id,
              run_attempt: $run_attempt,
              workflow_ref: $workflow_ref
            }' > quality-summary-manifest.json
      - name: Upload quality summary manifest
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: quality-summary-manifest
          path: quality-summary-manifest.json
          if-no-files-found: error
          retention-days: 7

  quality-terminal:
    name: Quality Terminal
    runs-on: ubuntu-22.04
    needs: [quality-summary]
    if: ${{ always() }}
    steps:
      - name: Confirm terminal quality status
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ needs.quality-summary.result }}" != "success" ]; then
            echo "::error::Quality Summary did not complete successfully (result=${{ needs.quality-summary.result }})."
            exit 1
          fi
          echo "Quality Summary completed successfully."
