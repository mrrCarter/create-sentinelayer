name: Quality Gates

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NPM_VERSION_PIN: "10.8.2"

concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies (lockfile immutable)
        shell: bash
        run: |
          set -euo pipefail
          lock_hash_before="$(sha256sum package-lock.json | awk '{print $1}')"
          timeout --preserve-status 8m npm ci --ignore-scripts
          lock_hash_after="$(sha256sum package-lock.json | awk '{print $1}')"
          if [[ "${lock_hash_before}" != "${lock_hash_after}" ]]; then
            echo "::error::package-lock.json mutated during dependency installation."
            exit 1
          fi

      - name: Run lint/syntax gate
        run: npm run check

  eval-impact:
    name: Eval Impact Gate
    runs-on: ubuntu-22.04
    needs: [lint]
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Evaluate AI-impacting changes
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            base_sha="${PR_BASE_SHA}"
            head_sha="${PR_HEAD_SHA}"
            target_branch="${PR_BASE_REF}"
          else
            base_sha="${PUSH_BEFORE_SHA}"
            head_sha="${PUSH_HEAD_SHA}"
            target_branch="${DEFAULT_BRANCH}"
          fi
          if [ -z "${head_sha}" ]; then
            head_sha="${PUSH_HEAD_SHA:-HEAD}"
          fi
          if [ -z "${base_sha}" ] || [ "${base_sha}" = "0000000000000000000000000000000000000000" ]; then
            target_branch="${target_branch:-main}"
            git fetch --no-tags --prune --depth=200 origin "${target_branch}"
            base_sha="$(git merge-base "origin/${target_branch}" "${head_sha}")"
            if [ -z "${base_sha}" ]; then
              echo "::error::Unable to resolve deterministic merge-base for eval-impact (target=${target_branch}, head=${head_sha})."
              exit 1
            fi
          fi
          bash scripts/eval/eval-check.sh "${base_sha}" "${head_sha}"

  syntax-matrix:
    name: Syntax & Sanity (Node ${{ matrix.node }})
    runs-on: ubuntu-22.04
    needs: [lint]
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: timeout --preserve-status 8m npm ci --ignore-scripts

      - name: Validate CLI syntax
        run: npm run check

      - name: Run unit tests
        run: npm run test:unit

  unit-coverage:
    name: Unit Coverage (>=80%)
    runs-on: ubuntu-22.04
    needs: [lint]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: timeout --preserve-status 8m npm ci --ignore-scripts

      - name: Enforce unit coverage thresholds
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: error

  e2e-packaging:
    name: E2E Tests
    runs-on: ubuntu-22.04
    needs: [lint]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: timeout --preserve-status 8m npm ci --ignore-scripts

      - name: Run E2E tests
        run: npm run test:e2e

  security-scan:
    name: Security Scan
    runs-on: ubuntu-22.04
    timeout-minutes: 12
    needs: [eval-impact, syntax-matrix, unit-coverage, e2e-packaging]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: timeout --preserve-status 8m npm ci --ignore-scripts

      - name: Run npm audit (prod deps only)
        run: timeout --preserve-status 5m npm audit --omit=dev --audit-level=high

      - name: Run npm audit (full dependency graph)
        run: timeout --preserve-status 5m npm audit --audit-level=high

      - name: Enforce pinned gitleaks action policy
        shell: bash
        run: |
          set -euo pipefail
          allowlist_file=".github/security/action-sha-allowlist.txt"
          test -f "${allowlist_file}" || (echo "::error::Missing ${allowlist_file}." && exit 1)
          expected_sha="$(awk -F'=' '$1=="gitleaks/gitleaks-action" {print $2}' "${allowlist_file}" | tr -d '[:space:]')"
          test -n "${expected_sha}" || (echo "::error::Missing gitleaks/gitleaks-action allowlist entry in ${allowlist_file}." && exit 1)
          if [[ ! "${expected_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Invalid gitleaks allowlist SHA '${expected_sha}'."
            exit 1
          fi
          configured_sha="$(grep -E "gitleaks/gitleaks-action@[0-9a-f]{40}" .github/workflows/quality-gates.yml | head -n 1 | sed -E 's/.*@([0-9a-f]{40}).*/\1/')"
          test -n "${configured_sha}" || (echo "::error::Unable to resolve gitleaks action SHA from quality-gates workflow." && exit 1)
          if [[ "${configured_sha}" != "${expected_sha}" ]]; then
            echo "::error::Gitleaks action SHA drift detected (configured=${configured_sha}, allowlist=${expected_sha})."
            exit 1
          fi

      - name: Run gitleaks secret scan gate
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.6 (sha pinned)
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_SUMMARY: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  build-artifact:
    name: Build Artifact
    runs-on: ubuntu-22.04
    timeout-minutes: 12
    needs: [security-scan]
    env:
      TZ: UTC
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Pin npm CLI version
        shell: bash
        run: |
          set -euo pipefail
          cache_dir="${RUNNER_TEMP}/npm-cache-quality"
          echo "NPM_CACHE_DIR=${cache_dir}" >> "$GITHUB_ENV"
          npm install --global "npm@${NPM_VERSION_PIN}"
          npm config set cache "${cache_dir}"
          npm --version

      - name: Validate lockfile dependency provenance metadata
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("node:fs");
          const lockfile = JSON.parse(fs.readFileSync("package-lock.json", "utf8"));
          const packages = lockfile && typeof lockfile === "object" ? lockfile.packages || {} : {};
          const missingIntegrity = [];
          const missingResolved = [];
          const nonRegistryResolved = [];
          for (const [pkgPath, pkg] of Object.entries(packages)) {
            if (pkgPath === "" || !pkg || typeof pkg !== "object") {
              continue;
            }
            if (pkg.link === true) {
              continue;
            }
            const resolved = String(pkg.resolved || "").trim();
            if (!resolved) {
              missingResolved.push(pkgPath);
            } else if (!resolved.startsWith("https://registry.npmjs.org/")) {
              nonRegistryResolved.push(`${pkgPath}:${resolved}`);
            }
            const integrity = String(pkg.integrity || "").trim();
            if (!integrity) {
              missingIntegrity.push(pkgPath);
            }
          }
          const formatPreview = (entries) => entries.slice(0, 10).join(", ");
          if (missingIntegrity.length > 0) {
            console.error(`::error::Missing lockfile integrity metadata for ${missingIntegrity.length} package(s): ${formatPreview(missingIntegrity)}`);
            process.exit(1);
          }
          if (missingResolved.length > 0) {
            console.error(`::error::Missing lockfile resolved metadata for ${missingResolved.length} package(s): ${formatPreview(missingResolved)}`);
            process.exit(1);
          }
          if (nonRegistryResolved.length > 0) {
            console.error(`::error::Detected non-registry lockfile sources (${nonRegistryResolved.length}): ${formatPreview(nonRegistryResolved)}`);
            process.exit(1);
          }
          NODE

      - name: Build package tarball and digest
        shell: bash
        run: |
          set -euo pipefail
          lock_hash_expected="$(sha256sum package-lock.json | awk '{print $1}')"
          baseline_dir="$(mktemp -d)"
          rebuild_dir="$(mktemp -d)"
          baseline_cache_dir="$(mktemp -d)"
          rebuild_cache_dir="$(mktemp -d)"
          git clone --local --quiet "." "${baseline_dir}"
          git -C "${baseline_dir}" checkout --detach "${GITHUB_SHA}" >/dev/null
          git -C "${baseline_dir}" clean -ffdqx
          git clone --local --quiet "." "${rebuild_dir}"
          git -C "${rebuild_dir}" checkout --detach "${GITHUB_SHA}" >/dev/null
          git -C "${rebuild_dir}" clean -ffdqx
          pushd "${baseline_dir}" >/dev/null
          npm config set registry "https://registry.npmjs.org/"
          npm config set cache "${baseline_cache_dir}"
          timeout --preserve-status 8m npm ci --ignore-scripts
          baseline_lock_hash="$(sha256sum package-lock.json | awk '{print $1}')"
          if [[ "${baseline_lock_hash}" != "${lock_hash_expected}" ]]; then
            echo "::error::Lockfile drift detected during baseline clean-tree build (expected=${lock_hash_expected}, actual=${baseline_lock_hash})."
            exit 1
          fi
          baseline_pack_json="$(npm pack --json)"
          baseline_tarball="$(echo "${baseline_pack_json}" | jq -r '.[0].filename')"
          test -n "${baseline_tarball}" || (echo "::error::Unable to resolve baseline packed tarball filename." && exit 1)
          baseline_hash="$(sha256sum "${baseline_tarball}" | awk '{print $1}')"
          tar -tf "${baseline_tarball}" | LC_ALL=C sort > "${GITHUB_WORKSPACE}/quality-build.files.baseline.txt"
          popd >/dev/null
          pushd "${rebuild_dir}" >/dev/null
          npm config set registry "https://registry.npmjs.org/"
          npm config set cache "${rebuild_cache_dir}"
          timeout --preserve-status 8m npm ci --ignore-scripts
          rebuild_lock_hash="$(sha256sum package-lock.json | awk '{print $1}')"
          if [[ "${rebuild_lock_hash}" != "${lock_hash_expected}" ]]; then
            echo "::error::Lockfile drift detected during clean-room rebuild (expected=${lock_hash_expected}, actual=${rebuild_lock_hash})."
            exit 1
          fi
          rebuild_pack_json="$(npm pack --json)"
          rebuild_tarball="$(echo "${rebuild_pack_json}" | jq -r '.[0].filename')"
          test -n "${rebuild_tarball}" || (echo "::error::Unable to resolve rebuild tarball filename." && exit 1)
          rebuild_hash="$(sha256sum "${rebuild_tarball}" | awk '{print $1}')"
          tar -tf "${rebuild_tarball}" | LC_ALL=C sort > "${GITHUB_WORKSPACE}/quality-build.files.rebuild.txt"
          popd >/dev/null
          if [[ "${baseline_tarball}" != "${rebuild_tarball}" ]]; then
            echo "::error::Tarball identity mismatch across clean trees (baseline=${baseline_tarball}, rebuild=${rebuild_tarball})."
            exit 1
          fi
          if ! cmp -s quality-build.files.baseline.txt quality-build.files.rebuild.txt; then
            echo "::error::Packed file list drift detected across clean-tree builds."
            exit 1
          fi
          cp "${baseline_dir}/${baseline_tarball}" "./${baseline_tarball}"
          printf "%s\n" "${baseline_hash}" > quality-build.sha256
          printf "%s\n" "${baseline_tarball}" > quality-build.tarball
          printf "%s\n" "${rebuild_hash}" > quality-build.rebuild.sha256
          if [[ "${baseline_hash}" != "${rebuild_hash}" ]]; then
            echo "::error::Non-deterministic quality build hash detected (baseline=${baseline_hash}, rebuild=${rebuild_hash})."
            exit 1
          fi
          cat > quality-build.manifest.json <<EOF
          {
            "schemaVersion": "1.0.0",
            "workflow": "quality-gates",
            "runId": "${GITHUB_RUN_ID}",
            "commitSha": "${GITHUB_SHA}",
            "artifactName": "${baseline_tarball}",
            "sha256": "${baseline_hash}",
            "rebuildSha256": "${rebuild_hash}"
          }
          EOF

      - name: Upload build artifact
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: quality-build-package
          path: |
            create-sentinelayer-*.tgz
            quality-build.sha256
            quality-build.rebuild.sha256
            quality-build.tarball
            quality-build.manifest.json
            quality-build.files.baseline.txt
            quality-build.files.rebuild.txt
          if-no-files-found: error

      - name: Attest quality build provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: create-sentinelayer-*.tgz

  release-readiness:
    name: Release Readiness
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [build-artifact]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Download quality build package
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: quality-build-package
          path: quality-readiness

      - name: Verify CLI package smoke install from quality artifact
        shell: bash
        run: |
          set -euo pipefail
          tarball="$(tr -d '\r\n' < quality-readiness/quality-build.tarball)"
          test -n "${tarball}" || (echo "::error::Unable to resolve quality tarball path." && exit 1)
          test -f "quality-readiness/${tarball}" || (echo "::error::Missing quality tarball quality-readiness/${tarball}." && exit 1)
          prefix_dir="$(mktemp -d)"
          npm install --prefix "${prefix_dir}" "./quality-readiness/${tarball}" --ignore-scripts
          PATH="${prefix_dir}/node_modules/.bin:${PATH}" create-sentinelayer --version | tee quality-readiness/create-sentinelayer.version.txt
          PATH="${prefix_dir}/node_modules/.bin:${PATH}" sl --version | tee quality-readiness/sl.version.txt
          sha256="$(awk 'NF {print $1; exit}' quality-readiness/quality-build.sha256)"
          cat > quality-readiness/release-readiness.summary.json <<EOF
          {
            "schemaVersion": "1.0.0",
            "workflow": "quality-gates",
            "runId": "${GITHUB_RUN_ID}",
            "commitSha": "${GITHUB_SHA}",
            "artifactName": "${tarball}",
            "artifactSha256": "${sha256}",
            "smokeChecks": ["create-sentinelayer --version", "sl --version"]
          }
          EOF

      - name: Upload release-readiness proof
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: release-readiness-proof
          path: |
            quality-readiness/release-readiness.summary.json
            quality-readiness/create-sentinelayer.version.txt
            quality-readiness/sl.version.txt
          if-no-files-found: error

  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-22.04
    needs: [lint, eval-impact, syntax-matrix, unit-coverage, e2e-packaging, security-scan, build-artifact, release-readiness]
    if: ${{ always() }}
    steps:
      - name: Evaluate gate outcomes
        shell: bash
        env:
          RESULT_EVAL_IMPACT: ${{ needs.eval-impact.result }}
          RESULT_LINT: ${{ needs.lint.result }}
          RESULT_SYNTAX_MATRIX: ${{ needs.syntax-matrix.result }}
          RESULT_UNIT_COVERAGE: ${{ needs.unit-coverage.result }}
          RESULT_E2E_PACKAGING: ${{ needs.e2e-packaging.result }}
          RESULT_SECURITY_SCAN: ${{ needs.security-scan.result }}
          RESULT_BUILD_ARTIFACT: ${{ needs.build-artifact.result }}
          RESULT_RELEASE_READINESS: ${{ needs.release-readiness.result }}
        run: |
          set -euo pipefail
          failures=0
          for gate in RESULT_LINT RESULT_EVAL_IMPACT RESULT_SYNTAX_MATRIX RESULT_UNIT_COVERAGE RESULT_E2E_PACKAGING RESULT_SECURITY_SCAN RESULT_BUILD_ARTIFACT RESULT_RELEASE_READINESS; do
            result="${!gate}"
            name="$(echo "${gate}" | sed 's/^RESULT_//; s/_/ /g')"
            echo "${name}: ${result}"
            if [[ "${result}" != "success" ]]; then
              echo "::error::${name} did not succeed (result=${result})."
              failures=$((failures + 1))
            fi
          done

          if (( failures > 0 )); then
            echo "::error::Quality Summary failing due to ${failures} upstream gate(s)."
            exit 1
          fi

          echo "All quality checks passed."
