name: Quality Gates

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: >-
    ${{
      github.event_name == 'pull_request' && format('quality-gates-pr-{0}', github.event.pull_request.number) ||
      (github.ref == 'refs/heads/main' && 'quality-gates-main') ||
      format('quality-gates-ref-{0}', github.ref)
    }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' }}

permissions:
  checks: read
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  eval-impact:
    name: Eval Impact Gate
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    outputs:
      eval_resolution: ${{ steps.eval.outputs.eval_resolution }}
      eval_required: ${{ steps.eval.outputs.eval_required }}
      eval_evidence_found: ${{ steps.eval.outputs.eval_evidence_found }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Evaluate AI-impacting changes
        id: eval
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
          ALLOW_SKIP_EVENTS: ${{ vars.EVAL_IMPACT_ALLOW_SKIP_EVENTS || 'workflow_dispatch' }}
        run: |
          set -euo pipefail
          append_output() {
            local line="$1"
            if [ -n "${GITHUB_OUTPUT:-}" ]; then
              echo "${line}" >> "${GITHUB_OUTPUT}"
            fi
          }
          csv_contains_event() {
            local csv="$1"
            local event_name="$2"
            local item=""
            IFS=',' read -r -a items <<< "${csv}"
            for item in "${items[@]}"; do
              item="$(echo "${item}" | xargs)"
              if [ "${item}" = "${event_name}" ]; then
                return 0
              fi
            done
            return 1
          }
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            base_sha="${PR_BASE_SHA}"
            head_sha="${PR_HEAD_SHA}"
          else
            base_sha="${PUSH_BEFORE_SHA}"
            head_sha="${PUSH_HEAD_SHA}"
          fi
          if [ -z "${head_sha}" ]; then
            head_sha="HEAD"
          fi
          if [ -z "${base_sha}" ] || [ "${base_sha}" = "0000000000000000000000000000000000000000" ]; then
            if git rev-parse "${head_sha}^" >/dev/null 2>&1; then
              base_sha="$(git rev-parse "${head_sha}^")"
              echo "::notice::Eval impact gate resolved base from ${head_sha} parent commit ${base_sha}."
            else
              if csv_contains_event "${ALLOW_SKIP_EVENTS}" "${EVENT_NAME}"; then
                echo "::notice::No parent commit available for ${head_sha}; approved skip for event ${EVENT_NAME} (ALLOW_SKIP_EVENTS=${ALLOW_SKIP_EVENTS})."
                if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
                  {
                    echo "## Eval Impact Gate"
                    echo "- status: \`approved_skip\`"
                    echo "- event: \`${EVENT_NAME}\`"
                    echo "- reason: no parent commit available and event is allowlisted."
                    echo "- allow_skip_events: \`${ALLOW_SKIP_EVENTS}\`"
                  } >> "${GITHUB_STEP_SUMMARY}"
                fi
                append_output "eval_resolution=approved_skip"
                append_output "eval_required=false"
                append_output "eval_evidence_found=false"
                exit 0
              fi
              echo "::error::Eval impact gate could not resolve base commit for ${EVENT_NAME} (head=${head_sha}) and this event is not allowlisted to skip."
              exit 1
            fi
          fi
          bash scripts/eval/eval-check.sh "${base_sha}" "${head_sha}"
          append_output "eval_resolution=resolved"

  lint:
    name: Lint
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [eval-impact]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run lint gate
        run: npm run check

  syntax-matrix:
    name: Syntax & Sanity (Node ${{ matrix.node }})
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [eval-impact]
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate CLI runtime entrypoints
        shell: bash
        run: |
          set -euo pipefail
          node --version
          node bin/sentinelayer-cli.js --version
          node bin/create-sentinelayer.js --version
          node bin/sl.js --version

  unit-coverage:
    name: Unit Coverage (>=80%, Node ${{ matrix.node }})
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [eval-impact, lint, syntax-matrix]
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Enforce unit coverage thresholds
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: coverage-lcov-node-${{ matrix.node }}
          path: coverage/lcov.info
          if-no-files-found: error

  security-semgrep:
    name: Security Semgrep
    needs: [unit-coverage]
    uses: ./.github/workflows/semgrep.yml
    secrets: inherit
    permissions:
      contents: read

  security-gitleaks:
    name: Security Gitleaks
    needs: [unit-coverage]
    uses: ./.github/workflows/gitleaks.yml
    secrets: inherit
    permissions:
      contents: read

  security-iac:
    name: Security IaC
    needs: [unit-coverage]
    uses: ./.github/workflows/iac-scan.yml
    secrets: inherit
    permissions:
      contents: read

  security-sca:
    name: Security SCA
    needs: [unit-coverage]
    uses: ./.github/workflows/sca-audit.yml
    secrets: inherit
    permissions:
      contents: read

  security-license:
    name: Security License
    needs: [unit-coverage]
    uses: ./.github/workflows/license-gate.yml
    secrets: inherit
    permissions:
      contents: read

  security-sbom:
    name: Security SBOM
    needs: [unit-coverage]
    uses: ./.github/workflows/sbom.yml
    secrets: inherit
    permissions:
      contents: read

  security-codeql:
    name: Security CodeQL
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: [unit-coverage]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Enforce CodeQL check-run policy
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          QUALITY_REQUIRE_CODEQL: ${{ vars.QUALITY_REQUIRE_CODEQL || 'false' }}
          QUALITY_CODEQL_WAIVER: ${{ vars.QUALITY_CODEQL_WAIVER || 'CodeQL workflow is currently not enabled; temporary risk acceptance recorded.' }}
          MAX_WAIT_SECONDS: "900"
          POLL_INTERVAL_SECONDS: "10"
        run: |
          set -euo pipefail
          require_codeql="$(echo "${QUALITY_REQUIRE_CODEQL}" | tr '[:upper:]' '[:lower:]' | xargs || true)"
          waiver="$(echo "${QUALITY_CODEQL_WAIVER}" | xargs || true)"
          merge_bound_event="false"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ] || [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            merge_bound_event="true"
          fi
          if [ "${merge_bound_event}" = "true" ]; then
            REQUIRED_CHECKS_JSON='[{"name":"CodeQL Summary","app":"github-actions","optional":false}]'
            if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
              {
                echo "## Security CodeQL"
                echo "- mode: \`required\`"
                echo "- reason: merge-bound event (${GITHUB_EVENT_NAME} ${GITHUB_REF})"
              } >> "${GITHUB_STEP_SUMMARY}"
            fi
          else
            case "${require_codeql}" in
              true|1|yes)
                REQUIRED_CHECKS_JSON='[{"name":"CodeQL Summary","app":"github-actions","optional":false}]'
                ;;
              false|0|no|'')
                if [ -z "${waiver}" ]; then
                  echo "::error::QUALITY_REQUIRE_CODEQL is disabled but QUALITY_CODEQL_WAIVER is empty."
                  exit 1
                fi
                echo "::warning::CodeQL check-run enforcement waived: ${waiver}"
                if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
                  {
                    echo "## Security CodeQL"
                    echo "- mode: \`waived\`"
                    echo "- waiver: ${waiver}"
                  } >> "${GITHUB_STEP_SUMMARY}"
                fi
                REQUIRED_CHECKS_JSON='[{"name":"CodeQL Summary","app":"github-actions","optional":true}]'
                ;;
              *)
                echo "::error::Invalid QUALITY_REQUIRE_CODEQL value: ${QUALITY_REQUIRE_CODEQL}"
                exit 1
                ;;
            esac
          fi
          export REQUIRED_CHECKS_JSON
          .github/scripts/require-check-runs.sh

  security-stage:
    name: Security Stage
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    needs:
      - security-semgrep
      - security-gitleaks
      - security-iac
      - security-sca
      - security-license
      - security-sbom
      - security-codeql
    steps:
      - name: Confirm in-workflow security suites passed
        shell: bash
        run: |
          set -euo pipefail
          echo "Semgrep, gitleaks, IaC, SCA, license, and SBOM suites passed in this quality workflow run."

  e2e-packaging:
    name: E2E & Package (Node ${{ matrix.node }})
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: [unit-coverage, security-stage]
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Validate package tarball
        if: ${{ matrix.node == '22' }}
        run: npm pack --dry-run

  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-22.04
    needs: [eval-impact, lint, syntax-matrix, unit-coverage, security-stage, e2e-packaging]
    if: >-
      ${{
        always() &&
        needs.eval-impact.result == 'success' &&
        contains(fromJSON('["resolved","approved_skip"]'), needs.eval-impact.outputs.eval_resolution) &&
        needs.lint.result == 'success' &&
        needs.syntax-matrix.result == 'success' &&
        needs.unit-coverage.result == 'success' &&
        needs.security-stage.result == 'success' &&
        needs.e2e-packaging.result == 'success'
      }}
    steps:
      - name: Confirm all quality gates passed
        run: echo "All quality checks passed."
