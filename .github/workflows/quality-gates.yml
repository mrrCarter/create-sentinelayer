name: Quality Gates

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: quality-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  checks: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  eval-impact:
    name: Eval Impact Gate
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    outputs:
      eval_resolution: ${{ steps.eval.outputs.eval_resolution }}
      eval_required: ${{ steps.eval.outputs.eval_required }}
      eval_evidence_found: ${{ steps.eval.outputs.eval_evidence_found }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Evaluate AI-impacting changes
        id: eval
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
          ALLOW_SKIP_EVENTS: ${{ vars.EVAL_IMPACT_ALLOW_SKIP_EVENTS || 'workflow_dispatch' }}
        run: |
          set -euo pipefail
          append_output() {
            local line="$1"
            if [ -n "${GITHUB_OUTPUT:-}" ]; then
              echo "${line}" >> "${GITHUB_OUTPUT}"
            fi
          }
          csv_contains_event() {
            local csv="$1"
            local event_name="$2"
            local item=""
            IFS=',' read -r -a items <<< "${csv}"
            for item in "${items[@]}"; do
              item="$(echo "${item}" | xargs)"
              if [ "${item}" = "${event_name}" ]; then
                return 0
              fi
            done
            return 1
          }
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            base_sha="${PR_BASE_SHA}"
            head_sha="${PR_HEAD_SHA}"
          else
            base_sha="${PUSH_BEFORE_SHA}"
            head_sha="${PUSH_HEAD_SHA}"
          fi
          if [ -z "${head_sha}" ]; then
            head_sha="HEAD"
          fi
          if [ -z "${base_sha}" ] || [ "${base_sha}" = "0000000000000000000000000000000000000000" ]; then
            if git rev-parse "${head_sha}^" >/dev/null 2>&1; then
              base_sha="$(git rev-parse "${head_sha}^")"
              echo "::notice::Eval impact gate resolved base from ${head_sha} parent commit ${base_sha}."
            else
              if csv_contains_event "${ALLOW_SKIP_EVENTS}" "${EVENT_NAME}"; then
                echo "::notice::No parent commit available for ${head_sha}; approved skip for event ${EVENT_NAME} (ALLOW_SKIP_EVENTS=${ALLOW_SKIP_EVENTS})."
                if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
                  {
                    echo "## Eval Impact Gate"
                    echo "- status: \`approved_skip\`"
                    echo "- event: \`${EVENT_NAME}\`"
                    echo "- reason: no parent commit available and event is allowlisted."
                    echo "- allow_skip_events: \`${ALLOW_SKIP_EVENTS}\`"
                  } >> "${GITHUB_STEP_SUMMARY}"
                fi
                append_output "eval_resolution=approved_skip"
                append_output "eval_required=false"
                append_output "eval_evidence_found=false"
                exit 0
              fi
              echo "::error::Eval impact gate could not resolve base commit for ${EVENT_NAME} (head=${head_sha}) and this event is not allowlisted to skip."
              exit 1
            fi
          fi
          bash scripts/eval/eval-check.sh "${base_sha}" "${head_sha}"
          append_output "eval_resolution=resolved"

  lint:
    name: Lint
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [eval-impact]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run lint gate
        run: npm run check

  syntax-matrix:
    name: Syntax & Sanity (Node ${{ matrix.node }})
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [eval-impact]
    strategy:
      fail-fast: false
      matrix:
        node: ["22"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate CLI runtime entrypoints
        shell: bash
        run: |
          set -euo pipefail
          node --version
          node bin/sentinelayer-cli.js --version
          node bin/create-sentinelayer.js --version
          node bin/sl.js --version

  security-omar:
    name: Security Gate (Omar)
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    needs: [eval-impact]
    permissions:
      checks: read
      contents: read
    steps:
      - name: Confirm Omar Gate check success
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TARGET_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            pr_head_repo="${{ github.event.pull_request.head.repo.full_name }}"
            if [ "${pr_head_repo}" != "${REPO}" ]; then
              echo "::notice::Fork PR detected; Omar Gate must run in trusted base-repository context before merge."
            fi
          fi
          api_url="https://api.github.com/repos/${REPO}/commits/${TARGET_SHA}/check-runs?check_name=Omar%20Gate"
          response="$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "${api_url}")"
          total="$(echo "${response}" | jq -r '.total_count // 0')"
          if [ "${total}" -lt 1 ]; then
            echo "::error::Omar Gate check run not found for ${TARGET_SHA}."
            exit 1
          fi
          selected="$(echo "${response}" | jq -c '
            .check_runs
            | sort_by(.completed_at // .started_at)
            | reverse
            | map(select(.app.slug == "github-actions"))
            | first // empty
          ')"
          if [ -z "${selected}" ]; then
            echo "::error::No GitHub Actions Omar Gate check run found for ${TARGET_SHA}."
            exit 1
          fi
          status="$(echo "${selected}" | jq -r '.status // empty')"
          conclusion="$(echo "${selected}" | jq -r '.conclusion // empty')"
          summary="$(echo "${selected}" | jq -r '.output.summary // ""')"
          if [ "${status}" != "completed" ] || [ "${conclusion}" != "success" ]; then
            echo "::error::Omar Gate is not successful (status=${status}, conclusion=${conclusion})."
            exit 1
          fi
          if [ -z "${summary}" ]; then
            echo "::error::Omar Gate summary missing; cannot validate trusted scan outputs."
            exit 1
          fi
          if echo "${summary}" | grep -q "status: \`skipped\`"; then
            echo "::error::Omar Gate was skipped for this commit; trusted scan outputs are required."
            exit 1
          fi
          if ! echo "${summary}" | grep -q "run_id:"; then
            echo "::error::Omar Gate summary missing run_id; cannot validate trusted scan outputs."
            exit 1
          fi
          echo "Omar Gate check run is successful for ${TARGET_SHA}."

  unit-coverage:
    name: Unit Coverage (>=80%, Node ${{ matrix.node }})
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [eval-impact, lint, syntax-matrix]
    strategy:
      fail-fast: false
      matrix:
        node: ["22"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Enforce unit coverage thresholds
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: coverage-lcov-node-${{ matrix.node }}
          path: coverage/lcov.info
          if-no-files-found: error

  e2e-packaging:
    name: E2E & Package (Node ${{ matrix.node }})
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: [unit-coverage]
    strategy:
      fail-fast: false
      matrix:
        node: ["22"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Validate package tarball
        if: ${{ matrix.node == '22' }}
        run: npm pack --dry-run

  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-22.04
    needs: [eval-impact, lint, syntax-matrix, security-omar, unit-coverage, e2e-packaging]
    if: >-
      ${{
        always() &&
        needs.eval-impact.result == 'success' &&
        contains(fromJSON('["resolved","approved_skip"]'), needs.eval-impact.outputs.eval_resolution) &&
        (needs.eval-impact.outputs.eval_required != 'true' || needs.eval-impact.outputs.eval_evidence_found == 'true') &&
        needs.lint.result == 'success' &&
        needs.syntax-matrix.result == 'success' &&
        needs.security-omar.result == 'success' &&
        needs.unit-coverage.result == 'success' &&
        needs.e2e-packaging.result == 'success'
      }}
    steps:
      - name: Confirm all quality gates passed
        run: echo "All quality checks passed."
