name: Quality Gates

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: >-
    ${{
      github.event_name == 'pull_request' && format('quality-gates-pr-{0}', github.event.pull_request.number) ||
      (github.ref == 'refs/heads/main' && 'quality-gates-main') ||
      format('quality-gates-ref-{0}', github.ref)
    }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.ref_protected != true }}

permissions:
  checks: read
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CANONICAL_NODE_VERSION: "22"

jobs:
  eval-impact:
    name: Eval Impact Gate
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    outputs:
      eval_resolution: ${{ steps.eval.outputs.eval_resolution }}
      eval_required: ${{ steps.eval.outputs.eval_required }}
      eval_evidence_found: ${{ steps.eval.outputs.eval_evidence_found }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Evaluate AI-impacting changes
        id: eval
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
          ALLOW_SKIP_EVENTS: ${{ vars.EVAL_IMPACT_ALLOW_SKIP_EVENTS || 'workflow_dispatch' }}
        run: |
          set -euo pipefail
          append_output() {
            local line="$1"
            if [ -n "${GITHUB_OUTPUT:-}" ]; then
              echo "${line}" >> "${GITHUB_OUTPUT}"
            fi
          }
          csv_contains_event() {
            local csv="$1"
            local event_name="$2"
            local item=""
            IFS=',' read -r -a items <<< "${csv}"
            for item in "${items[@]}"; do
              item="$(echo "${item}" | xargs)"
              if [ "${item}" = "${event_name}" ]; then
                return 0
              fi
            done
            return 1
          }
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            base_sha="${PR_BASE_SHA}"
            head_sha="${PR_HEAD_SHA}"
          else
            base_sha="${PUSH_BEFORE_SHA}"
            head_sha="${PUSH_HEAD_SHA}"
          fi
          if [ -z "${head_sha}" ]; then
            head_sha="HEAD"
          fi
          if [ -z "${base_sha}" ] || [ "${base_sha}" = "0000000000000000000000000000000000000000" ]; then
            if git rev-parse "${head_sha}^" >/dev/null 2>&1; then
              base_sha="$(git rev-parse "${head_sha}^")"
              echo "::notice::Eval impact gate resolved base from ${head_sha} parent commit ${base_sha}."
            else
              if csv_contains_event "${ALLOW_SKIP_EVENTS}" "${EVENT_NAME}"; then
                echo "::notice::No parent commit available for ${head_sha}; approved skip for event ${EVENT_NAME} (ALLOW_SKIP_EVENTS=${ALLOW_SKIP_EVENTS})."
                if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
                  {
                    echo "## Eval Impact Gate"
                    echo "- status: \`approved_skip\`"
                    echo "- event: \`${EVENT_NAME}\`"
                    echo "- reason: no parent commit available and event is allowlisted."
                    echo "- allow_skip_events: \`${ALLOW_SKIP_EVENTS}\`"
                  } >> "${GITHUB_STEP_SUMMARY}"
                fi
                append_output "eval_resolution=approved_skip"
                append_output "eval_required=false"
                append_output "eval_evidence_found=false"
                exit 0
              fi
              echo "::error::Eval impact gate could not resolve base commit for ${EVENT_NAME} (head=${head_sha}) and this event is not allowlisted to skip."
              exit 1
            fi
          fi
          bash scripts/eval/eval-check.sh "${base_sha}" "${head_sha}"
          append_output "eval_resolution=resolved"

  eval-enforce:
    name: Eval Impact Enforcement
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    needs: [eval-impact]
    if: always()
    outputs:
      eval_resolution: ${{ needs.eval-impact.outputs.eval_resolution }}
      eval_required: ${{ needs.eval-impact.outputs.eval_required }}
      eval_evidence_found: ${{ needs.eval-impact.outputs.eval_evidence_found }}
    steps:
      - name: Enforce eval-impact policy for protected events
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVAL_JOB_RESULT: ${{ needs.eval-impact.result }}
          EVAL_RESOLUTION: ${{ needs.eval-impact.outputs.eval_resolution }}
          EVAL_REQUIRED: ${{ needs.eval-impact.outputs.eval_required }}
          EVAL_EVIDENCE_FOUND: ${{ needs.eval-impact.outputs.eval_evidence_found }}
        run: |
          set -euo pipefail
          if [ "${EVAL_JOB_RESULT}" != "success" ]; then
            echo "::error::eval-impact job did not succeed (result=${EVAL_JOB_RESULT})."
            exit 1
          fi
          case "${EVAL_RESOLUTION}" in
            resolved|approved_skip) ;;
            *)
              echo "::error::Unsupported eval_resolution '${EVAL_RESOLUTION}'."
              exit 1
              ;;
          esac
          if [ "${EVAL_RESOLUTION}" = "approved_skip" ] && [ "${EVENT_NAME}" != "workflow_dispatch" ]; then
            echo "::error::approved_skip is only allowed for workflow_dispatch events."
            exit 1
          fi
          if [ "${EVAL_REQUIRED}" = "true" ] && [ "${EVAL_EVIDENCE_FOUND}" != "true" ]; then
            echo "::error::Eval evidence required but not found."
            exit 1
          fi

  action-pin-policy:
    name: Action Pin Policy
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    needs: [eval-enforce]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Enforce locked action pin policy
        shell: bash
        run: bash .github/scripts/verify-workflow-action-pins.sh

  lint:
    name: Lint
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [eval-enforce, action-pin-policy]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.CANONICAL_NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run lint gate
        run: npm run check

  syntax-matrix:
    name: Syntax & Sanity (Node ${{ matrix.node }})
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [eval-enforce, action-pin-policy]
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate CLI runtime entrypoints
        shell: bash
        run: |
          set -euo pipefail
          node --version
          node bin/sentinelayer-cli.js --version
          node bin/create-sentinelayer.js --version
          node bin/sl.js --version

  test:
    name: Test
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    needs: [eval-enforce, lint, syntax-matrix]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.CANONICAL_NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run test suite
        run: npm test

  unit-coverage:
    name: Unit Coverage (>=80%, Node ${{ matrix.node }})
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [eval-enforce, lint, syntax-matrix, test]
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Enforce unit coverage thresholds
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: coverage-lcov-node-${{ matrix.node }}
          path: coverage/lcov.info
          if-no-files-found: error

  security-semgrep:
    name: Security Semgrep
    needs: [eval-enforce, lint, syntax-matrix, test]
    uses: ./.github/workflows/semgrep.yml
    permissions:
      contents: read

  security-gitleaks:
    name: Security Gitleaks
    needs: [eval-enforce, lint, syntax-matrix, test]
    uses: ./.github/workflows/gitleaks.yml
    permissions:
      contents: read

  security-iac:
    name: Security IaC
    needs: [eval-enforce, lint, syntax-matrix, test]
    uses: ./.github/workflows/iac-scan.yml
    permissions:
      contents: read

  security-sca:
    name: Security SCA
    needs: [eval-enforce, lint, syntax-matrix, test]
    uses: ./.github/workflows/sca-audit.yml
    permissions:
      contents: read

  security-license:
    name: Security License
    needs: [eval-enforce, lint, syntax-matrix, test]
    uses: ./.github/workflows/license-gate.yml
    permissions:
      contents: read

  security-sbom:
    name: Security SBOM
    needs: [eval-enforce, lint, syntax-matrix, test]
    uses: ./.github/workflows/sbom.yml
    permissions:
      contents: read

  security-codeql:
    name: Security CodeQL
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: [eval-enforce, lint, syntax-matrix, test]
    permissions:
      contents: read
      pull-requests: read
      security-events: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Evaluate CodeQL alerts directly in workflow
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.sha }}
          PR_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}
          PR_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
          CODEQL_ALERTS_POLL_SECONDS: "3"
        run: |
          set -euo pipefail
          case "${CODEQL_ALERTS_POLL_SECONDS}" in ''|*[!0-9]*) echo "::error::Invalid CODEQL_ALERTS_POLL_SECONDS value: ${CODEQL_ALERTS_POLL_SECONDS}" ; exit 1 ;; esac
          target_ref_sha="${TARGET_SHA}"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ] && [ -n "${PR_HEAD_SHA}" ]; then
            target_ref_sha="${PR_HEAD_SHA}"
          fi
          endpoints=()
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ] && [[ "${PR_NUMBER}" =~ ^[0-9]+$ ]]; then
            endpoints+=("repos/${GITHUB_REPOSITORY}/code-scanning/alerts?state=open&pr=${PR_NUMBER}&tool_name=CodeQL&per_page=100")
          fi
          endpoints+=("repos/${GITHUB_REPOSITORY}/code-scanning/alerts?state=open&ref=${target_ref_sha}&tool_name=CodeQL&per_page=100")
          alerts_json=""
          selected_endpoint=""
          for endpoint in "${endpoints[@]}"; do
            for attempt in 1 2 3; do
              response="$(gh api "${endpoint}" 2>/tmp/codeql-policy.err || true)"
              if [ -n "${response}" ]; then
                alerts_json="${response}"
                selected_endpoint="${endpoint}"
                break 2
              fi
              if [ "${attempt}" -lt 3 ]; then
                sleep "${CODEQL_ALERTS_POLL_SECONDS}"
              fi
            done
          done
          if [ -z "${alerts_json}" ]; then
            echo "::error::Unable to resolve CodeQL alerts via GitHub code-scanning API."
            cat /tmp/codeql-policy.err || true
            exit 1
          fi
          query_mode="ref"
          if [[ "${selected_endpoint}" == *"pr="* ]]; then
            query_mode="pull_request"
          fi
          total_alerts="$(echo "${alerts_json}" | jq 'if type=="array" then length else 0 end')"
          high_critical_alerts="$(echo "${alerts_json}" | jq '
            if type=="array" then
              [
                .[]
                | select(
                    (.rule.security_severity_level // .rule.severity // .severity // "" | ascii_downcase) == "high"
                    or
                    (.rule.security_severity_level // .rule.severity // .severity // "" | ascii_downcase) == "critical"
                  )
              ] | length
            else 0 end
          ')"
          case "${total_alerts}" in ''|*[!0-9]*) echo "::error::Invalid CodeQL alert count: ${total_alerts}" ; exit 1 ;; esac
          case "${high_critical_alerts}" in ''|*[!0-9]*) echo "::error::Invalid CodeQL high/critical count: ${high_critical_alerts}" ; exit 1 ;; esac
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            {
              echo "## Security CodeQL"
              echo "- mode: \`in-workflow-policy\`"
              echo "- query_mode: \`${query_mode}\`"
              echo "- query_endpoint: \`${selected_endpoint}\`"
              echo "- analysis_target_sha: \`${target_ref_sha}\`"
              echo "- total_open_alerts: \`${total_alerts}\`"
              echo "- high_critical_open_alerts: \`${high_critical_alerts}\`"
            } >> "${GITHUB_STEP_SUMMARY}"
          fi
          if [ "${high_critical_alerts}" -gt 0 ]; then
            echo "::error::CodeQL policy blocked: ${high_critical_alerts} high/critical open alerts."
            exit 1
          fi

  security-stage:
    name: Security Stage
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    needs:
      - build-package
      - security-semgrep
      - security-gitleaks
      - security-iac
      - security-sca
      - security-license
      - security-sbom
      - security-codeql
    if: >-
      ${{
        always() &&
        needs.build-package.result == 'success' &&
        needs.security-semgrep.result == 'success' &&
        needs.security-gitleaks.result == 'success' &&
        needs.security-iac.result == 'success' &&
        needs.security-sca.result == 'success' &&
        needs.security-license.result == 'success' &&
        needs.security-sbom.result == 'success' &&
        needs.security-codeql.result == 'success'
      }}
    steps:
      - name: Confirm in-workflow security suites passed
        shell: bash
        env:
          SEMGREP_RESULT: ${{ needs.security-semgrep.result }}
          GITLEAKS_RESULT: ${{ needs.security-gitleaks.result }}
          IAC_RESULT: ${{ needs.security-iac.result }}
          SCA_RESULT: ${{ needs.security-sca.result }}
          LICENSE_RESULT: ${{ needs.security-license.result }}
          SBOM_RESULT: ${{ needs.security-sbom.result }}
          CODEQL_RESULT: ${{ needs.security-codeql.result }}
        run: |
          set -euo pipefail
          for suite in \
            "semgrep:${SEMGREP_RESULT}" \
            "gitleaks:${GITLEAKS_RESULT}" \
            "iac:${IAC_RESULT}" \
            "sca:${SCA_RESULT}" \
            "license:${LICENSE_RESULT}" \
            "sbom:${SBOM_RESULT}" \
            "codeql:${CODEQL_RESULT}"; do
            suite_name="${suite%%:*}"
            suite_result="${suite##*:}"
            if [ "${suite_result}" != "success" ]; then
              echo "::error::Security suite ${suite_name} did not succeed (result=${suite_result})."
              exit 1
            fi
          done
          echo "Semgrep, gitleaks, IaC, SCA, license, and SBOM suites passed in this quality workflow run."

  e2e-packaging:
    name: E2E & Package (Node ${{ matrix.node }})
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: [unit-coverage]
    strategy:
      fail-fast: false
      matrix:
        node: ["22"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Validate package tarball
        if: ${{ matrix.node == '22' }}
        run: npm pack --dry-run

  build-package:
    name: Build Package Artifact
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [unit-coverage, e2e-packaging]
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      tarball: ${{ steps.pack.outputs.tarball }}
      sha256: ${{ steps.pack.outputs.sha256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.CANONICAL_NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build canonical package tarball
        id: pack
        shell: bash
        env:
          TARGET_COMMIT_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          npm pack --ignore-scripts --json > pack.json
          tarball="$(jq -r '.[0].filename' pack.json)"
          test -n "${tarball}"
          test -f "${tarball}"
          sha256="$(sha256sum "${tarball}" | awk '{print $1}')"
          jq -n \
            --arg tarball "${tarball}" \
            --arg sha256 "${sha256}" \
            --arg commit_sha "${TARGET_COMMIT_SHA}" \
            --arg workflow_ref "${GITHUB_WORKFLOW_REF}" \
            --arg workflow_name "${GITHUB_WORKFLOW}" \
            --arg run_id "${GITHUB_RUN_ID}" \
            --arg run_attempt "${GITHUB_RUN_ATTEMPT}" \
            '{
              tarball: $tarball,
              sha256: $sha256,
              commit_sha: $commit_sha,
              workflow_ref: $workflow_ref,
              workflow_name: $workflow_name,
              run_id: $run_id,
              run_attempt: $run_attempt
            }' > quality-package-manifest.json
          echo "tarball=${tarball}" >> "$GITHUB_OUTPUT"
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"

      - name: Upload quality package artifact
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: quality-package-artifacts
          path: |
            pack.json
            quality-package-manifest.json
            ${{ steps.pack.outputs.tarball }}
          if-no-files-found: error
          retention-days: 7

      - name: Generate quality artifact provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}

  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-22.04
    needs: [eval-enforce, action-pin-policy, lint, syntax-matrix, test, unit-coverage, security-stage, e2e-packaging, build-package]
    if: >-
      ${{
        always() &&
        needs.eval-enforce.result == 'success' &&
        needs.action-pin-policy.result == 'success' &&
        contains(fromJSON('["resolved","approved_skip"]'), needs.eval-enforce.outputs.eval_resolution) &&
        needs.lint.result == 'success' &&
        needs.syntax-matrix.result == 'success' &&
        needs.test.result == 'success' &&
        needs.unit-coverage.result == 'success' &&
        needs.security-stage.result == 'success' &&
        needs.e2e-packaging.result == 'success' &&
        needs.build-package.result == 'success'
      }}
    steps:
      - name: Confirm all quality gates passed
        run: |
          echo "All quality checks passed."
          echo "Canonical package tarball: ${{ needs.build-package.outputs.tarball }}"
          echo "Canonical package sha256: ${{ needs.build-package.outputs.sha256 }}"
