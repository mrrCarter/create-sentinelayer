name: Rollback Readiness

on:
  schedule:
    - cron: "0 7 * * 1"
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: rollback-readiness-${{ github.event_name == 'push' && github.ref_name || 'schedule' }}
  cancel-in-progress: false

jobs:
  rollback-readiness:
    name: Rollback Readiness
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Run rollback readiness audit (diagnostic)
        shell: bash
        env:
          PACKAGE_NAME: sentinelayer-cli
          ROLLBACK_MODE: diagnostic
          NON_BLOCKING_DIAGNOSTICS: "0"
        run: |
          set -euo pipefail
          bash .github/scripts/release-rollback-readiness.sh
          test -f release-rollback-readiness.json
          {
            echo "## Rollback Readiness"
            echo "- mode: \`diagnostic\`"
            echo "- status: \`completed\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload rollback readiness audit artifact
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: rollback-readiness-audit
          path: release-rollback-readiness.json
          if-no-files-found: error
          retention-days: 30
