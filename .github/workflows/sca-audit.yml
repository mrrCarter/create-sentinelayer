name: SCA Audit

on:
  workflow_call:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  schedule:
    - cron: "43 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CANONICAL_NODE_VERSION: "22"
  SCA_AUDIT_ATTEMPTS: "3"
  SCA_AUDIT_TIMEOUT_SECONDS: "120"

jobs:
  sca-audit:
    name: SCA Audit
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.CANONICAL_NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run npm audit policy
        run: |
          set -euo pipefail
          case "${SCA_AUDIT_ATTEMPTS}" in ''|*[!0-9]*) echo "::error::Invalid SCA_AUDIT_ATTEMPTS: ${SCA_AUDIT_ATTEMPTS}" ; exit 1 ;; esac
          case "${SCA_AUDIT_TIMEOUT_SECONDS}" in ''|*[!0-9]*) echo "::error::Invalid SCA_AUDIT_TIMEOUT_SECONDS: ${SCA_AUDIT_TIMEOUT_SECONDS}" ; exit 1 ;; esac
          if [ "${SCA_AUDIT_ATTEMPTS}" -lt 1 ]; then
            echo "::error::SCA_AUDIT_ATTEMPTS must be >= 1."
            exit 1
          fi
          if [ "${SCA_AUDIT_TIMEOUT_SECONDS}" -lt 10 ]; then
            echo "::error::SCA_AUDIT_TIMEOUT_SECONDS must be >= 10."
            exit 1
          fi

          audit_exit=1
          validated_report="false"
          for attempt in $(seq 1 "${SCA_AUDIT_ATTEMPTS}"); do
            set +e
            timeout "${SCA_AUDIT_TIMEOUT_SECONDS}" npm audit --audit-level=moderate --json > npm-audit.json
            audit_exit=$?
            set -e

            if [ ! -s npm-audit.json ]; then
              if [ "${attempt}" -lt "${SCA_AUDIT_ATTEMPTS}" ]; then
                echo "::warning::npm audit attempt ${attempt}/${SCA_AUDIT_ATTEMPTS} produced an empty report (exit=${audit_exit}); retrying."
                sleep $((attempt * 2))
                continue
              fi
              echo "::error::npm-audit.json was empty after ${SCA_AUDIT_ATTEMPTS} attempt(s)."
              exit 1
            fi

            if node <<'NODE'
          const fs = require("node:fs");
          const requiredKeys = ["info", "low", "moderate", "high", "critical", "total"];
          let report;
          try {
            report = JSON.parse(fs.readFileSync("npm-audit.json", "utf8"));
          } catch (error) {
            console.error(`::error::npm-audit.json is not valid JSON: ${error.message}`);
            process.exit(1);
          }

          const vulnerabilities = report?.metadata?.vulnerabilities;
          if (!vulnerabilities || typeof vulnerabilities !== "object" || Array.isArray(vulnerabilities)) {
            console.error("::error::npm-audit.json missing metadata.vulnerabilities object.");
            process.exit(1);
          }

          for (const key of requiredKeys) {
            const value = vulnerabilities[key];
            if (!Number.isInteger(value) || value < 0) {
              console.error(`::error::npm-audit.json has invalid vulnerabilities.${key}: ${value}`);
              process.exit(1);
            }
          }

          console.log(`npm audit summary: ${JSON.stringify(vulnerabilities)}`);
          NODE
            then
              validated_report="true"
              break
            fi

            if [ "${attempt}" -lt "${SCA_AUDIT_ATTEMPTS}" ]; then
              echo "::warning::npm audit attempt ${attempt}/${SCA_AUDIT_ATTEMPTS} produced an invalid report (exit=${audit_exit}); retrying."
              sleep $((attempt * 2))
            fi
          done

          if [ "${validated_report}" != "true" ]; then
            echo "::error::npm audit report validation failed after ${SCA_AUDIT_ATTEMPTS} attempt(s)."
            exit 1
          fi

          if [ "${audit_exit}" -ne 0 ]; then
            echo "::error::npm audit policy failed (moderate+ vulnerability detected)."
            exit "${audit_exit}"
          fi

      - name: Upload SCA audit artifact
        if: always()
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: npm-audit-report
          path: npm-audit.json
          if-no-files-found: warn
          retention-days: 7

  sca-summary:
    name: SCA Summary
    runs-on: ubuntu-22.04
    needs: [sca-audit]
    if: >-
      ${{
        always() &&
        needs.sca-audit.result == 'success'
      }}
    steps:
      - name: Confirm SCA audit passed
        run: echo "SCA audit completed successfully."
