name: SCA Audit

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  schedule:
    - cron: "43 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sca-audit:
    name: SCA Audit
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run npm audit policy
        run: |
          set +e
          npm audit --audit-level=moderate --json > npm-audit.json
          audit_exit=$?
          set -e

          if [ -s npm-audit.json ]; then
            node -e "const fs=require('fs');const report=JSON.parse(fs.readFileSync('npm-audit.json','utf8'));const m=(report.metadata&&report.metadata.vulnerabilities)||{};console.log('npm audit summary:',JSON.stringify(m));"
          else
            echo "::warning::npm-audit.json was empty."
          fi

          if [ "${audit_exit}" -ne 0 ]; then
            echo "::error::npm audit policy failed (moderate+ vulnerability detected)."
            exit "${audit_exit}"
          fi

      - name: Upload SCA audit artifact
        if: always()
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: npm-audit-report
          path: npm-audit.json
          if-no-files-found: warn
          retention-days: 7

  sca-summary:
    name: SCA Summary
    runs-on: ubuntu-22.04
    needs: [sca-audit]
    if: >-
      ${{
        always() &&
        needs.sca-audit.result == 'success'
      }}
    steps:
      - name: Confirm SCA audit passed
        run: echo "SCA audit completed successfully."
