name: SBOM

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SYFT_VERSION: v1.42.3

jobs:
  sbom-generate:
    name: SBOM Generate
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom-cyclonedx.json
          syft-version: ${{ env.SYFT_VERSION }}
          upload-artifact: "false"
          upload-release-assets: "false"
          dependency-snapshot: "false"

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: sbom-spdx.json
          syft-version: ${{ env.SYFT_VERSION }}
          upload-artifact: "false"
          upload-release-assets: "false"
          dependency-snapshot: "false"

      - name: Validate SBOM payloads and build hash manifest
        shell: bash
        run: |
          set -euo pipefail
          test -s sbom-cyclonedx.json
          test -s sbom-spdx.json
          cyclonedx_components="$(jq -r '.components | length' sbom-cyclonedx.json)"
          spdx_packages="$(jq -r '.packages | length' sbom-spdx.json)"
          case "${cyclonedx_components}" in ''|*[!0-9]*) echo "::error::Invalid CycloneDX component count: ${cyclonedx_components}" ; exit 1 ;; esac
          case "${spdx_packages}" in ''|*[!0-9]*) echo "::error::Invalid SPDX package count: ${spdx_packages}" ; exit 1 ;; esac
          if [ "${cyclonedx_components}" -le 0 ] || [ "${spdx_packages}" -le 0 ]; then
            echo "::error::SBOM generation produced empty inventories."
            exit 1
          fi
          cyclonedx_sha="$(sha256sum sbom-cyclonedx.json | awk '{print $1}')"
          spdx_sha="$(sha256sum sbom-spdx.json | awk '{print $1}')"
          jq -n \
            --arg generated_at "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --arg syft_version "${SYFT_VERSION}" \
            --arg cyclonedx_sha256 "${cyclonedx_sha}" \
            --arg spdx_sha256 "${spdx_sha}" \
            --argjson cyclonedx_components "${cyclonedx_components}" \
            --argjson spdx_packages "${spdx_packages}" \
            '{
              generated_at: $generated_at,
              syft_version: $syft_version,
              files: [
                {
                  path: "sbom-cyclonedx.json",
                  format: "cyclonedx-json",
                  sha256: $cyclonedx_sha256,
                  component_count: $cyclonedx_components
                },
                {
                  path: "sbom-spdx.json",
                  format: "spdx-json",
                  sha256: $spdx_sha256,
                  package_count: $spdx_packages
                }
              ]
            }' > sbom-manifest.json
          echo "cyclonedx_components=${cyclonedx_components}" >> "$GITHUB_ENV"
          echo "spdx_packages=${spdx_packages}" >> "$GITHUB_ENV"
          echo "cyclonedx_sha256=${cyclonedx_sha}" >> "$GITHUB_ENV"
          echo "spdx_sha256=${spdx_sha}" >> "$GITHUB_ENV"

      - name: Upload SBOM artifacts
        if: always()
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: sbom-artifacts
          path: |
            sbom-cyclonedx.json
            sbom-spdx.json
            sbom-manifest.json
          if-no-files-found: error
          retention-days: 7

      - name: Emit SBOM summary
        shell: bash
        run: |
          set -euo pipefail
          echo "## SBOM Generation" >> "$GITHUB_STEP_SUMMARY"
          echo "- syft_version: \`${SYFT_VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- cyclonedx_components: \`${cyclonedx_components}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- spdx_packages: \`${spdx_packages}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- cyclonedx_sha256: \`${cyclonedx_sha256}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- spdx_sha256: \`${spdx_sha256}\`" >> "$GITHUB_STEP_SUMMARY"

  sbom-summary:
    name: SBOM Summary
    runs-on: ubuntu-22.04
    needs: [sbom-generate]
    if: >-
      ${{
        always() &&
        needs.sbom-generate.result == 'success'
      }}
    steps:
      - name: Confirm SBOM generation passed
        run: echo "SBOM generation completed successfully."
