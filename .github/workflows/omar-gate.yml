name: Omar Gate

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      scan_mode:
        description: Sentinelayer scan profile
        required: false
        default: deep
        type: choice
        options:
          - pr-diff
          - deep
          - nightly
      severity_gate:
        description: Severity threshold that blocks merge
        required: false
        default: P1
        type: choice
        options:
          - P0
          - P1
          - P2
      p2_max_allowed:
        description: Maximum allowed P2 findings before Omar Gate blocks merge
        required: false
        default: "5"
        type: string

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  OMAR_SPEC_ID: fbe281812ebeeedcffcfe0442a94407bd4fb64ae78f3c21606512c9b94825afb

jobs:
  omar_untrusted_scan:
    name: Omar Gate Untrusted Scan
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    outputs:
      run_id: ${{ steps.untrusted.outputs.run_id }}
      gate_status: ${{ steps.untrusted.outputs.gate_status }}
      p0_count: ${{ steps.untrusted.outputs.p0_count }}
      p1_count: ${{ steps.untrusted.outputs.p1_count }}
      p2_count: ${{ steps.untrusted.outputs.p2_count }}
      p3_count: ${{ steps.untrusted.outputs.p3_count }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v4.2.2
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies (untrusted context)
        shell: bash
        run: |
          set -euo pipefail
          npm ci --ignore-scripts
      - name: Run deterministic untrusted scan
        id: untrusted
        shell: bash
        run: |
          set -euo pipefail
          set +e
          SENTINELAYER_CLI_SKIP_AUTH=1 node bin/sl.js review --path . --json > omar-untrusted-review.json
          review_exit="$?"
          set -e
          if [ "${review_exit}" -ne 0 ] && [ "${review_exit}" -ne 2 ]; then
            echo "::error::Untrusted deterministic scan failed with exit code ${review_exit}."
            exit "${review_exit}"
          fi
          if ! jq -e '
            type == "object"
            and (.runId | type == "string" and length > 0)
            and (.p0 | type == "number")
            and (.p1 | type == "number")
            and (.p2 | type == "number")
            and (.p3 | type == "number")
          ' omar-untrusted-review.json >/dev/null; then
            echo "::error::Untrusted deterministic scan produced invalid JSON payload."
            cat omar-untrusted-review.json || true
            exit 1
          fi
          run_id="$(jq -r '.runId' omar-untrusted-review.json)"
          p0="$(jq -r '.p0' omar-untrusted-review.json)"
          p1="$(jq -r '.p1' omar-untrusted-review.json)"
          p2="$(jq -r '.p2' omar-untrusted-review.json)"
          p3="$(jq -r '.p3' omar-untrusted-review.json)"
          gate_status="passed"
          if [ "${p0}" -gt 0 ] || [ "${p1}" -gt 0 ]; then
            gate_status="blocked"
          fi
          echo "run_id=${run_id}" >> "${GITHUB_OUTPUT}"
          echo "gate_status=${gate_status}" >> "${GITHUB_OUTPUT}"
          echo "p0_count=${p0}" >> "${GITHUB_OUTPUT}"
          echo "p1_count=${p1}" >> "${GITHUB_OUTPUT}"
          echo "p2_count=${p2}" >> "${GITHUB_OUTPUT}"
          echo "p3_count=${p3}" >> "${GITHUB_OUTPUT}"
          {
            echo "## Omar Gate (Untrusted Deterministic Scan)"
            echo "- status: \`${gate_status}\`"
            echo "- source: \`local-deterministic\`"
            echo "- findings: \`P0=${p0} P1=${p1} P2=${p2} P3=${p3}\`"
            echo "- run_id: \`${run_id}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  omar_scan:
    name: Omar Gate (Deep Scan)
    if: >-
      ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-22.04
    permissions:
      actions: read
      contents: read
      id-token: write
      checks: write
      pull-requests: write
    outputs:
      trusted_context: ${{ steps.trust_boundary.outputs.trusted_context }}
      credential_mode: ${{ steps.resolve_omar_credentials.outputs.credential_mode }}
      run_id: ${{ steps.omar_result.outputs.run_id }}
      gate_status: ${{ steps.omar_result.outputs.gate_status }}
      p0_count: ${{ steps.omar_result.outputs.p0_count }}
      p1_count: ${{ steps.omar_result.outputs.p1_count }}
      p2_count: ${{ steps.omar_result.outputs.p2_count }}
      p3_count: ${{ steps.omar_result.outputs.p3_count }}
      evidence_digest: ${{ steps.omar_result.outputs.evidence_digest }}
      idempotency_key: ${{ steps.omar_result.outputs.idempotency_key }}
      archive_sha256: ${{ steps.artifact_secret_scan.outputs.archive_sha256 }}
      artifact_id: ${{ steps.artifact_upload.outputs.artifact-id }}
      upload_digest: ${{ steps.artifact_upload.outputs.artifact-digest }}
      subject_sha: ${{ steps.omar_result.outputs.subject_sha }}
      workflow_sha: ${{ steps.omar_result.outputs.workflow_sha }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v4.2.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - name: Resolve trusted execution boundary
        id: trust_boundary
        shell: bash
        run: |
          set -euo pipefail
          echo "trusted_context=true" >> "${GITHUB_OUTPUT}"
      - name: Bind Omar scan provenance
        id: provenance
        if: steps.trust_boundary.outputs.trusted_context == 'true'
        shell: bash
        env:
          TARGET_SUBJECT_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          set -euo pipefail
          actual_subject_sha="$(git rev-parse HEAD)"
          expected_subject_sha="$(echo "${TARGET_SUBJECT_SHA}" | tr '[:upper:]' '[:lower:]' | xargs)"
          workflow_sha="$(echo "${WORKFLOW_SHA}" | tr '[:upper:]' '[:lower:]' | xargs)"
          if ! echo "${expected_subject_sha}" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error::Expected Omar subject SHA is invalid."
            exit 1
          fi
          if [ "${actual_subject_sha}" != "${expected_subject_sha}" ]; then
            echo "::error::Checked-out Omar subject mismatch. expected=${expected_subject_sha} actual=${actual_subject_sha}."
            exit 1
          fi
          if ! echo "${workflow_sha}" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error::Omar workflow SHA is invalid."
            exit 1
          fi
          workflow_file_sha256="$(sha256sum .github/workflows/omar-gate.yml | awk '{print $1}')"
          validator_sha256="$(sha256sum src/scan/omar-action-evidence-validator.mjs | awk '{print $1}')"
          echo "subject_sha=${actual_subject_sha}" >> "${GITHUB_OUTPUT}"
          echo "workflow_sha=${workflow_sha}" >> "${GITHUB_OUTPUT}"
          echo "workflow_file_sha256=${workflow_file_sha256}" >> "${GITHUB_OUTPUT}"
          echo "validator_sha256=${validator_sha256}" >> "${GITHUB_OUTPUT}"
      - name: Resolve Omar credential mode
        if: steps.trust_boundary.outputs.trusted_context == 'true'
        id: resolve_omar_credentials
        shell: bash
        env:
          SENTINELAYER_TOKEN: ${{ secrets.SENTINELAYER_TOKEN }}
          OMAR_TOKEN_EXCHANGE_URL: ${{ vars.OMAR_TOKEN_EXCHANGE_URL || '' }}
          OMAR_TOKEN_EXCHANGE_AUDIENCE: ${{ vars.OMAR_TOKEN_EXCHANGE_AUDIENCE || '' }}
          OMAR_TOKEN_EXCHANGE_ISSUER: ${{ vars.OMAR_TOKEN_EXCHANGE_ISSUER || '' }}
          OMAR_TOKEN_EXCHANGE_MAX_TTL_SECONDS: ${{ vars.OMAR_TOKEN_EXCHANGE_MAX_TTL_SECONDS || '3600' }}
          OMAR_TOKEN_EXCHANGE_PINNED_PUBKEY_SHA256: ${{ vars.OMAR_TOKEN_EXCHANGE_PINNED_PUBKEY_SHA256 || '' }}
          OMAR_REQUIRE_PINNED_PUBKEY_ON_PROTECTED_REF: ${{ vars.OMAR_REQUIRE_PINNED_PUBKEY_ON_PROTECTED_REF || 'true' }}
          OMAR_REQUIRE_RESPONSE_BINDING_ON_PROTECTED_REF: ${{ vars.OMAR_REQUIRE_RESPONSE_BINDING_ON_PROTECTED_REF || 'true' }}
          OMAR_TOKEN_EXCHANGE_ALLOWED_HOSTS: ${{ vars.OMAR_TOKEN_EXCHANGE_ALLOWED_HOSTS || 'api.sentinelayer.com' }}
          OMAR_TOKEN_EXCHANGE_ALLOWED_PATHS: ${{ vars.OMAR_TOKEN_EXCHANGE_ALLOWED_PATHS || '/v1/token/exchange/sentinelayer' }}
          OMAR_REQUIRE_OIDC_ON_PROTECTED_REF: ${{ vars.OMAR_REQUIRE_OIDC_ON_PROTECTED_REF || 'true' }}
          OMAR_ALLOW_STATIC_SECRETS: ${{ vars.OMAR_ALLOW_STATIC_SECRETS || 'false' }}
          GITHUB_REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          set -euo pipefail
          mode="static-secrets"
          credential_env_name="SENTINELAYER_TOKEN"
          resolved_credential="${!credential_env_name}"
          exchange_url="$(echo "${OMAR_TOKEN_EXCHANGE_URL}" | xargs || true)"
          exchange_audience="$(echo "${OMAR_TOKEN_EXCHANGE_AUDIENCE}" | xargs || true)"
          event_name="${GITHUB_EVENT_NAME}"
          ref_protected="$(echo "${GITHUB_REF_PROTECTED}" | tr '[:upper:]' '[:lower:]' | xargs || true)"
          allow_static="$(echo "${OMAR_ALLOW_STATIC_SECRETS:-false}" | tr '[:upper:]' '[:lower:]' | xargs || true)"
          require_pinned="$(echo "${OMAR_REQUIRE_PINNED_PUBKEY_ON_PROTECTED_REF}" | tr '[:upper:]' '[:lower:]' | xargs || true)"
          require_response_binding_on_protected="$(echo "${OMAR_REQUIRE_RESPONSE_BINDING_ON_PROTECTED_REF}" | tr '[:upper:]' '[:lower:]' | xargs || true)"
          pinned_pubkey="$(echo "${OMAR_TOKEN_EXCHANGE_PINNED_PUBKEY_SHA256}" | xargs || true)"
          if [ -z "${exchange_url}" ] || [ -z "${exchange_audience}" ]; then
            if [ "${allow_static}" != "true" ]; then
              if [ "${ref_protected}" = "true" ]; then
                echo "::error::OIDC exchange is required for Omar Gate on protected refs. Configure OMAR_TOKEN_EXCHANGE_URL and OMAR_TOKEN_EXCHANGE_AUDIENCE, or set OMAR_ALLOW_STATIC_SECRETS=true only as a documented emergency fallback until exchange is provisioned."
              else
                echo "::error::OIDC exchange is required for Omar Gate on ${event_name} events. Configure OMAR_TOKEN_EXCHANGE_URL and OMAR_TOKEN_EXCHANGE_AUDIENCE, or set OMAR_ALLOW_STATIC_SECRETS=true for emergency static fallback."
              fi
              exit 1
            fi
            if [ "${ref_protected}" = "true" ]; then
              echo "::warning::Protected ref is using explicit OMAR_ALLOW_STATIC_SECRETS=true fallback because Omar OIDC exchange is not configured. Provision OMAR_TOKEN_EXCHANGE_URL and OMAR_TOKEN_EXCHANGE_AUDIENCE, then unset OMAR_ALLOW_STATIC_SECRETS."
            fi
          fi
          if [ -n "${exchange_url}" ] && [ -n "${exchange_audience}" ]; then
            if ! echo "${exchange_url}" | grep -Eq '^https://'; then
              echo "::error::OMAR_TOKEN_EXCHANGE_URL must use https://."
              exit 1
            fi
            exchange_host="$(node -e "try { const u = new URL(process.argv[1]); process.stdout.write(String(u.hostname || '').toLowerCase()); } catch { process.exit(1); }" "${exchange_url}" || true)"
            exchange_path="$(node -e "try { const u = new URL(process.argv[1]); process.stdout.write(String(u.pathname || '/')); } catch { process.exit(1); }" "${exchange_url}" || true)"
            if [ -z "${exchange_host}" ] || [ -z "${exchange_path}" ]; then
              echo "::error::OMAR_TOKEN_EXCHANGE_URL is not a valid absolute URL."
              exit 1
            fi
            host_allowed="false"
            IFS=',' read -r -a allowed_hosts <<< "${OMAR_TOKEN_EXCHANGE_ALLOWED_HOSTS}"
            for host in "${allowed_hosts[@]}"; do
              candidate="$(echo "${host}" | tr '[:upper:]' '[:lower:]' | xargs)"
              if [ -n "${candidate}" ] && [ "${candidate}" = "${exchange_host}" ]; then
                host_allowed="true"
                break
              fi
            done
            if [ "${host_allowed}" != "true" ]; then
              echo "::error::OMAR_TOKEN_EXCHANGE_URL host '${exchange_host}' is not allowlisted. Allowed hosts: ${OMAR_TOKEN_EXCHANGE_ALLOWED_HOSTS}."
              exit 1
            fi
            path_allowed="false"
            IFS=',' read -r -a allowed_paths <<< "${OMAR_TOKEN_EXCHANGE_ALLOWED_PATHS}"
            for allowed_path in "${allowed_paths[@]}"; do
              candidate_path="$(echo "${allowed_path}" | xargs)"
              if [ -n "${candidate_path}" ] && [ "${candidate_path}" = "${exchange_path}" ]; then
                path_allowed="true"
                break
              fi
            done
            if [ "${path_allowed}" != "true" ]; then
              echo "::error::OMAR_TOKEN_EXCHANGE_URL path '${exchange_path}' is not allowlisted. Allowed paths: ${OMAR_TOKEN_EXCHANGE_ALLOWED_PATHS}."
              exit 1
            fi
            if [ "${ref_protected}" = "true" ] && [ "${require_pinned}" != "false" ] && [ -z "${pinned_pubkey}" ]; then
              echo "::error::Pinned public key is required for Omar token exchange on protected refs. Set OMAR_TOKEN_EXCHANGE_PINNED_PUBKEY_SHA256."
              exit 1
            fi
            curl_pinned_arg=""
            if [ -n "${pinned_pubkey}" ]; then
              if echo "${pinned_pubkey}" | grep -q '^sha256//'; then
                curl_pinned_arg="--pinnedpubkey ${pinned_pubkey}"
              else
                curl_pinned_arg="--pinnedpubkey sha256//${pinned_pubkey}"
              fi
            fi
            if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
              echo "::error::OIDC exchange is configured but GitHub OIDC request context is unavailable."
              exit 1
            fi
            oidc_url="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${exchange_audience}"
            oidc_response="$(curl -fsS --retry 2 --retry-delay 1 --retry-all-errors --connect-timeout 5 --max-time 20 \
              -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              "${oidc_url}")"
            oidc_token="$(echo "${oidc_response}" | jq -r '.value // empty')"
            if [ -z "${oidc_token}" ]; then
              echo "::error::OIDC exchange failed: missing id_token value in GitHub OIDC response."
              exit 1
            fi
            exchange_nonce="$(printf '%s|%s|%s|%s' "${GITHUB_RUN_ID}" "${GITHUB_RUN_ATTEMPT}" "${GITHUB_SHA}" "$(date +%s%N)" | sha256sum | awk '{print $1}')"
            exchange_payload="$(jq -n \
              --arg repository "${GITHUB_REPOSITORY}" \
              --arg run_id "${GITHUB_RUN_ID}" \
              --arg run_attempt "${GITHUB_RUN_ATTEMPT}" \
              --arg ref "${GITHUB_REF}" \
              --arg sha "${GITHUB_SHA}" \
              --arg exchange_nonce "${exchange_nonce}" \
              '{repository: $repository, run_id: $run_id, run_attempt: $run_attempt, ref: $ref, sha: $sha, exchange_nonce: $exchange_nonce}')"
            exchange_headers="$(mktemp)"
            exchange_body="$(mktemp)"
            exchange_status="$(curl -sS --retry 2 --retry-delay 1 --retry-all-errors --connect-timeout 5 --max-time 20 \
              -D "${exchange_headers}" \
              -o "${exchange_body}" \
              -w "%{http_code}" \
              ${curl_pinned_arg} \
              -H "Authorization: Bearer ${oidc_token}" \
              -H "Content-Type: application/json" \
              -d "${exchange_payload}" \
              "${exchange_url}")"
            if [ "${exchange_status}" != "200" ]; then
              echo "::error::OIDC exchange failed with status ${exchange_status}."
              exchange_error_code="$(jq -r '.error_code // .code // empty' "${exchange_body}" 2>/dev/null || true)"
              exchange_request_id="$(jq -r '.request_id // .requestId // empty' "${exchange_body}" 2>/dev/null || true)"
              if [ -n "${exchange_error_code}" ] || [ -n "${exchange_request_id}" ]; then
                echo "::error::exchange_error_code=${exchange_error_code:-<none>} exchange_request_id=${exchange_request_id:-<none>}"
              fi
              exit 1
            fi
            content_type="$(grep -i '^content-type:' "${exchange_headers}" | tail -n 1 | cut -d':' -f2- | xargs || true)"
            if ! echo "${content_type}" | grep -qi '^application/json'; then
              echo "::error::OIDC exchange response content-type must be application/json (received '${content_type:-<none>}')."
              exit 1
            fi
            if ! jq -e 'type=="object" and (.sentinelayer_token|type=="string" and length>0) and (.expires_at|type=="string" and length>0) and (.issuer|type=="string" and length>0) and (.audience|type=="string" and length>0)' "${exchange_body}" >/dev/null 2>&1; then
              echo "::error::OIDC exchange response schema invalid or missing required fields."
              exchange_error_code="$(jq -r '.error_code // .code // empty' "${exchange_body}" 2>/dev/null || true)"
              exchange_request_id="$(jq -r '.request_id // .requestId // empty' "${exchange_body}" 2>/dev/null || true)"
              if [ -n "${exchange_error_code}" ] || [ -n "${exchange_request_id}" ]; then
                echo "::error::exchange_error_code=${exchange_error_code:-<none>} exchange_request_id=${exchange_request_id:-<none>}"
              fi
              exit 1
            fi
            resolved_credential="$(jq -r '.sentinelayer_token' "${exchange_body}")"
            exchange_issuer="$(jq -r '.issuer' "${exchange_body}")"
            exchange_audience_resp="$(jq -r '.audience' "${exchange_body}")"
            exchange_expires_at="$(jq -r '.expires_at' "${exchange_body}")"
            response_repository="$(jq -r '.repository // empty' "${exchange_body}")"
            response_run_id="$(jq -r '.run_id // empty' "${exchange_body}")"
            response_sha="$(jq -r '.sha // empty' "${exchange_body}")"
            response_nonce="$(jq -r '.exchange_nonce // empty' "${exchange_body}")"
            if [ -n "${exchange_audience}" ] && [ "${exchange_audience_resp}" != "${exchange_audience}" ]; then
              echo "::error::OIDC exchange audience mismatch. expected=${exchange_audience} actual=${exchange_audience_resp}."
              exit 1
            fi
            expected_issuer="$(echo "${OMAR_TOKEN_EXCHANGE_ISSUER}" | xargs || true)"
            if [ -n "${expected_issuer}" ] && [ "${exchange_issuer}" != "${expected_issuer}" ]; then
              echo "::error::OIDC exchange issuer mismatch. expected=${expected_issuer} actual=${exchange_issuer}."
              exit 1
            fi
            expires_epoch="$(date -u -d "${exchange_expires_at}" +%s 2>/dev/null || true)"
            if [ -z "${expires_epoch}" ]; then
              echo "::error::OIDC exchange expires_at is invalid: ${exchange_expires_at}."
              exit 1
            fi
            now_epoch="$(date +%s)"
            ttl_seconds="$((expires_epoch - now_epoch))"
            max_ttl="$(echo "${OMAR_TOKEN_EXCHANGE_MAX_TTL_SECONDS}" | xargs || true)"
            case "${max_ttl}" in ''|*[!0-9]*) echo "::error::Invalid OMAR_TOKEN_EXCHANGE_MAX_TTL_SECONDS value: ${max_ttl}" ; exit 1 ;; esac
            if [ "${ttl_seconds}" -le 0 ]; then
              echo "::error::OIDC exchange token is already expired (ttl=${ttl_seconds})."
              exit 1
            fi
            if [ "${ttl_seconds}" -gt "${max_ttl}" ]; then
              echo "::error::OIDC exchange token TTL ${ttl_seconds}s exceeds maximum ${max_ttl}s."
              exit 1
            fi
            # Enforce response binding checks on ALL refs, not only
            # protected. Unprotected contexts are still subject to token
            # forgery / replay if the binding isn't validated. Opt-out via
            # OMAR_REQUIRE_RESPONSE_BINDING_ON_PROTECTED_REF=false remains as
            # an emergency escape hatch but applies globally now, and is
            # deprecated — remove in a future release.
            if [ "${require_response_binding_on_protected}" != "false" ]; then
              if [ -z "${response_repository}" ] || [ -z "${response_run_id}" ] || [ -z "${response_sha}" ] || [ -z "${response_nonce}" ]; then
                echo "::error::OIDC exchange response binding fields are required (repository, run_id, sha, exchange_nonce)."
                exit 1
              fi
              if [ "${response_repository}" != "${GITHUB_REPOSITORY}" ]; then
                echo "::error::OIDC exchange repository binding mismatch. expected=${GITHUB_REPOSITORY} actual=${response_repository}."
                exit 1
              fi
              if [ "${response_run_id}" != "${GITHUB_RUN_ID}" ]; then
                echo "::error::OIDC exchange run_id binding mismatch. expected=${GITHUB_RUN_ID} actual=${response_run_id}."
                exit 1
              fi
              if [ "${response_sha}" != "${GITHUB_SHA}" ]; then
                echo "::error::OIDC exchange sha binding mismatch. expected=${GITHUB_SHA} actual=${response_sha}."
                exit 1
              fi
              if [ "${response_nonce}" != "${exchange_nonce}" ]; then
                echo "::error::OIDC exchange nonce binding mismatch."
                exit 1
              fi
            fi
            mode="oidc-exchange"
          fi
          require_oidc="$(echo "${OMAR_REQUIRE_OIDC_ON_PROTECTED_REF}" | tr '[:upper:]' '[:lower:]' | xargs || true)"
          if [ "${mode}" = "static-secrets" ] && [ "${ref_protected}" = "true" ] && [ "${require_oidc}" != "false" ] && [ "${allow_static}" != "true" ]; then
            echo "::error::Static-secret Omar mode is blocked on protected refs. Configure OMAR_TOKEN_EXCHANGE_URL and OMAR_TOKEN_EXCHANGE_AUDIENCE."
            exit 1
          fi
          echo "::add-mask::${resolved_credential}"
          echo "sentinelayer_token=${resolved_credential}" >> "${GITHUB_OUTPUT}"
          echo "credential_mode=${mode}" >> "${GITHUB_OUTPUT}"
          {
            echo "## Omar Credential Mode"
            echo "- mode: \`${mode}\`"
            if [ -n "${exchange_url}" ] && [ -n "${exchange_audience}" ]; then
              echo "- exchange_url: \`${exchange_url}\`"
              echo "- exchange_audience: \`${exchange_audience}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Validate Sentinelayer token secret
        if: steps.trust_boundary.outputs.trusted_context == 'true'
        shell: bash
        env:
          CREDENTIAL_MODE: ${{ steps.resolve_omar_credentials.outputs.credential_mode || '' }}
          RESOLVED_SENTINELAYER_TOKEN: ${{ steps.resolve_omar_credentials.outputs.sentinelayer_token || '' }}
          SENTINELAYER_TOKEN: ${{ secrets.SENTINELAYER_TOKEN }}
        run: |
          set -euo pipefail
          mode="$(echo "${CREDENTIAL_MODE}" | xargs || true)"
          if [ "${mode}" = "oidc-exchange" ]; then
            bash .github/scripts/require-secret.sh "OMAR_OIDC_EXCHANGED_SENTINELAYER_TOKEN" "${RESOLVED_SENTINELAYER_TOKEN}"
            exit 0
          fi
          bash .github/scripts/require-secret.sh "SENTINELAYER_TOKEN" "${SENTINELAYER_TOKEN}"
      - name: Validate Omar configuration invariants
        if: steps.trust_boundary.outputs.trusted_context == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if ! echo "${OMAR_SPEC_ID}" | grep -Eq '^[a-f0-9]{64}$'; then
            echo "::error::OMAR_SPEC_ID must be a 64-character lowercase hex digest."
            exit 1
          fi
      - name: Enforce security-review environment policy
        if: steps.trust_boundary.outputs.trusted_context == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          set -euo pipefail
          env_json="$(gh api "repos/${GITHUB_REPOSITORY}/environments/security-review")"
          reviewer_count="$(echo "${env_json}" | jq -r '[.protection_rules[]? | select(.type=="required_reviewers") | .reviewers[]?] | length')"
          ref_protected="$(echo "${GITHUB_REF_PROTECTED}" | tr '[:upper:]' '[:lower:]' | xargs || true)"
          case "${reviewer_count}" in ''|*[!0-9]*) echo "::error::Invalid security-review reviewer count: ${reviewer_count}" ; exit 1 ;; esac
          if [ "${ref_protected}" = "true" ] && [ "${reviewer_count}" -lt 1 ]; then
            echo "::error::security-review environment has no required reviewers configured for protected refs."
            exit 1
          fi
          {
            echo "## Security Review Environment"
            echo "- required_reviewers: \`${reviewer_count}\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Validate Omar workflow contract
        if: steps.trust_boundary.outputs.trusted_context == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/ci/check_omar_workflow_contract.py --self-test
          python3 scripts/ci/check_omar_workflow_contract.py
          python3 scripts/ci/check_forbidden_omar_surface.py --self-test
          python3 scripts/ci/check_forbidden_omar_surface.py
      - name: Verify managed Omar token secret
        if: steps.trust_boundary.outputs.trusted_context == 'true'
        shell: bash
        env:
          SENTINELAYER_TOKEN: ${{ steps.resolve_omar_credentials.outputs.sentinelayer_token }}
        run: |
          set -euo pipefail
          if [ -z "${SENTINELAYER_TOKEN:-}" ]; then
            echo "::error::SENTINELAYER_TOKEN is required for Omar telemetry/upload."
            exit 1
          fi
      - name: Run Omar Gate
        if: steps.trust_boundary.outputs.trusted_context == 'true'
        id: omar
        continue-on-error: true
        uses: mrrCarter/sentinelayer-v1-action@52fe9cf0d0d4656ce2b6f4af0eb5652fa07b31c5
        with:
          github_token: ${{ github.token }}
          publish_github: "false"
          comment_tag: ${{ format('omar-gate-{0}-{1}', github.run_id, github.run_attempt) }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          google_api_key: ${{ secrets.GOOGLE_GEMINI_API_KEY != '' && secrets.GOOGLE_GEMINI_API_KEY || secrets.GOOGLE_API_KEY }}
          llm_provider: ${{ secrets.OPENAI_API_KEY != '' && 'openai' || ((secrets.GOOGLE_GEMINI_API_KEY != '' || secrets.GOOGLE_API_KEY != '') && 'google' || 'openai') }}
          sentinelayer_token: ${{ steps.resolve_omar_credentials.outputs.sentinelayer_token }}
          sentinelayer_spec_id: ${{ env.OMAR_SPEC_ID }}
          sentinelayer_managed_llm: ${{ steps.resolve_omar_credentials.outputs.sentinelayer_token != '' }}
          scan_mode: ${{ github.event_name == 'workflow_dispatch' && inputs.scan_mode || 'deep' }}
          severity_gate: none
          model: ${{ secrets.OPENAI_API_KEY != '' && 'gpt-5.3-codex' || ((secrets.GOOGLE_GEMINI_API_KEY != '' || secrets.GOOGLE_API_KEY != '') && 'gemini-2.5-flash' || 'gpt-5.3-codex') }}
          codex_model: gpt-5.3-codex
          model_fallback: ${{ (secrets.GOOGLE_GEMINI_API_KEY != '' || secrets.GOOGLE_API_KEY != '') && 'gemini-2.5-flash' || 'gpt-4.1-mini' }}
          use_codex: ${{ secrets.OPENAI_API_KEY != '' || (secrets.GOOGLE_GEMINI_API_KEY == '' && secrets.GOOGLE_API_KEY == '') }}
          codex_only: "false"
          llm_failure_policy: block
          max_daily_scans: ${{ vars.OMAR_MAX_DAILY_SCANS || '200' }}
          min_scan_interval_minutes: ${{ vars.OMAR_MIN_SCAN_INTERVAL_MINUTES || '0' }}
          rate_limit_fail_mode: closed
      - name: Build Omar evidence manifest
        id: evidence_manifest
        if: ${{ always() && steps.trust_boundary.outputs.trusted_context == 'true' }}
        shell: bash
        env:
          OMAR_ACTION_REF: mrrCarter/sentinelayer-v1-action@52fe9cf0d0d4656ce2b6f4af0eb5652fa07b31c5
          OMAR_ACTION_OUTCOME: ${{ steps.omar.outcome || '' }}
          OMAR_GATE_STATUS: ${{ steps.omar.outputs.gate_status || '' }}
          OMAR_RUN_ID: ${{ steps.omar.outputs.run_id || '' }}
          OMAR_IDEMPOTENCY_KEY: ${{ steps.omar.outputs.idempotency_key || '' }}
          OMAR_ACTION_SCAN_MODE: ${{ steps.omar.outputs.scan_mode || '' }}
          OMAR_POLICY_PACK: ${{ steps.omar.outputs.policy_pack || '' }}
          OMAR_POLICY_PACK_VERSION: ${{ steps.omar.outputs.policy_pack_version || '' }}
          OMAR_P0: ${{ steps.omar.outputs.p0_count || '' }}
          OMAR_P1: ${{ steps.omar.outputs.p1_count || '' }}
          OMAR_P2: ${{ steps.omar.outputs.p2_count || '' }}
          OMAR_P3: ${{ steps.omar.outputs.p3_count || '' }}
          OMAR_FINDINGS_ARTIFACT: ${{ steps.omar.outputs.findings_artifact || '' }}
          OMAR_PACK_SUMMARY_ARTIFACT: ${{ steps.omar.outputs.pack_summary_artifact || '' }}
          OMAR_LLM_ATTEMPTED: ${{ steps.omar.outputs.llm_attempted || '' }}
          OMAR_LLM_SUCCESS: ${{ steps.omar.outputs.llm_success || '' }}
          OMAR_LLM_OUTPUT_VALID: ${{ steps.omar.outputs.llm_output_valid || '' }}
          OMAR_LLM_NO_FINDINGS_REPORTED: ${{ steps.omar.outputs.llm_no_findings_reported || '' }}
          OMAR_LLM_FINDINGS_COUNT: ${{ steps.omar.outputs.llm_findings_count || '' }}
          OMAR_LLM_PARSE_ERROR_COUNT: ${{ steps.omar.outputs.llm_parse_error_count || '' }}
          OMAR_LLM_FAILURE_CLASS: ${{ steps.omar.outputs.llm_failure_class || '' }}
          OMAR_SUBJECT_SHA: ${{ steps.provenance.outputs.subject_sha || '' }}
          OMAR_WORKFLOW_SHA: ${{ steps.provenance.outputs.workflow_sha || '' }}
          OMAR_WORKFLOW_FILE_SHA256: ${{ steps.provenance.outputs.workflow_file_sha256 || '' }}
          OMAR_VALIDATOR_SHA256: ${{ steps.provenance.outputs.validator_sha256 || '' }}
          OMAR_WORKFLOW_REF: ${{ github.workflow_ref }}
          OMAR_EVENT_NAME: ${{ github.event_name }}
          OMAR_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number || '0' }}
          OMAR_COMMENT_TAG: ${{ format('omar-gate-{0}-{1}', github.run_id, github.run_attempt) }}
        run: |
          set -euo pipefail
          mkdir -p omar-validation
          node --input-type=module <<'NODE'
          import fs from "node:fs";

          const env = (name) => process.env[name] ?? "";
          const manifest = {
            schema_version: "1.0",
            action: {
              ref: env("OMAR_ACTION_REF"),
              outcome: env("OMAR_ACTION_OUTCOME"),
              gate_status: env("OMAR_GATE_STATUS"),
              run_id: env("OMAR_RUN_ID"),
              idempotency_key: env("OMAR_IDEMPOTENCY_KEY"),
              scan_mode: env("OMAR_ACTION_SCAN_MODE"),
              policy_pack: env("OMAR_POLICY_PACK"),
              policy_pack_version: env("OMAR_POLICY_PACK_VERSION"),
              p0_count: env("OMAR_P0"),
              p1_count: env("OMAR_P1"),
              p2_count: env("OMAR_P2"),
              p3_count: env("OMAR_P3"),
              findings_artifact: env("OMAR_FINDINGS_ARTIFACT"),
              pack_summary_artifact: env("OMAR_PACK_SUMMARY_ARTIFACT"),
              llm_attempted: env("OMAR_LLM_ATTEMPTED"),
              llm_success: env("OMAR_LLM_SUCCESS"),
              llm_output_valid: env("OMAR_LLM_OUTPUT_VALID"),
              llm_no_findings_reported: env("OMAR_LLM_NO_FINDINGS_REPORTED"),
              llm_findings_count: env("OMAR_LLM_FINDINGS_COUNT"),
              llm_parse_error_count: env("OMAR_LLM_PARSE_ERROR_COUNT"),
              llm_failure_class: env("OMAR_LLM_FAILURE_CLASS"),
            },
            provenance: {
              subject_sha: env("OMAR_SUBJECT_SHA"),
              workflow_sha: env("OMAR_WORKFLOW_SHA"),
              workflow_ref: env("OMAR_WORKFLOW_REF"),
              workflow_file_sha256: env("OMAR_WORKFLOW_FILE_SHA256"),
              validator_sha256: env("OMAR_VALIDATOR_SHA256"),
              repository: env("GITHUB_REPOSITORY"),
              github_run_id: env("GITHUB_RUN_ID"),
              github_run_attempt: env("GITHUB_RUN_ATTEMPT"),
              event_name: env("OMAR_EVENT_NAME"),
              pull_request_number: env("OMAR_PULL_REQUEST_NUMBER"),
              comment_tag: env("OMAR_COMMENT_TAG"),
            },
          };
          fs.writeFileSync(
            "omar-validation/action-evidence-input.json",
            `${JSON.stringify(manifest, null, 2)}\n`,
            { encoding: "utf8", mode: 0o600 },
          );
          NODE
      - name: Validate live Omar evidence
        id: omar_result
        if: ${{ always() && steps.trust_boundary.outputs.trusted_context == 'true' }}
        continue-on-error: true
        shell: bash
        env:
          EXPECTED_SUBJECT_SHA: ${{ steps.provenance.outputs.subject_sha || '' }}
          EXPECTED_WORKFLOW_SHA: ${{ steps.provenance.outputs.workflow_sha || '' }}
          EXPECTED_WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          node src/scan/omar-action-evidence-validator.mjs \
            --input omar-validation/action-evidence-input.json \
            --workspace-root "${GITHUB_WORKSPACE}" \
            --expected-subject-sha "${EXPECTED_SUBJECT_SHA}" \
            --expected-workflow-sha "${EXPECTED_WORKFLOW_SHA}" \
            --expected-workflow-ref "${EXPECTED_WORKFLOW_REF}" \
            --summary-out omar-validation/validated-evidence.json \
            --github-output "${GITHUB_OUTPUT}"
      - name: Stage Omar artifacts (redacted)
        if: ${{ always() && steps.trust_boundary.outputs.trusted_context == 'true' }}
        shell: bash
        env:
          OMAR_UPLOAD_LOGS: ${{ vars.OMAR_UPLOAD_LOGS || 'false' }}
          OMAR_ACTION_OUTCOME: ${{ steps.omar.outcome || '' }}
          OMAR_VALIDATION_OUTCOME: ${{ steps.omar_result.outcome || '' }}
          OMAR_RUN_ID: ${{ steps.omar_result.outputs.run_id || '' }}
          OMAR_GATE_STATUS: ${{ steps.omar_result.outputs.gate_status || '' }}
          OMAR_P0: ${{ steps.omar_result.outputs.p0_count || '0' }}
          OMAR_P1: ${{ steps.omar_result.outputs.p1_count || '0' }}
          OMAR_P2: ${{ steps.omar_result.outputs.p2_count || '0' }}
          OMAR_P3: ${{ steps.omar_result.outputs.p3_count || '0' }}
          OMAR_PACK_SUMMARY_PATH: ${{ steps.omar_result.outputs.pack_summary_path || '' }}
          OMAR_FINDINGS_PATH: ${{ steps.omar_result.outputs.findings_path || '' }}
          OMAR_PACK_SHA256: ${{ steps.omar_result.outputs.pack_sha256 || '' }}
          OMAR_FINDINGS_SHA256: ${{ steps.omar_result.outputs.findings_sha256 || '' }}
          OMAR_EVIDENCE_DIGEST: ${{ steps.omar_result.outputs.evidence_digest || '' }}
          OMAR_IDEMPOTENCY_KEY: ${{ steps.omar_result.outputs.idempotency_key || '' }}
          OMAR_SUBJECT_SHA: ${{ steps.omar_result.outputs.subject_sha || steps.provenance.outputs.subject_sha || '' }}
          OMAR_WORKFLOW_SHA: ${{ steps.omar_result.outputs.workflow_sha || steps.provenance.outputs.workflow_sha || '' }}
          OMAR_LLM_FAILURE_CLASS: ${{ steps.omar.outputs.llm_failure_class || '' }}
          OMAR_SCAN_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.scan_mode || 'deep' }}
          OMAR_SEVERITY_GATE: ${{ github.event_name == 'workflow_dispatch' && inputs.severity_gate || 'P1' }}
          OMAR_P2_MAX_ALLOWED: ${{ github.event_name == 'workflow_dispatch' && inputs.p2_max_allowed || '5' }}
        run: |
          set -euo pipefail
          rm -rf omar-artifacts
          mkdir -p omar-artifacts/original omar-artifacts/reports omar-artifacts/telemetry omar-artifacts/validation
          if [ -d ".sentinelayer/reports" ]; then
            cp -R .sentinelayer/reports/. omar-artifacts/reports/ 2>/dev/null || true
          fi
          if [ -d ".sentinelayer/telemetry" ]; then
            cp -R .sentinelayer/telemetry/. omar-artifacts/telemetry/ 2>/dev/null || true
          fi
          if [ "$(echo "${OMAR_UPLOAD_LOGS}" | tr '[:upper:]' '[:lower:]' | xargs || true)" = "true" ] && [ -d ".sentinelayer/logs" ]; then
            mkdir -p omar-artifacts/logs
            cp -R .sentinelayer/logs/. omar-artifacts/logs/ 2>/dev/null || true
          fi
          cp omar-validation/action-evidence-input.json omar-artifacts/validation/action-evidence-input.json
          if [ -f omar-validation/validated-evidence.json ]; then
            cp omar-validation/validated-evidence.json omar-artifacts/validation/validated-evidence.json
          fi
          if [ "${OMAR_VALIDATION_OUTCOME}" = "success" ]; then
            test -f "${OMAR_PACK_SUMMARY_PATH}"
            test -f "${OMAR_FINDINGS_PATH}"
            cp "${OMAR_PACK_SUMMARY_PATH}" omar-artifacts/original/PACK_SUMMARY.json
            cp "${OMAR_FINDINGS_PATH}" omar-artifacts/original/FINDINGS.jsonl
            staged_pack_sha256="$(sha256sum omar-artifacts/original/PACK_SUMMARY.json | awk '{print $1}')"
            staged_findings_sha256="$(sha256sum omar-artifacts/original/FINDINGS.jsonl | awk '{print $1}')"
            if [ "${staged_pack_sha256}" != "${OMAR_PACK_SHA256}" ] || [ "${staged_findings_sha256}" != "${OMAR_FINDINGS_SHA256}" ]; then
              echo "::error::Staged Omar evidence differs from the validated Action bytes."
              exit 1
            fi
          fi
          node --input-type=module <<'NODE'
          import fs from "node:fs";

          const env = (name, fallback = "") => process.env[name] ?? fallback;
          const integer = (name) => {
            const value = env(name, "0");
            return /^\d+$/.test(value) ? Number(value) : 0;
          };
          const repository = env("GITHUB_REPOSITORY");
          const githubRunId = env("GITHUB_RUN_ID");
          const serverUrl = env("GITHUB_SERVER_URL", "https://github.com").replace(/\/$/, "");
          const summary = {
            schema_version: "2.0",
            kind: "validated_omar_gate_summary",
            validation_succeeded: env("OMAR_VALIDATION_OUTCOME") === "success",
            action_outcome: env("OMAR_ACTION_OUTCOME"),
            validation_outcome: env("OMAR_VALIDATION_OUTCOME"),
            run_id: env("OMAR_RUN_ID"),
            gate_status: env("OMAR_GATE_STATUS"),
            findings: {
              P0: integer("OMAR_P0"),
              P1: integer("OMAR_P1"),
              P2: integer("OMAR_P2"),
              P3: integer("OMAR_P3"),
            },
            threshold: {
              severity_gate: env("OMAR_SEVERITY_GATE", "P1"),
              p2_max_allowed: integer("OMAR_P2_MAX_ALLOWED"),
            },
            evidence: {
              action_ref: "mrrCarter/sentinelayer-v1-action@52fe9cf0d0d4656ce2b6f4af0eb5652fa07b31c5",
              llm_failure_policy: "block",
              failure_class: env("OMAR_LLM_FAILURE_CLASS"),
              pack_sha256: env("OMAR_PACK_SHA256"),
              findings_sha256: env("OMAR_FINDINGS_SHA256"),
              evidence_digest: env("OMAR_EVIDENCE_DIGEST"),
              idempotency_key: env("OMAR_IDEMPOTENCY_KEY"),
            },
            provenance: {
              subject_sha: env("OMAR_SUBJECT_SHA"),
              workflow_sha: env("OMAR_WORKFLOW_SHA"),
              workflow_ref: env("GITHUB_WORKFLOW_REF"),
            },
            github: {
              repository,
              event_name: env("GITHUB_EVENT_NAME"),
              run_id: githubRunId,
              run_attempt: env("GITHUB_RUN_ATTEMPT"),
              run_url: repository && githubRunId ? `${serverUrl}/${repository}/actions/runs/${githubRunId}` : "",
            },
          };
          fs.writeFileSync(
            "omar-artifacts/summary.json",
            `${JSON.stringify(summary, null, 2)}\n`,
            { encoding: "utf8", mode: 0o600 },
          );
          NODE
      - name: Seal and scan staged Omar artifacts
        id: artifact_secret_scan
        if: ${{ always() && steps.trust_boundary.outputs.trusted_context == 'true' }}
        shell: bash
        env:
          OMAR_PACK_SHA256: ${{ steps.omar_result.outputs.pack_sha256 || '' }}
          OMAR_FINDINGS_SHA256: ${{ steps.omar_result.outputs.findings_sha256 || '' }}
        run: |
          set -euo pipefail
          if [ ! -d "omar-artifacts" ]; then
            exit 0
          fi
          rm -rf omar-upload omar-archive-verify omar-upload-verify
          mkdir -p omar-upload omar-validation
          report="omar-validation/secret-scan.json"
          manifest="omar-validation/artifact-manifest.json"
          set +e
          node .github/scripts/scan-omar-artifacts.js \
            --path omar-artifacts \
            --report "${report}" \
            --manifest "${manifest}"
          scan_exit="$?"
          set -e
          if [ "${scan_exit}" -ne 0 ]; then
            findings="$(jq 'length' "${report}" 2>/dev/null || echo 0)"
            echo "::error::Secret scan detected ${findings} potential secret(s) in Omar artifacts. Aborting upload."
            exit 1
          fi
          manifest_sha256="$(sha256sum "${manifest}" | awk '{print $1}')"
          cp "${manifest}" omar-artifacts/validation/artifact-manifest.json
          archive_file_list="$(pwd)/omar-validation/archive-files.nul"
          MANIFEST_PATH="${manifest}" ARCHIVE_FILE_LIST="${archive_file_list}" node --input-type=module <<'NODE'
          import fs from "node:fs";

          const manifest = JSON.parse(fs.readFileSync(process.env.MANIFEST_PATH, "utf8"));
          const paths = [
            ...manifest.files.map((entry) => entry.path),
            "validation/artifact-manifest.json",
          ].sort();
          if (
            paths.some(
              (entry) =>
                typeof entry !== "string" ||
                entry.length === 0 ||
                entry.includes("\0") ||
                entry.startsWith("/") ||
                entry.split("/").some((segment) => segment === "" || segment === "." || segment === ".."),
            ) ||
            new Set(paths).size !== paths.length
          ) {
            throw new Error("Artifact manifest contains an unsafe archive member path");
          }
          const chunks = paths.flatMap((entry) => [Buffer.from(entry, "utf8"), Buffer.from([0])]);
          fs.writeFileSync(process.env.ARCHIVE_FILE_LIST, Buffer.concat(chunks), {
            mode: 0o600,
          });
          NODE
          archive_tmp="omar-upload/omar-gate-artifacts.tar.tmp"
          tar \
            --sort=name \
            --mtime='@0' \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            --format=posix \
            --pax-option=delete=atime,delete=ctime \
            -cf "${archive_tmp}" \
            -C omar-artifacts \
            --null \
            --verbatim-files-from \
            --no-recursion \
            -T "${archive_file_list}"
          mkdir -p omar-archive-verify
          tar -xf "${archive_tmp}" -C omar-archive-verify --no-same-owner
          embedded_manifest="omar-archive-verify/validation/artifact-manifest.json"
          test "$(sha256sum "${embedded_manifest}" | awk '{print $1}')" = "${manifest_sha256}"
          node .github/scripts/scan-omar-artifacts.js \
            --path omar-archive-verify \
            --report omar-validation/archive-secret-scan.json \
            --expected-manifest "${embedded_manifest}"
          extracted_pack_sha256="$(sha256sum omar-archive-verify/original/PACK_SUMMARY.json | awk '{print $1}')"
          extracted_findings_sha256="$(sha256sum omar-archive-verify/original/FINDINGS.jsonl | awk '{print $1}')"
          if [ "${extracted_pack_sha256}" != "${OMAR_PACK_SHA256}" ] || [ "${extracted_findings_sha256}" != "${OMAR_FINDINGS_SHA256}" ]; then
            echo "::error::Sealed Omar archive differs from the validated Action bytes."
            exit 1
          fi
          archive_sha256="$(sha256sum "${archive_tmp}" | awk '{print $1}')"
          case "${archive_sha256}" in (''|*[!0-9a-f]*) echo "::error::Invalid sealed archive digest"; exit 1;; esac
          archive_path="omar-upload/omar-gate-artifacts-${archive_sha256}.tar"
          mv "${archive_tmp}" "${archive_path}"
          chmod 0444 "${archive_path}"
          rm -rf omar-artifacts omar-archive-verify
          echo "archive_path=${archive_path}" >> "${GITHUB_OUTPUT}"
          echo "archive_sha256=${archive_sha256}" >> "${GITHUB_OUTPUT}"
      - name: Upload Omar artifacts
        id: artifact_upload
        if: ${{ always() && steps.trust_boundary.outputs.trusted_context == 'true' && steps.artifact_secret_scan.outcome == 'success' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: omar-gate-artifacts
          path: ${{ steps.artifact_secret_scan.outputs.archive_path }}
          if-no-files-found: error
          compression-level: 0
      - name: Download uploaded Omar artifact for verification
        id: artifact_download
        if: ${{ always() && steps.trust_boundary.outputs.trusted_context == 'true' && steps.artifact_upload.outcome == 'success' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          artifact-ids: ${{ steps.artifact_upload.outputs.artifact-id }}
          path: omar-upload-verify
          merge-multiple: true
      - name: Verify sealed artifact handoff
        id: artifact_handoff
        if: ${{ always() && steps.trust_boundary.outputs.trusted_context == 'true' && steps.artifact_download.outcome == 'success' }}
        shell: bash
        env:
          OMAR_ARCHIVE_PATH: ${{ steps.artifact_secret_scan.outputs.archive_path || '' }}
          OMAR_ARCHIVE_SHA256: ${{ steps.artifact_secret_scan.outputs.archive_sha256 || '' }}
          OMAR_ARTIFACT_ID: ${{ steps.artifact_upload.outputs.artifact-id || '' }}
          OMAR_UPLOAD_DIGEST: ${{ steps.artifact_upload.outputs.artifact-digest || '' }}
          OMAR_DOWNLOAD_PATH: ${{ steps.artifact_download.outputs.download-path || '' }}
        run: |
          set -euo pipefail
          test -n "${OMAR_ARCHIVE_PATH}"
          test -f "${OMAR_ARCHIVE_PATH}"
          test ! -L "${OMAR_ARCHIVE_PATH}"
          test "$(basename "${OMAR_ARCHIVE_PATH}")" = "omar-gate-artifacts-${OMAR_ARCHIVE_SHA256}.tar"
          actual_sha256="$(sha256sum "${OMAR_ARCHIVE_PATH}" | awk '{print $1}')"
          test "${actual_sha256}" = "${OMAR_ARCHIVE_SHA256}"
          case "${OMAR_ARTIFACT_ID}" in (''|*[!0-9]*) echo "::error::Upload action did not return a canonical artifact id"; exit 1;; esac
          case "${OMAR_UPLOAD_DIGEST}" in (????????????????????????????????????????????????????????????????) ;; (*) echo "::error::Upload action did not return a canonical artifact digest"; exit 1;; esac
          case "${OMAR_UPLOAD_DIGEST}" in (*[!0-9a-f]*) echo "::error::Upload action returned an invalid artifact digest"; exit 1;; esac
          test -d "${OMAR_DOWNLOAD_PATH}"
          expected_filename="$(basename "${OMAR_ARCHIVE_PATH}")"
          downloaded_archive="${OMAR_DOWNLOAD_PATH}/${expected_filename}"
          test -f "${downloaded_archive}"
          test ! -L "${downloaded_archive}"
          test "$(find "${OMAR_DOWNLOAD_PATH}" -type f | wc -l | xargs)" = "1"
          test -z "$(find "${OMAR_DOWNLOAD_PATH}" -type l -print -quit)"
          downloaded_sha256="$(sha256sum "${downloaded_archive}" | awk '{print $1}')"
          test "${downloaded_sha256}" = "${OMAR_ARCHIVE_SHA256}"
      - name: Enforce validated Omar evidence
        if: ${{ always() && steps.trust_boundary.outputs.trusted_context == 'true' }}
        shell: bash
        env:
          OMAR_ACTION_OUTCOME: ${{ steps.omar.outcome || '' }}
          OMAR_VALIDATION_OUTCOME: ${{ steps.omar_result.outcome || '' }}
          OMAR_SECRET_SCAN_OUTCOME: ${{ steps.artifact_secret_scan.outcome || '' }}
          OMAR_ARTIFACT_UPLOAD_OUTCOME: ${{ steps.artifact_upload.outcome || '' }}
          OMAR_ARTIFACT_DOWNLOAD_OUTCOME: ${{ steps.artifact_download.outcome || '' }}
          OMAR_ARTIFACT_HANDOFF_OUTCOME: ${{ steps.artifact_handoff.outcome || '' }}
          OMAR_LLM_FAILURE_CLASS: ${{ steps.omar.outputs.llm_failure_class || '' }}
        run: |
          set -euo pipefail
          if [ "${OMAR_ACTION_OUTCOME}" != "success" ]; then
            echo "::error::Omar Action did not succeed; live evidence is non-authoritative (failure_class=${OMAR_LLM_FAILURE_CLASS:-unclassified})."
            exit 1
          fi
          if [ "${OMAR_VALIDATION_OUTCOME}" != "success" ]; then
            echo "::error::Omar Action evidence validation failed closed."
            exit 1
          fi
          if [ "${OMAR_SECRET_SCAN_OUTCOME}" != "success" ] || [ "${OMAR_ARTIFACT_UPLOAD_OUTCOME}" != "success" ] || [ "${OMAR_ARTIFACT_DOWNLOAD_OUTCOME}" != "success" ] || [ "${OMAR_ARTIFACT_HANDOFF_OUTCOME}" != "success" ]; then
            echo "::error::Validated Omar evidence was not safely retained."
            exit 1
          fi
  omar_enforce:
    name: Omar Gate
    needs: [omar_scan, omar_untrusted_scan]
    if: ${{ always() }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Require authoritative Omar scan success
        shell: bash
        env:
          TRUSTED_SCAN_RESULT: ${{ needs.omar_scan.result }}
          TRUSTED_CONTEXT: ${{ needs.omar_scan.outputs.trusted_context || '' }}
          UNTRUSTED_SCAN_RESULT: ${{ needs.omar_untrusted_scan.result }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REPOSITORY: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || '' }}
          BASE_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "pull_request" ] && [ "${HEAD_REPOSITORY}" != "${BASE_REPOSITORY}" ]; then
            if [ "${UNTRUSTED_SCAN_RESULT}" != "success" ]; then
              echo "::error::Untrusted Omar scan did not succeed (result=${UNTRUSTED_SCAN_RESULT})."
              exit 1
            fi
            echo "::error::Fork Omar scan is diagnostic only and cannot satisfy the required live gate. Trusted exact-subject promotion is required before merge."
            exit 1
          fi
          if [ "${TRUSTED_SCAN_RESULT}" != "success" ] || [ "${TRUSTED_CONTEXT}" != "true" ]; then
            echo "::error::Trusted Omar scan did not succeed (result=${TRUSTED_SCAN_RESULT}, trusted_context=${TRUSTED_CONTEXT:-<empty>})."
            exit 1
          fi
      - name: Enforce Omar reviewer merge thresholds
        shell: bash
        env:
          P0_COUNT: ${{ needs.omar_scan.outputs.trusted_context == 'true' && needs.omar_scan.outputs.p0_count || needs.omar_untrusted_scan.outputs.p0_count || '0' }}
          P1_COUNT: ${{ needs.omar_scan.outputs.trusted_context == 'true' && needs.omar_scan.outputs.p1_count || needs.omar_untrusted_scan.outputs.p1_count || '0' }}
          P2_COUNT: ${{ needs.omar_scan.outputs.trusted_context == 'true' && needs.omar_scan.outputs.p2_count || needs.omar_untrusted_scan.outputs.p2_count || '0' }}
          P2_MAX_ALLOWED: ${{ github.event_name == 'workflow_dispatch' && inputs.p2_max_allowed || '5' }}
          SEVERITY_GATE_SELECTED: ${{ github.event_name == 'workflow_dispatch' && inputs.severity_gate || 'P1' }}
          OMAR_POLICY_MIN_SEVERITY_GATE: ${{ vars.OMAR_POLICY_MIN_SEVERITY_GATE || 'P1' }}
          OMAR_POLICY_P2_MAX_ALLOWED: ${{ vars.OMAR_POLICY_P2_MAX_ALLOWED || '5' }}
          OMAR_ALLOW_RELAXATION_ON_DISPATCH: ${{ vars.OMAR_ALLOW_RELAXATION_ON_DISPATCH || 'false' }}
          GITHUB_REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          set -euo pipefail
          severity_rank() {
            case "$1" in
              P0) echo 0 ;;
              P1) echo 1 ;;
              P2) echo 2 ;;
              *) echo -1 ;;
            esac
          }
          rank_to_severity() {
            case "$1" in
              0) echo "P0" ;;
              1) echo "P1" ;;
              2) echo "P2" ;;
              *) echo "" ;;
            esac
          }
          p0="$(echo "${P0_COUNT}" | tr -d '\r' | xargs || true)"
          p1="$(echo "${P1_COUNT}" | tr -d '\r' | xargs || true)"
          p2="$(echo "${P2_COUNT}" | tr -d '\r' | xargs || true)"
          p2_max="$(echo "${P2_MAX_ALLOWED}" | tr -d '\r' | xargs || true)"
          severity_gate="$(echo "${SEVERITY_GATE_SELECTED}" | tr -d '\r' | xargs || true)"
          policy_gate="$(echo "${OMAR_POLICY_MIN_SEVERITY_GATE}" | tr -d '\r' | xargs || true)"
          policy_p2_max="$(echo "${OMAR_POLICY_P2_MAX_ALLOWED}" | tr -d '\r' | xargs || true)"
          relaxation_allowed="$(echo "${OMAR_ALLOW_RELAXATION_ON_DISPATCH}" | tr -d '\r' | xargs || true)"
          ref_protected="$(echo "${GITHUB_REF_PROTECTED}" | tr '[:upper:]' '[:lower:]' | xargs || true)"
          case "${p0}" in ''|*[!0-9]*) echo "::error::Invalid Omar P0 count: ${p0}" ; exit 1 ;; esac
          case "${p1}" in ''|*[!0-9]*) echo "::error::Invalid Omar P1 count: ${p1}" ; exit 1 ;; esac
          case "${p2}" in ''|*[!0-9]*) echo "::error::Invalid Omar P2 count: ${p2}" ; exit 1 ;; esac
          case "${p2_max}" in ''|*[!0-9]*) echo "::error::Invalid p2_max_allowed value: ${p2_max}" ; exit 1 ;; esac
          case "${policy_p2_max}" in ''|*[!0-9]*) echo "::error::Invalid OMAR_POLICY_P2_MAX_ALLOWED value: ${policy_p2_max}" ; exit 1 ;; esac
          selected_rank="$(severity_rank "${severity_gate}")"
          policy_rank="$(severity_rank "${policy_gate}")"
          if [ "${selected_rank}" -lt 0 ]; then
            echo "::error::Invalid severity_gate value: ${severity_gate}"
            exit 1
          fi
          if [ "${policy_rank}" -lt 0 ]; then
            echo "::error::Invalid OMAR_POLICY_MIN_SEVERITY_GATE value: ${policy_gate}"
            exit 1
          fi
          if [ "${selected_rank}" -lt "${policy_rank}" ] && [ "${ref_protected}" = "true" ] && [ "${relaxation_allowed}" != "true" ]; then
            echo "::error::workflow_dispatch severity_gate ${severity_gate} is weaker than policy minimum ${policy_gate} on protected ref."
            exit 1
          fi
          effective_rank="${selected_rank}"
          if [ "${policy_rank}" -gt "${effective_rank}" ]; then
            effective_rank="${policy_rank}"
          fi
          effective_gate="$(rank_to_severity "${effective_rank}")"
          if [ -z "${effective_gate}" ]; then
            echo "::error::Failed to resolve effective Omar severity gate."
            exit 1
          fi
          effective_p2_max="${p2_max}"
          if [ "${effective_gate}" = "P2" ]; then
            if [ "${effective_p2_max}" -gt "${policy_p2_max}" ] && [ "${ref_protected}" = "true" ] && [ "${relaxation_allowed}" != "true" ]; then
              echo "::error::p2_max_allowed ${effective_p2_max} exceeds policy maximum ${policy_p2_max} on protected ref."
              exit 1
            fi
            if [ "${policy_p2_max}" -lt "${effective_p2_max}" ]; then
              effective_p2_max="${policy_p2_max}"
            fi
          fi
          echo "OMAR_EFFECTIVE_SEVERITY_GATE=${effective_gate}" >> "$GITHUB_ENV"
          echo "OMAR_EFFECTIVE_P2_MAX_ALLOWED=${effective_p2_max}" >> "$GITHUB_ENV"
          case "${effective_gate}" in
            P0)
              if [ "${p0}" -gt 0 ]; then
                echo "::error::Omar Gate blocked: P0=${p0}. Threshold requires P0=0."
                exit 1
              fi
              ;;
            P1)
              if [ "${p0}" -gt 0 ] || [ "${p1}" -gt 0 ]; then
                echo "::error::Omar Gate blocked: P0=${p0}, P1=${p1}. Threshold requires P0=0 and P1=0."
                exit 1
              fi
              ;;
            P2)
              if [ "${p0}" -gt 0 ] || [ "${p1}" -gt 0 ]; then
                echo "::error::Omar Gate blocked: P0=${p0}, P1=${p1}. Threshold requires P0=0 and P1=0."
                exit 1
              fi
              if [ "${p2}" -gt "${effective_p2_max}" ]; then
                echo "::error::Omar Gate blocked: P2=${p2} exceeds max allowed ${effective_p2_max}."
                exit 1
              fi
              ;;
            *)
              echo "::error::Invalid effective severity_gate value: ${effective_gate}"
              exit 1
              ;;
          esac
          if [ "${effective_gate}" != "${severity_gate}" ]; then
            echo "::notice::Omar severity gate hardened by policy from ${severity_gate} to ${effective_gate}."
          fi
      - name: Emit Omar run summary
        shell: bash
        env:
          OMAR_RUN_ID: ${{ needs.omar_scan.outputs.trusted_context == 'true' && needs.omar_scan.outputs.run_id || needs.omar_untrusted_scan.outputs.run_id || '' }}
          OMAR_GATE_STATUS: ${{ needs.omar_scan.outputs.trusted_context == 'true' && needs.omar_scan.outputs.gate_status || needs.omar_untrusted_scan.outputs.gate_status || '' }}
          OMAR_P0: ${{ needs.omar_scan.outputs.trusted_context == 'true' && needs.omar_scan.outputs.p0_count || needs.omar_untrusted_scan.outputs.p0_count || '0' }}
          OMAR_P1: ${{ needs.omar_scan.outputs.trusted_context == 'true' && needs.omar_scan.outputs.p1_count || needs.omar_untrusted_scan.outputs.p1_count || '0' }}
          OMAR_P2: ${{ needs.omar_scan.outputs.trusted_context == 'true' && needs.omar_scan.outputs.p2_count || needs.omar_untrusted_scan.outputs.p2_count || '0' }}
          OMAR_P3: ${{ needs.omar_scan.outputs.trusted_context == 'true' && needs.omar_scan.outputs.p3_count || needs.omar_untrusted_scan.outputs.p3_count || '0' }}
          EFFECTIVE_SEVERITY_GATE: ${{ env.OMAR_EFFECTIVE_SEVERITY_GATE || (github.event_name == 'workflow_dispatch' && inputs.severity_gate || 'P1') }}
          EFFECTIVE_P2_MAX_ALLOWED: ${{ env.OMAR_EFFECTIVE_P2_MAX_ALLOWED || (github.event_name == 'workflow_dispatch' && inputs.p2_max_allowed || '5') }}
        run: |
          set -euo pipefail
          severity_gate="${EFFECTIVE_SEVERITY_GATE}"
          p2_max="${EFFECTIVE_P2_MAX_ALLOWED}"
          threshold_line="P0=0, P1=0"
          if [ "${severity_gate}" = "P0" ]; then
            threshold_line="P0=0"
          elif [ "${severity_gate}" = "P2" ]; then
            threshold_line="P0=0, P1=0, P2<=${p2_max}"
          fi
          echo "## Omar Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "- run_id: \`${OMAR_RUN_ID}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- gate_status: \`${OMAR_GATE_STATUS}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- findings: \`P0=${OMAR_P0} P1=${OMAR_P1} P2=${OMAR_P2} P3=${OMAR_P3}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- severity_gate: \`${severity_gate}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- merge_threshold: \`${threshold_line}\`" >> "$GITHUB_STEP_SUMMARY"
