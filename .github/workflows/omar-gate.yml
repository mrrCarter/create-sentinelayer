name: Omar Gate

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      scan_mode:
        description: Sentinelayer scan profile
        required: false
        default: deep
        type: choice
        options:
          - deep
          - nightly
      severity_gate:
        description: Severity threshold that blocks merge
        required: false
        default: P2
        type: choice
        options:
          - P0
          - P1
          - P2
      p2_max_allowed:
        description: Maximum allowed P2 findings before Omar Gate blocks merge
        required: false
        default: "5"
        type: string

permissions:
  contents: read
  checks: write
  pull-requests: write
  id-token: write

concurrency:
  group: omar-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  omar_gate:
    name: Omar Gate
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      checks: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Resolve trusted execution boundary
        id: trust_boundary
        shell: bash
        run: |
          set -euo pipefail
          trusted_context="true"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            pr_head_repo="${{ github.event.pull_request.head.repo.full_name }}"
            if [ "${pr_head_repo}" != "${GITHUB_REPOSITORY}" ]; then
              trusted_context="false"
              echo "::notice::Fork PR context detected (${pr_head_repo}); Omar action is skipped to avoid exposing repository secrets."
            fi
          fi
          echo "trusted_context=${trusted_context}" >> "${GITHUB_OUTPUT}"
      - name: Validate Sentinelayer token secret
        if: steps.trust_boundary.outputs.trusted_context == 'true'
        shell: bash
        env:
          SENTINELAYER_TOKEN: ${{ secrets.SENTINELAYER_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${SENTINELAYER_TOKEN}" || (echo "Missing SENTINELAYER_TOKEN" && exit 1)
      - name: Validate OpenAI key secret for Omar LLM scan
        if: steps.trust_boundary.outputs.trusted_context == 'true'
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          test -n "${OPENAI_API_KEY}" || (echo "Missing OPENAI_API_KEY" && exit 1)
      - name: Block untrusted fork PR contexts
        if: steps.trust_boundary.outputs.trusted_context != 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "## Omar Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "- status: \`skipped\` (untrusted fork pull request context)" >> "$GITHUB_STEP_SUMMARY"
          echo "- remediation: \`maintainer must run Omar Gate in trusted base-repository context before merge\`" >> "$GITHUB_STEP_SUMMARY"
          echo "::notice::Untrusted fork pull request context cannot receive Sentinelayer/OpenAI secrets. Omar Gate skipped in this context."
          echo "::error::Omar Gate skipped for fork PR; maintainer must run a trusted scan before merge."
          exit 1
      - name: Resolve severity gate (trusted context)
        if: steps.trust_boundary.outputs.trusted_context == 'true'
        id: severity_gate
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REQUESTED_GATE: ${{ github.event_name == 'workflow_dispatch' && (inputs.severity_gate || 'P2') || 'P1' }}
        run: |
          set -euo pipefail
          requested="$(echo "${REQUESTED_GATE}" | tr -d '\r' | xargs || true)"
          if [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ "${requested}" != "P1" ]; then
            echo "::notice::Workflow dispatch requests must use severity_gate=P1 for trusted enforcement; overriding ${requested} -> P1."
          fi
          echo "severity_gate=P1" >> "${GITHUB_OUTPUT}"
      - name: Run Omar Gate
        if: steps.trust_boundary.outputs.trusted_context == 'true'
        id: omar
        uses: mrrCarter/sentinelayer-v1-action@14ca51c75ca81fdb6e6b7668d417d6a5abc39018
        with:
          github_token: ${{ github.token }}
          sentinelayer_token: ${{ secrets.SENTINELAYER_TOKEN }}
          sentinelayer_spec_id: fbe281812ebeeedcffcfe0442a94407bd4fb64ae78f3c21606512c9b94825afb
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          sentinelayer_managed_llm: "true"
          scan_mode: ${{ github.event_name == 'workflow_dispatch' && inputs.scan_mode || 'deep' }}
          severity_gate: ${{ steps.severity_gate.outputs.severity_gate }}
      - name: Enforce Omar reviewer merge thresholds
        if: steps.trust_boundary.outputs.trusted_context == 'true'
        shell: bash
        env:
          P0_COUNT: ${{ steps.omar.outputs.p0_count || '0' }}
          P1_COUNT: ${{ steps.omar.outputs.p1_count || '0' }}
          P2_COUNT: ${{ steps.omar.outputs.p2_count || '0' }}
          P2_MAX_ALLOWED: ${{ github.event_name == 'workflow_dispatch' && inputs.p2_max_allowed || '5' }}
          SEVERITY_GATE_SELECTED: ${{ steps.severity_gate.outputs.severity_gate }}
        run: |
          set -euo pipefail
          p0="$(echo "${P0_COUNT}" | tr -d '\r' | xargs || true)"
          p1="$(echo "${P1_COUNT}" | tr -d '\r' | xargs || true)"
          p2="$(echo "${P2_COUNT}" | tr -d '\r' | xargs || true)"
          p2_max="$(echo "${P2_MAX_ALLOWED}" | tr -d '\r' | xargs || true)"
          severity_gate="$(echo "${SEVERITY_GATE_SELECTED}" | tr -d '\r' | xargs || true)"
          case "${p0}" in ''|*[!0-9]*) echo "::error::Invalid Omar P0 count: ${p0}" ; exit 1 ;; esac
          case "${p1}" in ''|*[!0-9]*) echo "::error::Invalid Omar P1 count: ${p1}" ; exit 1 ;; esac
          case "${p2}" in ''|*[!0-9]*) echo "::error::Invalid Omar P2 count: ${p2}" ; exit 1 ;; esac
          case "${p2_max}" in ''|*[!0-9]*) echo "::error::Invalid p2_max_allowed value: ${p2_max}" ; exit 1 ;; esac
          case "${severity_gate}" in
            P0)
              if [ "${p0}" -gt 0 ]; then
                echo "::error::Omar Gate blocked: P0=${p0}. Threshold requires P0=0."
                exit 1
              fi
              ;;
            P1)
              if [ "${p0}" -gt 0 ] || [ "${p1}" -gt 0 ]; then
                echo "::error::Omar Gate blocked: P0=${p0}, P1=${p1}. Threshold requires P0=0 and P1=0."
                exit 1
              fi
              ;;
            P2)
              if [ "${p0}" -gt 0 ] || [ "${p1}" -gt 0 ]; then
                echo "::error::Omar Gate blocked: P0=${p0}, P1=${p1}. Threshold requires P0=0 and P1=0."
                exit 1
              fi
              if [ "${p2}" -gt "${p2_max}" ]; then
                echo "::error::Omar Gate blocked: P2=${p2} exceeds max allowed ${p2_max}."
                exit 1
              fi
              ;;
            *)
              echo "::error::Invalid severity_gate value: ${severity_gate}"
              exit 1
              ;;
          esac
      - name: Emit Omar run summary
        if: steps.trust_boundary.outputs.trusted_context == 'true'
        shell: bash
        run: |
          set -euo pipefail
          severity_gate="${{ steps.severity_gate.outputs.severity_gate }}"
          p2_max="${{ github.event_name == 'workflow_dispatch' && inputs.p2_max_allowed || '5' }}"
          threshold_line="P0=0, P1=0"
          if [ "${severity_gate}" = "P0" ]; then
            threshold_line="P0=0"
          elif [ "${severity_gate}" = "P2" ]; then
            threshold_line="P0=0, P1=0, P2<=${p2_max}"
          fi
          echo "## Omar Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "- run_id: \`${{ steps.omar.outputs.run_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- gate_status: \`${{ steps.omar.outputs.gate_status }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- findings: \`P0=${{ steps.omar.outputs.p0_count }} P1=${{ steps.omar.outputs.p1_count }} P2=${{ steps.omar.outputs.p2_count }} P3=${{ steps.omar.outputs.p3_count }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- severity_gate: \`${severity_gate}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- merge_threshold: \`${threshold_line}\`" >> "$GITHUB_STEP_SUMMARY"
