name: Omar Gate

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      scan_mode:
        description: Sentinelayer scan profile
        required: false
        default: deep
        type: choice
        options:
          - deep
          - nightly
      severity_gate:
        description: Severity threshold that blocks merge
        required: false
        default: P1
        type: choice
        options:
          - P0
          - P1
          - P2
      p2_max_allowed:
        description: Maximum allowed P2 findings before Omar Gate blocks merge
        required: false
        default: "5"
        type: string

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  OMAR_SPEC_ID: fbe281812ebeeedcffcfe0442a94407bd4fb64ae78f3c21606512c9b94825afb

jobs:
  omar_untrusted_scan:
    name: Omar Gate Untrusted Scan
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    outputs:
      run_id: ${{ steps.untrusted.outputs.run_id }}
      gate_status: ${{ steps.untrusted.outputs.gate_status }}
      p0_count: ${{ steps.untrusted.outputs.p0_count }}
      p1_count: ${{ steps.untrusted.outputs.p1_count }}
      p2_count: ${{ steps.untrusted.outputs.p2_count }}
      p3_count: ${{ steps.untrusted.outputs.p3_count }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v4.2.2
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies (untrusted context)
        shell: bash
        run: |
          set -euo pipefail
          npm ci --ignore-scripts
      - name: Run deterministic untrusted scan
        id: untrusted
        shell: bash
        run: |
          set -euo pipefail
          set +e
          SENTINELAYER_CLI_SKIP_AUTH=1 node bin/sl.js review --path . --json > omar-untrusted-review.json
          review_exit="$?"
          set -e
          if [ "${review_exit}" -ne 0 ] && [ "${review_exit}" -ne 2 ]; then
            echo "::error::Untrusted deterministic scan failed with exit code ${review_exit}."
            exit "${review_exit}"
          fi
          if ! jq -e '
            type == "object"
            and (.runId | type == "string" and length > 0)
            and (.p0 | type == "number")
            and (.p1 | type == "number")
            and (.p2 | type == "number")
            and (.p3 | type == "number")
          ' omar-untrusted-review.json >/dev/null; then
            echo "::error::Untrusted deterministic scan produced invalid JSON payload."
            cat omar-untrusted-review.json || true
            exit 1
          fi
          run_id="$(jq -r '.runId' omar-untrusted-review.json)"
          p0="$(jq -r '.p0' omar-untrusted-review.json)"
          p1="$(jq -r '.p1' omar-untrusted-review.json)"
          p2="$(jq -r '.p2' omar-untrusted-review.json)"
          p3="$(jq -r '.p3' omar-untrusted-review.json)"
          gate_status="passed"
          if [ "${p0}" -gt 0 ] || [ "${p1}" -gt 0 ]; then
            gate_status="blocked"
          fi
          echo "run_id=${run_id}" >> "${GITHUB_OUTPUT}"
          echo "gate_status=${gate_status}" >> "${GITHUB_OUTPUT}"
          echo "p0_count=${p0}" >> "${GITHUB_OUTPUT}"
          echo "p1_count=${p1}" >> "${GITHUB_OUTPUT}"
          echo "p2_count=${p2}" >> "${GITHUB_OUTPUT}"
          echo "p3_count=${p3}" >> "${GITHUB_OUTPUT}"
          {
            echo "## Omar Gate (Untrusted Deterministic Scan)"
            echo "- status: \`${gate_status}\`"
            echo "- source: \`local-deterministic\`"
            echo "- findings: \`P0=${p0} P1=${p1} P2=${p2} P3=${p3}\`"
            echo "- run_id: \`${run_id}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  omar_scan:
    name: Omar Gate Scan
    if: >-
      ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
      checks: write
      pull-requests: write
    outputs:
      trusted_context: ${{ steps.trust_boundary.outputs.trusted_context }}
      credential_mode: ${{ steps.resolve_omar_credentials.outputs.credential_mode }}
      run_id: ${{ steps.omar.outputs.run_id }}
      gate_status: ${{ steps.omar.outputs.gate_status }}
      p0_count: ${{ steps.omar.outputs.p0_count }}
      p1_count: ${{ steps.omar.outputs.p1_count }}
      p2_count: ${{ steps.omar.outputs.p2_count }}
      p3_count: ${{ steps.omar.outputs.p3_count }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v4.2.2
      - name: Resolve trusted execution boundary
        id: trust_boundary
        shell: bash
        run: |
          set -euo pipefail
          echo "trusted_context=true" >> "${GITHUB_OUTPUT}"
      - name: Resolve Omar credential mode
        if: steps.trust_boundary.outputs.trusted_context == 'true'
        id: resolve_omar_credentials
        shell: bash
        env:
          SENTINELAYER_TOKEN: ${{ secrets.SENTINELAYER_TOKEN }}
          OMAR_TOKEN_EXCHANGE_URL: ${{ vars.OMAR_TOKEN_EXCHANGE_URL || '' }}
          OMAR_TOKEN_EXCHANGE_AUDIENCE: ${{ vars.OMAR_TOKEN_EXCHANGE_AUDIENCE || '' }}
          OMAR_TOKEN_EXCHANGE_ISSUER: ${{ vars.OMAR_TOKEN_EXCHANGE_ISSUER || '' }}
          OMAR_TOKEN_EXCHANGE_MAX_TTL_SECONDS: ${{ vars.OMAR_TOKEN_EXCHANGE_MAX_TTL_SECONDS || '3600' }}
          OMAR_TOKEN_EXCHANGE_PINNED_PUBKEY_SHA256: ${{ vars.OMAR_TOKEN_EXCHANGE_PINNED_PUBKEY_SHA256 || '' }}
          OMAR_REQUIRE_PINNED_PUBKEY_ON_PROTECTED_REF: ${{ vars.OMAR_REQUIRE_PINNED_PUBKEY_ON_PROTECTED_REF || 'true' }}
          OMAR_REQUIRE_RESPONSE_BINDING_ON_PROTECTED_REF: ${{ vars.OMAR_REQUIRE_RESPONSE_BINDING_ON_PROTECTED_REF || 'true' }}
          OMAR_TOKEN_EXCHANGE_ALLOWED_HOSTS: ${{ vars.OMAR_TOKEN_EXCHANGE_ALLOWED_HOSTS || 'api.sentinelayer.com' }}
          OMAR_TOKEN_EXCHANGE_ALLOWED_PATHS: ${{ vars.OMAR_TOKEN_EXCHANGE_ALLOWED_PATHS || '/v1/token/exchange/sentinelayer' }}
          OMAR_REQUIRE_OIDC_ON_PROTECTED_REF: ${{ vars.OMAR_REQUIRE_OIDC_ON_PROTECTED_REF || 'true' }}
          OMAR_ALLOW_STATIC_SECRETS: ${{ vars.OMAR_ALLOW_STATIC_SECRETS || 'false' }}
          GITHUB_REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          set -euo pipefail
          mode="static-secrets"
          resolved_token="${SENTINELAYER_TOKEN}"
          exchange_url="$(echo "${OMAR_TOKEN_EXCHANGE_URL}" | xargs || true)"
          exchange_audience="$(echo "${OMAR_TOKEN_EXCHANGE_AUDIENCE}" | xargs || true)"
          event_name="${GITHUB_EVENT_NAME}"
          ref_protected="$(echo "${GITHUB_REF_PROTECTED}" | tr '[:upper:]' '[:lower:]' | xargs || true)"
          allow_static="$(echo "${OMAR_ALLOW_STATIC_SECRETS:-false}" | tr '[:upper:]' '[:lower:]' | xargs || true)"
          require_pinned="$(echo "${OMAR_REQUIRE_PINNED_PUBKEY_ON_PROTECTED_REF}" | tr '[:upper:]' '[:lower:]' | xargs || true)"
          require_response_binding_on_protected="$(echo "${OMAR_REQUIRE_RESPONSE_BINDING_ON_PROTECTED_REF}" | tr '[:upper:]' '[:lower:]' | xargs || true)"
          pinned_pubkey="$(echo "${OMAR_TOKEN_EXCHANGE_PINNED_PUBKEY_SHA256}" | xargs || true)"
          if [ -z "${exchange_url}" ] || [ -z "${exchange_audience}" ]; then
            # Protected refs: hard-fail regardless of OMAR_ALLOW_STATIC_SECRETS.
            # Static long-lived secrets are not an acceptable credential
            # source on protected refs (strict OIDC-only posture).
            if [ "${ref_protected}" = "true" ]; then
              echo "::error::OIDC exchange is required for Omar Gate on protected refs. Configure OMAR_TOKEN_EXCHANGE_URL and OMAR_TOKEN_EXCHANGE_AUDIENCE."
              echo "::error::OMAR_ALLOW_STATIC_SECRETS is NOT honored on protected refs. Promote your credential pipeline to OIDC."
              exit 1
            fi
            # Non-protected refs: static fallback permitted only via explicit
            # OMAR_ALLOW_STATIC_SECRETS=true.
            if [ "${allow_static}" != "true" ]; then
              echo "::error::OIDC exchange is required for Omar Gate on ${event_name} events. Configure OMAR_TOKEN_EXCHANGE_URL and OMAR_TOKEN_EXCHANGE_AUDIENCE (or set OMAR_ALLOW_STATIC_SECRETS=true for emergency static fallback on non-protected refs)."
              exit 1
            fi
          fi
          if [ -n "${exchange_url}" ] && [ -n "${exchange_audience}" ]; then
            if ! echo "${exchange_url}" | grep -Eq '^https://'; then
              echo "::error::OMAR_TOKEN_EXCHANGE_URL must use https://."
              exit 1
            fi
            exchange_host="$(node -e "try { const u = new URL(process.argv[1]); process.stdout.write(String(u.hostname || '').toLowerCase()); } catch { process.exit(1); }" "${exchange_url}" || true)"
            exchange_path="$(node -e "try { const u = new URL(process.argv[1]); process.stdout.write(String(u.pathname || '/')); } catch { process.exit(1); }" "${exchange_url}" || true)"
            if [ -z "${exchange_host}" ] || [ -z "${exchange_path}" ]; then
              echo "::error::OMAR_TOKEN_EXCHANGE_URL is not a valid absolute URL."
              exit 1
            fi
            host_allowed="false"
            IFS=',' read -r -a allowed_hosts <<< "${OMAR_TOKEN_EXCHANGE_ALLOWED_HOSTS}"
            for host in "${allowed_hosts[@]}"; do
              candidate="$(echo "${host}" | tr '[:upper:]' '[:lower:]' | xargs)"
              if [ -n "${candidate}" ] && [ "${candidate}" = "${exchange_host}" ]; then
                host_allowed="true"
                break
              fi
            done
            if [ "${host_allowed}" != "true" ]; then
              echo "::error::OMAR_TOKEN_EXCHANGE_URL host '${exchange_host}' is not allowlisted. Allowed hosts: ${OMAR_TOKEN_EXCHANGE_ALLOWED_HOSTS}."
              exit 1
            fi
            path_allowed="false"
            IFS=',' read -r -a allowed_paths <<< "${OMAR_TOKEN_EXCHANGE_ALLOWED_PATHS}"
            for allowed_path in "${allowed_paths[@]}"; do
              candidate_path="$(echo "${allowed_path}" | xargs)"
              if [ -n "${candidate_path}" ] && [ "${candidate_path}" = "${exchange_path}" ]; then
                path_allowed="true"
                break
              fi
            done
            if [ "${path_allowed}" != "true" ]; then
              echo "::error::OMAR_TOKEN_EXCHANGE_URL path '${exchange_path}' is not allowlisted. Allowed paths: ${OMAR_TOKEN_EXCHANGE_ALLOWED_PATHS}."
              exit 1
            fi
            if [ "${ref_protected}" = "true" ] && [ "${require_pinned}" != "false" ] && [ -z "${pinned_pubkey}" ]; then
              echo "::error::Pinned public key is required for Omar token exchange on protected refs. Set OMAR_TOKEN_EXCHANGE_PINNED_PUBKEY_SHA256."
              exit 1
            fi
            curl_pinned_arg=""
            if [ -n "${pinned_pubkey}" ]; then
              if echo "${pinned_pubkey}" | grep -q '^sha256//'; then
                curl_pinned_arg="--pinnedpubkey ${pinned_pubkey}"
              else
                curl_pinned_arg="--pinnedpubkey sha256//${pinned_pubkey}"
              fi
            fi
            if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
              echo "::error::OIDC exchange is configured but GitHub OIDC request context is unavailable."
              exit 1
            fi
            oidc_url="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${exchange_audience}"
            oidc_response="$(curl -fsS --retry 2 --retry-delay 1 --retry-all-errors --connect-timeout 5 --max-time 20 \
              -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              "${oidc_url}")"
            oidc_token="$(echo "${oidc_response}" | jq -r '.value // empty')"
            if [ -z "${oidc_token}" ]; then
              echo "::error::OIDC exchange failed: missing id_token value in GitHub OIDC response."
              exit 1
            fi
            exchange_nonce="$(printf '%s|%s|%s|%s' "${GITHUB_RUN_ID}" "${GITHUB_RUN_ATTEMPT}" "${GITHUB_SHA}" "$(date +%s%N)" | sha256sum | awk '{print $1}')"
            exchange_payload="$(jq -n \
              --arg repository "${GITHUB_REPOSITORY}" \
              --arg run_id "${GITHUB_RUN_ID}" \
              --arg run_attempt "${GITHUB_RUN_ATTEMPT}" \
              --arg ref "${GITHUB_REF}" \
              --arg sha "${GITHUB_SHA}" \
              --arg exchange_nonce "${exchange_nonce}" \
              '{repository: $repository, run_id: $run_id, run_attempt: $run_attempt, ref: $ref, sha: $sha, exchange_nonce: $exchange_nonce}')"
            exchange_headers="$(mktemp)"
            exchange_body="$(mktemp)"
            exchange_status="$(curl -sS --retry 2 --retry-delay 1 --retry-all-errors --connect-timeout 5 --max-time 20 \
              -D "${exchange_headers}" \
              -o "${exchange_body}" \
              -w "%{http_code}" \
              ${curl_pinned_arg} \
              -H "Authorization: Bearer ${oidc_token}" \
              -H "Content-Type: application/json" \
              -d "${exchange_payload}" \
              "${exchange_url}")"
            if [ "${exchange_status}" != "200" ]; then
              echo "::error::OIDC exchange failed with status ${exchange_status}."
              exchange_error_code="$(jq -r '.error_code // .code // empty' "${exchange_body}" 2>/dev/null || true)"
              exchange_request_id="$(jq -r '.request_id // .requestId // empty' "${exchange_body}" 2>/dev/null || true)"
              if [ -n "${exchange_error_code}" ] || [ -n "${exchange_request_id}" ]; then
                echo "::error::exchange_error_code=${exchange_error_code:-<none>} exchange_request_id=${exchange_request_id:-<none>}"
              fi
              exit 1
            fi
            content_type="$(grep -i '^content-type:' "${exchange_headers}" | tail -n 1 | cut -d':' -f2- | xargs || true)"
            if ! echo "${content_type}" | grep -qi '^application/json'; then
              echo "::error::OIDC exchange response content-type must be application/json (received '${content_type:-<none>}')."
              exit 1
            fi
            if ! jq -e 'type=="object" and (.sentinelayer_token|type=="string" and length>0) and (.expires_at|type=="string" and length>0) and (.issuer|type=="string" and length>0) and (.audience|type=="string" and length>0)' "${exchange_body}" >/dev/null 2>&1; then
              echo "::error::OIDC exchange response schema invalid or missing required fields."
              exchange_error_code="$(jq -r '.error_code // .code // empty' "${exchange_body}" 2>/dev/null || true)"
              exchange_request_id="$(jq -r '.request_id // .requestId // empty' "${exchange_body}" 2>/dev/null || true)"
              if [ -n "${exchange_error_code}" ] || [ -n "${exchange_request_id}" ]; then
                echo "::error::exchange_error_code=${exchange_error_code:-<none>} exchange_request_id=${exchange_request_id:-<none>}"
              fi
              exit 1
            fi
            resolved_token="$(jq -r '.sentinelayer_token' "${exchange_body}")"
            exchange_issuer="$(jq -r '.issuer' "${exchange_body}")"
            exchange_audience_resp="$(jq -r '.audience' "${exchange_body}")"
            exchange_expires_at="$(jq -r '.expires_at' "${exchange_body}")"
            response_repository="$(jq -r '.repository // empty' "${exchange_body}")"
            response_run_id="$(jq -r '.run_id // empty' "${exchange_body}")"
            response_sha="$(jq -r '.sha // empty' "${exchange_body}")"
            response_nonce="$(jq -r '.exchange_nonce // empty' "${exchange_body}")"
            if [ -n "${exchange_audience}" ] && [ "${exchange_audience_resp}" != "${exchange_audience}" ]; then
              echo "::error::OIDC exchange audience mismatch. expected=${exchange_audience} actual=${exchange_audience_resp}."
              exit 1
            fi
            expected_issuer="$(echo "${OMAR_TOKEN_EXCHANGE_ISSUER}" | xargs || true)"
            if [ -n "${expected_issuer}" ] && [ "${exchange_issuer}" != "${expected_issuer}" ]; then
              echo "::error::OIDC exchange issuer mismatch. expected=${expected_issuer} actual=${exchange_issuer}."
              exit 1
            fi
            expires_epoch="$(date -u -d "${exchange_expires_at}" +%s 2>/dev/null || true)"
            if [ -z "${expires_epoch}" ]; then
              echo "::error::OIDC exchange expires_at is invalid: ${exchange_expires_at}."
              exit 1
            fi
            now_epoch="$(date +%s)"
            ttl_seconds="$((expires_epoch - now_epoch))"
            max_ttl="$(echo "${OMAR_TOKEN_EXCHANGE_MAX_TTL_SECONDS}" | xargs || true)"
            case "${max_ttl}" in ''|*[!0-9]*) echo "::error::Invalid OMAR_TOKEN_EXCHANGE_MAX_TTL_SECONDS value: ${max_ttl}" ; exit 1 ;; esac
            if [ "${ttl_seconds}" -le 0 ]; then
              echo "::error::OIDC exchange token is already expired (ttl=${ttl_seconds})."
              exit 1
            fi
            if [ "${ttl_seconds}" -gt "${max_ttl}" ]; then
              echo "::error::OIDC exchange token TTL ${ttl_seconds}s exceeds maximum ${max_ttl}s."
              exit 1
            fi
            # Enforce response binding checks on ALL refs, not only
            # protected. Unprotected contexts are still subject to token
            # forgery / replay if the binding isn't validated. Opt-out via
            # OMAR_REQUIRE_RESPONSE_BINDING_ON_PROTECTED_REF=false remains as
            # an emergency escape hatch but applies globally now, and is
            # deprecated — remove in a future release.
            if [ "${require_response_binding_on_protected}" != "false" ]; then
              if [ -z "${response_repository}" ] || [ -z "${response_run_id}" ] || [ -z "${response_sha}" ] || [ -z "${response_nonce}" ]; then
                echo "::error::OIDC exchange response binding fields are required (repository, run_id, sha, exchange_nonce)."
                exit 1
              fi
              if [ "${response_repository}" != "${GITHUB_REPOSITORY}" ]; then
                echo "::error::OIDC exchange repository binding mismatch. expected=${GITHUB_REPOSITORY} actual=${response_repository}."
                exit 1
              fi
              if [ "${response_run_id}" != "${GITHUB_RUN_ID}" ]; then
                echo "::error::OIDC exchange run_id binding mismatch. expected=${GITHUB_RUN_ID} actual=${response_run_id}."
                exit 1
              fi
              if [ "${response_sha}" != "${GITHUB_SHA}" ]; then
                echo "::error::OIDC exchange sha binding mismatch. expected=${GITHUB_SHA} actual=${response_sha}."
                exit 1
              fi
              if [ "${response_nonce}" != "${exchange_nonce}" ]; then
                echo "::error::OIDC exchange nonce binding mismatch."
                exit 1
              fi
            fi
            mode="oidc-exchange"
          fi
          require_oidc="$(echo "${OMAR_REQUIRE_OIDC_ON_PROTECTED_REF}" | tr '[:upper:]' '[:lower:]' | xargs || true)"
          if [ "${mode}" = "static-secrets" ] && [ "${ref_protected}" = "true" ] && [ "${require_oidc}" != "false" ] && [ "${allow_static}" != "true" ]; then
            echo "::error::Static-secret Omar mode is blocked on protected refs. Configure OMAR_TOKEN_EXCHANGE_URL and OMAR_TOKEN_EXCHANGE_AUDIENCE."
            exit 1
          fi
          echo "::add-mask::${resolved_token}"
          echo "sentinelayer_token=${resolved_token}" >> "${GITHUB_OUTPUT}"
          echo "credential_mode=${mode}" >> "${GITHUB_OUTPUT}"
          {
            echo "## Omar Credential Mode"
            echo "- mode: \`${mode}\`"
            if [ -n "${exchange_url}" ] && [ -n "${exchange_audience}" ]; then
              echo "- exchange_url: \`${exchange_url}\`"
              echo "- exchange_audience: \`${exchange_audience}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Validate Sentinelayer token secret
        if: steps.trust_boundary.outputs.trusted_context == 'true'
        shell: bash
        env:
          CREDENTIAL_MODE: ${{ steps.resolve_omar_credentials.outputs.credential_mode || '' }}
          RESOLVED_SENTINELAYER_TOKEN: ${{ steps.resolve_omar_credentials.outputs.sentinelayer_token || '' }}
          SENTINELAYER_TOKEN: ${{ secrets.SENTINELAYER_TOKEN }}
        run: |
          set -euo pipefail
          mode="$(echo "${CREDENTIAL_MODE}" | xargs || true)"
          if [ "${mode}" = "oidc-exchange" ]; then
            bash .github/scripts/require-secret.sh "OMAR_OIDC_EXCHANGED_SENTINELAYER_TOKEN" "${RESOLVED_SENTINELAYER_TOKEN}"
            exit 0
          fi
          bash .github/scripts/require-secret.sh "SENTINELAYER_TOKEN" "${SENTINELAYER_TOKEN}"
      - name: Validate OpenAI key secret for Omar LLM scan
        if: steps.trust_boundary.outputs.trusted_context == 'true'
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          bash .github/scripts/require-secret.sh "OPENAI_API_KEY" "${OPENAI_API_KEY}"
      - name: Validate Omar configuration invariants
        if: steps.trust_boundary.outputs.trusted_context == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if ! echo "${OMAR_SPEC_ID}" | grep -Eq '^[a-f0-9]{64}$'; then
            echo "::error::OMAR_SPEC_ID must be a 64-character lowercase hex digest."
            exit 1
          fi
      - name: Enforce security-review environment policy
        if: steps.trust_boundary.outputs.trusted_context == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          set -euo pipefail
          env_json="$(gh api "repos/${GITHUB_REPOSITORY}/environments/security-review")"
          reviewer_count="$(echo "${env_json}" | jq -r '[.protection_rules[]? | select(.type=="required_reviewers") | .reviewers[]?] | length')"
          ref_protected="$(echo "${GITHUB_REF_PROTECTED}" | tr '[:upper:]' '[:lower:]' | xargs || true)"
          case "${reviewer_count}" in ''|*[!0-9]*) echo "::error::Invalid security-review reviewer count: ${reviewer_count}" ; exit 1 ;; esac
          if [ "${ref_protected}" = "true" ] && [ "${reviewer_count}" -lt 1 ]; then
            echo "::error::security-review environment has no required reviewers configured for protected refs."
            exit 1
          fi
          {
            echo "## Security Review Environment"
            echo "- required_reviewers: \`${reviewer_count}\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Run Omar Gate
        if: steps.trust_boundary.outputs.trusted_context == 'true'
        id: omar
        uses: ./.github/actions/omar-gate
        with:
          github_token: ${{ github.token }}
          sentinelayer_token: ${{ steps.resolve_omar_credentials.outputs.sentinelayer_token }}
          sentinelayer_spec_id: ${{ env.OMAR_SPEC_ID }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          scan_mode: ${{ github.event_name == 'workflow_dispatch' && inputs.scan_mode || 'deep' }}
          severity_gate: ${{ github.event_name == 'workflow_dispatch' && inputs.severity_gate || 'P1' }}
      - name: Validate Omar output contract
        if: steps.trust_boundary.outputs.trusted_context == 'true'
        shell: bash
        env:
          OMAR_RUN_ID: ${{ steps.omar.outputs.run_id || '' }}
          OMAR_GATE_STATUS: ${{ steps.omar.outputs.gate_status || '' }}
          OMAR_P0: ${{ steps.omar.outputs.p0_count || '0' }}
          OMAR_P1: ${{ steps.omar.outputs.p1_count || '0' }}
          OMAR_P2: ${{ steps.omar.outputs.p2_count || '0' }}
          OMAR_P3: ${{ steps.omar.outputs.p3_count || '0' }}
        run: |
          set -euo pipefail
          if [ -n "${OMAR_RUN_ID}" ] && ! echo "${OMAR_RUN_ID}" | grep -Eq '^[A-Za-z0-9-]{8,64}$'; then
            echo "::error::Invalid Omar run_id output: ${OMAR_RUN_ID}"
            exit 1
          fi
          case "${OMAR_GATE_STATUS}" in ''|pass|passed|blocked|fail|failed) ;; *) echo "::error::Invalid Omar gate_status output: ${OMAR_GATE_STATUS}" ; exit 1 ;; esac
          for value in "${OMAR_P0}" "${OMAR_P1}" "${OMAR_P2}" "${OMAR_P3}"; do
            case "${value}" in ''|*[!0-9]*) echo "::error::Invalid Omar severity count output: ${value}" ; exit 1 ;; esac
          done
      - name: Stage Omar artifacts (redacted)
        if: steps.trust_boundary.outputs.trusted_context == 'true'
        shell: bash
        env:
          OMAR_UPLOAD_LOGS: ${{ vars.OMAR_UPLOAD_LOGS || 'false' }}
        run: |
          set -euo pipefail
          rm -rf omar-artifacts
          mkdir -p omar-artifacts/reports omar-artifacts/telemetry
          if [ -d ".sentinelayer/reports" ]; then
            cp -R .sentinelayer/reports/. omar-artifacts/reports/ 2>/dev/null || true
          fi
          if [ -d ".sentinelayer/telemetry" ]; then
            cp -R .sentinelayer/telemetry/. omar-artifacts/telemetry/ 2>/dev/null || true
          fi
          if [ "$(echo "${OMAR_UPLOAD_LOGS}" | tr '[:upper:]' '[:lower:]' | xargs || true)" = "true" ] && [ -d ".sentinelayer/logs" ]; then
            mkdir -p omar-artifacts/logs
            cp -R .sentinelayer/logs/. omar-artifacts/logs/ 2>/dev/null || true
          fi
      - name: Scan staged artifacts for secrets
        if: steps.trust_boundary.outputs.trusted_context == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d "omar-artifacts" ]; then
            exit 0
          fi
          report="omar-artifacts/secret-scan.json"
          set +e
          node .github/scripts/scan-omar-artifacts.js --path omar-artifacts --report "${report}"
          scan_exit="$?"
          set -e
          if [ "${scan_exit}" -ne 0 ]; then
            findings="$(jq 'length' "${report}" 2>/dev/null || echo 0)"
            echo "::error::Secret scan detected ${findings} potential secret(s) in Omar artifacts. Aborting upload."
            exit 1
          fi
      - name: Upload Omar artifacts
        if: steps.trust_boundary.outputs.trusted_context == 'true'
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: omar-gate-artifacts
          path: omar-artifacts/**
          if-no-files-found: ignore
  omar_enforce:
    name: Omar Gate
    needs: [omar_scan, omar_untrusted_scan]
    if: >-
      ${{
        always() &&
        (
          (needs.omar_scan.result == 'success' && needs.omar_scan.outputs.trusted_context == 'true') ||
          (needs.omar_untrusted_scan.result == 'success')
        )
      }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Enforce Omar reviewer merge thresholds
        shell: bash
        env:
          P0_COUNT: ${{ needs.omar_scan.outputs.trusted_context == 'true' && needs.omar_scan.outputs.p0_count || needs.omar_untrusted_scan.outputs.p0_count || '0' }}
          P1_COUNT: ${{ needs.omar_scan.outputs.trusted_context == 'true' && needs.omar_scan.outputs.p1_count || needs.omar_untrusted_scan.outputs.p1_count || '0' }}
          P2_COUNT: ${{ needs.omar_scan.outputs.trusted_context == 'true' && needs.omar_scan.outputs.p2_count || needs.omar_untrusted_scan.outputs.p2_count || '0' }}
          P2_MAX_ALLOWED: ${{ github.event_name == 'workflow_dispatch' && inputs.p2_max_allowed || '5' }}
          SEVERITY_GATE_SELECTED: ${{ github.event_name == 'workflow_dispatch' && inputs.severity_gate || 'P1' }}
          OMAR_POLICY_MIN_SEVERITY_GATE: ${{ vars.OMAR_POLICY_MIN_SEVERITY_GATE || 'P1' }}
          OMAR_POLICY_P2_MAX_ALLOWED: ${{ vars.OMAR_POLICY_P2_MAX_ALLOWED || '5' }}
          OMAR_ALLOW_RELAXATION_ON_DISPATCH: ${{ vars.OMAR_ALLOW_RELAXATION_ON_DISPATCH || 'false' }}
          GITHUB_REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          set -euo pipefail
          severity_rank() {
            case "$1" in
              P0) echo 0 ;;
              P1) echo 1 ;;
              P2) echo 2 ;;
              *) echo -1 ;;
            esac
          }
          rank_to_severity() {
            case "$1" in
              0) echo "P0" ;;
              1) echo "P1" ;;
              2) echo "P2" ;;
              *) echo "" ;;
            esac
          }
          p0="$(echo "${P0_COUNT}" | tr -d '\r' | xargs || true)"
          p1="$(echo "${P1_COUNT}" | tr -d '\r' | xargs || true)"
          p2="$(echo "${P2_COUNT}" | tr -d '\r' | xargs || true)"
          p2_max="$(echo "${P2_MAX_ALLOWED}" | tr -d '\r' | xargs || true)"
          severity_gate="$(echo "${SEVERITY_GATE_SELECTED}" | tr -d '\r' | xargs || true)"
          policy_gate="$(echo "${OMAR_POLICY_MIN_SEVERITY_GATE}" | tr -d '\r' | xargs || true)"
          policy_p2_max="$(echo "${OMAR_POLICY_P2_MAX_ALLOWED}" | tr -d '\r' | xargs || true)"
          relaxation_allowed="$(echo "${OMAR_ALLOW_RELAXATION_ON_DISPATCH}" | tr -d '\r' | xargs || true)"
          ref_protected="$(echo "${GITHUB_REF_PROTECTED}" | tr '[:upper:]' '[:lower:]' | xargs || true)"
          case "${p0}" in ''|*[!0-9]*) echo "::error::Invalid Omar P0 count: ${p0}" ; exit 1 ;; esac
          case "${p1}" in ''|*[!0-9]*) echo "::error::Invalid Omar P1 count: ${p1}" ; exit 1 ;; esac
          case "${p2}" in ''|*[!0-9]*) echo "::error::Invalid Omar P2 count: ${p2}" ; exit 1 ;; esac
          case "${p2_max}" in ''|*[!0-9]*) echo "::error::Invalid p2_max_allowed value: ${p2_max}" ; exit 1 ;; esac
          case "${policy_p2_max}" in ''|*[!0-9]*) echo "::error::Invalid OMAR_POLICY_P2_MAX_ALLOWED value: ${policy_p2_max}" ; exit 1 ;; esac
          selected_rank="$(severity_rank "${severity_gate}")"
          policy_rank="$(severity_rank "${policy_gate}")"
          if [ "${selected_rank}" -lt 0 ]; then
            echo "::error::Invalid severity_gate value: ${severity_gate}"
            exit 1
          fi
          if [ "${policy_rank}" -lt 0 ]; then
            echo "::error::Invalid OMAR_POLICY_MIN_SEVERITY_GATE value: ${policy_gate}"
            exit 1
          fi
          if [ "${selected_rank}" -lt "${policy_rank}" ] && [ "${ref_protected}" = "true" ] && [ "${relaxation_allowed}" != "true" ]; then
            echo "::error::workflow_dispatch severity_gate ${severity_gate} is weaker than policy minimum ${policy_gate} on protected ref."
            exit 1
          fi
          effective_rank="${selected_rank}"
          if [ "${policy_rank}" -gt "${effective_rank}" ]; then
            effective_rank="${policy_rank}"
          fi
          effective_gate="$(rank_to_severity "${effective_rank}")"
          if [ -z "${effective_gate}" ]; then
            echo "::error::Failed to resolve effective Omar severity gate."
            exit 1
          fi
          effective_p2_max="${p2_max}"
          if [ "${effective_gate}" = "P2" ]; then
            if [ "${effective_p2_max}" -gt "${policy_p2_max}" ] && [ "${ref_protected}" = "true" ] && [ "${relaxation_allowed}" != "true" ]; then
              echo "::error::p2_max_allowed ${effective_p2_max} exceeds policy maximum ${policy_p2_max} on protected ref."
              exit 1
            fi
            if [ "${policy_p2_max}" -lt "${effective_p2_max}" ]; then
              effective_p2_max="${policy_p2_max}"
            fi
          fi
          echo "OMAR_EFFECTIVE_SEVERITY_GATE=${effective_gate}" >> "$GITHUB_ENV"
          echo "OMAR_EFFECTIVE_P2_MAX_ALLOWED=${effective_p2_max}" >> "$GITHUB_ENV"
          case "${effective_gate}" in
            P0)
              if [ "${p0}" -gt 0 ]; then
                echo "::error::Omar Gate blocked: P0=${p0}. Threshold requires P0=0."
                exit 1
              fi
              ;;
            P1)
              if [ "${p0}" -gt 0 ] || [ "${p1}" -gt 0 ]; then
                echo "::error::Omar Gate blocked: P0=${p0}, P1=${p1}. Threshold requires P0=0 and P1=0."
                exit 1
              fi
              ;;
            P2)
              if [ "${p0}" -gt 0 ] || [ "${p1}" -gt 0 ]; then
                echo "::error::Omar Gate blocked: P0=${p0}, P1=${p1}. Threshold requires P0=0 and P1=0."
                exit 1
              fi
              if [ "${p2}" -gt "${effective_p2_max}" ]; then
                echo "::error::Omar Gate blocked: P2=${p2} exceeds max allowed ${effective_p2_max}."
                exit 1
              fi
              ;;
            *)
              echo "::error::Invalid effective severity_gate value: ${effective_gate}"
              exit 1
              ;;
          esac
          if [ "${effective_gate}" != "${severity_gate}" ]; then
            echo "::notice::Omar severity gate hardened by policy from ${severity_gate} to ${effective_gate}."
          fi
      - name: Emit Omar run summary
        shell: bash
        env:
          OMAR_RUN_ID: ${{ needs.omar_scan.outputs.trusted_context == 'true' && needs.omar_scan.outputs.run_id || needs.omar_untrusted_scan.outputs.run_id || '' }}
          OMAR_GATE_STATUS: ${{ needs.omar_scan.outputs.trusted_context == 'true' && needs.omar_scan.outputs.gate_status || needs.omar_untrusted_scan.outputs.gate_status || '' }}
          OMAR_P0: ${{ needs.omar_scan.outputs.trusted_context == 'true' && needs.omar_scan.outputs.p0_count || needs.omar_untrusted_scan.outputs.p0_count || '0' }}
          OMAR_P1: ${{ needs.omar_scan.outputs.trusted_context == 'true' && needs.omar_scan.outputs.p1_count || needs.omar_untrusted_scan.outputs.p1_count || '0' }}
          OMAR_P2: ${{ needs.omar_scan.outputs.trusted_context == 'true' && needs.omar_scan.outputs.p2_count || needs.omar_untrusted_scan.outputs.p2_count || '0' }}
          OMAR_P3: ${{ needs.omar_scan.outputs.trusted_context == 'true' && needs.omar_scan.outputs.p3_count || needs.omar_untrusted_scan.outputs.p3_count || '0' }}
          EFFECTIVE_SEVERITY_GATE: ${{ env.OMAR_EFFECTIVE_SEVERITY_GATE || (github.event_name == 'workflow_dispatch' && inputs.severity_gate || 'P1') }}
          EFFECTIVE_P2_MAX_ALLOWED: ${{ env.OMAR_EFFECTIVE_P2_MAX_ALLOWED || (github.event_name == 'workflow_dispatch' && inputs.p2_max_allowed || '5') }}
        run: |
          set -euo pipefail
          severity_gate="${EFFECTIVE_SEVERITY_GATE}"
          p2_max="${EFFECTIVE_P2_MAX_ALLOWED}"
          threshold_line="P0=0, P1=0"
          if [ "${severity_gate}" = "P0" ]; then
            threshold_line="P0=0"
          elif [ "${severity_gate}" = "P2" ]; then
            threshold_line="P0=0, P1=0, P2<=${p2_max}"
          fi
          echo "## Omar Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "- run_id: \`${OMAR_RUN_ID}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- gate_status: \`${OMAR_GATE_STATUS}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- findings: \`P0=${OMAR_P0} P1=${OMAR_P1} P2=${OMAR_P2} P3=${OMAR_P3}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- severity_gate: \`${severity_gate}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- merge_threshold: \`${threshold_line}\`" >> "$GITHUB_STEP_SUMMARY"
