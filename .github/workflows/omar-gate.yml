name: Omar Gate

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:
    inputs:
      scan_mode:
        description: Sentinelayer scan profile
        required: false
        default: deep
        type: choice
        options:
          - deep
          - nightly
      severity_gate:
        description: Severity threshold that blocks merge
        required: false
        default: P1
        type: choice
        options:
          - P1
          - P2
      p2_max_allowed:
        description: Maximum allowed P2 findings before Omar Gate blocks merge
        required: false
        default: "5"
        type: string

permissions:
  contents: read
  checks: write
  pull-requests: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  omar_gate:
    name: Omar Gate
    runs-on: ubuntu-latest
    environment: security-review
    permissions:
      contents: read
      checks: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Resolve trusted secret context
        id: trust
        shell: bash
        run: |
          set -euo pipefail
          trusted="false"
          if [[ "${GITHUB_EVENT_NAME}" != "pull_request" ]]; then
            trusted="true"
          elif [[ "${{ github.event.pull_request.head.repo.full_name }}" == "${GITHUB_REPOSITORY}" ]]; then
            trusted="true"
          fi
          echo "trusted=${trusted}" >> "${GITHUB_OUTPUT}"
      - name: Enforce manual invocation allowlist
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        env:
          ALLOWED_OMAR_DISPATCH_ACTORS: "mrrCarter"
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "::error::Manual Omar Gate dispatch is allowed only on refs/heads/main. Received '${GITHUB_REF}'."
            exit 1
          fi
          case ",${ALLOWED_OMAR_DISPATCH_ACTORS}," in
            *",${GITHUB_ACTOR},"*) ;;
            *)
              echo "::error::Actor '${GITHUB_ACTOR}' is not allowlisted for manual Omar Gate dispatch."
              exit 1
              ;;
          esac
      - name: Validate Sentinelayer token secret
        if: ${{ steps.trust.outputs.trusted == 'true' }}
        shell: bash
        env:
          SENTINELAYER_TOKEN: ${{ secrets.SENTINELAYER_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${SENTINELAYER_TOKEN}" || (echo "Missing SENTINELAYER_TOKEN" && exit 1)
      - name: Validate OpenAI key secret for Omar LLM scan
        if: ${{ steps.trust.outputs.trusted == 'true' }}
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          test -n "${OPENAI_API_KEY}" || (echo "Missing OPENAI_API_KEY" && exit 1)
      - name: Setup Node for untrusted pull_request gate
        if: ${{ steps.trust.outputs.trusted != 'true' }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Run minimal untrusted pull_request gate
        if: ${{ steps.trust.outputs.trusted != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          npm ci --ignore-scripts
          npm run check
          echo "::notice::Untrusted pull_request gate passed without secret-backed Omar scan."
      - name: Run Omar Gate
        if: ${{ steps.trust.outputs.trusted == 'true' }}
        id: omar
        uses: mrrCarter/sentinelayer-v1-action@14ca51c75ca81fdb6e6b7668d417d6a5abc39018
        with:
          github_token: ${{ github.token }}
          sentinelayer_token: ${{ secrets.SENTINELAYER_TOKEN }}
          sentinelayer_spec_id: fbe281812ebeeedcffcfe0442a94407bd4fb64ae78f3c21606512c9b94825afb
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          sentinelayer_managed_llm: "false"
          scan_mode: ${{ github.event_name == 'workflow_dispatch' && inputs.scan_mode || 'deep' }}
          severity_gate: ${{ github.event_name == 'workflow_dispatch' && inputs.severity_gate || 'P1' }}
          model: gpt-5.3-codex
          codex_model: gpt-5.3-codex
          model_fallback: gpt-4.1-mini
          use_codex: "true"
          codex_only: "false"
          llm_failure_policy: block
      - name: Enforce Omar reviewer merge thresholds
        if: ${{ steps.trust.outputs.trusted == 'true' }}
        shell: bash
        env:
          P0_COUNT: ${{ steps.omar.outputs.p0_count || '0' }}
          P1_COUNT: ${{ steps.omar.outputs.p1_count || '0' }}
          P2_COUNT: ${{ steps.omar.outputs.p2_count || '0' }}
          P2_MAX_ALLOWED: ${{ github.event_name == 'workflow_dispatch' && inputs.p2_max_allowed || '5' }}
          SEVERITY_GATE_SELECTED: ${{ github.event_name == 'workflow_dispatch' && inputs.severity_gate || 'P1' }}
        run: |
          set -euo pipefail
          p0="$(echo "${P0_COUNT}" | tr -d '\r' | xargs || true)"
          p1="$(echo "${P1_COUNT}" | tr -d '\r' | xargs || true)"
          p2="$(echo "${P2_COUNT}" | tr -d '\r' | xargs || true)"
          p2_max="$(echo "${P2_MAX_ALLOWED}" | tr -d '\r' | xargs || true)"
          severity_gate="$(echo "${SEVERITY_GATE_SELECTED}" | tr -d '\r' | xargs || true)"
          case "${p0}" in ''|*[!0-9]*) echo "::error::Invalid Omar P0 count: ${p0}" ; exit 1 ;; esac
          case "${p1}" in ''|*[!0-9]*) echo "::error::Invalid Omar P1 count: ${p1}" ; exit 1 ;; esac
          case "${p2}" in ''|*[!0-9]*) echo "::error::Invalid Omar P2 count: ${p2}" ; exit 1 ;; esac
          case "${p2_max}" in ''|*[!0-9]*) echo "::error::Invalid p2_max_allowed value: ${p2_max}" ; exit 1 ;; esac
          case "${severity_gate}" in
            P1)
              if [ "${p0}" -gt 0 ] || [ "${p1}" -gt 0 ]; then
                echo "::error::Omar Gate blocked: P0=${p0}, P1=${p1}. Threshold requires P0=0 and P1=0."
                exit 1
              fi
              ;;
            P2)
              if [ "${p0}" -gt 0 ] || [ "${p1}" -gt 0 ]; then
                echo "::error::Omar Gate blocked: P0=${p0}, P1=${p1}. Threshold requires P0=0 and P1=0."
                exit 1
              fi
              if [ "${p2}" -gt "${p2_max}" ]; then
                echo "::error::Omar Gate blocked: P2=${p2} exceeds max allowed ${p2_max}."
                exit 1
              fi
              ;;
            *)
              echo "::error::Invalid severity_gate value: ${severity_gate}"
              exit 1
              ;;
          esac
      - name: Emit Omar run summary
        if: ${{ steps.trust.outputs.trusted == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          severity_gate="${{ github.event_name == 'workflow_dispatch' && inputs.severity_gate || 'P1' }}"
          p2_max="${{ github.event_name == 'workflow_dispatch' && inputs.p2_max_allowed || '5' }}"
          threshold_line="P0=0, P1=0"
          if [ "${severity_gate}" = "P2" ]; then
            threshold_line="P0=0, P1=0, P2<=${p2_max}"
          fi
          echo "## Omar Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "- run_id: \`${{ steps.omar.outputs.run_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- gate_status: \`${{ steps.omar.outputs.gate_status }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- findings: \`P0=${{ steps.omar.outputs.p0_count }} P1=${{ steps.omar.outputs.p1_count }} P2=${{ steps.omar.outputs.p2_count }} P3=${{ steps.omar.outputs.p3_count }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- severity_gate: \`${severity_gate}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- merge_threshold: \`${threshold_line}\`" >> "$GITHUB_STEP_SUMMARY"
