name: IaC Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  schedule:
    - cron: "37 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TRIVY_VERSION: "0.69.3"

jobs:
  iac-scan:
    name: IaC Scan
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install trivy
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            -o trivy.tar.gz
          tar -xzf trivy.tar.gz trivy
          chmod +x trivy
          ./trivy --version

      - name: Run IaC misconfiguration scan
        run: |
          set -euo pipefail
          targets=()
          for candidate in ".github/workflows" "terraform" "infrastructure" "k8s" "helm"; do
            if [ -e "${candidate}" ]; then
              targets+=("${candidate}")
            fi
          done

          if [ "${#targets[@]}" -eq 0 ]; then
            echo '{"results":[]}' > trivy-iac-results.json
            echo "No IaC targets detected; scan skipped with empty result artifact."
            exit 0
          fi

          ./trivy config \
            --severity CRITICAL \
            --exit-code 1 \
            --format json \
            --output trivy-iac-results.json \
            "${targets[@]}"

      - name: Upload IaC scan artifact
        if: always()
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: trivy-iac-results
          path: trivy-iac-results.json
          if-no-files-found: warn
          retention-days: 7

  iac-summary:
    name: IaC Summary
    runs-on: ubuntu-22.04
    needs: [iac-scan]
    if: >-
      ${{
        always() &&
        needs.iac-scan.result == 'success'
      }}
    steps:
      - name: Confirm IaC scan passed
        run: echo "IaC scan completed successfully."
