name: IaC Scan

on:
  workflow_call:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  schedule:
    - cron: "37 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TRIVY_VERSION: "0.69.3"

jobs:
  iac-scan:
    name: IaC Scan
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install trivy
        run: |
          set -euo pipefail
          release_base_url="https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}"
          policy_file=".github/policies/tool-digests.json"
          release_asset="$(jq -r --arg version "${TRIVY_VERSION}" '.trivy[$version].asset // empty' "${policy_file}")"
          expected_sha="$(jq -r --arg version "${TRIVY_VERSION}" '.trivy[$version].sha256 // empty' "${policy_file}")"
          if [ -z "${release_asset}" ] || [ -z "${expected_sha}" ]; then
            echo "::error::Missing pinned digest policy entry for trivy ${TRIVY_VERSION}"
            exit 1
          fi
          if ! echo "${expected_sha}" | grep -Eq '^[a-f0-9]{64}$'; then
            echo "::error::Invalid pinned SHA256 for trivy ${TRIVY_VERSION}"
            exit 1
          fi
          curl -fsSL \
            --retry 3 \
            --retry-all-errors \
            --retry-delay 2 \
            --connect-timeout 5 \
            --max-time 60 \
            "${release_base_url}/${release_asset}" \
            -o trivy.tar.gz
          actual_sha="$(sha256sum trivy.tar.gz | awk '{print $1}')"
          if [ "${actual_sha}" != "${expected_sha}" ]; then
            echo "::error::Pinned digest mismatch for ${release_asset}"
            echo "::error::expected=${expected_sha} actual=${actual_sha}"
            exit 1
          fi
          tar -xzf trivy.tar.gz trivy
          chmod +x trivy
          ./trivy --version

      - name: Run IaC misconfiguration scan
        run: |
          set -euo pipefail
          targets=()
          for candidate in ".github/workflows" "terraform" "infrastructure" "k8s" "helm"; do
            if [ -e "${candidate}" ]; then
              targets+=("${candidate}")
            fi
          done

          if [ "${#targets[@]}" -eq 0 ]; then
            echo '{"results":[]}' > trivy-iac-results.json
            echo "No IaC targets detected; scan skipped with empty result artifact."
            exit 0
          fi

          ./trivy config \
            --severity CRITICAL \
            --exit-code 1 \
            --format json \
            --output trivy-iac-results.json \
            "${targets[@]}"

      - name: Upload IaC scan artifact
        if: always()
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: trivy-iac-results
          path: trivy-iac-results.json
          if-no-files-found: warn
          retention-days: 7

  iac-summary:
    name: IaC Summary
    runs-on: ubuntu-22.04
    needs: [iac-scan]
    if: >-
      ${{
        always() &&
        needs.iac-scan.result == 'success'
      }}
    steps:
      - name: Confirm IaC scan passed
        run: echo "IaC scan completed successfully."
