name: Gitleaks

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  schedule:
    - cron: "31 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GITLEAKS_VERSION: "8.24.2"

jobs:
  gitleaks-scan:
    name: Gitleaks Scan
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          ./gitleaks version

      - name: Run gitleaks on PR commit range
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"
          ./gitleaks git \
            --redact \
            --report-format json \
            --report-path gitleaks-results.json \
            --log-opts "${BASE_SHA}..${HEAD_SHA}"

      - name: Run gitleaks on repository snapshot
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          ./gitleaks detect \
            --source . \
            --redact \
            --report-format json \
            --report-path gitleaks-results.json

      - name: Upload gitleaks artifact
        if: always()
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: gitleaks-results
          path: gitleaks-results.json
          if-no-files-found: warn
          retention-days: 7

  gitleaks-summary:
    name: Gitleaks Summary
    runs-on: ubuntu-22.04
    needs: [gitleaks-scan]
    if: >-
      ${{
        always() &&
        needs.gitleaks-scan.result == 'success'
      }}
    steps:
      - name: Confirm gitleaks scan passed
        run: echo "Gitleaks scan completed successfully."
