name: Gitleaks

on:
  workflow_call:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  schedule:
    - cron: "31 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GITLEAKS_VERSION: "8.24.2"

jobs:
  gitleaks-scan:
    name: Gitleaks Scan
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          release_base_url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          policy_file=".github/policies/tool-digests.json"
          release_asset="$(jq -r --arg version "${GITLEAKS_VERSION}" '.gitleaks[$version].asset // empty' "${policy_file}")"
          expected_sha="$(jq -r --arg version "${GITLEAKS_VERSION}" '.gitleaks[$version].sha256 // empty' "${policy_file}")"
          if [ -z "${release_asset}" ] || [ -z "${expected_sha}" ]; then
            echo "::error::Missing pinned digest policy entry for gitleaks ${GITLEAKS_VERSION}"
            exit 1
          fi
          if ! echo "${expected_sha}" | grep -Eq '^[a-f0-9]{64}$'; then
            echo "::error::Invalid pinned SHA256 for gitleaks ${GITLEAKS_VERSION}"
            exit 1
          fi
          curl -fsSL \
            --retry 3 \
            --retry-all-errors \
            --retry-delay 2 \
            --connect-timeout 5 \
            --max-time 60 \
            "${release_base_url}/${release_asset}" \
            -o gitleaks.tar.gz
          actual_sha="$(sha256sum gitleaks.tar.gz | awk '{print $1}')"
          if [ "${actual_sha}" != "${expected_sha}" ]; then
            echo "::error::Pinned digest mismatch for ${release_asset}"
            echo "::error::expected=${expected_sha} actual=${actual_sha}"
            exit 1
          fi
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          ./gitleaks version

      - name: Run gitleaks on PR commit range
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"
          ./gitleaks git \
            --redact \
            --report-format json \
            --report-path gitleaks-results.json \
            --log-opts "${BASE_SHA}..${HEAD_SHA}"

      - name: Run gitleaks on repository snapshot
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          ./gitleaks detect \
            --source . \
            --redact \
            --report-format json \
            --report-path gitleaks-results.json

      - name: Upload gitleaks artifact
        if: always()
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: gitleaks-results
          path: gitleaks-results.json
          if-no-files-found: warn
          retention-days: 7

  gitleaks-summary:
    name: Gitleaks Summary
    runs-on: ubuntu-22.04
    needs: [gitleaks-scan]
    if: >-
      ${{
        always() &&
        needs.gitleaks-scan.result == 'success'
      }}
    steps:
      - name: Confirm gitleaks scan passed
        run: echo "Gitleaks scan completed successfully."
