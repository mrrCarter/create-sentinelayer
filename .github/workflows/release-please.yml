name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  checks: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-control-create-sentinelayer
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    environment: release-management
    permissions:
      contents: write
      pull-requests: write
      checks: read
      actions: read
    steps:
      - name: Verify release-management environment protections
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          env_json="$(timeout --preserve-status 30s gh api "repos/${REPO}/environments/release-management" -H "Accept: application/vnd.github+json")"
          reviewer_count="$(echo "${env_json}" | jq -r '[.protection_rules[]? | select(.type == "required_reviewers") | ((.reviewers // []) | length)] | add // 0')"
          if [[ "${reviewer_count}" -lt 1 ]]; then
            echo "::error::release-management environment must require at least one reviewer."
            exit 1
          fi

      - name: Verify Quality Summary gate for target SHA
        id: quality_gate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 600))
          while (( SECONDS < deadline )); do
            api_status=0
            runs_json="$(timeout --preserve-status 30s gh api "repos/${REPO}/actions/workflows/quality-gates.yml/runs?head_sha=${TARGET_SHA}&per_page=20" -H "Accept: application/vnd.github+json")" || api_status=$?
            if [[ "${api_status}" -ne 0 ]]; then
              echo "quality-gates lookup timed out or failed (status=${api_status}); retrying."
              sleep 10
              continue
            fi
            latest_quality_run="$(echo "${runs_json}" | jq -c --arg sha "${TARGET_SHA}" --arg path ".github/workflows/quality-gates.yml" '
              [.workflow_runs[]
                | select((.head_sha // "") == $sha)
                | select(((.path // "") | split("@")[0]) == $path)
              ] | sort_by((.run_number // 0), (.run_attempt // 0), (.created_at // "")) | last // empty
            ')"
            if [[ -z "${latest_quality_run}" ]]; then
              echo "Waiting for quality-gates workflow run on ${TARGET_SHA}."
              sleep 10
              continue
            fi
            quality_run_id="$(echo "${latest_quality_run}" | jq -r '.id // ""')"
            quality_run_url="$(echo "${latest_quality_run}" | jq -r '.html_url // ""')"
            status="$(echo "${latest_quality_run}" | jq -r '.status')"
            conclusion="$(echo "${latest_quality_run}" | jq -r '.conclusion // ""')"
            if [[ "${status}" != "completed" ]]; then
              echo "quality-gates run ${quality_run_id} status=${status}; waiting."
              sleep 10
              continue
            fi
            if [[ "${conclusion}" != "success" ]]; then
              echo "::error::Quality Summary concluded with '${conclusion}' for ${TARGET_SHA} (run=${quality_run_id})."
              exit 1
            fi
            echo "quality_run_id=${quality_run_id}" >> "$GITHUB_OUTPUT"
            echo "Quality Summary passed for ${TARGET_SHA} via run ${quality_run_id} (${quality_run_url})."
            exit 0
          done
          echo "::error::Timed out waiting for Quality Summary on ${TARGET_SHA}."
          exit 1

      - name: Verify Omar Gate for target SHA
        id: omar_gate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 600))
          while (( SECONDS < deadline )); do
            api_status=0
            runs_json="$(timeout --preserve-status 30s gh api "repos/${REPO}/actions/workflows/omar-gate.yml/runs?head_sha=${TARGET_SHA}&per_page=50" -H "Accept: application/vnd.github+json")" || api_status=$?
            if [[ "${api_status}" -ne 0 ]]; then
              echo "omar-gate lookup timed out or failed (status=${api_status}); retrying."
              sleep 10
              continue
            fi
            latest_omar_run="$(echo "${runs_json}" | jq -c --arg sha "${TARGET_SHA}" --arg path ".github/workflows/omar-gate.yml" --arg repo "${REPO}" '
              [.workflow_runs[]
                | select((.head_sha // "") == $sha)
                | select(((.path // "") | split("@")[0]) == $path)
                | select((.event // "") == "pull_request" or (.event // "") == "workflow_dispatch")
                | select(((.head_repository.full_name // .repository.full_name // "") == $repo))
              ] | sort_by((.run_number // 0), (.run_attempt // 0), (.created_at // "")) | last // empty
            ')"
            if [[ -z "${latest_omar_run}" ]]; then
              echo "Waiting for Omar Gate workflow run on ${TARGET_SHA}."
              sleep 10
              continue
            fi
            omar_run_id="$(echo "${latest_omar_run}" | jq -r '.id // ""')"
            omar_run_url="$(echo "${latest_omar_run}" | jq -r '.html_url // ""')"
            status="$(echo "${latest_omar_run}" | jq -r '.status // ""')"
            conclusion="$(echo "${latest_omar_run}" | jq -r '.conclusion // ""')"
            if [[ "${status}" != "completed" ]]; then
              echo "omar-gate run ${omar_run_id} status=${status}; waiting."
              sleep 10
              continue
            fi
            if [[ "${conclusion}" != "success" ]]; then
              echo "::error::Omar Gate concluded with '${conclusion}' for ${TARGET_SHA} (run=${omar_run_id})."
              exit 1
            fi
            echo "omar_run_id=${omar_run_id}" >> "$GITHUB_OUTPUT"
            echo "Omar Gate passed for ${TARGET_SHA} via run ${omar_run_id} (${omar_run_url})."
            exit 0
          done
          echo "::error::Timed out waiting for Omar Gate on ${TARGET_SHA}."
          exit 1

      - name: Validate quality build artifact lineage
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          QUALITY_RUN_ID: ${{ steps.quality_gate.outputs.quality_run_id }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          test -n "${QUALITY_RUN_ID}" || (echo "::error::Missing quality_run_id from Quality Summary gate step." && exit 1)
          timeout --preserve-status 120s gh run download "${QUALITY_RUN_ID}" --name quality-build-package --dir quality-proof
          test -f quality-proof/quality-build.manifest.json || (echo "::error::Missing quality-build.manifest.json artifact from quality run ${QUALITY_RUN_ID}." && exit 1)
          quality_commit_sha="$(jq -r '.commitSha // ""' quality-proof/quality-build.manifest.json)"
          quality_sha="$(jq -r '.sha256 // ""' quality-proof/quality-build.manifest.json)"
          quality_rebuild_sha="$(jq -r '.rebuildSha256 // ""' quality-proof/quality-build.manifest.json)"
          if [[ -z "${quality_commit_sha}" ]] || [[ "${quality_commit_sha}" != "${TARGET_SHA}" ]]; then
            echo "::error::Quality artifact commit (${quality_commit_sha}) does not match target SHA (${TARGET_SHA})."
            exit 1
          fi
          if [[ -z "${quality_sha}" ]] || [[ "${quality_sha}" != "${quality_rebuild_sha}" ]]; then
            echo "::error::Quality artifact reproducibility proof mismatch (sha256=${quality_sha}, rebuild=${quality_rebuild_sha})."
            exit 1
          fi

      - name: Run release-please
        timeout-minutes: 5
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
