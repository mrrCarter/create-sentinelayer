name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Validate release-please preflight gates
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "::error::Release Please must run from refs/heads/main. Received '${GITHUB_REF}'."
            exit 1
          fi

          read_success_workflow_run_id() {
            local workflow_file="$1"
            local sha="$2"
            local event_name="$3"
            local branch_name="$4"
            local query="/repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow_file}/runs?head_sha=${sha}&status=completed&event=${event_name}&per_page=20"
            if [[ -n "${branch_name}" ]]; then
              query="${query}&branch=${branch_name}"
            fi
            gh api \
              -H 'Accept: application/vnd.github+json' \
              "${query}" \
              --jq '.workflow_runs[] | select(.conclusion=="success") | .id' \
              | head -n 1 || true
          }

          quality_run_id=""
          for _ in $(seq 1 18); do
            quality_run_id="$(read_success_workflow_run_id "quality-gates.yml" "${GITHUB_SHA}" "push" "main")"
            if [[ -n "${quality_run_id}" && "${quality_run_id}" != "null" ]]; then
              break
            fi
            sleep 10
          done
          if [[ -z "${quality_run_id}" || "${quality_run_id}" == "null" ]]; then
            echo "::error::No successful quality-gates workflow run found for ${GITHUB_SHA}."
            exit 1
          fi

          pr_head_sha="$(gh api \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
            --jq '.[0].head.sha' 2>/dev/null || true)"

          omar_sha="${GITHUB_SHA}"
          if [[ -n "${pr_head_sha}" && "${pr_head_sha}" != "null" ]]; then
            omar_sha="${pr_head_sha}"
          fi

          omar_run_id=""
          for _ in $(seq 1 12); do
            omar_run_id="$(read_success_workflow_run_id "omar-gate.yml" "${omar_sha}" "pull_request" "")"
            if [[ -n "${omar_run_id}" && "${omar_run_id}" != "null" ]]; then
              break
            fi
            sleep 5
          done
          if [[ -z "${omar_run_id}" || "${omar_run_id}" == "null" ]]; then
            echo "::error::No successful Omar Gate workflow run found for commit ${omar_sha}."
            exit 1
          fi

      - name: Run release-please
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
