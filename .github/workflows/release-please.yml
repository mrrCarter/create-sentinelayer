name: Release Please

on:
  push:
    branches: [main]

concurrency:
  group: release-please-main
  cancel-in-progress: true

permissions:
  actions: write
  checks: read
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    permissions:
      actions: write
      checks: read
      contents: write
      pull-requests: write
    concurrency:
      group: release-please-main
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Ensure main commit passed required upstream gates
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.sha }}
          REQUIRED_CHECKS_JSON: >-
            [
              {"name":"Quality Summary","app":"github-actions","optional":false},
              {"name":"Omar Gate","app":"github-actions","optional":false},
              {"name":"Semgrep Summary","app":"github-actions","optional":false},
              {"name":"Gitleaks Summary","app":"github-actions","optional":false},
              {"name":"IaC Summary","app":"github-actions","optional":false},
              {"name":"SCA Summary","app":"github-actions","optional":false},
              {"name":"License Summary","app":"github-actions","optional":false},
              {"name":"SBOM Summary","app":"github-actions","optional":false},
              {"name":"Attestation Summary","app":"github-actions","optional":false},
              {"name":"CodeQL Summary","app":"github-actions","optional":true}
            ]
          MAX_WAIT_SECONDS: "1800"
          POLL_INTERVAL_SECONDS: "10"
        run: .github/scripts/require-check-runs.sh

      - name: Run release-please
        id: release_please
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        with:
          token: ${{ github.token }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Track Release workflow triggered by generated release tag
        if: steps.release_please.outputs.release_created == 'true' || steps.release_please.outputs.releases_created == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PLEASE_OUTPUTS_JSON: ${{ toJson(steps.release_please.outputs) }}
          EXPECTED_RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          tag_name="$(echo "${RELEASE_PLEASE_OUTPUTS_JSON}" | jq -r '.tag_name // empty')"
          if [ -z "${tag_name}" ]; then
            tag_name="$(echo "${RELEASE_PLEASE_OUTPUTS_JSON}" | jq -r '
              to_entries
              | map(select(.key | endswith("--tag_name")))
              | .[0].value // empty
            ')"
          fi
          if [ -z "${tag_name}" ]; then
            echo "::error::release-please reported release creation but no tag output was found."
            echo "${RELEASE_PLEASE_OUTPUTS_JSON}"
            exit 1
          fi

          tag_object_type="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag_name}" --jq '.object.type')"
          tag_object_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag_name}" --jq '.object.sha')"
          if [ -z "${tag_object_type}" ] || [ -z "${tag_object_sha}" ]; then
            echo "::error::Unable to resolve tag object for ${tag_name}."
            exit 1
          fi
          if [ "${tag_object_type}" = "commit" ]; then
            resolved_release_sha="${tag_object_sha}"
          elif [ "${tag_object_type}" = "tag" ]; then
            resolved_release_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object_sha}" --jq '.object.sha')"
          else
            echo "::error::Unsupported tag object type '${tag_object_type}' for ${tag_name}."
            exit 1
          fi
          if [ -z "${resolved_release_sha}" ]; then
            echo "::error::Unable to resolve release commit SHA for tag ${tag_name}."
            exit 1
          fi
          if [ "${resolved_release_sha}" != "${EXPECTED_RELEASE_SHA}" ]; then
            echo "::error::Release tag commit mismatch for ${tag_name}. Expected ${EXPECTED_RELEASE_SHA}, got ${resolved_release_sha}."
            exit 1
          fi

          release_run_id=""
          for attempt in $(seq 1 40); do
            run_list_json="$(gh run list --workflow "Release" --limit 50 --json databaseId,event,headBranch,headSha,createdAt)"
            release_run_id="$(echo "${run_list_json}" | jq -r \
              --arg tag "${tag_name}" \
              --arg sha "${resolved_release_sha}" \
              '
                [
                  .[]
                  | select(
                      .event == "push"
                      and .headBranch == $tag
                      and .headSha == $sha
                    )
                ]
                | sort_by(.createdAt)
                | last
                | .databaseId // empty
              ')"
            if [ -n "${release_run_id}" ] && [ "${release_run_id}" != "null" ]; then
              break
            fi
            sleep 10
          done

          if [ -z "${release_run_id}" ] || [ "${release_run_id}" = "null" ]; then
            echo "::error::Unable to resolve Release workflow run id for tag ${tag_name} (push event, sha=${resolved_release_sha})."
            exit 1
          fi

          gh run watch "${release_run_id}" --exit-status
          release_conclusion="$(gh run view "${release_run_id}" --json conclusion --jq '.conclusion')"
          if [ "${release_conclusion}" != "success" ]; then
            echo "::error::Release workflow failed for ${tag_name} (run_id=${release_run_id}, conclusion=${release_conclusion})."
            exit 1
          fi

          {
            echo "## Release Workflow Tracking"
            echo "- tag: \`${tag_name}\`"
            echo "- run_id: \`${release_run_id}\`"
            echo "- conclusion: \`${release_conclusion}\`"
          } >> "$GITHUB_STEP_SUMMARY"
