name: Release Please

on:
  push:
    branches: [main]

concurrency:
  group: release-please-main
  cancel-in-progress: false

permissions:
  actions: read
  checks: read
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-preflight:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    concurrency:
      group: release-please-preflight-main
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Enforce main branch protection preflight
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GOVERNANCE_TOKEN || github.token }}
          GOVERNANCE_TOKEN_CONFIGURED: ${{ secrets.RELEASE_GOVERNANCE_TOKEN != '' && 'true' || 'false' }}
          ALLOW_PREFLIGHT_BYPASS: ${{ vars.ALLOW_RELEASE_PREFLIGHT_BYPASS || 'false' }}
        run: |
          set -euo pipefail
          protection_json="$(gh api "repos/${GITHUB_REPOSITORY}/branches/main/protection" 2>/tmp/branch-protection.err || true)"
          if [ -z "${protection_json}" ] || ! echo "${protection_json}" | jq -e '.required_status_checks != null' >/dev/null 2>&1; then
            api_message="$(echo "${protection_json}" | jq -r '.message // empty' 2>/dev/null || true)"
            if [ -z "${api_message}" ]; then
              api_message="$(tr -d '\r' </tmp/branch-protection.err | head -n 1 || true)"
            fi
            # Fail-closed by default. Bypass only when explicitly authorized
            # via ALLOW_RELEASE_PREFLIGHT_BYPASS repo variable — emit audit
            # metadata so the bypass is auditable in step summary.
            if [ "${GOVERNANCE_TOKEN_CONFIGURED}" = "true" ]; then
              echo "::error::Failed to validate main branch protection with RELEASE_GOVERNANCE_TOKEN."
              if [ -n "${api_message}" ]; then
                echo "::error::${api_message}"
              fi
              exit 1
            fi
            bypass_requested="$(echo "${ALLOW_PREFLIGHT_BYPASS}" | tr '[:upper:]' '[:lower:]' | xargs || true)"
            if [ "${bypass_requested}" != "true" ]; then
              echo "::error::Cannot validate main branch protection and no bypass authorized."
              echo "::error::Configure RELEASE_GOVERNANCE_TOKEN (repo admin) or set repo var ALLOW_RELEASE_PREFLIGHT_BYPASS=true to proceed without strict validation."
              if [ -n "${api_message}" ]; then
                echo "::error::API response: ${api_message}"
              fi
              exit 1
            fi
            echo "::warning::ALLOW_RELEASE_PREFLIGHT_BYPASS=true — proceeding without branch-protection enforcement. This is an auditable bypass."
            if [ -n "${api_message}" ]; then
              echo "::notice::Branch protection API response: ${api_message}"
            fi
            {
              echo "## Branch Protection Preflight — BYPASS"
              echo "- strict_validation: \`bypassed\`"
              echo "- bypass_actor: \`${GITHUB_ACTOR:-<unknown>}\`"
              echo "- bypass_ts: \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\`"
              echo "- reason: \`insufficient token scope + explicit bypass var set\`"
              echo "- remediation: Configure RELEASE_GOVERNANCE_TOKEN and unset ALLOW_RELEASE_PREFLIGHT_BYPASS."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          required_contexts_json="$(echo "${protection_json}" | jq -c '
            [
              (.required_status_checks.contexts[]?),
              (.required_status_checks.checks[]?.context)
            ]
            | map(select(type == "string" and length > 0))
            | unique
          ')"
          if [ "${required_contexts_json}" = "[]" ]; then
            echo "::error::main branch protection is missing required status checks."
            exit 1
          fi
          strict_checks="$(echo "${protection_json}" | jq -r '.required_status_checks.strict // false')"
          if [ "${strict_checks}" != "true" ]; then
            echo "::error::main branch protection must require up-to-date branches (required_status_checks.strict=true)."
            exit 1
          fi
          reviews_required="$(echo "${protection_json}" | jq -r '.required_pull_request_reviews != null')"
          if [ "${reviews_required}" != "true" ]; then
            echo "::error::main branch protection must require pull request reviews."
            exit 1
          fi
          force_push_allowed="$(echo "${protection_json}" | jq -r '.allow_force_pushes.enabled // false')"
          if [ "${force_push_allowed}" = "true" ]; then
            echo "::error::main branch protection must block force pushes."
            exit 1
          fi
          deletion_allowed="$(echo "${protection_json}" | jq -r '.allow_deletions.enabled // false')"
          if [ "${deletion_allowed}" = "true" ]; then
            echo "::error::main branch protection must block branch deletions."
            exit 1
          fi
          REQUIRED_RELEASE_CONTEXTS='[
            "Quality Summary",
            "Quality Gates Terminal",
            "Omar Gate",
            "Attestation Summary"
          ]'
          missing_contexts="$(jq -n \
            --argjson expected "${REQUIRED_RELEASE_CONTEXTS}" \
            --argjson actual "${required_contexts_json}" '
              [
                $expected[]
                | select(($actual | index(.)) == null)
              ]
            ')"
          if [ "$(echo "${missing_contexts}" | jq 'length')" -gt 0 ]; then
            echo "::error::main branch protection is missing required checks for release automation."
            echo "Missing: $(echo "${missing_contexts}" | jq -r 'join(", ")')"
            exit 1
          fi
          {
            echo "## Branch Protection Preflight"
            echo "- branch: \`main\`"
            echo "- required_checks_verified: \`$(echo "${required_contexts_json}" | jq 'length')\`"
            echo "- strict_required_checks: \`${strict_checks}\`"
            echo "- requires_pull_request_reviews: \`${reviews_required}\`"
            echo "- allow_force_pushes: \`${force_push_allowed}\`"
            echo "- allow_deletions: \`${deletion_allowed}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Ensure main commit passed required upstream gates
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.sha }}
          REQUIRED_CHECKS_JSON: >-
            [
              {"name":"Quality Summary","app":"github-actions","optional":false,"workflow_path":".github/workflows/quality-gates.yml"},
              {"name":"Quality Gates Terminal","app":"github-actions","optional":false,"workflow_path":".github/workflows/quality-gates.yml"},
              {"name":"Omar Gate","app":"github-actions","optional":false,"workflow_path":".github/workflows/omar-gate.yml"},
              {"name":"Attestation Summary","app":"github-actions","optional":false,"workflow_path":".github/workflows/attestations.yml"}
            ]
          MAX_WAIT_SECONDS: "1800"
          POLL_INTERVAL_SECONDS: "10"
        run: .github/scripts/require-check-runs.sh

  release-please:
    needs: [release-preflight]
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    permissions:
      actions: read
      checks: read
      contents: write
      pull-requests: write
    concurrency:
      group: release-please-mutate-main
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run release-please
        id: release_please
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # digest-pinned (googleapis/release-please-action)
        with:
          token: ${{ github.token }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: true

      - name: Emit signed-tag release handoff
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          {
            echo "## Release Publish Handoff"
            echo
            echo "Release Please only manages the version/changelog PR. Publishing is triggered by a signed annotated release tag."
            echo
            echo "Use the guarded release command so the process fails before a lightweight GitHub tag can be created:"
            echo
            echo "\`\`\`bash"
            echo "git fetch origin main --tags"
            echo "git checkout main && git pull --ff-only"
            echo "npm run release:publish -- --tag ${tag} --notes-file <release-notes.md>"
            echo "\`\`\`"
            echo
            echo "The command creates \`${tag}\` with \`git tag -s\`, verifies it with \`git tag -v\`, pushes it, verifies the remote GitHub tag object is annotated and signed by an allowlisted identity, then runs \`gh release create --verify-tag\`."
            echo
            echo "Do not run \`gh release create ${tag}\` before pushing the signed tag; GitHub would create a lightweight tag and the Release workflow will fail closed."
          } >> "$GITHUB_STEP_SUMMARY"
