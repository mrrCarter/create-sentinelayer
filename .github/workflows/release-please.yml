name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  checks: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Validate release-please preflight gates
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "::error::Release Please must run from refs/heads/main. Received '${GITHUB_REF}'."
            exit 1
          fi

          read_success_check_run_id() {
            local sha="$1"
            local check_name="$2"
            gh api \
              -H 'Accept: application/vnd.github+json' \
              "/repos/${GITHUB_REPOSITORY}/commits/${sha}/check-runs?per_page=100" \
              --jq ".check_runs[] | select(.name==\"${check_name}\") | select(.status==\"completed\" and .conclusion==\"success\") | .id" \
              | head -n 1 || true
          }

          quality_check_id=""
          for _ in $(seq 1 18); do
            quality_check_id="$(read_success_check_run_id "${GITHUB_SHA}" "Quality Summary")"
            if [[ -n "${quality_check_id}" && "${quality_check_id}" != "null" ]]; then
              break
            fi
            sleep 10
          done
          if [[ -z "${quality_check_id}" || "${quality_check_id}" == "null" ]]; then
            echo "::error::No successful Quality Summary check run found for commit ${GITHUB_SHA}."
            exit 1
          fi

          omar_check_id=""
          for _ in $(seq 1 12); do
            omar_check_id="$(read_success_check_run_id "${GITHUB_SHA}" "Omar Gate")"
            if [[ -n "${omar_check_id}" && "${omar_check_id}" != "null" ]]; then
              break
            fi
            sleep 5
          done

          if [[ -z "${omar_check_id}" || "${omar_check_id}" == "null" ]]; then
            pr_head_sha="$(gh api \
              -H 'Accept: application/vnd.github+json' \
              "/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
              --jq '.[0].head.sha' 2>/dev/null || true)"
            if [[ -n "${pr_head_sha}" && "${pr_head_sha}" != "null" ]]; then
              for _ in $(seq 1 12); do
                omar_check_id="$(read_success_check_run_id "${pr_head_sha}" "Omar Gate")"
                if [[ -n "${omar_check_id}" && "${omar_check_id}" != "null" ]]; then
                  break
                fi
                sleep 5
              done
            fi
          fi

          if [[ -z "${omar_check_id}" || "${omar_check_id}" == "null" ]]; then
            echo "::error::No successful Omar Gate check run found for commit ${GITHUB_SHA} or its linked PR head."
            exit 1
          fi

          echo "Release-please preflight passed with Quality Summary check ${quality_check_id} and Omar Gate check ${omar_check_id}."

      - name: Run release-please
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
