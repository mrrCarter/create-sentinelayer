name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  checks: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Validate release-please preflight gates
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "::error::Release Please must run from refs/heads/main. Received '${GITHUB_REF}'."
            exit 1
          fi

          gh_api_with_timeout() {
            local endpoint="$1"
            shift
            local attempt=1
            local max_attempts=4
            while (( attempt <= max_attempts )); do
              if timeout 20s gh api -H 'Accept: application/vnd.github+json' "${endpoint}" "$@"; then
                return 0
              fi
              if (( attempt == max_attempts )); then
                echo "::error::gh api request failed after ${max_attempts} attempts: ${endpoint}" >&2
                return 1
              fi
              sleep "$((attempt + (RANDOM % 2)))"
              attempt="$((attempt + 1))"
            done
          }

          read_success_workflow_run_ids() {
            local workflow_file="$1"
            local sha="$2"
            gh_api_with_timeout \
              "/repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow_file}/runs?head_sha=${sha}&status=completed&per_page=50" \
              --jq '.workflow_runs[] | select(.conclusion=="success" and .event=="push" and .head_branch=="main") | .id' \
              || true
          }

          read_success_job_id_for_run() {
            local run_id="$1"
            local job_name="$2"
            gh_api_with_timeout \
              "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100" \
              --jq ".jobs[] | select(.name==\"${job_name}\") | select(.status==\"completed\" and .conclusion==\"success\") | .id" \
              | head -n 1 || true
          }

          read_latest_check_run_result() {
            local sha="$1"
            local check_name="$2"
            gh_api_with_timeout \
              "/repos/${GITHUB_REPOSITORY}/commits/${sha}/check-runs?per_page=100" \
              --jq ".check_runs | map(select(.name==\"${check_name}\")) | sort_by(.started_at // .completed_at // .id) | last | [(.id|tostring), (.status // \"\"), (.conclusion // \"\")] | @tsv" \
              || true
          }

          wait_for_latest_check_success() {
            local sha="$1"
            local check_name="$2"
            local attempts="$3"
            local sleep_seconds="$4"
            local result=""
            for _ in $(seq 1 "${attempts}"); do
              result="$(read_latest_check_run_result "${sha}" "${check_name}")"
              if [[ -n "${result}" ]]; then
                IFS=$'\t' read -r check_id check_status check_conclusion <<< "${result}"
                if [[ "${check_status}" == "completed" && "${check_conclusion}" == "success" ]]; then
                  printf '%s\n' "${check_id}"
                  return 0
                fi
              fi
              sleep "${sleep_seconds}"
            done
            printf '\n'
          }

          quality_check_id=""
          quality_run_id=""
          for _ in $(seq 1 18); do
            while IFS= read -r candidate_run_id; do
              [[ -z "${candidate_run_id}" || "${candidate_run_id}" == "null" ]] && continue
              quality_job_id="$(read_success_job_id_for_run "${candidate_run_id}" "Quality Summary")"
              if [[ -n "${quality_job_id}" && "${quality_job_id}" != "null" ]]; then
                quality_run_id="${candidate_run_id}"
                quality_check_id="${quality_job_id}"
                break
              fi
            done < <(read_success_workflow_run_ids "quality-gates.yml" "${GITHUB_SHA}")
            if [[ -n "${quality_run_id}" && "${quality_run_id}" != "null" ]]; then
              break
            fi
            sleep 10
          done
          if [[ -z "${quality_check_id}" ]]; then
            echo "::error::No successful Quality Summary check run found for commit ${GITHUB_SHA}."
            exit 1
          fi

          omar_check_id="$(wait_for_latest_check_success "${GITHUB_SHA}" "Omar Gate" 12 5)"

          if [[ -z "${omar_check_id}" ]]; then
            pr_head_sha="$(gh api \
              -H 'Accept: application/vnd.github+json' \
              "/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
              --jq '.[0].head.sha' 2>/dev/null || true)"
            if [[ -n "${pr_head_sha}" && "${pr_head_sha}" != "null" ]]; then
              omar_check_id="$(wait_for_latest_check_success "${pr_head_sha}" "Omar Gate" 12 5)"
            fi
          fi

          if [[ -z "${omar_check_id}" ]]; then
            echo "::error::No successful Omar Gate check run found for commit ${GITHUB_SHA} or its linked PR head."
            exit 1
          fi

          echo "Release-please preflight passed with Quality Summary check ${quality_check_id} (run ${quality_run_id}) and Omar Gate check ${omar_check_id}."

      - name: Run release-please
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
