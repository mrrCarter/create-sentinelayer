name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Validate release-please preflight gates
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "::error::Release Please must run from refs/heads/main. Received '${GITHUB_REF}'."
            exit 1
          fi

          read_check_conclusion() {
            local sha="$1"
            local check_name="$2"
            gh api \
              -H 'Accept: application/vnd.github+json' \
              "/repos/${GITHUB_REPOSITORY}/commits/${sha}/check-runs" \
              --jq ".check_runs[] | select(.name==\"${check_name}\") | .conclusion" \
              | head -n 1 || true
          }

          quality_conclusion="$(gh api \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/check-runs" \
            --jq '.check_runs[] | select(.name=="Quality Summary") | .conclusion' | head -n 1 || true)"

          if [[ "${quality_conclusion}" != "success" ]]; then
            echo "::error::Quality Summary is not successful for commit ${GITHUB_SHA}. Found conclusion='${quality_conclusion:-missing}'."
            exit 1
          fi

          pr_head_sha="$(gh api \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
            --jq '.[0].head.sha' 2>/dev/null || true)"

          security_on_sha="$(read_check_conclusion "${GITHUB_SHA}" "Security Scan")"
          if [[ "${security_on_sha}" != "success" ]]; then
            echo "::error::Security Scan is not successful for commit ${GITHUB_SHA}. Found conclusion='${security_on_sha:-missing}'."
            exit 1
          fi

          omar_sha="${GITHUB_SHA}"
          if [[ -n "${pr_head_sha}" && "${pr_head_sha}" != "null" ]]; then
            omar_sha="${pr_head_sha}"
          fi
          omar_conclusion="$(read_check_conclusion "${omar_sha}" "Omar Gate")"
          if [[ "${omar_conclusion}" != "success" ]]; then
            echo "::error::Omar Gate is not successful for commit ${omar_sha}. Found conclusion='${omar_conclusion:-missing}'."
            exit 1
          fi

      - name: Run release-please
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
