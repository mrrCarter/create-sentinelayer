name: Release Please

on:
  push:
    branches: [main]

concurrency:
  group: release-please-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  checks: read
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      checks: read
      contents: write
      pull-requests: write
    concurrency:
      group: release-please-main
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Ensure main commit passed required upstream gates
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.sha }}
          REQUIRED_CHECKS_JSON: >-
            [
              {"name":"Quality Summary","app":"github-actions","optional":false},
              {"name":"Omar Gate","app":"github-actions","optional":false},
              {"name":"Semgrep Summary","app":"github-actions","optional":false},
              {"name":"Gitleaks Summary","app":"github-actions","optional":false},
              {"name":"IaC Summary","app":"github-actions","optional":false},
              {"name":"SCA Summary","app":"github-actions","optional":false},
              {"name":"License Summary","app":"github-actions","optional":false},
              {"name":"SBOM Summary","app":"github-actions","optional":false},
              {"name":"Attestation Summary","app":"github-actions","optional":false},
              {"name":"CodeQL Summary","app":"github-actions","optional":true}
            ]
          MAX_WAIT_SECONDS: "1800"
          POLL_INTERVAL_SECONDS: "10"
        run: .github/scripts/require-check-runs.sh

      - name: Run release-please
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        with:
          token: ${{ github.token }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
