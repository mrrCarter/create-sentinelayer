name: License Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  schedule:
    - cron: "49 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  license-audit:
    name: License Audit
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Collect license inventory
        run: npm exec -- license-checker-rseidelsohn --production --json > license-report.json

      - name: Enforce license policy
        run: node scripts/license-policy-check.mjs license-report.json .github/policies/license-policy.json license-violations.json

      - name: Upload license artifacts
        if: always()
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: license-audit-artifacts
          path: |
            license-report.json
            license-violations.json
          if-no-files-found: warn
          retention-days: 7

  license-summary:
    name: License Summary
    runs-on: ubuntu-22.04
    needs: [license-audit]
    if: >-
      ${{
        always() &&
        needs.license-audit.result == 'success'
      }}
    steps:
      - name: Confirm license gate passed
        run: echo "License gate completed successfully."
