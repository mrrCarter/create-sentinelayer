name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  actions: read
  checks: read
  contents: read
  attestations: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  policy-precheck:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Enforce trusted tag trigger policy
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ALLOWED_TAG_ACTORS: ${{ vars.RELEASE_ALLOWED_TAG_ACTORS || 'github-actions[bot],mrrCarter' }}
          EVENT_CREATED: ${{ github.event.created }}
          EVENT_DELETED: ${{ github.event.deleted }}
        run: |
          set -euo pipefail
          if [ "${EVENT_DELETED}" = "true" ]; then
            echo "::error::Release workflow does not run on deleted tags."
            exit 1
          fi
          if [ "${EVENT_CREATED}" != "true" ]; then
            echo "::error::Release workflow requires newly created semver tags (event.created=true)."
            exit 1
          fi
          actor="${GITHUB_ACTOR}"
          allowed_csv="${RELEASE_ALLOWED_TAG_ACTORS}"
          if [ -z "$(echo "${allowed_csv}" | xargs || true)" ]; then
            echo "::error::RELEASE_ALLOWED_TAG_ACTORS is empty."
            exit 1
          fi
          actor_allowed="false"
          IFS=',' read -r -a allowed_items <<< "${allowed_csv}"
          for item in "${allowed_items[@]}"; do
            candidate="$(echo "${item}" | xargs)"
            if [ -n "${candidate}" ] && [ "${candidate}" = "${actor}" ]; then
              actor_allowed="true"
              break
            fi
          done
          if [ "${actor_allowed}" != "true" ]; then
            echo "::error::Actor ${actor} is not allowed to trigger release tags. Allowed actors: ${allowed_csv}."
            exit 1
          fi
          tag_object_type="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${GITHUB_REF_NAME}" --jq '.object.type')"
          if [ "${tag_object_type}" != "commit" ] && [ "${tag_object_type}" != "tag" ]; then
            echo "::error::Unexpected tag object type for ${GITHUB_REF_NAME}: ${tag_object_type}"
            exit 1
          fi
          {
            echo "## Release Trigger Policy"
            echo "- tag: \`${GITHUB_REF_NAME}\`"
            echo "- actor: \`${actor}\`"
            echo "- created_event: \`${EVENT_CREATED}\`"
            echo "- tag_object_type: \`${tag_object_type}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  tag-preflight:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [policy-precheck]
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    environment: package-release
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Enforce release tag policy
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
            echo "::error::Unsupported release preflight context: ${GITHUB_EVENT_NAME} ${GITHUB_REF}"
            exit 1
          fi
          if ! echo "${GITHUB_REF_NAME}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "::error::Release tag must match semantic version pattern (vMAJOR.MINOR.PATCH[-suffix]). Received ${GITHUB_REF_NAME}."
            exit 1
          fi

      - name: Enforce release actor allowlist policy (tag release)
        shell: bash
        env:
          RELEASE_ALLOWED_TAG_ACTORS: ${{ vars.RELEASE_ALLOWED_TAG_ACTORS || 'github-actions[bot],mrrCarter' }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
            echo "::error::Unsupported actor policy context: ${GITHUB_EVENT_NAME} ${GITHUB_REF}"
            exit 1
          fi
          policy_branch="tag-release"
          allowed_csv="${RELEASE_ALLOWED_TAG_ACTORS}"
          if [ -z "$(echo "${allowed_csv}" | xargs || true)" ]; then
            echo "::error::Actor allowlist is empty for policy branch ${policy_branch}."
            exit 1
          fi
          actor="${GITHUB_ACTOR}"
          actor_allowed="false"
          IFS=',' read -r -a allowed_items <<< "${allowed_csv}"
          for item in "${allowed_items[@]}"; do
            candidate="$(echo "${item}" | xargs)"
            if [ -n "${candidate}" ] && [ "${candidate}" = "${actor}" ]; then
              actor_allowed="true"
              break
            fi
          done
          if [ "${actor_allowed}" != "true" ]; then
            echo "::error::Actor ${actor} is not allowed for ${policy_branch}. Allowed actors: ${allowed_csv}."
            exit 1
          fi
          {
            echo "### Release actor policy"
            echo "- branch: \`${policy_branch}\`"
            echo "- actor: \`${actor}\`"
            echo "- allowlist: \`${allowed_csv}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce release tag ancestry on main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "::error::Release tag commit ${GITHUB_SHA} is not reachable from origin/main."
            exit 1
          fi

      - name: Ensure target commit passed required upstream gates
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.sha }}
          REQUIRED_CHECKS_JSON: >-
            [
              {"name":"Quality Summary","app":"github-actions","optional":false},
              {"name":"Omar Gate","app":"github-actions","optional":false},
              {"name":"Semgrep Summary","app":"github-actions","optional":false},
              {"name":"Gitleaks Summary","app":"github-actions","optional":false},
              {"name":"IaC Summary","app":"github-actions","optional":false},
              {"name":"SCA Summary","app":"github-actions","optional":false},
              {"name":"License Summary","app":"github-actions","optional":false},
              {"name":"SBOM Summary","app":"github-actions","optional":false},
              {"name":"Attestation Summary","app":"github-actions","optional":false},
              {"name":"CodeQL Summary","app":"github-actions","optional":true}
            ]
          MAX_WAIT_SECONDS: "1800"
          POLL_INTERVAL_SECONDS: "10"
        run: .github/scripts/require-check-runs.sh

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate package
        run: npm run verify

      - name: Emit preflight summary
        run: |
          set -euo pipefail
          echo "## Release Tag Preflight" >> "$GITHUB_STEP_SUMMARY"
          echo "- mode: \`tag-preflight\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- ref: \`${GITHUB_REF}\`" >> "$GITHUB_STEP_SUMMARY"

  release-authorize:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [tag-preflight]
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    environment: package-release
    steps:
      - name: Confirm release preflight completed
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" != "refs/tags/${GITHUB_REF_NAME}" ]; then
            echo "::error::Unexpected ref format: ${GITHUB_REF}"
            exit 1
          fi
          echo "Release preflight gate passed for ${GITHUB_REF_NAME}."

      - name: Enforce package-release environment reviewer policy
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          response="$(gh api "repos/${GITHUB_REPOSITORY}/environments/package-release")"
          rule_count="$(echo "${response}" | jq -r '.protection_rules | length')"
          reviewer_count="$(echo "${response}" | jq -r '[.protection_rules[]? | select(.type=="required_reviewers") | (.reviewers // [])[]] | length')"
          case "${rule_count}" in ''|*[!0-9]*) echo "::error::Invalid protection rule count returned for package-release environment." ; exit 1 ;; esac
          case "${reviewer_count}" in ''|*[!0-9]*) echo "::error::Invalid reviewer count returned for package-release environment." ; exit 1 ;; esac
          if [ "${rule_count}" -lt 1 ]; then
            echo "::error::package-release environment has no protection rules configured. Add required reviewers before publishing."
            exit 1
          fi
          if [ "${reviewer_count}" -lt 1 ]; then
            echo "::error::package-release environment has no required reviewers configured. Add required reviewers before publishing."
            exit 1
          fi

  build-release-artifact:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release-authorize]
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    concurrency:
      group: release-build-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Resolve canonical attested artifact for release commit
        id: attested_source
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          check_runs_json="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/check-runs?per_page=100")"
          attestation_candidates="$(echo "${check_runs_json}" | jq -c '
            [
              (.check_runs // [])[]
              | select(
                  .name == "Attestation Summary"
                  and .app.slug == "github-actions"
                  and .status == "completed"
                  and .conclusion == "success"
                  and (.details_url // "" | test("/actions/runs/[0-9]+"))
                )
              | {
                  id: .id,
                  completed_at: (.completed_at // ""),
                  details_url: .details_url
                }
            ]
            | sort_by(.completed_at)
          ')"
          candidate_count="$(echo "${attestation_candidates}" | jq 'length')"
          if [ "${candidate_count}" -lt 1 ]; then
            echo "::error::No successful 'Attestation Summary' check-run found for commit ${GITHUB_SHA}."
            exit 1
          fi
          if [ "${candidate_count}" -gt 1 ]; then
            unique_run_count="$(echo "${attestation_candidates}" | jq '
              [ .[] | .details_url | capture("/actions/runs/(?<id>[0-9]+)") | .id ]
              | unique
              | length
            ')"
            if [ "${unique_run_count}" -gt 1 ]; then
              echo "::error::Ambiguous attestation provenance: multiple successful Attestation Summary runs found for ${GITHUB_SHA}."
              echo "${attestation_candidates}" | jq '.'
              exit 1
            fi
          fi
          attestation_run_id="$(echo "${attestation_candidates}" | jq -r 'last.details_url | capture("/actions/runs/(?<id>[0-9]+)") | .id')"
          if ! [[ "${attestation_run_id}" =~ ^[0-9]+$ ]]; then
            echo "::error::Unable to resolve attestation workflow run id from Attestation Summary check-run."
            exit 1
          fi
          run_meta_json="$(gh run view "${attestation_run_id}" --json databaseId,name,path,conclusion,event,headSha,url)"
          run_name="$(echo "${run_meta_json}" | jq -r '.name // empty')"
          run_path="$(echo "${run_meta_json}" | jq -r '.path // empty')"
          run_conclusion="$(echo "${run_meta_json}" | jq -r '.conclusion // empty')"
          run_head_sha="$(echo "${run_meta_json}" | jq -r '.headSha // empty')"
          if [ "${run_conclusion}" != "success" ]; then
            echo "::error::Resolved attestation run ${attestation_run_id} is not successful (conclusion=${run_conclusion})."
            exit 1
          fi
          if [ "${run_name}" != "Build Attestation" ]; then
            echo "::error::Resolved run ${attestation_run_id} has unexpected workflow name '${run_name}'."
            exit 1
          fi
          if [ "${run_path}" != ".github/workflows/attestations.yml" ]; then
            echo "::error::Resolved run ${attestation_run_id} has unexpected workflow path '${run_path}'."
            exit 1
          fi
          if [ "${run_head_sha}" != "${GITHUB_SHA}" ]; then
            echo "::error::Resolved run ${attestation_run_id} head SHA mismatch. expected=${GITHUB_SHA} actual=${run_head_sha}."
            exit 1
          fi
          rm -rf attestation-source
          mkdir -p attestation-source
          gh run download "${attestation_run_id}" --name "attestation-build-artifacts" --dir attestation-source
          echo "run_id=${attestation_run_id}" >> "${GITHUB_OUTPUT}"
          {
            echo "## Canonical Attestation Source"
            echo "- run_id: \`${attestation_run_id}\`"
            echo "- workflow: \`${run_name}\`"
            echo "- path: \`${run_path}\`"
            echo "- source_url: \`$(echo "${run_meta_json}" | jq -r '.url // empty')\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate release artifact manifest
        id: artifact_manifest
        run: |
          set -euo pipefail
          shopt -s nullglob
          SOURCE_MANIFEST="attestation-source/attestation-manifest.json"
          if [ ! -f "${SOURCE_MANIFEST}" ]; then
            echo "::error::Missing attestation manifest from canonical artifact source."
            exit 1
          fi
          SOURCE_COMMIT_SHA="$(jq -r '.commit_sha // empty' "${SOURCE_MANIFEST}")"
          if [ -z "${SOURCE_COMMIT_SHA}" ] || [ "${SOURCE_COMMIT_SHA}" != "${GITHUB_SHA}" ]; then
            echo "::error::Canonical artifact commit mismatch. expected=${GITHUB_SHA} source=${SOURCE_COMMIT_SHA:-<none>}."
            exit 1
          fi
          SOURCE_WORKFLOW_REF="$(jq -r '.workflow_ref // empty' "${SOURCE_MANIFEST}")"
          SOURCE_WORKFLOW_NAME="$(jq -r '.workflow_name // empty' "${SOURCE_MANIFEST}")"
          SOURCE_RUN_ID="$(jq -r '.run_id // empty' "${SOURCE_MANIFEST}")"
          if [ -z "${SOURCE_WORKFLOW_REF}" ] || ! echo "${SOURCE_WORKFLOW_REF}" | grep -Eq "^${GITHUB_REPOSITORY}/\\.github/workflows/attestations\\.yml@"; then
            echo "::error::Canonical artifact workflow_ref is missing or invalid: ${SOURCE_WORKFLOW_REF:-<none>}."
            exit 1
          fi
          if [ "${SOURCE_WORKFLOW_NAME}" != "Build Attestation" ]; then
            echo "::error::Canonical artifact workflow_name mismatch: ${SOURCE_WORKFLOW_NAME:-<none>}."
            exit 1
          fi
          if [ -z "${SOURCE_RUN_ID}" ] || [ "${SOURCE_RUN_ID}" != "${{ steps.attested_source.outputs.run_id }}" ]; then
            echo "::error::Canonical artifact run_id mismatch. expected=${{ steps.attested_source.outputs.run_id }} source=${SOURCE_RUN_ID:-<none>}."
            exit 1
          fi
          SOURCE_SHA256="$(jq -r '.sha256 // empty' "${SOURCE_MANIFEST}")"
          tarballs=(attestation-source/sentinelayer-cli-*.tgz)
          if [ "${#tarballs[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one canonical release tarball, found ${#tarballs[@]}."
            printf 'Found tarballs: %s\n' "${tarballs[@]:-<none>}"
            exit 1
          fi
          SOURCE_TARBALL_PATH="${tarballs[0]}"
          TARBALL="$(basename "${SOURCE_TARBALL_PATH}")"
          cp "${SOURCE_TARBALL_PATH}" "${TARBALL}"
          SHA256="$(sha256sum "${TARBALL}" | awk '{print $1}')"
          if [ -n "${SOURCE_SHA256}" ] && [ "${SOURCE_SHA256}" != "${SHA256}" ]; then
            echo "::error::Canonical artifact digest mismatch. source=${SOURCE_SHA256} actual=${SHA256}."
            exit 1
          fi
          jq -n \
            --arg tarball "${TARBALL}" \
            --arg sha256 "${SHA256}" \
            --arg commit_sha "${GITHUB_SHA}" \
            --arg workflow_ref "${GITHUB_WORKFLOW_REF}" \
            --arg attestation_run_id "${{ steps.attested_source.outputs.run_id }}" \
            '{
              tarball: $tarball,
              sha256: $sha256,
              commit_sha: $commit_sha,
              workflow_ref: $workflow_ref,
              source_attestation_run_id: ($attestation_run_id | if length > 0 then . else null end)
            }' > release-artifact-manifest.json
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Validate packaged CLI install
        run: |
          set -euo pipefail
          TARBALL="${{ steps.artifact_manifest.outputs.tarball }}"
          PREFIX_DIR="$(mktemp -d)"
          npm install --prefix "${PREFIX_DIR}" --ignore-scripts "${TARBALL}"
          "${PREFIX_DIR}/node_modules/.bin/sentinelayer-cli" --version
          "${PREFIX_DIR}/node_modules/.bin/create-sentinelayer" --version
          "${PREFIX_DIR}/node_modules/.bin/sentinel" --version
          "${PREFIX_DIR}/node_modules/.bin/sl" --version
          rm -rf "${PREFIX_DIR}"

      - name: Generate release build attestation
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: ${{ steps.artifact_manifest.outputs.tarball }}

      - name: Verify release build attestation policy
        env:
          GH_TOKEN: ${{ github.token }}
          TARBALL: ${{ steps.artifact_manifest.outputs.tarball }}
          SIGNER_WORKFLOW: ${{ github.repository }}/.github/workflows/release.yml
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if gh attestation verify "${TARBALL}" --repo "${GITHUB_REPOSITORY}" --signer-workflow "${SIGNER_WORKFLOW}" --format json > release-attestation-verify.json; then
              break
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "::error::Release attestation verification failed after retries."
              exit 1
            fi
            sleep 10
          done
          jq -e 'length > 0' release-attestation-verify.json > /dev/null

      - name: Upload release tarball artifact
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: sentinelayer-cli-tarball
          path: |
            ${{ steps.artifact_manifest.outputs.tarball }}
            release-artifact-manifest.json
            release-attestation-verify.json
          if-no-files-found: error
          retention-days: 7

  rollback-readiness-tag:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-release-artifact]
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Validate rollback readiness (tag release dry-run)
        env:
          PACKAGE_NAME: sentinelayer-cli
          ROLLBACK_MODE: tag-release
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          release_version="${RELEASE_VERSION#v}"
          RELEASE_VERSION="${release_version}" bash .github/scripts/release-rollback-readiness.sh

  release-approval:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-release-artifact, rollback-readiness-tag]
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    environment: package-release
    steps:
      - name: Record protected approval gate
        run: |
          set -euo pipefail
          echo "Release approval gate satisfied for ${GITHUB_REF}."

  pre-publish-gates:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-release-artifact, rollback-readiness-tag, release-approval]
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      checks: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Re-verify required upstream gates immediately before publish
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.sha }}
          REQUIRED_CHECKS_JSON: >-
            [
              {"name":"Quality Summary","app":"github-actions","optional":false},
              {"name":"Omar Gate","app":"github-actions","optional":false},
              {"name":"Semgrep Summary","app":"github-actions","optional":false},
              {"name":"Gitleaks Summary","app":"github-actions","optional":false},
              {"name":"IaC Summary","app":"github-actions","optional":false},
              {"name":"SCA Summary","app":"github-actions","optional":false},
              {"name":"License Summary","app":"github-actions","optional":false},
              {"name":"SBOM Summary","app":"github-actions","optional":false},
              {"name":"Attestation Summary","app":"github-actions","optional":false},
              {"name":"CodeQL Summary","app":"github-actions","optional":true}
            ]
          MAX_WAIT_SECONDS: "900"
          POLL_INTERVAL_SECONDS: "10"
        run: .github/scripts/require-check-runs.sh

  publish:
    needs: [pre-publish-gates]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    environment: package-release
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: release-publish-prod
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Download release tarball artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sentinelayer-cli-tarball
          path: release-artifact

      - name: Enforce trusted npm publishing context
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "::error::Trusted publishing requires GitHub OIDC runtime context, but id-token environment is unavailable."
            exit 1
          fi
          echo "PUBLISH_AUTH_MODE=trusted" >> "$GITHUB_ENV"
          echo "### npm publish auth mode: trusted (OIDC)" >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce release artifact checksum manifest and bind publish tarball
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=(release-artifact/sentinelayer-cli-*.tgz)
          if [ "${#tarballs[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one downloaded tarball, found ${#tarballs[@]}."
            printf 'Found tarballs: %s\n' "${tarballs[@]:-<none>}"
            exit 1
          fi
          TARBALL="${tarballs[0]}"
          MANIFEST="release-artifact/release-artifact-manifest.json"
          test -f "${MANIFEST}"
          MANIFEST_TARBALL="$(jq -r '.tarball // empty' "${MANIFEST}")"
          EXPECTED_SHA256="$(jq -r '.sha256' "${MANIFEST}")"
          MANIFEST_COMMIT_SHA="$(jq -r '.commit_sha // empty' "${MANIFEST}")"
          ACTUAL_SHA256="$(sha256sum "${TARBALL}" | awk '{print $1}')"
          if [ -z "${MANIFEST_TARBALL}" ]; then
            echo "::error::Manifest missing expected tarball name."
            exit 1
          fi
          if [ "$(basename "${TARBALL}")" != "${MANIFEST_TARBALL}" ]; then
            echo "::error::Manifest tarball mismatch. expected=${MANIFEST_TARBALL} actual=$(basename "${TARBALL}")"
            exit 1
          fi
          if [ -z "${EXPECTED_SHA256}" ] || [ "${EXPECTED_SHA256}" = "null" ]; then
            echo "::error::Manifest missing expected sha256."
            exit 1
          fi
          if [ -z "${MANIFEST_COMMIT_SHA}" ] || [ "${MANIFEST_COMMIT_SHA}" = "null" ]; then
            echo "::error::Manifest missing commit_sha."
            exit 1
          fi
          if [ "${MANIFEST_COMMIT_SHA}" != "${GITHUB_SHA}" ]; then
            echo "::error::Manifest commit mismatch. expected=${MANIFEST_COMMIT_SHA} actual=${GITHUB_SHA}"
            exit 1
          fi
          if [ "${EXPECTED_SHA256}" != "${ACTUAL_SHA256}" ]; then
            echo "::error::Release artifact checksum mismatch."
            echo "::error::Expected ${EXPECTED_SHA256}, got ${ACTUAL_SHA256}."
            exit 1
          fi
          BUILD_ATTESTATION_FILE="release-artifact/release-attestation-verify.json"
          if [ ! -f "${BUILD_ATTESTATION_FILE}" ]; then
            echo "::error::Missing build-stage attestation verification artifact at ${BUILD_ATTESTATION_FILE}."
            exit 1
          fi
          BUILD_ATTESTED_SHA256="$(jq -r '
            [
              .. | objects
              | select(has("digest"))
              | .digest
              | if type == "object" then .sha256 // empty else empty end
            ]
            | map(select(type == "string" and length > 0))
            | first // empty
          ' "${BUILD_ATTESTATION_FILE}")"
          if [ -n "${BUILD_ATTESTED_SHA256}" ] && [ "${BUILD_ATTESTED_SHA256}" != "${EXPECTED_SHA256}" ]; then
            echo "::error::Build-stage attested digest mismatch. expected=${EXPECTED_SHA256} build_attested=${BUILD_ATTESTED_SHA256}."
            exit 1
          fi
          echo "VERIFIED_TARBALL=${TARBALL}" >> "$GITHUB_ENV"
          echo "EXPECTED_SHA256=${EXPECTED_SHA256}" >> "$GITHUB_ENV"

      - name: Enforce release attestation verification policy
        env:
          GH_TOKEN: ${{ github.token }}
          SIGNER_WORKFLOW: ${{ github.repository }}/.github/workflows/release.yml
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if gh attestation verify "${VERIFIED_TARBALL}" --repo "${GITHUB_REPOSITORY}" --signer-workflow "${SIGNER_WORKFLOW}" --format json > release-attestation-publish-verify.json; then
              break
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "::error::Publish attestation verification failed after retries."
              exit 1
            fi
            sleep 10
          done
          jq -e 'length > 0' release-attestation-publish-verify.json > /dev/null
          ATTESTED_SHA256="$(jq -r '
            [
              .. | objects
              | select(has("digest"))
              | .digest
              | if type == "object" then .sha256 // empty else empty end
            ]
            | map(select(type == "string" and length > 0))
            | first // empty
          ' release-attestation-publish-verify.json)"
          if [ -z "${ATTESTED_SHA256}" ]; then
            echo "::error::Could not resolve attested subject digest from release-attestation-publish-verify.json."
            exit 1
          fi
          if [ "${ATTESTED_SHA256}" != "${EXPECTED_SHA256}" ]; then
            echo "::error::Attested digest mismatch."
            echo "::error::Expected ${EXPECTED_SHA256}, attested ${ATTESTED_SHA256}."
            exit 1
          fi

      - name: Prepare npm publish context
        shell: bash
        run: |
          set -euo pipefail
          npm config set registry "https://registry.npmjs.org/"
          if [ "${PUBLISH_AUTH_MODE:-}" = "trusted" ]; then
            npm config delete //registry.npmjs.org/:_authToken || true
          fi

      - name: Publish to npm
        run: |
          set -euo pipefail
          test -f "${VERIFIED_TARBALL}"
          npm publish "./${VERIFIED_TARBALL}" --provenance --access public

