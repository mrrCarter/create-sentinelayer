name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm (requires NPM_TOKEN)"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read
  attestations: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release-artifact:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    concurrency:
      group: release-build-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate package
        run: npm run verify

      - name: Ensure release commit passed required upstream gates
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          checks_json="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/commits/${TARGET_SHA}/check-runs?per_page=100")"

          require_check_success() {
            local check_name="$1"
            local latest_conclusion
            latest_conclusion="$(echo "${checks_json}" | jq -r --arg check_name "${check_name}" '
              [.check_runs[]
                | select(.name == $check_name and .status == "completed")
                | { completed_at, conclusion }
              ]
              | sort_by(.completed_at)
              | last
              | .conclusion // ""
            ')"

            if [ -z "${latest_conclusion}" ] || [ "${latest_conclusion}" = "null" ]; then
              echo "::error::Required check '${check_name}' has no completed run for commit ${TARGET_SHA}."
              exit 1
            fi

            if [ "${latest_conclusion}" != "success" ]; then
              echo "::error::Required check '${check_name}' concluded '${latest_conclusion}' for commit ${TARGET_SHA}."
              exit 1
            fi
          }

          require_check_success "Quality Summary"
          require_check_success "Omar Gate"
          require_check_success "CodeQL Summary"
          require_check_success "Semgrep Summary"
          require_check_success "Gitleaks Summary"
          require_check_success "IaC Summary"
          require_check_success "SCA Summary"
          require_check_success "License Summary"
          require_check_success "SBOM Summary"
          require_check_success "Attestation Summary"

      - name: Build release tarball
        run: npm pack

      - name: Generate release artifact manifest
        id: artifact_manifest
        run: |
          set -euo pipefail
          TARBALL="$(ls -1 sentinelayer-cli-*.tgz | head -n 1)"
          SHA256="$(sha256sum "${TARBALL}" | awk '{print $1}')"
          jq -n \
            --arg tarball "${TARBALL}" \
            --arg sha256 "${SHA256}" \
            --arg commit_sha "${GITHUB_SHA}" \
            --arg workflow_ref "${GITHUB_WORKFLOW_REF}" \
            '{
              tarball: $tarball,
              sha256: $sha256,
              commit_sha: $commit_sha,
              workflow_ref: $workflow_ref
            }' > release-artifact-manifest.json
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Validate packaged CLI install
        run: |
          set -euo pipefail
          TARBALL="${{ steps.artifact_manifest.outputs.tarball }}"
          PREFIX_DIR="$(mktemp -d)"
          npm install --prefix "${PREFIX_DIR}" --ignore-scripts "${TARBALL}"
          "${PREFIX_DIR}/node_modules/.bin/sentinelayer-cli" --version
          "${PREFIX_DIR}/node_modules/.bin/create-sentinelayer" --version
          "${PREFIX_DIR}/node_modules/.bin/sentinel" --version
          "${PREFIX_DIR}/node_modules/.bin/sl" --version
          rm -rf "${PREFIX_DIR}"

      - name: Generate release build attestation
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: ${{ steps.artifact_manifest.outputs.tarball }}

      - name: Verify release build attestation policy
        env:
          GH_TOKEN: ${{ github.token }}
          TARBALL: ${{ steps.artifact_manifest.outputs.tarball }}
          SIGNER_WORKFLOW: ${{ github.repository }}/.github/workflows/release.yml
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if gh attestation verify "${TARBALL}" --repo "${GITHUB_REPOSITORY}" --signer-workflow "${SIGNER_WORKFLOW}" --format json > release-attestation-verify.json; then
              break
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "::error::Release attestation verification failed after retries."
              exit 1
            fi
            sleep 10
          done
          jq -e 'length > 0' release-attestation-verify.json > /dev/null

      - name: Upload release tarball artifact
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: sentinelayer-cli-tarball
          path: |
            ${{ steps.artifact_manifest.outputs.tarball }}
            release-artifact-manifest.json
            release-attestation-verify.json
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: [build-release-artifact]
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    environment: package-release
    concurrency:
      group: release-publish-${{ github.ref }}
      cancel-in-progress: false
    env:
      NPM_TOKEN_VALUE: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Download release tarball artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sentinelayer-cli-tarball
          path: release-artifact

      - name: Validate publish credentials
        run: |
          set -euo pipefail
          if [ -z "${NPM_TOKEN_VALUE:-}" ]; then
            echo "::error::NPM_TOKEN is required when publish is requested."
            exit 1
          fi

      - name: Enforce release artifact checksum manifest
        run: |
          set -euo pipefail
          TARBALL="$(ls -1 release-artifact/sentinelayer-cli-*.tgz | head -n 1)"
          MANIFEST="release-artifact/release-artifact-manifest.json"
          test -f "${MANIFEST}"
          EXPECTED_SHA256="$(jq -r '.sha256' "${MANIFEST}")"
          ACTUAL_SHA256="$(sha256sum "${TARBALL}" | awk '{print $1}')"
          if [ -z "${EXPECTED_SHA256}" ] || [ "${EXPECTED_SHA256}" = "null" ]; then
            echo "::error::Manifest missing expected sha256."
            exit 1
          fi
          if [ "${EXPECTED_SHA256}" != "${ACTUAL_SHA256}" ]; then
            echo "::error::Release artifact checksum mismatch."
            echo "::error::Expected ${EXPECTED_SHA256}, got ${ACTUAL_SHA256}."
            exit 1
          fi
          echo "TARBALL=${TARBALL}" >> "$GITHUB_ENV"

      - name: Enforce release attestation verification policy
        env:
          GH_TOKEN: ${{ github.token }}
          SIGNER_WORKFLOW: ${{ github.repository }}/.github/workflows/release.yml
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if gh attestation verify "${TARBALL}" --repo "${GITHUB_REPOSITORY}" --signer-workflow "${SIGNER_WORKFLOW}" --format json > release-attestation-publish-verify.json; then
              break
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "::error::Publish attestation verification failed after retries."
              exit 1
            fi
            sleep 10
          done
          jq -e 'length > 0' release-attestation-publish-verify.json > /dev/null

      - name: Publish to npm
        run: |
          set -euo pipefail
          npm publish "${TARBALL}" --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN_VALUE }}

