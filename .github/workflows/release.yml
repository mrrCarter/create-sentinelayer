name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm (requires NPM_TOKEN)"
        required: false
        default: false
        type: boolean
      dry_run:
        description: "Run release validation without attempting npm publish"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write
  checks: read
  actions: read
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NPM_VERSION_PIN: "10.8.2"
  ROLLBACK_PROOF_MAX_AGE_DAYS: "14"

concurrency:
  group: release-control-create-sentinelayer
  cancel-in-progress: false

jobs:
  resolve-release-flags:
    name: Resolve Release Flags
    runs-on: ubuntu-22.04
    timeout-minutes: 3
    outputs:
      publish_requested: ${{ steps.flags.outputs.publish_requested }}
      dry_run: ${{ steps.flags.outputs.dry_run }}
      release_path_execution: ${{ steps.flags.outputs.release_path_execution }}
    steps:
      - name: Validate trusted release invoker
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_REPOSITORY: ${{ github.event.repository.full_name }}
          ACTOR: ${{ github.actor }}
          GITHUB_REF_VALUE: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_REPOSITORY}" != "${REPO}" ]]; then
            echo "::error::Release workflow must originate from canonical repository '${REPO}' (received '${EVENT_REPOSITORY}')."
            exit 1
          fi
          requires_invoker_validation="false"
          case "${EVENT_NAME}" in
            workflow_dispatch)
              if [[ "${GITHUB_REF_VALUE}" != "refs/heads/main" ]] && [[ "${GITHUB_REF_VALUE}" != refs/tags/v* ]]; then
                echo "::error::Release workflow_dispatch is restricted to refs/heads/main or refs/tags/v* (received '${GITHUB_REF_VALUE}')."
                exit 1
              fi
              requires_invoker_validation="true"
              ;;
            push)
              if [[ "${GITHUB_REF_VALUE}" == refs/tags/v* ]]; then
                requires_invoker_validation="true"
              fi
              ;;
            *)
              echo "Trusted invoker validation not required for event '${EVENT_NAME}'."
              exit 0
              ;;
          esac
          if [[ "${requires_invoker_validation}" != "true" ]]; then
            echo "Trusted invoker validation skipped for ref '${GITHUB_REF_VALUE}'."
            exit 0
          fi
          permission="$(timeout --preserve-status 30s gh api "repos/${REPO}/collaborators/${ACTOR}/permission" --jq '.permission // \"\"' 2>/dev/null || true)"
          trusted_actor="false"
          case "${permission}" in
            admin|maintain|write)
              trusted_actor="true"
              echo "Trusted release invoker '${ACTOR}' with permission '${permission}'."
              ;;
          esac
          tag_name=""
          ref_type=""
          ref_sha=""
          target_sha=""
          annotated_tag_json=""
          if [[ "${GITHUB_REF_VALUE}" == refs/tags/v* ]]; then
            tag_name="${GITHUB_REF_VALUE#refs/tags/}"
            tag_ref_json="$(timeout --preserve-status 30s gh api "repos/${REPO}/git/ref/tags/${tag_name}")"
            ref_type="$(echo "${tag_ref_json}" | jq -r '.object.type // ""')"
            ref_sha="$(echo "${tag_ref_json}" | jq -r '.object.sha // ""')"
            if [[ -z "${ref_sha}" ]]; then
              echo "::error::Unable to resolve tag object SHA for '${tag_name}'."
              exit 1
            fi
            target_sha="${ref_sha}"
            if [[ "${ref_type}" == "tag" ]]; then
              annotated_tag_json="$(timeout --preserve-status 30s gh api "repos/${REPO}/git/tags/${ref_sha}")"
              target_sha="$(echo "${annotated_tag_json}" | jq -r '.object.sha // ""')"
            elif [[ "${ref_type}" != "commit" ]]; then
              echo "::error::Tag '${tag_name}' points to unsupported object type '${ref_type}'."
              exit 1
            fi
            if [[ -z "${target_sha}" ]]; then
              echo "::error::Unable to resolve commit SHA for tag '${tag_name}'."
              exit 1
            fi
          fi
          if [[ "${EVENT_NAME}" == "push" ]] && [[ "${GITHUB_REF_VALUE}" == refs/tags/v* ]] && [[ "${ACTOR}" == "github-actions[bot]" ]]; then
            release_runs_json="$(timeout --preserve-status 30s gh api "repos/${REPO}/actions/workflows/release-please.yml/runs?head_sha=${target_sha}&per_page=20" -H "Accept: application/vnd.github+json")"
            release_run_id="$(echo "${release_runs_json}" | jq -r --arg sha "${target_sha}" --arg path ".github/workflows/release-please.yml" --arg repo "${REPO}" '
              [.workflow_runs[]
                | select((.head_sha // "") == $sha)
                | select(((.path // "") | split("@")[0]) == $path)
                | select((.event // "") == "push")
                | select((.status // "") == "completed")
                | select((.conclusion // "") == "success")
                | select(((.head_repository.full_name // .repository.full_name // "") == $repo))
              ] | sort_by((.run_number // 0), (.run_attempt // 0), (.created_at // "")) | last | .id // empty
            ')"
            if [[ -z "${release_run_id}" ]]; then
              echo "::error::Tag push by github-actions[bot] requires successful release-please provenance on commit ${target_sha}."
              exit 1
            fi
            echo "Trusted bot invoker '${ACTOR}' validated via release-please run ${release_run_id} on commit ${target_sha}."
            trusted_actor="true"
          fi
          if [[ "${trusted_actor}" != "true" ]]; then
            echo "::error::Actor '${ACTOR}' is not authorized for release event '${EVENT_NAME}' on '${GITHUB_REF_VALUE}' (permission='${permission}')."
            exit 1
          fi
          if [[ -n "${tag_name}" ]]; then
            if [[ "${ref_type}" == "tag" ]]; then
              tag_verified="$(echo "${annotated_tag_json}" | jq -r '.verification.verified // false')"
              if [[ "${tag_verified}" != "true" ]]; then
                echo "::error::Annotated tag '${tag_name}' is not cryptographically verified."
                exit 1
              fi
            fi
            commit_json="$(timeout --preserve-status 30s gh api "repos/${REPO}/commits/${target_sha}" -H "Accept: application/vnd.github+json")"
            commit_verified="$(echo "${commit_json}" | jq -r '.commit.verification.verified // false')"
            if [[ "${commit_verified}" != "true" ]]; then
              echo "::error::Tag target commit '${target_sha}' is not cryptographically verified."
              exit 1
            fi
            echo "Verified signed release provenance for tag '${tag_name}' (commit=${target_sha})."
          fi

      - name: Normalize dispatch and tag inputs
        id: flags
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_VALUE: ${{ github.ref }}
          INPUT_PUBLISH: ${{ github.event.inputs.publish }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          normalize_bool() {
            case "$(echo "${1:-}" | tr '[:upper:]' '[:lower:]' | xargs)" in
              true|1|yes|on) echo "true" ;;
              *) echo "false" ;;
            esac
          }
          publish_requested="false"
          release_path_execution="false"
          dry_run="$(normalize_bool "${INPUT_DRY_RUN}")"
          is_tag_ref="false"
          if [[ "${GITHUB_REF_VALUE}" == refs/tags/v* ]]; then
            is_tag_ref="true"
          fi
          case "${EVENT_NAME}" in
            push)
              if [[ "${is_tag_ref}" == "true" ]]; then
                publish_requested="true"
                release_path_execution="true"
              fi
              ;;
            workflow_dispatch)
              dispatch_publish="$(normalize_bool "${INPUT_PUBLISH}")"
              publish_requested="false"
              dry_run="true"
              if [[ "${is_tag_ref}" == "true" ]]; then
                release_path_execution="true"
                if [[ "${dispatch_publish}" == "true" ]]; then
                  echo "::notice::workflow_dispatch publish request ignored; manual release runs are validation-only."
                fi
                echo "::notice::workflow_dispatch on tag ref is validation-only (publish disabled, dry-run forced)."
              else
                release_path_execution="false"
                if [[ "${dispatch_publish}" == "true" ]]; then
                  echo "::notice::Manual publish requested on non-tag ref; request ignored because release path requires semver tags."
                fi
                echo "::notice::workflow_dispatch on non-tag ref skips release path jobs (publish disabled, dry-run forced)."
              fi
              ;;
            *)
              if [[ "${is_tag_ref}" == "true" ]]; then
                release_path_execution="true"
              fi
              ;;
          esac
          echo "publish_requested=${publish_requested}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${dry_run}" >> "$GITHUB_OUTPUT"
          echo "release_path_execution=${release_path_execution}" >> "$GITHUB_OUTPUT"

  verify-required-checks:
    name: Verify Required Checks
    runs-on: ubuntu-22.04
    needs: [resolve-release-flags]
    environment: release-management
    timeout-minutes: 12
    outputs:
      target_sha: ${{ steps.verify.outputs.target_sha }}
      quality_run_id: ${{ steps.verify.outputs.quality_run_id }}
      omar_run_id: ${{ steps.verify.outputs.omar_run_id }}
    permissions:
      contents: read
      checks: read
      actions: read
    steps:
      - name: Verify release-management environment protections
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          env_json="$(timeout --preserve-status 30s gh api "repos/${REPO}/environments/release-management" -H "Accept: application/vnd.github+json")"
          reviewer_count="$(echo "${env_json}" | jq -r '[.protection_rules[]? | select(.type == "required_reviewers") | ((.reviewers // []) | length)] | add // 0')"
          if [[ "${reviewer_count}" -lt 1 ]]; then
            echo "::error::release-management environment must require at least one reviewer."
            exit 1
          fi

      - name: Verify branch-protection required check contexts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
        run: |
          set -euo pipefail
          branch_name="${DEFAULT_BRANCH:-main}"
          protection_status=0
          protection_json="$(timeout --preserve-status 30s gh api "repos/${REPO}/branches/${branch_name}/protection" -H "Accept: application/vnd.github+json")" || protection_status=$?
          if [[ "${protection_status}" -ne 0 ]]; then
            echo "::error::Branch '${branch_name}' must have protection enabled with strict required checks."
            exit 1
          fi
          strict_checks="$(echo "${protection_json}" | jq -r '.required_status_checks.strict // false')"
          if [[ "${strict_checks}" != "true" ]]; then
            echo "::error::Branch protection must enforce strict required status checks for '${branch_name}'."
            exit 1
          fi
          required_review_count="$(echo "${protection_json}" | jq -r '.required_pull_request_reviews.required_approving_review_count // 0')"
          dismiss_stale_reviews="$(echo "${protection_json}" | jq -r '.required_pull_request_reviews.dismiss_stale_reviews // false')"
          if [[ "${required_review_count}" -lt 1 ]]; then
            echo "::error::Branch protection must require at least one approving pull request review for '${branch_name}'."
            exit 1
          fi
          if [[ "${dismiss_stale_reviews}" != "true" ]]; then
            echo "::error::Branch protection must enforce stale-review dismissal for '${branch_name}'."
            exit 1
          fi
          configured_contexts="$(echo "${protection_json}" | jq -c '(((.required_status_checks.checks // []) | map(.context)) + (.required_status_checks.contexts // [])) | unique')"
          required_contexts=("Omar Gate" "Quality Summary" "Release Readiness")
          for required_context in "${required_contexts[@]}"; do
            if ! echo "${configured_contexts}" | jq -e --arg context "${required_context}" 'index($context) != null' >/dev/null; then
              echo "::error::Branch protection for ${branch_name} is missing required status context '${required_context}'."
              exit 1
            fi
          done
          env_json="$(timeout --preserve-status 30s gh api "repos/${REPO}/environments/release-management" -H "Accept: application/vnd.github+json")"
          env_reviewer_count="$(echo "${env_json}" | jq -r '[.protection_rules[]? | select(.type == "required_reviewers") | ((.reviewers // []) | length)] | add // 0')"
          env_branch_policy_enabled="$(echo "${env_json}" | jq -r '((.deployment_branch_policy.protected_branches // false) or (.deployment_branch_policy.custom_branch_policies // false))')"
          if [[ "${env_reviewer_count}" -lt 1 ]]; then
            echo "::error::release-management environment must require at least one reviewer."
            exit 1
          fi
          if [[ "${env_branch_policy_enabled}" != "true" ]]; then
            echo "::error::release-management environment must enforce deployment branch policy."
            exit 1
          fi

      - name: Verify release commit checks
        id: verify
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TARGET_SHA: ${{ github.sha }}
          GITHUB_REF_VALUE: ${{ github.ref }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
          BASE_REQUIRED_CHECKS: Omar Gate,Quality Summary,Release Readiness
        run: |
          set -euo pipefail
          resolved_sha="${TARGET_SHA}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag_name="${GITHUB_REF_VALUE#refs/tags/}"
            if [[ -n "${tag_name}" ]]; then
              ref_json="$(timeout --preserve-status 30s gh api "repos/${REPO}/git/ref/tags/${tag_name}")"
              ref_type="$(echo "${ref_json}" | jq -r '.object.type')"
              ref_sha="$(echo "${ref_json}" | jq -r '.object.sha')"
              if [[ "${ref_type}" == "tag" ]]; then
                tag_json="$(timeout --preserve-status 30s gh api "repos/${REPO}/git/tags/${ref_sha}")"
                resolved_sha="$(echo "${tag_json}" | jq -r '.object.sha')"
              elif [[ "${ref_type}" == "commit" ]]; then
                resolved_sha="${ref_sha}"
              fi
            fi
          fi
          TARGET_SHA="${resolved_sha}"
          required_checks_csv="${BASE_REQUIRED_CHECKS}"
          echo "Validating required checks for commit ${TARGET_SHA} (event ref: ${GITHUB_REF_VALUE})."
          IFS=',' read -r -a required_checks <<< "${required_checks_csv}"
          if [[ "${#required_checks[@]}" -eq 0 ]]; then
            echo "::error::No required checks configured."
            exit 1
          fi
          quality_run_id=""
          omar_run_id=""
          workflow_file_for_check() {
            case "${1}" in
              "Omar Gate") echo "omar-gate.yml" ;;
              "Quality Summary") echo "quality-gates.yml" ;;
              "Release Readiness") echo "quality-gates.yml" ;;
              *) return 1 ;;
            esac
          }
          workflow_path_for_check() {
            case "${1}" in
              "Omar Gate") echo ".github/workflows/omar-gate.yml" ;;
              "Quality Summary") echo ".github/workflows/quality-gates.yml" ;;
              "Release Readiness") echo ".github/workflows/quality-gates.yml" ;;
              *) return 1 ;;
            esac
          }
          allowed_events_for_check() {
            case "${1}" in
              "Omar Gate") echo "[\"pull_request\"]" ;;
              "Quality Summary"|"Release Readiness") echo "[\"pull_request\", \"push\"]" ;;
              *) return 1 ;;
            esac
          }
          deadline=$((SECONDS + 600))
          while (( SECONDS < deadline )); do
            pending=0
            for required in "${required_checks[@]}"; do
              check_name="$(echo "${required}" | xargs)"
              if [[ -z "${check_name}" ]]; then
                continue
              fi
              if [[ "${check_name}" == "Omar Gate" ]] && [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
                runs_json="$(timeout --preserve-status 30s gh api "repos/${REPO}/actions/workflows/omar-gate.yml/runs?head_sha=${TARGET_SHA}&per_page=20" -H "Accept: application/vnd.github+json")"
                latest_run="$(echo "${runs_json}" | jq -c --arg sha "${TARGET_SHA}" --arg path ".github/workflows/omar-gate.yml" --arg repo "${REPO}" '
                  [.workflow_runs[]
                    | select((.head_sha // "") == $sha)
                    | select(((.path // "") | split("@")[0]) == $path)
                    | select((.event // "") == "pull_request")
                    | select(((.head_repository.full_name // .repository.full_name // "") == $repo))
                  ] | sort_by((.run_number // 0), (.run_attempt // 0), (.created_at // "")) | last // empty
                ')"
                if [[ -z "${latest_run}" ]]; then
                  echo "::error::No prior Omar Gate pull_request workflow run found for tag target commit ${TARGET_SHA}. Trigger Omar Gate on the source PR before publishing ${GITHUB_REF_VALUE}."
                  exit 1
                fi
                run_id="$(echo "${latest_run}" | jq -r '.id // ""')"
                if [[ -z "${run_id}" ]]; then
                  echo "::error::Unable to resolve workflow run id for required check '${check_name}' on tag commit ${TARGET_SHA}."
                  exit 1
                fi
                status="$(echo "${latest_run}" | jq -r '.status // ""')"
                conclusion="$(echo "${latest_run}" | jq -r '.conclusion // ""')"
                if [[ "${status}" != "completed" ]]; then
                  echo "::error::Required check '${check_name}' workflow run ${run_id} is ${status}; wait for completion before running release on tag ${GITHUB_REF_VALUE}."
                  exit 1
                fi
                if [[ "${conclusion}" != "success" ]]; then
                  echo "::error::Required check '${check_name}' workflow run ${run_id} concluded with '${conclusion}'."
                  exit 1
                fi
                omar_run_id="${run_id}"
                echo "Required check '${check_name}' passed via prior workflow run ${run_id}."
                continue
              fi
              workflow_file="$(workflow_file_for_check "${check_name}" || true)"
              workflow_path="$(workflow_path_for_check "${check_name}" || true)"
              if [[ -z "${workflow_file}" ]] || [[ -z "${workflow_path}" ]]; then
                echo "::error::Missing workflow identity mapping for required check '${check_name}'."
                exit 1
              fi
              allowed_events_json="$(allowed_events_for_check "${check_name}" || true)"
              if [[ -z "${allowed_events_json}" ]]; then
                echo "::error::Missing allowed event mapping for required check '${check_name}'."
                exit 1
              fi
              runs_json="$(timeout --preserve-status 30s gh api "repos/${REPO}/actions/workflows/${workflow_file}/runs?head_sha=${TARGET_SHA}&per_page=20" -H "Accept: application/vnd.github+json")"
              candidate_runs="$(echo "${runs_json}" | jq -c --arg sha "${TARGET_SHA}" --arg path "${workflow_path}" --arg repo "${REPO}" --argjson allowedEvents "${allowed_events_json}" '
                [.workflow_runs[]
                  | select((.head_sha // "") == $sha)
                  | select(((.path // "") | split("@")[0]) == $path)
                  | select((($allowedEvents | index(.event // "")) != null))
                  | select(((.head_repository.full_name // .repository.full_name // "") == $repo))
                ] | sort_by((.run_number // 0), (.run_attempt // 0), (.created_at // "")) | reverse
              ')"
              candidate_count="$(echo "${candidate_runs}" | jq -r 'length')"
              if [[ "${candidate_count}" -gt 1 ]]; then
                echo "::error::Multiple workflow runs matched required check '${check_name}' on ${TARGET_SHA}; refusing heuristic selection."
                exit 1
              fi
              latest_run="$(echo "${candidate_runs}" | jq -c '.[0] // empty')"
              if [[ -z "${latest_run}" ]]; then
                echo "Waiting for required check '${check_name}' on ${TARGET_SHA}."
                pending=1
                continue
              fi
              run_id="$(echo "${latest_run}" | jq -r '.id // ""')"
              if [[ -z "${run_id}" ]]; then
                echo "::error::Unable to resolve workflow run id for required check '${check_name}'."
                exit 1
              fi
              status="$(echo "${latest_run}" | jq -r '.status')"
              conclusion="$(echo "${latest_run}" | jq -r '.conclusion // ""')"
              event_name="$(echo "${latest_run}" | jq -r '.event // ""')"
              check_runs_json="$(timeout --preserve-status 30s gh api "repos/${REPO}/commits/${TARGET_SHA}/check-runs?per_page=100" -H "Accept: application/vnd.github+json")"
              anchored_check_run="$(echo "${check_runs_json}" | jq -c --arg name "${check_name}" '
                [.check_runs[]
                  | select((.name // "") == $name)
                  | select(((.details_url // "") | contains("/actions/runs/")))
                ] | sort_by((.started_at // ""), (.completed_at // ""), (.id // 0)) | last // empty
              ')"
              anchored_run_id="$(echo "${anchored_check_run}" | jq -r '.details_url // ""' | sed -nE 's#^.*/actions/runs/([0-9]+)/.*#\1#p')"
              if [[ -n "${anchored_run_id}" ]] && [[ "${anchored_run_id}" != "${run_id}" ]]; then
                echo "::error::Required check '${check_name}' run identity mismatch (workflow run=${run_id}, check-run anchor=${anchored_run_id})."
                exit 1
              fi
              if [[ "${status}" != "completed" ]]; then
                echo "Required check '${check_name}' status=${status}; waiting."
                pending=1
                continue
              fi
              if [[ "${conclusion}" != "success" ]]; then
                echo "::error::Required check '${check_name}' concluded with '${conclusion}'."
                exit 1
              fi
              if [[ "${check_name}" == "Quality Summary" ]]; then
                quality_run_id="${run_id}"
              fi
              if [[ "${check_name}" == "Omar Gate" ]]; then
                omar_run_id="${run_id}"
              fi
              echo "Required check '${check_name}' passed (event=${event_name}, run=${run_id})."
            done
            if [[ "${pending}" -eq 0 ]]; then
              echo "target_sha=${TARGET_SHA}" >> "$GITHUB_OUTPUT"
              echo "quality_run_id=${quality_run_id}" >> "$GITHUB_OUTPUT"
              echo "omar_run_id=${omar_run_id}" >> "$GITHUB_OUTPUT"
              echo "Required checks validated for ${TARGET_SHA}."
              exit 0
            fi
            sleep 10
          done
          echo "::error::Timed out waiting for required checks on ${TARGET_SHA}."
          exit 1

  preflight:
    name: Release Preflight (Verify + Security)
    runs-on: ubuntu-22.04
    needs: [resolve-release-flags, verify-required-checks]
    if: ${{ needs.resolve-release-flags.outputs.release_path_execution == 'true' }}
    environment: release-management
    timeout-minutes: 30
    permissions:
      contents: read
      checks: read
      actions: read
      id-token: write
      attestations: write
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      QUALITY_RUN_ID: ${{ needs.verify-required-checks.outputs.quality_run_id }}
      TARGET_SHA: ${{ needs.verify-required-checks.outputs.target_sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate rollback automation contracts
        shell: bash
        run: |
          set -euo pipefail
          test -f docs/RELEASE_ROLLBACK.md || (echo "::error::Missing rollback runbook docs/RELEASE_ROLLBACK.md." && exit 1)
          test -f .github/workflows/rollback.yml || (echo "::error::Missing rollback workflow .github/workflows/rollback.yml." && exit 1)

      - name: Validate recent rollback proof run
        shell: bash
        env:
          MAX_AGE_DAYS: ${{ env.ROLLBACK_PROOF_MAX_AGE_DAYS }}
        run: |
          set -euo pipefail
          max_age_days="$(echo "${MAX_AGE_DAYS:-14}" | tr -d '\r' | xargs || true)"
          case "${max_age_days}" in ''|*[!0-9]*) echo "::error::Invalid ROLLBACK_PROOF_MAX_AGE_DAYS value '${max_age_days}'." ; exit 1 ;; esac
          if [[ "${max_age_days}" -le 0 ]]; then
            echo "::error::ROLLBACK_PROOF_MAX_AGE_DAYS must be > 0."
            exit 1
          fi
          runs_json="$(timeout --preserve-status 30s gh api "repos/${REPO}/actions/workflows/rollback.yml/runs?per_page=50" -H "Accept: application/vnd.github+json")"
          latest_success_run="$(echo "${runs_json}" | jq -c --arg path ".github/workflows/rollback.yml" --arg repo "${REPO}" '
            [.workflow_runs[]
              | select((.status // "") == "completed")
              | select((.conclusion // "") == "success")
              | select(((.path // "") | split("@")[0]) == $path)
              | select(((.head_repository.full_name // .repository.full_name // "") == $repo))
            ] | sort_by((.run_number // 0), (.run_attempt // 0), (.created_at // "")) | last // empty
          ')"
          if [[ -z "${latest_success_run}" ]]; then
            echo "::error::No successful rollback workflow run found for .github/workflows/rollback.yml."
            exit 1
          fi
          rollback_run_id="$(echo "${latest_success_run}" | jq -r '.id // ""')"
          rollback_run_url="$(echo "${latest_success_run}" | jq -r '.html_url // ""')"
          rollback_created_at="$(echo "${latest_success_run}" | jq -r '.created_at // ""')"
          test -n "${rollback_run_id}" || (echo "::error::Unable to resolve rollback run id." && exit 1)
          test -n "${rollback_created_at}" || (echo "::error::Unable to resolve rollback run created_at timestamp." && exit 1)
          rollback_epoch="$(date -u -d "${rollback_created_at}" +%s 2>/dev/null || true)"
          if [[ -z "${rollback_epoch}" ]]; then
            echo "::error::Unable to parse rollback run timestamp '${rollback_created_at}'."
            exit 1
          fi
          now_epoch="$(date -u +%s)"
          age_seconds=$((now_epoch - rollback_epoch))
          if [[ "${age_seconds}" -lt 0 ]]; then
            age_seconds=0
          fi
          max_age_seconds=$((max_age_days * 86400))
          if [[ "${age_seconds}" -gt "${max_age_seconds}" ]]; then
            echo "::error::Latest successful rollback proof is stale (${age_seconds}s old, max ${max_age_seconds}s). Run ${rollback_run_url}"
            exit 1
          fi
          echo "Rollback proof run ${rollback_run_id} is within recency window (${max_age_days} days)."

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20.11.1"
          cache: npm

      - name: Pin npm CLI version
        shell: bash
        run: |
          set -euo pipefail
          npm install --global "npm@${NPM_VERSION_PIN}"
          npm --version

      - name: Pin npm registry and snapshot lock hash
        shell: bash
        run: |
          set -euo pipefail
          npm config set registry "https://registry.npmjs.org/"
          sha256sum package-lock.json > package-lock.sha256

      - name: Configure npm cache for deterministic rebuild
        shell: bash
        run: |
          set -euo pipefail
          cache_dir="${GITHUB_WORKSPACE}/.npm-cache-release"
          mkdir -p "${cache_dir}"
          npm config set cache "${cache_dir}"
          echo "NPM_CACHE_DIR=${cache_dir}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Snapshot production dependency graph
        shell: bash
        run: npm ls --omit=dev --json > npm-prod-tree.json

      - name: Validate package
        run: npm run verify

      - name: Run npm audit (prod deps only)
        run: npm audit --omit=dev --audit-level=high

      - name: Build immutable release tarball + digest
        shell: bash
        run: |
          set -euo pipefail
          pack_json="$(npm pack --json)"
          tarball="$(echo "${pack_json}" | jq -r '.[0].filename')"
          test -n "${tarball}" || (echo "::error::Unable to resolve packed tarball filename." && exit 1)
          printf "%s" "${tarball}" > create-sentinelayer.tarball
          sha256sum "${tarball}" > create-sentinelayer.sha256

      - name: Verify deterministic rebuild hash (isolated second pass)
        shell: bash
        run: |
          set -euo pipefail
          baseline_hash="$(awk '{print $1}' create-sentinelayer.sha256)"
          rebuild_dir="$(mktemp -d)"
          git archive --format=tar HEAD | tar -xf - -C "${rebuild_dir}"
          pushd "${rebuild_dir}" >/dev/null
          npm config set registry "https://registry.npmjs.org/"
          npm config set cache "${NPM_CACHE_DIR}"
          npm ci --ignore-scripts --offline
          rebuild_pack_json="$(npm pack --json)"
          rebuild_tarball="$(echo "${rebuild_pack_json}" | jq -r '.[0].filename')"
          test -n "${rebuild_tarball}" || (echo "::error::Unable to resolve rebuild tarball filename." && exit 1)
          rebuild_hash="$(sha256sum "${rebuild_tarball}" | awk '{print $1}')"
          popd >/dev/null
          printf "%s\n" "${rebuild_hash}" > create-sentinelayer.rebuild.sha256
          if [[ "${baseline_hash}" != "${rebuild_hash}" ]]; then
            echo "::error::Non-deterministic package hash detected (baseline=${baseline_hash}, rebuild=${rebuild_hash})."
            exit 1
          fi

      - name: Download quality workflow artifact proof
        shell: bash
        run: |
          set -euo pipefail
          test -n "${QUALITY_RUN_ID}" || (echo "::error::Missing quality workflow run id from verify-required-checks." && exit 1)
          gh run download "${QUALITY_RUN_ID}" --name quality-build-package --dir quality-proof

      - name: Verify quality-build attestation provenance
        shell: bash
        run: |
          set -euo pipefail
          test -f quality-proof/quality-build.manifest.json || (echo "::error::Missing quality-build.manifest.json from quality workflow artifacts." && exit 1)
          quality_artifact_name="$(jq -r '.artifactName // ""' quality-proof/quality-build.manifest.json)"
          quality_sha="$(jq -r '.sha256 // ""' quality-proof/quality-build.manifest.json)"
          test -n "${quality_artifact_name}" || (echo "::error::Unable to parse quality artifact name from manifest." && exit 1)
          test -n "${quality_sha}" || (echo "::error::Unable to parse quality artifact sha256 from manifest." && exit 1)
          test -f "quality-proof/${quality_artifact_name}" || (echo "::error::Missing quality artifact file quality-proof/${quality_artifact_name}." && exit 1)
          gh attestation verify "quality-proof/${quality_artifact_name}" \
            --repo "${REPO}" \
            --signer-workflow "${REPO}/.github/workflows/quality-gates.yml" \
            --format json > quality-proof/quality-attestation.verify.json
          if ! jq -e --arg expectedSha "${quality_sha}" '[.[].verificationResult.statement.subject[]?.digest.sha256 // empty] | index($expectedSha) != null' quality-proof/quality-attestation.verify.json >/dev/null; then
            echo "::error::Quality artifact attestation does not include expected digest ${quality_sha}."
            exit 1
          fi

      - name: Verify cross-workflow build digest lineage
        shell: bash
        run: |
          set -euo pipefail
          test -f quality-proof/quality-build.manifest.json || (echo "::error::Missing quality-build.manifest.json from quality workflow artifacts." && exit 1)
          quality_sha="$(jq -r '.sha256 // ""' quality-proof/quality-build.manifest.json)"
          quality_rebuild_sha="$(jq -r '.rebuildSha256 // ""' quality-proof/quality-build.manifest.json)"
          quality_commit_sha="$(jq -r '.commitSha // ""' quality-proof/quality-build.manifest.json)"
          quality_run_id_manifest="$(jq -r '.runId // ""' quality-proof/quality-build.manifest.json)"
          quality_artifact_name="$(jq -r '.artifactName // ""' quality-proof/quality-build.manifest.json)"
          release_artifact_name="$(tr -d '\r\n' < create-sentinelayer.tarball)"
          package_name="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).name")"
          package_version="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          baseline_hash="$(awk 'NF {print $1; exit}' create-sentinelayer.sha256)"
          test -n "${baseline_hash}" || (echo "::error::Unable to parse release baseline hash." && exit 1)
          test -n "${quality_sha}" || (echo "::error::Unable to parse quality baseline hash." && exit 1)
          test -n "${quality_rebuild_sha}" || (echo "::error::Unable to parse quality rebuild hash." && exit 1)
          test -n "${release_artifact_name}" || (echo "::error::Unable to parse release artifact name." && exit 1)
          test -n "${quality_artifact_name}" || (echo "::error::Unable to parse quality artifact name." && exit 1)
          test -n "${package_version}" || (echo "::error::Unable to parse package version from package.json." && exit 1)
          if [[ "${quality_sha}" != "${quality_rebuild_sha}" ]]; then
            echo "::error::Quality workflow reproducibility proof mismatch (baseline=${quality_sha}, rebuild=${quality_rebuild_sha})."
            exit 1
          fi
          if [[ "${quality_artifact_name}" != "${release_artifact_name}" ]]; then
            echo "::error::Artifact identity mismatch between quality (${quality_artifact_name}) and release (${release_artifact_name})."
            exit 1
          fi
          if [[ "${release_artifact_name}" != *"-${package_version}.tgz" ]]; then
            echo "::error::Release artifact '${release_artifact_name}' is not bound to package.json version '${package_version}'."
            exit 1
          fi
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            expected_tag="v${package_version}"
            if [[ "${GITHUB_REF_NAME:-}" != "${expected_tag}" ]]; then
              echo "::error::Tag '${GITHUB_REF_NAME:-}' does not match package version '${package_version}' (expected ${expected_tag})."
              exit 1
            fi
          fi
          if [[ "${baseline_hash}" != "${quality_sha}" ]]; then
            echo "::error::Release baseline hash (${baseline_hash}) does not match quality workflow hash (${quality_sha})."
            exit 1
          fi
          if [[ -n "${TARGET_SHA}" ]] && [[ "${quality_commit_sha}" != "${TARGET_SHA}" ]]; then
            echo "::error::Quality workflow commit (${quality_commit_sha}) does not match release target (${TARGET_SHA})."
            exit 1
          fi
          if [[ -n "${quality_run_id_manifest}" ]] && [[ "${quality_run_id_manifest}" != "${QUALITY_RUN_ID}" ]]; then
            echo "::error::Quality manifest run id (${quality_run_id_manifest}) does not match selected run (${QUALITY_RUN_ID})."
            exit 1
          fi
          echo "Verified release artifact lineage for ${package_name}@${package_version}."

      - name: Upload immutable release artifact
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: create-sentinelayer-release-bundle
          path: |
            create-sentinelayer-*.tgz
            create-sentinelayer.tarball
            create-sentinelayer.sha256
            create-sentinelayer.rebuild.sha256
            package-lock.sha256
            npm-prod-tree.json

      - name: Attest immutable release artifact provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: create-sentinelayer-*.tgz

  rollback-readiness:
    name: Rollback Readiness
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [resolve-release-flags, verify-required-checks, preflight]
    if: ${{ needs.resolve-release-flags.outputs.publish_requested == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20.11.1"
          cache: npm

      - name: Validate rollback runbook and prior published package
        shell: bash
        run: |
          set -euo pipefail
          test -f docs/RELEASE_ROLLBACK.md || (echo "::error::Missing rollback runbook docs/RELEASE_ROLLBACK.md." && exit 1)
          package_name="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).name")"
          current_version="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          versions_json="$(npm view "${package_name}" versions --json)"
          previous_version="$(echo "${versions_json}" | jq -r --arg current "${current_version}" '
            if type == "array" then
              (map(select(. != $current)) | last // empty)
            elif type == "string" then
              (if . == $current then empty else . end)
            else
              empty
            end
          ')"
          if [[ -z "${previous_version}" ]]; then
            echo "::error::No previous published package version available to validate rollback readiness."
            exit 1
          fi
          prefix_dir="$(mktemp -d)"
          npm install --prefix "${prefix_dir}" "${package_name}@${previous_version}" --ignore-scripts
          PATH="${prefix_dir}/node_modules/.bin:${PATH}" create-sentinelayer --version
          echo "Rollback readiness validated against ${package_name}@${previous_version}."

  authorize-production-publish:
    name: Authorize Production Publish
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    needs: [resolve-release-flags, verify-required-checks, preflight, rollback-readiness]
    if: ${{ needs.resolve-release-flags.outputs.publish_requested == 'true' && needs.resolve-release-flags.outputs.dry_run != 'true' }}
    environment: production
    steps:
      - name: Confirm protected publish approval
        shell: bash
        run: |
          set -euo pipefail
          echo "Production publish authorization approved."

  publish:
    name: Publish
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: [resolve-release-flags, verify-required-checks, preflight, rollback-readiness, authorize-production-publish]
    if: ${{ needs.resolve-release-flags.outputs.publish_requested == 'true' }}
    environment: production
    env:
      NPM_TOKEN_PRESENT: ${{ secrets.NPM_TOKEN != '' }}
      PUBLISH_REQUESTED: ${{ needs.resolve-release-flags.outputs.publish_requested }}
      DRY_RUN: ${{ needs.resolve-release-flags.outputs.dry_run }}
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      TARGET_SHA: ${{ needs.verify-required-checks.outputs.target_sha || github.sha }}
      GITHUB_REF_NAME: ${{ github.ref_name }}
      GITHUB_REF_TYPE: ${{ github.ref_type }}
    steps:
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20.11.1"
          registry-url: "https://registry.npmjs.org"

      - name: Pin npm CLI version
        shell: bash
        run: |
          set -euo pipefail
          npm install --global "npm@${NPM_VERSION_PIN}"
          npm --version

      - name: Download immutable release artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: create-sentinelayer-release-bundle
          path: release-bundle

      - name: Verify release artifact attestation provenance
        shell: bash
        run: |
          set -euo pipefail
          TARBALL_NAME="$(cat release-bundle/create-sentinelayer.tarball)"
          TARBALL_PATH="release-bundle/${TARBALL_NAME}"
          test -f "${TARBALL_PATH}" || (echo "::error::Tarball '${TARBALL_NAME}' missing from release artifact bundle." && exit 1)
          expected_sha="$(awk 'NF {print $1; exit}' release-bundle/create-sentinelayer.sha256)"
          test -n "${expected_sha}" || (echo "::error::Unable to parse expected release tarball digest." && exit 1)
          gh attestation verify "${TARBALL_PATH}" \
            --repo "${REPO}" \
            --signer-workflow "${REPO}/.github/workflows/release.yml" \
            --format json > release-bundle/release-attestation.verify.json
          if ! jq -e --arg expectedSha "${expected_sha}" '[.[].verificationResult.statement.subject[]?.digest.sha256 // empty] | index($expectedSha) != null' release-bundle/release-attestation.verify.json >/dev/null; then
            echo "::error::Release artifact attestation does not include expected digest ${expected_sha}."
            exit 1
          fi
          echo "Release artifact attestation verified for digest ${expected_sha} (target=${TARGET_SHA})."

      - name: Verify artifact digest
        shell: bash
        run: |
          set -euo pipefail
          TARBALL_NAME="$(cat release-bundle/create-sentinelayer.tarball)"
          test -f "release-bundle/${TARBALL_NAME}" || (echo "::error::Tarball '${TARBALL_NAME}' missing from artifact bundle." && exit 1)
          (cd release-bundle && sha256sum -c create-sentinelayer.sha256)

      - name: Verify deterministic rebuild proof
        shell: bash
        run: |
          set -euo pipefail
          test -f release-bundle/create-sentinelayer.rebuild.sha256 || (echo "::error::Missing create-sentinelayer.rebuild.sha256 in release bundle." && exit 1)
          baseline_hash="$(awk 'NF {print $1; exit}' release-bundle/create-sentinelayer.sha256)"
          rebuild_hash="$(awk 'NF {print $1; exit}' release-bundle/create-sentinelayer.rebuild.sha256)"
          test -n "${baseline_hash}" || (echo "::error::Unable to parse baseline release hash." && exit 1)
          test -n "${rebuild_hash}" || (echo "::error::Unable to parse rebuild release hash." && exit 1)
          if [[ "${baseline_hash}" != "${rebuild_hash}" ]]; then
            echo "::error::Deterministic rebuild proof failed (baseline=${baseline_hash}, rebuild=${rebuild_hash})."
            exit 1
          fi

      - name: Validate packaged CLI install
        shell: bash
        run: |
          set -euo pipefail
          TARBALL_NAME="$(cat release-bundle/create-sentinelayer.tarball)"
          TARBALL_PATH="release-bundle/${TARBALL_NAME}"
          prefix_dir="$(mktemp -d)"
          npm install --prefix "${prefix_dir}" "${TARBALL_PATH}" --ignore-scripts
          PATH="${prefix_dir}/node_modules/.bin:${PATH}" create-sentinelayer --version
          PATH="${prefix_dir}/node_modules/.bin:${PATH}" sentinel --version

      - name: Enforce tag-only semver publish source
        if: env.PUBLISH_REQUESTED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "::error::Publish is only permitted from semver tags."
            exit 1
          fi
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Publish tag '${GITHUB_REF_NAME}' is not a valid semver tag (expected vX.Y.Z)."
            exit 1
          fi

      - name: Validate production environment protection rules
        if: env.PUBLISH_REQUESTED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          env_json="$(timeout --preserve-status 30s gh api "repos/${REPO}/environments/production" -H "Accept: application/vnd.github+json")"
          reviewer_count="$(echo "${env_json}" | jq -r '[.protection_rules[]? | select(.type == "required_reviewers") | ((.reviewers // []) | length)] | add // 0')"
          branch_policy_enabled="$(echo "${env_json}" | jq -r '((.deployment_branch_policy.protected_branches // false) or (.deployment_branch_policy.custom_branch_policies // false))')"
          if [[ "${reviewer_count}" -lt 1 ]]; then
            echo "::error::Production environment must require at least one reviewer."
            exit 1
          fi
          if [[ "${branch_policy_enabled}" != "true" ]]; then
            echo "::error::Production environment must enforce deployment branch policy."
            exit 1
          fi

      - name: Enforce NPM token when publish is requested
        if: env.PUBLISH_REQUESTED == 'true' && env.NPM_TOKEN_PRESENT != 'true' && env.DRY_RUN != 'true'
        run: |
          echo "::error::NPM_TOKEN is required when publish is requested."
          exit 1

      - name: Publish skipped (dry-run)
        if: env.PUBLISH_REQUESTED == 'true' && env.DRY_RUN == 'true'
        run: echo "Dry-run enabled. Skipping npm publish."

      - name: Publish to npm
        if: env.PUBLISH_REQUESTED == 'true' && env.NPM_TOKEN_PRESENT == 'true' && env.DRY_RUN != 'true'
        shell: bash
        run: |
          set -euo pipefail
          TARBALL_NAME="$(cat release-bundle/create-sentinelayer.tarball)"
          npm publish "release-bundle/${TARBALL_NAME}" --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Emit rollback runbook guidance
        shell: bash
        run: |
          set -euo pipefail
          echo "## Rollback" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger rollback workflow: \`gh workflow run rollback.yml -f version=<previous-version> -f execute=true\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Runbook: \`docs/RELEASE_ROLLBACK.md\`" >> "$GITHUB_STEP_SUMMARY"

