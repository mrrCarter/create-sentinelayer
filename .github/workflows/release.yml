name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.5.0)"
        required: true
        type: string

concurrency:
  group: release-state-prod
  cancel-in-progress: false

permissions:
  actions: read
  checks: read
  contents: read
  attestations: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GLOBAL_MAX_SECONDS: "3600"
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  policy-precheck:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Enforce trusted tag trigger policy
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_CREATED: ${{ github.event.created || 'true' }}
          EVENT_DELETED: ${{ github.event.deleted || 'false' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          policy_file=".github/policies/release-tag-policy.json"
          if [ ! -f "${policy_file}" ]; then
            echo "::error::Missing release tag policy file: ${policy_file}."
            exit 1
          fi
          if ! jq -e '
            type == "object"
            and (.allowed_tag_actors | type == "array" and length > 0)
            and (.allowed_tag_signer_emails | type == "array" and length > 0)
            and (.required_release_workflow_path | type == "string" and length > 0)
            and (.required_release_workflow_name | type == "string" and length > 0)
            and (.required_release_workflow_actor | type == "string" and length > 0)
          ' "${policy_file}" >/dev/null 2>&1; then
            echo "::error::Invalid release tag policy schema in ${policy_file}."
            exit 1
          fi
          allowed_actors_json="$(jq -c '[.allowed_tag_actors[] | strings | gsub("^\\s+|\\s+$"; "") | select(length > 0)]' "${policy_file}")"
          signer_allowlist_json="$(jq -c '[.allowed_tag_signer_emails[] | strings | ascii_downcase | gsub("^\\s+|\\s+$"; "") | select(length > 0)]' "${policy_file}")"
          actor_count="$(echo "${allowed_actors_json}" | jq 'length')"
          actor_unique_count="$(echo "${allowed_actors_json}" | jq 'unique | length')"
          signer_count="$(echo "${signer_allowlist_json}" | jq 'length')"
          signer_unique_count="$(echo "${signer_allowlist_json}" | jq 'unique | length')"
          case "${actor_count}" in ''|*[!0-9]*) echo "::error::Invalid allowed_tag_actors list count: ${actor_count}" ; exit 1 ;; esac
          case "${actor_unique_count}" in ''|*[!0-9]*) echo "::error::Invalid allowed_tag_actors unique count: ${actor_unique_count}" ; exit 1 ;; esac
          case "${signer_count}" in ''|*[!0-9]*) echo "::error::Invalid allowed_tag_signer_emails list count: ${signer_count}" ; exit 1 ;; esac
          case "${signer_unique_count}" in ''|*[!0-9]*) echo "::error::Invalid allowed_tag_signer_emails unique count: ${signer_unique_count}" ; exit 1 ;; esac
          if [ "${actor_count}" -ne "${actor_unique_count}" ]; then
            echo "::error::allowed_tag_actors contains duplicate or whitespace-equivalent entries."
            exit 1
          fi
          if [ "${signer_count}" -ne "${signer_unique_count}" ]; then
            echo "::error::allowed_tag_signer_emails contains duplicate or whitespace-equivalent entries."
            exit 1
          fi
          if ! echo "${allowed_actors_json}" | jq -e 'all(.[]; test("^[A-Za-z0-9._-]{1,39}([[]bot[]])?$"))' >/dev/null; then
            echo "::error::allowed_tag_actors contains invalid GitHub actor names."
            exit 1
          fi
          if ! echo "${signer_allowlist_json}" | jq -e 'all(.[]; test("^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$"))' >/dev/null; then
            echo "::error::allowed_tag_signer_emails contains invalid email entries."
            exit 1
          fi
          allowed_csv="$(echo "${allowed_actors_json}" | jq -r 'join(",")')"
          signer_allowlist="$(echo "${signer_allowlist_json}" | jq -r 'join(",")')"
          required_release_workflow_path="$(jq -r '.required_release_workflow_path' "${policy_file}")"
          required_release_workflow_name="$(jq -r '.required_release_workflow_name' "${policy_file}")"
          required_release_workflow_actor="$(jq -r '.required_release_workflow_actor' "${policy_file}")"
          export required_release_workflow_path
          export required_release_workflow_name
          export required_release_workflow_actor
          {
            echo "## Release Policy Allowlist"
            echo "- allowed_tag_actors: \`${allowed_csv}\`"
            echo "- allowed_tag_signer_emails: \`${signer_allowlist}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "${EVENT_DELETED}" = "true" ]; then
            echo "::error::Release workflow does not run on deleted tags."
            exit 1
          fi
          if [ "${EVENT_CREATED}" != "true" ]; then
            echo "::error::Release workflow requires newly created semver tags (event.created=true)."
            exit 1
          fi
      - name: Fail stale release runs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          STALE_RUN_MAX_MINUTES: ${{ vars.RELEASE_STALE_RUN_MAX_MINUTES || '90' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          # Skip stale/policy checks for manual dispatch
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "::notice::Skipping stale-run and tag-policy checks for workflow_dispatch."
            exit 0
          fi
          max_minutes="$(echo "${STALE_RUN_MAX_MINUTES}" | xargs || true)"
          case "${max_minutes}" in ''|*[!0-9]*) echo "::error::Invalid RELEASE_STALE_RUN_MAX_MINUTES value: ${max_minutes}" ; exit 1 ;; esac
          run_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}")"
          created_at="$(echo "${run_json}" | jq -r '.created_at // empty')"
          if [ -z "${created_at}" ]; then
            echo "::error::Failed to resolve release run created_at timestamp."
            exit 1
          fi
          created_epoch="$(date -u -d "${created_at}" +%s 2>/dev/null || true)"
          if [ -z "${created_epoch}" ]; then
            echo "::error::Unable to parse release run created_at timestamp: ${created_at}."
            exit 1
          fi
          now_epoch="$(date +%s)"
          age_minutes="$(( (now_epoch - created_epoch) / 60 ))"
          if [ "${age_minutes}" -gt "${max_minutes}" ]; then
            echo "::error::Release run is stale (age=${age_minutes}m, max=${max_minutes}m). Cancel the run and re-tag."
            echo "::error::Cancel via: gh run cancel ${GITHUB_RUN_ID}"
            exit 1
          fi
          {
            echo "## Release Run Freshness"
            echo "- age_minutes: \`${age_minutes}\`"
            echo "- max_minutes: \`${max_minutes}\`"
            echo "- cancel_command: \`gh run cancel ${GITHUB_RUN_ID}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          policy_file=".github/policies/release-tag-policy.json"
          allowed_csv="$(jq -r '.allowed_tag_actors | join(",")' "${policy_file}")"
          signer_allowlist="$(jq -r '.allowed_tag_signer_emails | join(",")' "${policy_file}")"
          required_release_workflow_path="$(jq -r '.required_release_workflow_path' "${policy_file}")"
          required_release_workflow_name="$(jq -r '.required_release_workflow_name' "${policy_file}")"
          required_release_workflow_actor="$(jq -r '.required_release_workflow_actor' "${policy_file}")"
          export required_release_workflow_path required_release_workflow_name required_release_workflow_actor
          actor="${GITHUB_ACTOR}"
          # Skip actor/signing checks for manual workflow_dispatch (explicit human action)
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "::notice::Skipping actor/signing policy checks for workflow_dispatch trigger (actor=${actor})."
            {
              echo "## Release Trigger Policy (workflow_dispatch bypass)"
              echo "- actor: \`${actor}\`"
              echo "- event: \`${EVENT_NAME}\`"
              echo "- tag: \`${RELEASE_TAG}\`"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ -z "$(echo "${allowed_csv}" | xargs || true)" ]; then
            echo "::error::allowed_tag_actors is empty in ${policy_file}."
            exit 1
          fi
          actor_allowed="false"
          IFS=',' read -r -a allowed_items <<< "${allowed_csv}"
          for item in "${allowed_items[@]}"; do
            candidate="$(echo "${item}" | xargs)"
            if [ -n "${candidate}" ] && [ "${candidate}" = "${actor}" ]; then
              actor_allowed="true"
              break
            fi
          done
          if [ "${actor_allowed}" != "true" ]; then
            echo "::error::Actor ${actor} is not allowed to trigger release tags. Allowed actors: ${allowed_csv}."
            exit 1
          fi
          tag_ref_json="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${GITHUB_REF_NAME}")"
          tag_object_type="$(echo "${tag_ref_json}" | jq -r '.object.type // empty')"
          tag_object_sha="$(echo "${tag_ref_json}" | jq -r '.object.sha // empty')"
          if [ "${tag_object_type}" != "tag" ]; then
            echo "::error::Release tags must be annotated and cryptographically signed. Lightweight tag object type '${tag_object_type}' is not allowed."
            exit 1
          fi
          if [ -z "${tag_object_sha}" ]; then
            echo "::error::Failed to resolve annotated tag object SHA for ${GITHUB_REF_NAME}."
            exit 1
          fi
          tag_object_json="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object_sha}")"
          tag_signature_verified="$(echo "${tag_object_json}" | jq -r '.verification.verified // false')"
          tag_signature_reason="$(echo "${tag_object_json}" | jq -r '.verification.reason // "unknown"')"
          if [ "${tag_signature_verified}" != "true" ]; then
            echo "::error::Release tag signature verification failed for ${GITHUB_REF_NAME} (reason=${tag_signature_reason})."
            exit 1
          fi
          tagger_date="$(echo "${tag_object_json}" | jq -r '.tagger.date // empty' | xargs || true)"
          signer_email="$(echo "${tag_object_json}" | jq -r '.tagger.email // empty' | tr '[:upper:]' '[:lower:]' | xargs || true)"
          if [ -z "$(echo "${signer_allowlist}" | xargs || true)" ]; then
            echo "::error::allowed_tag_signer_emails is empty in ${policy_file}."
            exit 1
          fi
          signer_allowed="false"
          IFS=',' read -r -a signer_items <<< "${signer_allowlist}"
          for item in "${signer_items[@]}"; do
            candidate="$(echo "${item}" | tr '[:upper:]' '[:lower:]' | xargs)"
            if [ -n "${candidate}" ] && [ "${candidate}" = "${signer_email}" ]; then
              signer_allowed="true"
              break
            fi
          done
          if [ "${signer_allowed}" != "true" ]; then
            echo "::error::Tag signer email '${signer_email:-<none>}' is not allowlisted. Allowed signer emails: ${signer_allowlist}."
            exit 1
          fi
          start_epoch="$(date +%s)"
          release_candidates='[]'
          page=1
          while true; do
            now_epoch="$(date +%s)"
            elapsed="$((now_epoch - start_epoch))"
            if [ "${elapsed}" -gt "${GLOBAL_MAX_SECONDS}" ]; then
              echo "::error::Release policy evaluation exceeded global budget (${elapsed}s > ${GLOBAL_MAX_SECONDS}s)."
              exit 1
            fi
            release_runs_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/release-please.yml/runs?event=push&branch=main&status=completed&per_page=100&page=${page}")"
            page_candidates="$(echo "${release_runs_json}" | jq -c --arg sha "${GITHUB_SHA}" '
              [
                (.workflow_runs // [])[]
                | select(
                    .conclusion == "success"
                    and (.event // "") == "push"
                    and (.head_branch // "") == "main"
                    and (.head_sha // "") == $sha
                    and (.path // "") == env.required_release_workflow_path
                    and (.name // "") == env.required_release_workflow_name
                    and (.actor.login // "") == env.required_release_workflow_actor
                  )
                | {
                    id: (.id | tostring),
                    run_number: (.run_number // 0),
                    run_attempt: (.run_attempt // 0),
                    created_at: (.created_at // ""),
                    updated_at: (.updated_at // "")
                  }
              ]
            ')"
            release_candidates="$(jq -s '.[0] + .[1]' \
              <(printf '%s' "${release_candidates}") \
              <(printf '%s' "${page_candidates}"))"
            page_size="$(echo "${release_runs_json}" | jq '.workflow_runs | length')"
            if [ "${page_size}" -lt 100 ]; then
              break
            fi
            page="$((page + 1))"
            if [ "${page}" -gt 50 ]; then
              echo "::error::Pagination exceeded 50 pages while resolving release-please candidates."
              exit 1
            fi
          done
          release_candidates="$(echo "${release_candidates}" | jq -c 'sort_by(.run_number, .run_attempt, .updated_at, .created_at)')"
          release_candidate_count="$(echo "${release_candidates}" | jq 'length')"
          if [ "${release_candidate_count}" -lt 1 ]; then
            echo "::error::No successful release-please workflow run found on main for tagged commit ${GITHUB_SHA}."
            exit 1
          fi
          if [ "${release_candidate_count}" -gt 1 ]; then
            candidate_ids="$(echo "${release_candidates}" | jq -r '[.[].id] | join(",")')"
            echo "::error::Multiple successful release-please runs found for ${GITHUB_SHA}; refusing nondeterministic selection."
            echo "::error::candidate_run_ids=${candidate_ids}"
            exit 1
          fi
          release_please_run_id="$(echo "${release_candidates}" | jq -r 'first.id // empty')"
          release_please_created_at="$(echo "${release_candidates}" | jq -r 'first.created_at // empty')"
          if ! [[ "${release_please_run_id}" =~ ^[0-9]+$ ]]; then
            echo "::error::Unable to resolve canonical release-please workflow run id."
            exit 1
          fi
          if [ -n "${tagger_date}" ] && [ -n "${release_please_created_at}" ]; then
            tag_epoch="$(date -u -d "${tagger_date}" +%s)"
            release_please_epoch="$(date -u -d "${release_please_created_at}" +%s)"
            if [ "${release_please_epoch}" -gt "${tag_epoch}" ]; then
              echo "::error::Release tag predates release-please run creation. tagger_date=${tagger_date} release_please_created_at=${release_please_created_at}."
              exit 1
            fi
          fi
          {
            echo "## Release Trigger Policy"
            echo "- tag: \`${GITHUB_REF_NAME}\`"
            echo "- actor: \`${actor}\`"
            echo "- created_event: \`${EVENT_CREATED}\`"
            echo "- tag_object_type: \`${tag_object_type}\`"
            echo "- tag_signature_verified: \`${tag_signature_verified}\`"
            echo "- tag_signature_reason: \`${tag_signature_reason}\`"
            echo "- signer_email: \`${signer_email:-<none>}\`"
            echo "- tagger_date: \`${tagger_date:-<none>}\`"
            echo "- release_please_run_id: \`${release_please_run_id}\`"
            echo "- release_please_match_count: \`${release_candidate_count}\`"
            echo "- policy_file: \`${policy_file}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  tag-preflight:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [policy-precheck]
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Enforce release tag policy
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
            echo "::error::Unsupported release preflight context: ${GITHUB_EVENT_NAME} ${GITHUB_REF}"
            exit 1
          fi
          if ! echo "${GITHUB_REF_NAME}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "::error::Release tag must match semantic version pattern (vMAJOR.MINOR.PATCH[-suffix]). Received ${GITHUB_REF_NAME}."
            exit 1
          fi

      - name: Enforce release tag ancestry on main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "::error::Release tag commit ${GITHUB_SHA} is not reachable from origin/main."
            exit 1
          fi

      - name: Ensure target commit passed required upstream gates
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.sha }}
          REQUIRED_CHECKS_JSON: >-
            [
              {"name":"Quality Summary","app":"github-actions","optional":false,"workflow_path":".github/workflows/quality-gates.yml"},
              {"name":"Quality Gates Terminal","app":"github-actions","optional":false,"workflow_path":".github/workflows/quality-gates.yml"},
              {"name":"Build Package (Deterministic)","app":"github-actions","optional":false,"workflow_path":".github/workflows/quality-gates.yml"},
              {"name":"Omar Gate","app":"github-actions","optional":false,"workflow_path":".github/workflows/omar-gate.yml"},
              {"name":"Attestation Summary","app":"github-actions","optional":false,"workflow_path":".github/workflows/attestations.yml"}
            ]
          MAX_WAIT_SECONDS: "1800"
          POLL_INTERVAL_SECONDS: "10"
        run: .github/scripts/require-check-runs.sh

      - name: Verify Quality Gates security scan job
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          check_runs_json="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${TARGET_SHA}/check-runs?per_page=100")"
          quality_candidates="$(echo "${check_runs_json}" | jq -c '
            [
              (.check_runs // [])[]
              | select(
                  .name == "Quality Summary"
                  and .app.slug == "github-actions"
                  and .status == "completed"
                  and .conclusion == "success"
                  and (.details_url // "" | test("/actions/runs/[0-9]+"))
                )
              | {
                  completed_at: (.completed_at // ""),
                  details_url: .details_url,
                  run_id: (.details_url | capture("/actions/runs/(?<id>[0-9]+)") | .id)
                }
            ]
            | sort_by(.completed_at, (.run_id | tonumber))
          ')"
          candidate_count="$(echo "${quality_candidates}" | jq 'length')"
          if [ "${candidate_count}" -lt 1 ]; then
            echo "::error::No successful Quality Summary check-run found for ${TARGET_SHA}."
            exit 1
          fi
          quality_run_id="$(echo "${quality_candidates}" | jq -r 'last.run_id // empty')"
          if ! [[ "${quality_run_id}" =~ ^[0-9]+$ ]]; then
            echo "::error::Failed to resolve quality workflow run id."
            exit 1
          fi
          jobs_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${quality_run_id}/jobs?per_page=100")"
          security_job="$(echo "${jobs_json}" | jq -r '.jobs[] | select(.name == "Deterministic Security Scan") | .conclusion' | head -n 1)"
          if [ -z "${security_job}" ]; then
            echo "::error::Deterministic Security Scan job missing from quality run ${quality_run_id}."
            exit 1
          fi
          if [ "${security_job}" != "success" ]; then
            echo "::error::Deterministic Security Scan job did not succeed (conclusion=${security_job})."
            exit 1
          fi

      - name: Emit preflight summary
        run: |
          set -euo pipefail
          echo "## Release Tag Preflight" >> "$GITHUB_STEP_SUMMARY"
          echo "- mode: \`tag-preflight\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- ref: \`${GITHUB_REF}\`" >> "$GITHUB_STEP_SUMMARY"

  release-authorize:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [tag-preflight]
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    environment: package-release
    steps:
      - name: Confirm release preflight completed
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" != "refs/tags/${GITHUB_REF_NAME}" ]; then
            echo "::error::Unexpected ref format: ${GITHUB_REF}"
            exit 1
          fi
          echo "Release preflight gate passed for ${GITHUB_REF_NAME}."

      - name: Enforce package-release environment reviewer policy
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REQUIRE_RELEASE_REVIEWERS: ${{ vars.REQUIRE_RELEASE_REVIEWERS || 'false' }}
        run: |
          set -euo pipefail
          # Fully automated publish path: reviewer requirement is opt-in via
          # repo var REQUIRE_RELEASE_REVIEWERS=true. Trusted publishing OIDC
          # exchange provides workflow+env binding for audit trail.
          response="$(gh api "repos/${GITHUB_REPOSITORY}/environments/package-release")"
          rule_count="$(echo "${response}" | jq -r '.protection_rules | length')"
          reviewer_count="$(echo "${response}" | jq -r '[.protection_rules[]? | select(.type=="required_reviewers") | (.reviewers // [])[]] | length')"
          require_reviewers="$(echo "${REQUIRE_RELEASE_REVIEWERS}" | tr '[:upper:]' '[:lower:]' | xargs || true)"
          case "${rule_count}" in ''|*[!0-9]*) echo "::error::Invalid protection rule count returned for package-release environment." ; exit 1 ;; esac
          case "${reviewer_count}" in ''|*[!0-9]*) echo "::error::Invalid reviewer count returned for package-release environment." ; exit 1 ;; esac
          if [ "${require_reviewers}" = "true" ]; then
            if [ "${rule_count}" -lt 1 ] || [ "${reviewer_count}" -lt 1 ]; then
              echo "::error::REQUIRE_RELEASE_REVIEWERS=true but package-release environment has no reviewers."
              exit 1
            fi
          fi
          {
            echo "## release-authorize: package-release authorization"
            echo "- rule_count: \`${rule_count}\`"
            echo "- reviewer_count: \`${reviewer_count}\`"
            echo "- require_reviewers_enforced: \`${require_reviewers}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build-release-artifact:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [release-authorize]
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    concurrency:
      group: release-build-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout release ref
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: false
      - name: Resolve canonical quality manifest digest
        id: quality_manifest
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          check_runs_json="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/check-runs?per_page=100")"
          quality_candidates="$(echo "${check_runs_json}" | jq -c '
            [
              (.check_runs // [])[]
              | select(
                  .name == "Quality Summary"
                  and .app.slug == "github-actions"
                  and .status == "completed"
                  and .conclusion == "success"
                  and (.details_url // "" | test("/actions/runs/[0-9]+"))
                )
              | {
                  completed_at: (.completed_at // ""),
                  details_url: .details_url,
                  run_id: (.details_url | capture("/actions/runs/(?<id>[0-9]+)") | .id)
                }
            ]
            | sort_by(.completed_at, (.run_id | tonumber))
          ')"
          quality_run_id="$(echo "${quality_candidates}" | jq -r 'last.run_id // empty')"
          if ! [[ "${quality_run_id}" =~ ^[0-9]+$ ]]; then
            echo "::error::Failed to resolve quality workflow run id for ${GITHUB_SHA}."
            exit 1
          fi
          rm -rf release-quality-source
          mkdir -p release-quality-source
          gh run download "${quality_run_id}" --name "quality-package-artifacts" --dir release-quality-source
          manifest_path="release-quality-source/quality-package-manifest.json"
          if [ ! -f "${manifest_path}" ]; then
            echo "::error::Missing quality-package-manifest.json in quality artifacts."
            exit 1
          fi
          quality_sha256="$(jq -r '.sha256 // empty' "${manifest_path}")"
          quality_tarball="$(jq -r '.tarball // empty' "${manifest_path}")"
          if [ -z "${quality_sha256}" ] || ! echo "${quality_sha256}" | grep -Eq '^[a-f0-9]{64}$'; then
            echo "::error::Invalid quality manifest sha256."
            exit 1
          fi
          echo "sha256=${quality_sha256}" >> "${GITHUB_OUTPUT}"
          echo "tarball=${quality_tarball}" >> "${GITHUB_OUTPUT}"

      - name: Resolve canonical attested artifact for release commit
        id: attested_source
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          workflow_runs_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/attestations.yml/runs?head_sha=${GITHUB_SHA}&status=completed&per_page=100")"
          attestation_candidates="$(echo "${workflow_runs_json}" | jq -c '
            [
              (.workflow_runs // [])[]
              | select(
                  .conclusion == "success"
                  and .path == ".github/workflows/attestations.yml"
                  and (.event // "") == "push"
                  and (.head_branch // "") == "main"
                  and (.head_sha // "") == env.GITHUB_SHA
                )
              | {
                  id: (.id | tostring),
                  run_number: (.run_number // 0),
                  run_attempt: (.run_attempt // 0),
                  created_at: (.created_at // ""),
                  updated_at: (.updated_at // ""),
                  event: (.event // ""),
                  head_branch: (.head_branch // ""),
                  name: (.name // ""),
                  path: (.path // ""),
                  html_url: (.html_url // "")
                }
            ]
            | sort_by(.run_number, .run_attempt, .updated_at, .created_at)
          ')"
          candidate_count="$(echo "${attestation_candidates}" | jq 'length')"
          if [ "${candidate_count}" -lt 1 ]; then
            echo "::error::No successful attestation workflow run found for commit ${GITHUB_SHA}."
            exit 1
          fi
          candidate_ids="$(echo "${attestation_candidates}" | jq -r '[.[].id] | join(",")')"
          if [ "${candidate_count}" -gt 1 ]; then
            echo "::notice::Multiple successful attestation producers found for ${GITHUB_SHA}; selecting deterministic winner by run_number/run_attempt/updated_at ordering."
            echo "::notice::candidate_ids=${candidate_ids}"
          fi
          attestation_run_id="$(echo "${attestation_candidates}" | jq -r 'last.id // empty')"
          if ! [[ "${attestation_run_id}" =~ ^[0-9]+$ ]]; then
            echo "::error::Unable to resolve canonical attestation workflow run id."
            exit 1
          fi
          # Fetch via REST API: gh run view --json does not expose `path` in
          # newer CLI versions. Workflow runs API returns all fields we need.
          run_meta_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${attestation_run_id}")"
          run_name="$(echo "${run_meta_json}" | jq -r '.name // empty')"
          run_path="$(echo "${run_meta_json}" | jq -r '.path // empty')"
          run_conclusion="$(echo "${run_meta_json}" | jq -r '.conclusion // empty')"
          run_event="$(echo "${run_meta_json}" | jq -r '.event // empty')"
          run_head_sha="$(echo "${run_meta_json}" | jq -r '.head_sha // empty')"
          if [ "${run_conclusion}" != "success" ]; then
            echo "::error::Resolved attestation run ${attestation_run_id} is not successful (conclusion=${run_conclusion})."
            exit 1
          fi
          if [ "${run_name}" != "Build Attestation" ]; then
            echo "::error::Resolved run ${attestation_run_id} has unexpected workflow name '${run_name}'."
            exit 1
          fi
          if [ "${run_path}" != ".github/workflows/attestations.yml" ]; then
            echo "::error::Resolved run ${attestation_run_id} has unexpected workflow path '${run_path}'."
            exit 1
          fi
          if [ "${run_event}" != "push" ]; then
            echo "::error::Resolved run ${attestation_run_id} has unexpected event '${run_event}'. Expected push."
            exit 1
          fi
          if [ "${run_head_sha}" != "${GITHUB_SHA}" ]; then
            echo "::error::Resolved run ${attestation_run_id} head SHA mismatch. expected=${GITHUB_SHA} actual=${run_head_sha}."
            exit 1
          fi
          rm -rf attestation-source
          mkdir -p attestation-source
          gh run download "${attestation_run_id}" --name "attestation-build-artifacts" --dir attestation-source
          echo "run_id=${attestation_run_id}" >> "${GITHUB_OUTPUT}"
          {
            echo "## Canonical Attestation Source"
            echo "- run_id: \`${attestation_run_id}\`"
            echo "- candidate_count: \`${candidate_count}\`"
            echo "- candidate_run_ids: \`${candidate_ids}\`"
            echo "- workflow: \`${run_name}\`"
            echo "- path: \`${run_path}\`"
            echo "- discovery: \`workflow-runs-api(head_sha=${GITHUB_SHA})\`"
            echo "- source_url: \`$(echo "${run_meta_json}" | jq -r '.url // empty')\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate release artifact manifest
        id: artifact_manifest
        run: |
          set -euo pipefail
          shopt -s nullglob
          SOURCE_MANIFEST="attestation-source/attestation-manifest.json"
          EXPECTED_SHA256="${{ steps.quality_manifest.outputs.sha256 }}"
          if [ ! -f "${SOURCE_MANIFEST}" ]; then
            echo "::error::Missing attestation manifest from canonical artifact source."
            exit 1
          fi
          SOURCE_COMMIT_SHA="$(jq -r '.commit_sha // empty' "${SOURCE_MANIFEST}")"
          SOURCE_INTENT="$(jq -r '.attestation_intent // empty' "${SOURCE_MANIFEST}")"
          if [ -z "${SOURCE_COMMIT_SHA}" ] || [ "${SOURCE_COMMIT_SHA}" != "${GITHUB_SHA}" ]; then
            echo "::error::Canonical artifact commit mismatch. expected=${GITHUB_SHA} source=${SOURCE_COMMIT_SHA:-<none>}."
            exit 1
          fi
          if [ "${SOURCE_INTENT}" != "release_candidate" ]; then
            echo "::error::Attestation intent mismatch. expected=release_candidate actual=${SOURCE_INTENT:-<none>}."
            exit 1
          fi
          SOURCE_SHA256="$(jq -r '.sha256 // empty' "${SOURCE_MANIFEST}")"
          if [ -z "${SOURCE_SHA256}" ] || ! echo "${SOURCE_SHA256}" | grep -Eq '^[a-f0-9]{64}$'; then
            echo "::error::Attestation manifest missing or invalid sha256."
            exit 1
          fi
          if [ -n "${EXPECTED_SHA256}" ] && [ "${SOURCE_SHA256}" != "${EXPECTED_SHA256}" ]; then
            echo "::error::Attestation sha256 mismatch. expected=${EXPECTED_SHA256} source=${SOURCE_SHA256}."
            exit 1
          fi
          SOURCE_WORKFLOW_REF="$(jq -r '.workflow_ref // empty' "${SOURCE_MANIFEST}")"
          SOURCE_WORKFLOW_NAME="$(jq -r '.workflow_name // empty' "${SOURCE_MANIFEST}")"
          SOURCE_RUN_ID="$(jq -r '.run_id // empty' "${SOURCE_MANIFEST}")"
          if [ -z "${SOURCE_WORKFLOW_REF}" ] || ! echo "${SOURCE_WORKFLOW_REF}" | grep -Eq "^${GITHUB_REPOSITORY}/\\.github/workflows/attestations\\.yml@"; then
            echo "::error::Canonical artifact workflow_ref is missing or invalid: ${SOURCE_WORKFLOW_REF:-<none>}."
            exit 1
          fi
          if [ "${SOURCE_WORKFLOW_NAME}" != "Build Attestation" ]; then
            echo "::error::Canonical artifact workflow_name mismatch: ${SOURCE_WORKFLOW_NAME:-<none>}."
            exit 1
          fi
          if [ -z "${SOURCE_RUN_ID}" ] || [ "${SOURCE_RUN_ID}" != "${{ steps.attested_source.outputs.run_id }}" ]; then
            echo "::error::Canonical artifact run_id mismatch. expected=${{ steps.attested_source.outputs.run_id }} source=${SOURCE_RUN_ID:-<none>}."
            exit 1
          fi
          SOURCE_SHA256="$(jq -r '.sha256 // empty' "${SOURCE_MANIFEST}")"
          tarballs=(attestation-source/sentinelayer-cli-*.tgz)
          if [ "${#tarballs[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one canonical release tarball, found ${#tarballs[@]}."
            printf 'Found tarballs: %s\n' "${tarballs[@]:-<none>}"
            exit 1
          fi
          SOURCE_TARBALL_PATH="${tarballs[0]}"
          TARBALL="$(basename "${SOURCE_TARBALL_PATH}")"
          cp "${SOURCE_TARBALL_PATH}" "${TARBALL}"
          SHA256="$(sha256sum "${TARBALL}" | awk '{print $1}')"
          INTEGRITY="sha512-$(openssl dgst -sha512 -binary "${TARBALL}" | openssl base64 -A)"
          PACKAGE_NAME="$(node -p 'require("./package.json").name')"
          PACKAGE_VERSION="$(node -p 'require("./package.json").version')"
          if [ -n "${SOURCE_SHA256}" ] && [ "${SOURCE_SHA256}" != "${SHA256}" ]; then
            echo "::error::Canonical artifact digest mismatch. source=${SOURCE_SHA256} actual=${SHA256}."
            exit 1
          fi
          jq -n \
            --arg tarball "${TARBALL}" \
            --arg sha256 "${SHA256}" \
            --arg integrity "${INTEGRITY}" \
            --arg package_name "${PACKAGE_NAME}" \
            --arg package_version "${PACKAGE_VERSION}" \
            --arg commit_sha "${GITHUB_SHA}" \
            --arg workflow_ref "${GITHUB_WORKFLOW_REF}" \
            --arg attestation_run_id "${{ steps.attested_source.outputs.run_id }}" \
            '{
              package_name: $package_name,
              package_version: $package_version,
              tarball: $tarball,
              sha256: $sha256,
              integrity: $integrity,
              commit_sha: $commit_sha,
              workflow_ref: $workflow_ref,
              source_attestation_run_id: ($attestation_run_id | if length > 0 then . else null end)
            }' > release-artifact-manifest.json
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Validate packaged CLI install
        run: |
          set -euo pipefail
          TARBALL="${{ steps.artifact_manifest.outputs.tarball }}"
          PREFIX_DIR="$(mktemp -d)"
          npm install --prefix "${PREFIX_DIR}" --ignore-scripts "${TARBALL}"
          "${PREFIX_DIR}/node_modules/.bin/sentinelayer-cli" --version
          "${PREFIX_DIR}/node_modules/.bin/create-sentinelayer" --version
          "${PREFIX_DIR}/node_modules/.bin/sentinel" --version
          "${PREFIX_DIR}/node_modules/.bin/sl" --version
          rm -rf "${PREFIX_DIR}"

      - name: Generate release build attestation
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # digest-pinned (actions/attest-build-provenance)
        with:
          subject-path: ${{ steps.artifact_manifest.outputs.tarball }}

      - name: Verify release build attestation policy
        env:
          GH_TOKEN: ${{ github.token }}
          TARBALL: ${{ steps.artifact_manifest.outputs.tarball }}
          SIGNER_WORKFLOW: ${{ github.repository }}/.github/workflows/release.yml
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if gh attestation verify "${TARBALL}" --repo "${GITHUB_REPOSITORY}" --signer-workflow "${SIGNER_WORKFLOW}" --format json > release-attestation-verify.json; then
              break
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "::error::Release attestation verification failed after retries."
              exit 1
            fi
            sleep 10
          done
          jq -e 'length > 0' release-attestation-verify.json > /dev/null

      - name: Upload release tarball artifact
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: sentinelayer-cli-tarball
          path: |
            ${{ steps.artifact_manifest.outputs.tarball }}
            release-artifact-manifest.json
            release-attestation-verify.json
          if-no-files-found: error
          retention-days: 7

  rollback-readiness-tag:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [build-release-artifact]
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Validate rollback readiness (tag release dry-run)
        env:
          PACKAGE_NAME: sentinelayer-cli
          ROLLBACK_MODE: tag-release
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          release_version="${RELEASE_VERSION#v}"
          RELEASE_VERSION="${release_version}" bash .github/scripts/release-rollback-readiness.sh

  release-approval:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [build-release-artifact, rollback-readiness-tag]
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    environment: package-release
    steps:
      - name: Record protected approval gate
        run: |
          set -euo pipefail
          echo "Release approval gate satisfied for ${GITHUB_REF}."

  pre-publish-gates:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [build-release-artifact, rollback-readiness-tag, release-approval]
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      checks: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Re-verify required upstream gates immediately before publish
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.sha }}
          REQUIRED_CHECKS_JSON: >-
            [
              {"name":"Quality Summary","app":"github-actions","optional":false,"workflow_path":".github/workflows/quality-gates.yml"},
              {"name":"Quality Gates Terminal","app":"github-actions","optional":false,"workflow_path":".github/workflows/quality-gates.yml"},
              {"name":"Build Package (Deterministic)","app":"github-actions","optional":false,"workflow_path":".github/workflows/quality-gates.yml"},
              {"name":"Omar Gate","app":"github-actions","optional":false,"workflow_path":".github/workflows/omar-gate.yml"},
              {"name":"Attestation Summary","app":"github-actions","optional":false,"workflow_path":".github/workflows/attestations.yml"}
            ]
          MAX_WAIT_SECONDS: "900"
          POLL_INTERVAL_SECONDS: "10"
        run: .github/scripts/require-check-runs.sh

  publish-approval:
    name: Publish Approval
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [pre-publish-gates]
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    environment: package-release
    steps:
      - name: Record protected publish approval gate
        run: |
          set -euo pipefail
          echo "Publish approval gate satisfied for ${GITHUB_REF}."

  publish-candidate:
    name: Publish Candidate
    needs: [pre-publish-gates, release-authorize, publish-approval]
    if: >-
      ${{
        startsWith(github.ref, 'refs/tags/v') &&
        needs.pre-publish-gates.result == 'success' &&
        needs.release-authorize.result == 'success' &&
        needs.publish-approval.result == 'success'
      }}
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    environment: package-release
    permissions:
      contents: read
      id-token: write
    outputs:
      package_name: ${{ steps.publish_guard.outputs.package_name }}
      package_version: ${{ steps.publish_guard.outputs.package_version }}
      already_published: ${{ steps.publish_guard.outputs.already_published }}
    concurrency:
      group: release-publish-prod
      cancel-in-progress: false
    steps:
      - name: Enforce protected release tag
        shell: bash
        env:
          GITHUB_REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          set -euo pipefail
          ref_protected="$(echo "${GITHUB_REF_PROTECTED}" | tr '[:upper:]' '[:lower:]' | xargs || true)"
          if [ "${ref_protected}" != "true" ]; then
            echo "::error::Release publish requires a protected ref (ref_protected=true)."
            exit 1
          fi

      - name: Enforce package-release environment reviewer policy
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REQUIRE_RELEASE_REVIEWERS: ${{ vars.REQUIRE_RELEASE_REVIEWERS || 'false' }}
        run: |
          set -euo pipefail
          # Fully automated publish path: reviewer requirement is opt-in via
          # repo var REQUIRE_RELEASE_REVIEWERS=true. Audit trail is preserved
          # via the trusted publishing OIDC exchange (workflow+env binding)
          # and the step-summary record below.
          response="$(gh api "repos/${GITHUB_REPOSITORY}/environments/package-release")"
          rule_count="$(echo "${response}" | jq -r '.protection_rules | length')"
          reviewer_count="$(echo "${response}" | jq -r '[.protection_rules[]? | select(.type=="required_reviewers") | (.reviewers // [])[]] | length')"
          require_reviewers="$(echo "${REQUIRE_RELEASE_REVIEWERS}" | tr '[:upper:]' '[:lower:]' | xargs || true)"
          case "${rule_count}" in ''|*[!0-9]*) echo "::error::Invalid protection rule count returned for package-release environment." ; exit 1 ;; esac
          case "${reviewer_count}" in ''|*[!0-9]*) echo "::error::Invalid reviewer count returned for package-release environment." ; exit 1 ;; esac
          if [ "${require_reviewers}" = "true" ] && [ "${reviewer_count}" -lt 1 ]; then
            echo "::error::package-release environment requires reviewers (REQUIRE_RELEASE_REVIEWERS=true) but none are configured."
            exit 1
          fi
          {
            echo "## package-release authorization"
            echo "- rule_count: \`${rule_count}\`"
            echo "- reviewer_count: \`${reviewer_count}\`"
            echo "- require_reviewers_enforced: \`${require_reviewers}\`"
            echo "- audit_trail: trusted-publishing OIDC exchange + env binding"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Assert release authorization gate state
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ needs.release-authorize.result }}" != "success" ]; then
            echo "::error::release-authorize did not complete successfully (result=${{ needs.release-authorize.result }})."
            exit 1
          fi

      - name: Block publish when rollback workflow is active
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          active_rollback_count="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/rollback.yml/runs?status=in_progress&per_page=100" --jq '.workflow_runs | length')"
          case "${active_rollback_count}" in ''|*[!0-9]*) echo "::error::Invalid rollback run count: ${active_rollback_count}" ; exit 1 ;; esac
          if [ "${active_rollback_count}" -gt 0 ]; then
            echo "::error::Rollback workflow is currently in progress; refusing concurrent publish."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Download release tarball artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # digest-pinned (actions/download-artifact)
        with:
          name: sentinelayer-cli-tarball
          path: release-artifact

      - name: Enforce trusted npm publishing context
        shell: bash
        env:
          NPM_OIDC_MAX_TTL_SECONDS: ${{ vars.NPM_OIDC_MAX_TTL_SECONDS || '900' }}
        run: |
          set -euo pipefail
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "::error::Trusted publishing requires GitHub OIDC runtime context, but id-token environment is unavailable."
            exit 1
          fi
          case "${NPM_OIDC_MAX_TTL_SECONDS}" in ''|*[!0-9]*) echo "::error::Invalid NPM_OIDC_MAX_TTL_SECONDS value: ${NPM_OIDC_MAX_TTL_SECONDS}" ; exit 1 ;; esac
          oidc_payload="$(curl -sSL \
            --fail-with-body \
            --proto '=https' \
            --tlsv1.2 \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npmjs.org")"
          oidc_token="$(echo "${oidc_payload}" | jq -r '.value // empty')"
          if [ -z "${oidc_token}" ] || [ "${oidc_token}" = "null" ]; then
            echo "::error::Failed to mint GitHub OIDC token for npm trusted publishing."
            exit 1
          fi
          claims_json="$(node -e "const token=process.argv[1]||''; const p=token.split('.')[1]||''; const b=p.replace(/-/g,'+').replace(/_/g,'/'); const pad=b + '='.repeat((4 - (b.length % 4)) % 4); try { process.stdout.write(Buffer.from(pad,'base64').toString('utf8')); } catch { process.exit(1); }" "${oidc_token}" || true)"
          oidc_iat="$(echo "${claims_json}" | jq -r '.iat // empty')"
          oidc_exp="$(echo "${claims_json}" | jq -r '.exp // empty')"
          case "${oidc_iat}" in ''|*[!0-9]*) echo "::error::Invalid OIDC iat claim: ${oidc_iat}" ; exit 1 ;; esac
          case "${oidc_exp}" in ''|*[!0-9]*) echo "::error::Invalid OIDC exp claim: ${oidc_exp}" ; exit 1 ;; esac
          oidc_ttl="$((oidc_exp - oidc_iat))"
          if [ "${oidc_ttl}" -le 0 ]; then
            echo "::error::Invalid OIDC token TTL computed from claims: ${oidc_ttl}."
            exit 1
          fi
          if [ "${oidc_ttl}" -gt "${NPM_OIDC_MAX_TTL_SECONDS}" ]; then
            echo "::error::OIDC token TTL ${oidc_ttl}s exceeds policy maximum ${NPM_OIDC_MAX_TTL_SECONDS}s."
            exit 1
          fi
          echo "PUBLISH_AUTH_MODE=trusted" >> "$GITHUB_ENV"
          {
            echo "### npm publish auth mode: trusted (OIDC)"
            echo "- oidc_ttl_seconds: \`${oidc_ttl}\`"
            echo "- oidc_ttl_policy_max_seconds: \`${NPM_OIDC_MAX_TTL_SECONDS}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce release artifact checksum manifest and bind publish tarball
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=(release-artifact/sentinelayer-cli-*.tgz)
          if [ "${#tarballs[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one downloaded tarball, found ${#tarballs[@]}."
            printf 'Found tarballs: %s\n' "${tarballs[@]:-<none>}"
            exit 1
          fi
          TARBALL="${tarballs[0]}"
          MANIFEST="release-artifact/release-artifact-manifest.json"
          test -f "${MANIFEST}"
          MANIFEST_TARBALL="$(jq -r '.tarball // empty' "${MANIFEST}")"
          EXPECTED_SHA256="$(jq -r '.sha256' "${MANIFEST}")"
          MANIFEST_INTEGRITY="$(jq -r '.integrity // empty' "${MANIFEST}")"
          MANIFEST_PACKAGE_NAME="$(jq -r '.package_name // empty' "${MANIFEST}")"
          MANIFEST_PACKAGE_VERSION="$(jq -r '.package_version // empty' "${MANIFEST}")"
          MANIFEST_COMMIT_SHA="$(jq -r '.commit_sha // empty' "${MANIFEST}")"
          MANIFEST_SOURCE_ATTEST_RUN_ID="$(jq -r '.source_attestation_run_id // empty' "${MANIFEST}")"
          ACTUAL_SHA256="$(sha256sum "${TARBALL}" | awk '{print $1}')"
          ACTUAL_INTEGRITY="sha512-$(openssl dgst -sha512 -binary "${TARBALL}" | openssl base64 -A)"
          if [ -z "${MANIFEST_TARBALL}" ]; then
            echo "::error::Manifest missing expected tarball name."
            exit 1
          fi
          if [ "$(basename "${TARBALL}")" != "${MANIFEST_TARBALL}" ]; then
            echo "::error::Manifest tarball mismatch. expected=${MANIFEST_TARBALL} actual=$(basename "${TARBALL}")"
            exit 1
          fi
          if [ -z "${EXPECTED_SHA256}" ] || [ "${EXPECTED_SHA256}" = "null" ]; then
            echo "::error::Manifest missing expected sha256."
            exit 1
          fi
          if [ -z "${MANIFEST_INTEGRITY}" ] || [ "${MANIFEST_INTEGRITY}" = "null" ]; then
            echo "::error::Manifest missing expected integrity."
            exit 1
          fi
          if [ -z "${MANIFEST_PACKAGE_NAME}" ] || [ "${MANIFEST_PACKAGE_NAME}" = "null" ]; then
            echo "::error::Manifest missing package_name."
            exit 1
          fi
          if [ -z "${MANIFEST_PACKAGE_VERSION}" ] || [ "${MANIFEST_PACKAGE_VERSION}" = "null" ]; then
            echo "::error::Manifest missing package_version."
            exit 1
          fi
          if [ -z "${MANIFEST_COMMIT_SHA}" ] || [ "${MANIFEST_COMMIT_SHA}" = "null" ]; then
            echo "::error::Manifest missing commit_sha."
            exit 1
          fi
          if [ -z "${MANIFEST_SOURCE_ATTEST_RUN_ID}" ] || [ "${MANIFEST_SOURCE_ATTEST_RUN_ID}" = "null" ]; then
            echo "::error::Manifest missing source_attestation_run_id."
            exit 1
          fi
          if ! echo "${MANIFEST_SOURCE_ATTEST_RUN_ID}" | grep -Eq '^[0-9]+$'; then
            echo "::error::Manifest source_attestation_run_id is invalid: ${MANIFEST_SOURCE_ATTEST_RUN_ID}."
            exit 1
          fi
          if [ "${MANIFEST_COMMIT_SHA}" != "${GITHUB_SHA}" ]; then
            echo "::error::Manifest commit mismatch. expected=${MANIFEST_COMMIT_SHA} actual=${GITHUB_SHA}"
            exit 1
          fi
          if [ "${EXPECTED_SHA256}" != "${ACTUAL_SHA256}" ]; then
            echo "::error::Release artifact checksum mismatch."
            echo "::error::Expected ${EXPECTED_SHA256}, got ${ACTUAL_SHA256}."
            exit 1
          fi
          if [ "${MANIFEST_INTEGRITY}" != "${ACTUAL_INTEGRITY}" ]; then
            echo "::error::Release artifact integrity mismatch."
            echo "::error::Expected ${MANIFEST_INTEGRITY}, got ${ACTUAL_INTEGRITY}."
            exit 1
          fi
          BUILD_ATTESTATION_FILE="release-artifact/release-attestation-verify.json"
          if [ ! -f "${BUILD_ATTESTATION_FILE}" ]; then
            echo "::error::Missing build-stage attestation verification artifact at ${BUILD_ATTESTATION_FILE}."
            exit 1
          fi
          BUILD_ATTESTED_SHA256="$(jq -r '
            [
              .. | objects
              | select(has("digest"))
              | .digest
              | if type == "object" then .sha256 // empty else empty end
            ]
            | map(select(type == "string" and length > 0))
            | first // empty
          ' "${BUILD_ATTESTATION_FILE}")"
          if [ -n "${BUILD_ATTESTED_SHA256}" ] && [ "${BUILD_ATTESTED_SHA256}" != "${EXPECTED_SHA256}" ]; then
            echo "::error::Build-stage attested digest mismatch. expected=${EXPECTED_SHA256} build_attested=${BUILD_ATTESTED_SHA256}."
            exit 1
          fi
          echo "VERIFIED_TARBALL=${TARBALL}" >> "$GITHUB_ENV"
          echo "EXPECTED_SHA256=${EXPECTED_SHA256}" >> "$GITHUB_ENV"
          echo "EXPECTED_INTEGRITY=${MANIFEST_INTEGRITY}" >> "$GITHUB_ENV"
          echo "EXPECTED_PACKAGE_NAME=${MANIFEST_PACKAGE_NAME}" >> "$GITHUB_ENV"
          echo "EXPECTED_PACKAGE_VERSION=${MANIFEST_PACKAGE_VERSION}" >> "$GITHUB_ENV"

      - name: Enforce immutable publish artifact source
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${VERIFIED_TARBALL:-}" ]; then
            echo "::error::VERIFIED_TARBALL is not set; refusing to publish from workspace."
            exit 1
          fi
          case "${VERIFIED_TARBALL}" in
            release-artifact/*) ;;
            *) echo "::error::VERIFIED_TARBALL must reference release-artifact/ (got ${VERIFIED_TARBALL})." ; exit 1 ;;
          esac
          if [ -f package.json ]; then
            echo "::notice::Workspace package.json present; publish will use ${VERIFIED_TARBALL} only."
          fi

      - name: Enforce release attestation verification policy
        env:
          GH_TOKEN: ${{ github.token }}
          SIGNER_WORKFLOW: ${{ github.repository }}/.github/workflows/release.yml
        run: |
          set -euo pipefail
          start_epoch="$(date +%s)"
          for attempt in 1 2 3 4 5; do
            now_epoch="$(date +%s)"
            elapsed="$((now_epoch - start_epoch))"
            if [ "${elapsed}" -gt "${GLOBAL_MAX_SECONDS}" ]; then
              echo "::error::Release attestation verification exceeded global budget (${elapsed}s > ${GLOBAL_MAX_SECONDS}s)."
              exit 1
            fi
            if gh attestation verify "${VERIFIED_TARBALL}" --repo "${GITHUB_REPOSITORY}" --signer-workflow "${SIGNER_WORKFLOW}" --format json > release-attestation-publish-verify.json; then
              break
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "::error::Publish attestation verification failed after retries."
              exit 1
            fi
            sleep 10
          done
          jq -e 'length > 0' release-attestation-publish-verify.json > /dev/null
          ATTESTED_SHA256="$(jq -r '
            [
              .. | objects
              | select(has("digest"))
              | .digest
              | if type == "object" then .sha256 // empty else empty end
            ]
            | map(select(type == "string" and length > 0))
            | first // empty
          ' release-attestation-publish-verify.json)"
          if [ -z "${ATTESTED_SHA256}" ]; then
            echo "::error::Could not resolve attested subject digest from release-attestation-publish-verify.json."
            exit 1
          fi
          if [ "${ATTESTED_SHA256}" != "${EXPECTED_SHA256}" ]; then
            echo "::error::Attested digest mismatch."
            echo "::error::Expected ${EXPECTED_SHA256}, attested ${ATTESTED_SHA256}."
            exit 1
          fi

      - name: Prepare npm publish context
        shell: bash
        run: |
          set -euo pipefail
          npm config set registry "https://registry.npmjs.org/"
          # Always clear stale authToken so npm CLI can perform OIDC trusted
          # publishing exchange cleanly. The stale NPM_TOKEN no longer has
          # publish rights for sentinelayer-cli since trusted publishing
          # claims package ownership.
          npm config delete //registry.npmjs.org/:_authToken || true

      - name: Guard deterministic npm publish idempotency
        id: publish_guard
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${RELEASE_TAG#v}"
          if [ -z "${package_name}" ] || [ -z "${package_version}" ]; then
            echo "::error::Failed to resolve package identity from package.json."
            exit 1
          fi
          if [ -n "${EXPECTED_PACKAGE_NAME:-}" ] && [ "${package_name}" != "${EXPECTED_PACKAGE_NAME}" ]; then
            echo "::error::Manifest package_name mismatch. expected=${EXPECTED_PACKAGE_NAME} actual=${package_name}."
            exit 1
          fi
          if [ -n "${EXPECTED_PACKAGE_VERSION:-}" ] && [ "${package_version}" != "${EXPECTED_PACKAGE_VERSION}" ]; then
            echo "::error::Manifest package_version mismatch. expected=${EXPECTED_PACKAGE_VERSION} actual=${package_version}."
            exit 1
          fi
          if [ "${package_version}" != "${tag_version}" ]; then
            echo "::error::Tag/version mismatch. tag=${tag_version} package=${package_version}."
            exit 1
          fi
          echo "package_name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "package_version=${package_version}" >> "$GITHUB_OUTPUT"
          expected_sha1="$(sha1sum "${VERIFIED_TARBALL}" | awk '{print $1}')"
          # npm view with --json writes {"error":{"code":"E404",...}} to stdout
          # when the package/version is absent (exit 0, not an error). Treat
          # E404 as "not published yet" and fall through to the publish step.
          published_raw="$(npm view "${package_name}@${package_version}" version --json 2>/tmp/npm-view.err || true)"
          published_raw_compact="$(echo "${published_raw}" | tr -d '[:space:]')"
          if [ -z "${published_raw_compact}" ] || echo "${published_raw_compact}" | grep -q 'E404\|"error"'; then
            published_version=""
          else
            published_version="$(echo "${published_raw}" | tr -d '\r\n\"[:space:]' | xargs || true)"
          fi
          if [ -n "${published_version}" ]; then
            if [ "${published_version}" != "${package_version}" ]; then
              echo "::error::Unexpected published version response for ${package_name}@${package_version}: ${published_version}"
              exit 1
            fi
            published_sha1="$(npm view "${package_name}@${package_version}" dist.shasum --json 2>/tmp/npm-view.err || true)"
            published_sha1="$(echo "${published_sha1}" | tr -d '\r\n\"[:space:]' | xargs || true)"
            if [ -n "${published_sha1}" ] && [ "${published_sha1}" != "${expected_sha1}" ]; then
              echo "::error::Published tarball checksum mismatch for ${package_name}@${package_version}. expected=${expected_sha1} published=${published_sha1}."
              exit 1
            fi
            if [ -n "${EXPECTED_INTEGRITY:-}" ]; then
              published_integrity="$(npm view "${package_name}@${package_version}" dist.integrity --json 2>/tmp/npm-view.err || true)"
              published_integrity="$(echo "${published_integrity}" | tr -d '\r\n\"[:space:]' | xargs || true)"
              if [ -n "${published_integrity}" ] && [ "${published_integrity}" != "${EXPECTED_INTEGRITY}" ]; then
                echo "::error::Published integrity mismatch for ${package_name}@${package_version}. expected=${EXPECTED_INTEGRITY} published=${published_integrity}."
                exit 1
              fi
            fi
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            {
              echo "### npm publish idempotency guard"
              echo "- package: \`${package_name}@${package_version}\`"
              echo "- status: \`already published\`"
              echo "- published_sha1: \`${published_sha1:-<unavailable>}\`"
              if [ -n "${EXPECTED_INTEGRITY:-}" ]; then
                echo "- published_integrity: \`${published_integrity:-<unavailable>}\`"
                echo "- expected_integrity: \`${EXPECTED_INTEGRITY}\`"
              fi
              echo "- expected_sha1: \`${expected_sha1}\`"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "already_published=false" >> "$GITHUB_OUTPUT"
          {
            echo "### npm publish idempotency guard"
            echo "- package: \`${package_name}@${package_version}\`"
            echo "- status: \`not published yet\`"
            echo "- expected_sha1: \`${expected_sha1}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install isolated npm 11.5.1 for OIDC trusted publishing
        if: steps.publish_guard.outputs.already_published != 'true'
        run: |
          set -euo pipefail
          # Install npm in an isolated location to avoid corrupting the
          # hosted-tools npm installation (prior self-upgrade attempt hit
          # MODULE_NOT_FOUND on promise-retry).
          mkdir -p "${HOME}/.npm-isolated"
          /usr/bin/env npm install --prefix "${HOME}/.npm-isolated" --no-save --no-package-lock --ignore-scripts npm@11.5.1
          echo "ISOLATED_NPM=${HOME}/.npm-isolated/node_modules/.bin/npm" >> "$GITHUB_ENV"
          "${HOME}/.npm-isolated/node_modules/.bin/npm" --version

      - name: Publish canary release to npm (`next`)
        if: steps.publish_guard.outputs.already_published != 'true'
        env:
          PACKAGE_NAME: ${{ steps.publish_guard.outputs.package_name }}
          PACKAGE_VERSION: ${{ steps.publish_guard.outputs.package_version }}
        run: |
          set -euo pipefail
          test -f "${VERIFIED_TARBALL}"
          # Pure OIDC trusted publishing via isolated npm 11.5.1.
          # The trusted publisher on npmjs.org is configured for this
          # repo/workflow/env; npm 11.5.1+ auto-exchanges the GitHub OIDC
          # token for a short-lived npm publish token at publish time.
          # Clear any stale authToken so the OIDC flow takes over cleanly.
          rm -f "${HOME}/.npmrc" 2>/dev/null || true
          printf 'registry=https://registry.npmjs.org/\nprovenance=true\n' > "${HOME}/.npmrc"
          echo "Using npm at: ${ISOLATED_NPM}"
          "${ISOLATED_NPM}" --version
          "${ISOLATED_NPM}" publish "./${VERIFIED_TARBALL}" --provenance --access public --tag next
          next_tag="$(npm view "${PACKAGE_NAME}" dist-tags.next --json 2>/tmp/npm-next.err || true)"
          next_tag="$(echo "${next_tag}" | tr -d '\r\n\"[:space:]' | xargs || true)"
          if [ "${next_tag}" != "${PACKAGE_VERSION}" ]; then
            echo "::error::Canary publish verification failed. dist-tags.next=${next_tag:-<none>} expected=${PACKAGE_VERSION}."
            cat /tmp/npm-next.err || true
            exit 1
          fi
          if [ -n "${EXPECTED_INTEGRITY:-}" ]; then
            published_integrity="$(npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" dist.integrity --json 2>/tmp/npm-view.err || true)"
            published_integrity="$(echo "${published_integrity}" | tr -d '\r\n\"[:space:]' | xargs || true)"
            if [ -n "${published_integrity}" ] && [ "${published_integrity}" != "${EXPECTED_INTEGRITY}" ]; then
              echo "::error::Canary publish integrity mismatch. expected=${EXPECTED_INTEGRITY} published=${published_integrity}."
              exit 1
            fi
          fi

      - name: Validate canary install from npm registry
        if: steps.publish_guard.outputs.already_published != 'true'
        env:
          PACKAGE_NAME: ${{ steps.publish_guard.outputs.package_name }}
          PACKAGE_VERSION: ${{ steps.publish_guard.outputs.package_version }}
        run: |
          set -euo pipefail
          prefix_dir="$(mktemp -d)"
          npm install --prefix "${prefix_dir}" --ignore-scripts "${PACKAGE_NAME}@${PACKAGE_VERSION}"
          "${prefix_dir}/node_modules/.bin/sentinelayer-cli" --version > /tmp/canary-version.out
          canary_version="$(tr -d '\r\n ' < /tmp/canary-version.out | sed 's/^v//')"
          if [ "${canary_version}" != "${PACKAGE_VERSION}" ]; then
            echo "::error::Canary runtime validation failed. CLI version=${canary_version:-<none>} expected=${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Run post-publish smoke checks
        if: steps.publish_guard.outputs.already_published != 'true'
        env:
          PACKAGE_NAME: ${{ steps.publish_guard.outputs.package_name }}
          PACKAGE_VERSION: ${{ steps.publish_guard.outputs.package_version }}
        run: |
          set -euo pipefail
          smoke_dir="$(mktemp -d)"
          npm install --prefix "${smoke_dir}" --ignore-scripts "${PACKAGE_NAME}@${PACKAGE_VERSION}"
          "${smoke_dir}/node_modules/.bin/sentinelayer-cli" --help > /tmp/canary-help.out
          "${smoke_dir}/node_modules/.bin/sentinelayer-cli" auth --help > /tmp/canary-auth-help.out
          if ! grep -qi "sentinelayer" /tmp/canary-help.out; then
            echo "::error::Canary smoke check failed: help output missing sentinelayer signature."
            exit 1
          fi

      - name: Finalize npm auth session
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          npm config delete //registry.npmjs.org/:_authToken || true
          residual_token="$(npm config get //registry.npmjs.org/:_authToken 2>/dev/null || true)"
          if [ -n "${residual_token}" ] && [ "${residual_token}" != "undefined" ] && [ "${residual_token}" != "null" ]; then
            echo "::error::Residual npm auth token detected after publish finalization."
            exit 1
          fi
          echo "No residual npm auth token remains after publish."

  promote-latest:
    name: Promote Latest
    needs: [publish-candidate]
    if: >-
      ${{
        startsWith(github.ref, 'refs/tags/v') &&
        needs.publish-candidate.result == 'success' &&
        needs.publish-candidate.outputs.already_published != 'true'
      }}
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    environment: package-release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Enforce soak window before promotion
        shell: bash
        env:
          NPM_PROMOTION_SOAK_SECONDS: ${{ vars.NPM_PROMOTION_SOAK_SECONDS || '300' }}
        run: |
          set -euo pipefail
          soak_seconds="$(echo "${NPM_PROMOTION_SOAK_SECONDS}" | xargs || true)"
          case "${soak_seconds}" in ''|*[!0-9]*) echo "::error::Invalid NPM_PROMOTION_SOAK_SECONDS value: ${soak_seconds}" ; exit 1 ;; esac
          if [ "${soak_seconds}" -gt 0 ]; then
            echo "Waiting ${soak_seconds}s before promoting to latest."
            sleep "${soak_seconds}"
          fi

      - name: Promote canary to stable (`latest`) dist-tag
        env:
          PACKAGE_NAME: ${{ needs.publish-candidate.outputs.package_name }}
          PACKAGE_VERSION: ${{ needs.publish-candidate.outputs.package_version }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${PACKAGE_NAME}" ] || [ -z "${PACKAGE_VERSION}" ]; then
            echo "::error::Missing package identity from publish-candidate outputs."
            exit 1
          fi
          npm dist-tag add "${PACKAGE_NAME}@${PACKAGE_VERSION}" latest
          latest_tag="$(npm view "${PACKAGE_NAME}" dist-tags.latest --json 2>/tmp/npm-latest.err || true)"
          latest_tag="$(echo "${latest_tag}" | tr -d '\r\n\"[:space:]' | xargs || true)"
          if [ "${latest_tag}" != "${PACKAGE_VERSION}" ]; then
            echo "::error::Stable promotion failed. dist-tags.latest=${latest_tag:-<none>} expected=${PACKAGE_VERSION}."
            cat /tmp/npm-latest.err || true
            exit 1
          fi
          {
            echo "### Progressive rollout"
            echo "- canary_tag: \`next\`"
            echo "- stable_tag: \`latest\`"
            echo "- promoted_version: \`${PACKAGE_VERSION}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  rollback-readiness:
    needs: [publish-candidate, promote-latest]
    if: >-
      ${{
        startsWith(github.ref, 'refs/tags/v') &&
        needs.publish-candidate.result == 'success' &&
        (needs.promote-latest.result == 'success' || needs.promote-latest.result == 'skipped')
      }}
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Run post-publish rollback readiness drill
        shell: bash
        env:
          PACKAGE_NAME: sentinelayer-cli
          ROLLBACK_MODE: post-publish
          RELEASE_VERSION: ${{ github.ref_name }}
          NON_BLOCKING_DIAGNOSTICS: "0"
        run: |
          set -euo pipefail
          release_version="${RELEASE_VERSION#v}"
          RELEASE_VERSION="${release_version}" bash .github/scripts/release-rollback-readiness.sh
          test -f release-rollback-readiness.json

      - name: Upload rollback readiness report
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: release-rollback-readiness
          path: release-rollback-readiness.json
          if-no-files-found: error
          retention-days: 7

