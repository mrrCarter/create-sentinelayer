name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  checks: read
  contents: read
  attestations: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-workflow-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  manual-validate:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    environment: package-release
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Enforce workflow_dispatch branch policy
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error::Manual release dispatch validation is restricted to refs/heads/main. Current ref: ${GITHUB_REF}."
            exit 1
          fi

      - name: Enforce manual release actor allowlist
        shell: bash
        env:
          RELEASE_ALLOWED_ACTORS: ${{ vars.RELEASE_ALLOWED_ACTORS || 'mrrCarter' }}
        run: |
          set -euo pipefail
          allowed_csv="${RELEASE_ALLOWED_ACTORS}"
          actor="${GITHUB_ACTOR}"
          actor_allowed="false"
          IFS=',' read -r -a allowed_items <<< "${allowed_csv}"
          for item in "${allowed_items[@]}"; do
            candidate="$(echo "${item}" | xargs)"
            if [ -n "${candidate}" ] && [ "${candidate}" = "${actor}" ]; then
              actor_allowed="true"
              break
            fi
          done
          if [ "${actor_allowed}" != "true" ]; then
            echo "::error::Actor ${actor} is not in RELEASE_ALLOWED_ACTORS (${allowed_csv})."
            exit 1
          fi

      - name: Ensure target commit passed required upstream gates
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.sha }}
          REQUIRED_CHECKS_JSON: >-
            [
              {"name":"Quality Summary","app":"github-actions","optional":false},
              {"name":"Omar Gate","app":"github-actions","optional":false},
              {"name":"Attestation Summary","app":"github-actions","optional":false}
            ]
          MAX_WAIT_SECONDS: "1800"
          POLL_INTERVAL_SECONDS: "10"
        run: .github/scripts/require-check-runs.sh

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate package
        run: npm run verify

      - name: Emit manual validation summary
        run: |
          set -euo pipefail
          echo "## Manual Release Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "- ref: \`${GITHUB_REF}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- note: workflow_dispatch validates only; publish remains tag-only and upstream checks must already be green." >> "$GITHUB_STEP_SUMMARY"

  rollback-readiness-manual:
    if: github.event_name == 'workflow_dispatch'
    needs: [manual-validate]
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    environment: package-release
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Validate rollback readiness (manual dry-run)
        env:
          PACKAGE_NAME: sentinelayer-cli
          ROLLBACK_MODE: manual-validate
        run: bash .github/scripts/release-rollback-readiness.sh

  release-authorize:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    environment: package-release
    steps:
      - name: Enforce release tag and actor authorization policy
        shell: bash
        env:
          RELEASE_ALLOWED_ACTORS: ${{ vars.RELEASE_ALLOWED_ACTORS || 'mrrCarter,github-actions[bot]' }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" != "refs/tags/${GITHUB_REF_NAME}" ]; then
            echo "::error::Unexpected ref format: ${GITHUB_REF}"
            exit 1
          fi
          if ! echo "${GITHUB_REF_NAME}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "::error::Release tag must match semantic version pattern (vMAJOR.MINOR.PATCH[-suffix]). Received ${GITHUB_REF_NAME}."
            exit 1
          fi
          allowed_csv="${RELEASE_ALLOWED_ACTORS}"
          actor="${GITHUB_ACTOR}"
          actor_allowed="false"
          IFS=',' read -r -a allowed_items <<< "${allowed_csv}"
          for item in "${allowed_items[@]}"; do
            candidate="$(echo "${item}" | xargs)"
            if [ -n "${candidate}" ] && [ "${candidate}" = "${actor}" ]; then
              actor_allowed="true"
              break
            fi
          done
          if [ "${actor_allowed}" != "true" ]; then
            echo "::error::Actor ${actor} is not allowed to authorize tag releases. RELEASE_ALLOWED_ACTORS=${allowed_csv}."
            exit 1
          fi

  release-prereqs:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release-authorize]
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run release prerequisite verification
        run: npm run verify

      - name: Ensure release commit passed required upstream checks
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.sha }}
          REQUIRED_CHECKS_JSON: >-
            [
              {"name":"Quality Summary","app":"github-actions","optional":false},
              {"name":"Omar Gate","app":"github-actions","optional":false},
              {"name":"Attestation Summary","app":"github-actions","optional":false}
            ]
          MAX_WAIT_SECONDS: "900"
          POLL_INTERVAL_SECONDS: "10"
        run: .github/scripts/require-check-runs.sh

  build-release-artifact:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release-authorize, release-prereqs]
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    concurrency:
      group: release-build-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Enforce release tag ancestry on main
        run: |
          set -euo pipefail
          git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "::error::Release tag commit ${GITHUB_SHA} is not reachable from origin/main."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate package
        run: npm run verify

      - name: Ensure release commit passed required upstream gates
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.sha }}
          REQUIRED_CHECKS_JSON: >-
            [
              {"name":"Quality Summary","app":"github-actions","optional":false},
              {"name":"Omar Gate","app":"github-actions","optional":false},
              {"name":"Attestation Summary","app":"github-actions","optional":false}
            ]
          MAX_WAIT_SECONDS: "900"
          POLL_INTERVAL_SECONDS: "10"
        run: .github/scripts/require-check-runs.sh

      - name: Build release tarball
        run: npm pack --ignore-scripts

      - name: Generate release artifact manifest
        id: artifact_manifest
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=(sentinelayer-cli-*.tgz)
          if [ "${#tarballs[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one release tarball, found ${#tarballs[@]}."
            printf 'Found tarballs: %s\n' "${tarballs[@]:-<none>}"
            exit 1
          fi
          TARBALL="${tarballs[0]}"
          SHA256="$(sha256sum "${TARBALL}" | awk '{print $1}')"
          jq -n \
            --arg tarball "${TARBALL}" \
            --arg sha256 "${SHA256}" \
            --arg commit_sha "${GITHUB_SHA}" \
            --arg workflow_ref "${GITHUB_WORKFLOW_REF}" \
            '{
              tarball: $tarball,
              sha256: $sha256,
              commit_sha: $commit_sha,
              workflow_ref: $workflow_ref
            }' > release-artifact-manifest.json
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Validate packaged CLI install
        run: |
          set -euo pipefail
          TARBALL="${{ steps.artifact_manifest.outputs.tarball }}"
          PREFIX_DIR="$(mktemp -d)"
          npm install --prefix "${PREFIX_DIR}" --ignore-scripts "${TARBALL}"
          "${PREFIX_DIR}/node_modules/.bin/sentinelayer-cli" --version
          "${PREFIX_DIR}/node_modules/.bin/create-sentinelayer" --version
          "${PREFIX_DIR}/node_modules/.bin/sentinel" --version
          "${PREFIX_DIR}/node_modules/.bin/sl" --version
          rm -rf "${PREFIX_DIR}"

      - name: Generate release build attestation
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: ${{ steps.artifact_manifest.outputs.tarball }}

      - name: Verify release build attestation policy
        env:
          GH_TOKEN: ${{ github.token }}
          TARBALL: ${{ steps.artifact_manifest.outputs.tarball }}
          SIGNER_WORKFLOW: ${{ github.repository }}/.github/workflows/release.yml
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if gh attestation verify "${TARBALL}" --repo "${GITHUB_REPOSITORY}" --signer-workflow "${SIGNER_WORKFLOW}" --format json > release-attestation-verify.json; then
              break
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "::error::Release attestation verification failed after retries."
              exit 1
            fi
            sleep 10
          done
          jq -e 'length > 0' release-attestation-verify.json > /dev/null

      - name: Upload release tarball artifact
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: sentinelayer-cli-tarball
          path: |
            ${{ steps.artifact_manifest.outputs.tarball }}
            release-artifact-manifest.json
            release-attestation-verify.json
          if-no-files-found: error
          retention-days: 7

  rollback-readiness-tag:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-release-artifact]
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Validate rollback readiness (tag release dry-run)
        env:
          PACKAGE_NAME: sentinelayer-cli
          ROLLBACK_MODE: tag-release
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          release_version="${RELEASE_VERSION#v}"
          RELEASE_VERSION="${release_version}" bash .github/scripts/release-rollback-readiness.sh

  release-approval:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-release-artifact, rollback-readiness-tag]
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    environment: package-release
    steps:
      - name: Record protected approval gate
        run: |
          set -euo pipefail
          echo "Release approval gate satisfied for ${GITHUB_REF}."

  pre-publish-gates:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-release-artifact, rollback-readiness-tag, release-approval]
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      checks: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Re-verify required upstream gates immediately before publish
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.sha }}
          REQUIRED_CHECKS_JSON: >-
            [
              {"name":"Quality Summary","app":"github-actions","optional":false},
              {"name":"Omar Gate","app":"github-actions","optional":false},
              {"name":"Attestation Summary","app":"github-actions","optional":false}
            ]
          MAX_WAIT_SECONDS: "900"
          POLL_INTERVAL_SECONDS: "10"
        run: .github/scripts/require-check-runs.sh

  publish:
    needs: [pre-publish-gates]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: release-publish-prod
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Download release tarball artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sentinelayer-cli-tarball
          path: release-artifact

      - name: Enforce trusted npm publishing context
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "::error::Trusted publishing requires GitHub OIDC runtime context, but id-token environment is unavailable."
            exit 1
          fi
          echo "PUBLISH_AUTH_MODE=trusted" >> "$GITHUB_ENV"
          echo "### npm publish auth mode: trusted (OIDC)" >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce release artifact checksum manifest
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=(release-artifact/sentinelayer-cli-*.tgz)
          if [ "${#tarballs[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one downloaded tarball, found ${#tarballs[@]}."
            printf 'Found tarballs: %s\n' "${tarballs[@]:-<none>}"
            exit 1
          fi
          TARBALL="${tarballs[0]}"
          MANIFEST="release-artifact/release-artifact-manifest.json"
          test -f "${MANIFEST}"
          EXPECTED_SHA256="$(jq -r '.sha256' "${MANIFEST}")"
          ACTUAL_SHA256="$(sha256sum "${TARBALL}" | awk '{print $1}')"
          if [ -z "${EXPECTED_SHA256}" ] || [ "${EXPECTED_SHA256}" = "null" ]; then
            echo "::error::Manifest missing expected sha256."
            exit 1
          fi
          if [ "${EXPECTED_SHA256}" != "${ACTUAL_SHA256}" ]; then
            echo "::error::Release artifact checksum mismatch."
            echo "::error::Expected ${EXPECTED_SHA256}, got ${ACTUAL_SHA256}."
            exit 1
          fi
          echo "TARBALL=${TARBALL}" >> "$GITHUB_ENV"
          echo "EXPECTED_SHA256=${EXPECTED_SHA256}" >> "$GITHUB_ENV"

      - name: Enforce release attestation verification policy
        env:
          GH_TOKEN: ${{ github.token }}
          SIGNER_WORKFLOW: ${{ github.repository }}/.github/workflows/release.yml
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if gh attestation verify "${TARBALL}" --repo "${GITHUB_REPOSITORY}" --signer-workflow "${SIGNER_WORKFLOW}" --format json > release-attestation-publish-verify.json; then
              break
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "::error::Publish attestation verification failed after retries."
              exit 1
            fi
            sleep 10
          done
          jq -e 'length > 0' release-attestation-publish-verify.json > /dev/null
          ATTESTED_SHA256="$(jq -r '
            [
              .. | objects
              | select(has("digest"))
              | .digest
              | if type == "object" then .sha256 // empty else empty end
            ]
            | map(select(type == "string" and length > 0))
            | first // empty
          ' release-attestation-publish-verify.json)"
          if [ -z "${ATTESTED_SHA256}" ]; then
            echo "::error::Could not resolve attested subject digest from release-attestation-publish-verify.json."
            exit 1
          fi
          if [ "${ATTESTED_SHA256}" != "${EXPECTED_SHA256}" ]; then
            echo "::error::Attested digest mismatch."
            echo "::error::Expected ${EXPECTED_SHA256}, attested ${ATTESTED_SHA256}."
            exit 1
          fi

      - name: Prepare npm publish context
        shell: bash
        run: |
          set -euo pipefail
          npm config set registry "https://registry.npmjs.org/"
          if [ "${PUBLISH_AUTH_MODE:-}" = "trusted" ]; then
            npm config delete //registry.npmjs.org/:_authToken || true
          fi

      - name: Publish to npm
        run: |
          set -euo pipefail
          test -f "${TARBALL}"
          npm publish "./${TARBALL}" --provenance --access public




