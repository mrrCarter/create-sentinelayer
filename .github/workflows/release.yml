name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm (requires NPM_TOKEN)"
        required: false
        default: false
        type: boolean
      dry_run:
        description: "Run release validation without attempting npm publish"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write
  checks: read
  actions: read
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NPM_VERSION_PIN: "10.8.2"

concurrency:
  group: release-control-create-sentinelayer
  cancel-in-progress: false

jobs:
  resolve-release-flags:
    name: Resolve Release Flags
    runs-on: ubuntu-22.04
    timeout-minutes: 3
    outputs:
      publish_requested: ${{ steps.flags.outputs.publish_requested }}
      dry_run: ${{ steps.flags.outputs.dry_run }}
      release_path_execution: ${{ steps.flags.outputs.release_path_execution }}
    steps:
      - name: Normalize dispatch and tag inputs
        id: flags
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_VALUE: ${{ github.ref }}
          INPUT_PUBLISH: ${{ github.event.inputs.publish }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          normalize_bool() {
            case "$(echo "${1:-}" | tr '[:upper:]' '[:lower:]' | xargs)" in
              true|1|yes|on) echo "true" ;;
              *) echo "false" ;;
            esac
          }
          publish_requested="false"
          release_path_execution="false"
          dry_run="$(normalize_bool "${INPUT_DRY_RUN}")"
          if [[ "${EVENT_NAME}" == "push" ]] && [[ "${GITHUB_REF_VALUE}" == refs/tags/v* ]]; then
            publish_requested="true"
            release_path_execution="true"
          fi
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_path_execution="true"
            dispatch_publish="$(normalize_bool "${INPUT_PUBLISH}")"
            if [[ "${GITHUB_REF_VALUE}" == refs/tags/v* ]] && [[ "${dispatch_publish}" == "true" ]]; then
              publish_requested="true"
              if [[ "${dry_run}" == "true" ]]; then
                echo "::notice::workflow_dispatch publish requested with dry-run=true; publish step will be skipped."
              fi
            else
              publish_requested="false"
              if [[ "${dispatch_publish}" == "true" ]]; then
                echo "::notice::Manual publish requested on non-tag ref; forcing dry-run validation."
              fi
              dry_run="true"
            fi
            if [[ "${dispatch_publish}" != "true" ]] && [[ "${dry_run}" != "true" ]]; then
              echo "::notice::workflow_dispatch validation run enabled (publish=false)."
            fi
          fi
          echo "publish_requested=${publish_requested}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${dry_run}" >> "$GITHUB_OUTPUT"
          echo "release_path_execution=${release_path_execution}" >> "$GITHUB_OUTPUT"

  verify-required-checks:
    name: Verify Required Checks
    runs-on: ubuntu-22.04
    needs: [resolve-release-flags]
    timeout-minutes: 12
    outputs:
      target_sha: ${{ steps.verify.outputs.target_sha }}
      quality_run_id: ${{ steps.verify.outputs.quality_run_id }}
      omar_run_id: ${{ steps.verify.outputs.omar_run_id }}
    permissions:
      contents: read
      checks: read
      actions: read
    steps:
      - name: Verify release commit checks
        id: verify
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TARGET_SHA: ${{ github.sha }}
          RELEASE_PATH_EXECUTION: ${{ needs.resolve-release-flags.outputs.release_path_execution }}
          GITHUB_REF_VALUE: ${{ github.ref }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
          REQUIRED_CHECKS: Omar Gate,Quality Summary
        run: |
          set -euo pipefail
          if [[ "${RELEASE_PATH_EXECUTION}" != "true" ]]; then
            echo "target_sha=${TARGET_SHA}" >> "$GITHUB_OUTPUT"
            echo "quality_run_id=" >> "$GITHUB_OUTPUT"
            echo "omar_run_id=" >> "$GITHUB_OUTPUT"
            echo "Release path not active; skipping required check verification."
            exit 0
          fi
          resolved_sha="${TARGET_SHA}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag_name="${GITHUB_REF_VALUE#refs/tags/}"
            if [[ -n "${tag_name}" ]]; then
              ref_json="$(gh api "repos/${REPO}/git/ref/tags/${tag_name}")"
              ref_type="$(echo "${ref_json}" | jq -r '.object.type')"
              ref_sha="$(echo "${ref_json}" | jq -r '.object.sha')"
              if [[ "${ref_type}" == "tag" ]]; then
                tag_json="$(gh api "repos/${REPO}/git/tags/${ref_sha}")"
                resolved_sha="$(echo "${tag_json}" | jq -r '.object.sha')"
              elif [[ "${ref_type}" == "commit" ]]; then
                resolved_sha="${ref_sha}"
              fi
            fi
          fi
          TARGET_SHA="${resolved_sha}"
          echo "Validating required checks for commit ${TARGET_SHA} (event ref: ${GITHUB_REF_VALUE})."
          IFS=',' read -r -a required_checks <<< "${REQUIRED_CHECKS}"
          if [[ "${#required_checks[@]}" -eq 0 ]]; then
            echo "::error::No required checks configured."
            exit 1
          fi
          quality_run_id=""
          omar_run_id=""
          expected_workflow_path_for_check() {
            case "${1}" in
              "Omar Gate") echo ".github/workflows/omar-gate.yml" ;;
              "Quality Summary") echo ".github/workflows/quality-gates.yml" ;;
              *) return 1 ;;
            esac
          }
          deadline=$((SECONDS + 600))
          while (( SECONDS < deadline )); do
            checks_json="$(gh api "repos/${REPO}/commits/${TARGET_SHA}/check-runs" -H "Accept: application/vnd.github+json")"
            pending=0
            for required in "${required_checks[@]}"; do
              check_name="$(echo "${required}" | xargs)"
              if [[ -z "${check_name}" ]]; then
                continue
              fi
              mismatched_count="$(echo "${checks_json}" | jq -r --arg name "${check_name}" '
                [.check_runs[]
                  | select(.name == $name)
                  | select((.app.slug // "") != "github-actions" or ((.details_url // "") | contains("/actions/runs/") | not))
                ] | length
              ')"
              if [[ "${mismatched_count}" != "0" ]]; then
                echo "::error::Detected ${mismatched_count} untrusted producer run(s) for required check '${check_name}'."
                exit 1
              fi
              latest_run="$(echo "${checks_json}" | jq -c --arg name "${check_name}" '
                [.check_runs[]
                  | select(.name == $name)
                  | select((.app.slug // "") == "github-actions")
                  | select((.details_url // "") | contains("/actions/runs/"))
                ] | sort_by(.started_at // .created_at) | last // empty
              ')"
              if [[ -z "${latest_run}" ]]; then
                echo "Waiting for required check '${check_name}' on ${TARGET_SHA}."
                pending=1
                continue
              fi
              details_url="$(echo "${latest_run}" | jq -r '.details_url // ""')"
              run_id="$(echo "${details_url}" | sed -nE 's#^.*/actions/runs/([0-9]+).*$#\1#p')"
              if [[ -z "${run_id}" ]]; then
                echo "::error::Unable to resolve workflow run id for required check '${check_name}'."
                exit 1
              fi
              run_json="$(gh api "repos/${REPO}/actions/runs/${run_id}" -H "Accept: application/vnd.github+json")"
              expected_workflow_path="$(expected_workflow_path_for_check "${check_name}" || true)"
              if [[ -z "${expected_workflow_path}" ]]; then
                echo "::error::Missing workflow identity mapping for required check '${check_name}'."
                exit 1
              fi
              run_workflow_path="$(echo "${run_json}" | jq -r '.path // ""' | cut -d'@' -f1)"
              run_head_sha="$(echo "${run_json}" | jq -r '.head_sha // ""')"
              if [[ "${run_workflow_path}" != "${expected_workflow_path}" ]]; then
                echo "::error::Required check '${check_name}' originated from unexpected workflow path '${run_workflow_path}' (expected '${expected_workflow_path}')."
                exit 1
              fi
              if [[ "${run_head_sha}" != "${TARGET_SHA}" ]]; then
                echo "::error::Required check '${check_name}' head_sha '${run_head_sha}' does not match target '${TARGET_SHA}'."
                exit 1
              fi
              status="$(echo "${latest_run}" | jq -r '.status')"
              conclusion="$(echo "${latest_run}" | jq -r '.conclusion // ""')"
              if [[ "${status}" != "completed" ]]; then
                echo "Required check '${check_name}' status=${status}; waiting."
                pending=1
                continue
              fi
              if [[ "${conclusion}" != "success" ]]; then
                echo "::error::Required check '${check_name}' concluded with '${conclusion}'."
                exit 1
              fi
              if [[ "${check_name}" == "Quality Summary" ]]; then
                quality_run_id="${run_id}"
              fi
              if [[ "${check_name}" == "Omar Gate" ]]; then
                omar_run_id="${run_id}"
              fi
              echo "Required check '${check_name}' passed."
            done
            if [[ "${pending}" -eq 0 ]]; then
              echo "target_sha=${TARGET_SHA}" >> "$GITHUB_OUTPUT"
              echo "quality_run_id=${quality_run_id}" >> "$GITHUB_OUTPUT"
              echo "omar_run_id=${omar_run_id}" >> "$GITHUB_OUTPUT"
              echo "Required checks validated for ${TARGET_SHA}."
              exit 0
            fi
            sleep 10
          done
          echo "::error::Timed out waiting for required checks on ${TARGET_SHA}."
          exit 1

  preflight:
    name: Release Preflight (Verify + Security)
    runs-on: ubuntu-22.04
    needs: [resolve-release-flags, verify-required-checks]
    if: ${{ needs.resolve-release-flags.outputs.release_path_execution == 'true' }}
    timeout-minutes: 30
    permissions:
      contents: read
      checks: read
      actions: read
      id-token: write
      attestations: write
    env:
      GH_TOKEN: ${{ github.token }}
      QUALITY_RUN_ID: ${{ needs.verify-required-checks.outputs.quality_run_id }}
      TARGET_SHA: ${{ needs.verify-required-checks.outputs.target_sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate rollback automation contracts
        shell: bash
        run: |
          set -euo pipefail
          test -f docs/RELEASE_ROLLBACK.md || (echo "::error::Missing rollback runbook docs/RELEASE_ROLLBACK.md." && exit 1)
          test -f .github/workflows/rollback.yml || (echo "::error::Missing rollback workflow .github/workflows/rollback.yml." && exit 1)

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20.11.1"
          cache: npm

      - name: Pin npm CLI version
        shell: bash
        run: |
          set -euo pipefail
          npm install --global "npm@${NPM_VERSION_PIN}"
          npm --version

      - name: Pin npm registry and snapshot lock hash
        shell: bash
        run: |
          set -euo pipefail
          npm config set registry "https://registry.npmjs.org/"
          sha256sum package-lock.json > package-lock.sha256

      - name: Configure npm cache for deterministic rebuild
        shell: bash
        run: |
          set -euo pipefail
          cache_dir="${GITHUB_WORKSPACE}/.npm-cache-release"
          mkdir -p "${cache_dir}"
          npm config set cache "${cache_dir}"
          echo "NPM_CACHE_DIR=${cache_dir}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Snapshot production dependency graph
        shell: bash
        run: npm ls --omit=dev --json > npm-prod-tree.json

      - name: Validate package
        run: npm run verify

      - name: Run npm audit (prod deps only)
        run: npm audit --omit=dev --audit-level=high

      - name: Build immutable release tarball + digest
        shell: bash
        run: |
          set -euo pipefail
          pack_json="$(npm pack --json)"
          tarball="$(echo "${pack_json}" | jq -r '.[0].filename')"
          test -n "${tarball}" || (echo "::error::Unable to resolve packed tarball filename." && exit 1)
          printf "%s" "${tarball}" > create-sentinelayer.tarball
          sha256sum "${tarball}" > create-sentinelayer.sha256

      - name: Verify deterministic rebuild hash (isolated second pass)
        shell: bash
        run: |
          set -euo pipefail
          baseline_hash="$(awk '{print $1}' create-sentinelayer.sha256)"
          rebuild_dir="$(mktemp -d)"
          git archive --format=tar HEAD | tar -xf - -C "${rebuild_dir}"
          pushd "${rebuild_dir}" >/dev/null
          npm config set registry "https://registry.npmjs.org/"
          npm config set cache "${NPM_CACHE_DIR}"
          npm ci --ignore-scripts --offline
          rebuild_pack_json="$(npm pack --json)"
          rebuild_tarball="$(echo "${rebuild_pack_json}" | jq -r '.[0].filename')"
          test -n "${rebuild_tarball}" || (echo "::error::Unable to resolve rebuild tarball filename." && exit 1)
          rebuild_hash="$(sha256sum "${rebuild_tarball}" | awk '{print $1}')"
          popd >/dev/null
          printf "%s\n" "${rebuild_hash}" > create-sentinelayer.rebuild.sha256
          if [[ "${baseline_hash}" != "${rebuild_hash}" ]]; then
            echo "::error::Non-deterministic package hash detected (baseline=${baseline_hash}, rebuild=${rebuild_hash})."
            exit 1
          fi

      - name: Download quality workflow artifact proof
        shell: bash
        run: |
          set -euo pipefail
          test -n "${QUALITY_RUN_ID}" || (echo "::error::Missing quality workflow run id from verify-required-checks." && exit 1)
          gh run download "${QUALITY_RUN_ID}" --name quality-build-package --dir quality-proof

      - name: Verify cross-workflow build digest lineage
        shell: bash
        run: |
          set -euo pipefail
          test -f quality-proof/quality-build.manifest.json || (echo "::error::Missing quality-build.manifest.json from quality workflow artifacts." && exit 1)
          quality_sha="$(jq -r '.sha256 // ""' quality-proof/quality-build.manifest.json)"
          quality_rebuild_sha="$(jq -r '.rebuildSha256 // ""' quality-proof/quality-build.manifest.json)"
          quality_commit_sha="$(jq -r '.commitSha // ""' quality-proof/quality-build.manifest.json)"
          quality_run_id_manifest="$(jq -r '.runId // ""' quality-proof/quality-build.manifest.json)"
          baseline_hash="$(awk 'NF {print $1; exit}' create-sentinelayer.sha256)"
          test -n "${baseline_hash}" || (echo "::error::Unable to parse release baseline hash." && exit 1)
          test -n "${quality_sha}" || (echo "::error::Unable to parse quality baseline hash." && exit 1)
          test -n "${quality_rebuild_sha}" || (echo "::error::Unable to parse quality rebuild hash." && exit 1)
          if [[ "${quality_sha}" != "${quality_rebuild_sha}" ]]; then
            echo "::error::Quality workflow reproducibility proof mismatch (baseline=${quality_sha}, rebuild=${quality_rebuild_sha})."
            exit 1
          fi
          if [[ "${baseline_hash}" != "${quality_sha}" ]]; then
            echo "::error::Release baseline hash (${baseline_hash}) does not match quality workflow hash (${quality_sha})."
            exit 1
          fi
          if [[ -n "${TARGET_SHA}" ]] && [[ "${quality_commit_sha}" != "${TARGET_SHA}" ]]; then
            echo "::error::Quality workflow commit (${quality_commit_sha}) does not match release target (${TARGET_SHA})."
            exit 1
          fi
          if [[ -n "${quality_run_id_manifest}" ]] && [[ "${quality_run_id_manifest}" != "${QUALITY_RUN_ID}" ]]; then
            echo "::error::Quality manifest run id (${quality_run_id_manifest}) does not match selected run (${QUALITY_RUN_ID})."
            exit 1
          fi

      - name: Upload immutable release artifact
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: create-sentinelayer-release-bundle
          path: |
            create-sentinelayer-*.tgz
            create-sentinelayer.tarball
            create-sentinelayer.sha256
            create-sentinelayer.rebuild.sha256
            package-lock.sha256
            npm-prod-tree.json

      - name: Attest immutable release artifact provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: create-sentinelayer-*.tgz

  rollback-readiness:
    name: Rollback Readiness
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [resolve-release-flags, verify-required-checks, preflight]
    if: ${{ needs.resolve-release-flags.outputs.publish_requested == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20.11.1"
          cache: npm

      - name: Validate rollback runbook and prior published package
        shell: bash
        run: |
          set -euo pipefail
          test -f docs/RELEASE_ROLLBACK.md || (echo "::error::Missing rollback runbook docs/RELEASE_ROLLBACK.md." && exit 1)
          package_name="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).name")"
          current_version="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          versions_json="$(npm view "${package_name}" versions --json)"
          previous_version="$(echo "${versions_json}" | jq -r --arg current "${current_version}" '
            if type == "array" then
              (map(select(. != $current)) | last // empty)
            elif type == "string" then
              (if . == $current then empty else . end)
            else
              empty
            end
          ')"
          if [[ -z "${previous_version}" ]]; then
            echo "::error::No previous published package version available to validate rollback readiness."
            exit 1
          fi
          prefix_dir="$(mktemp -d)"
          npm install --prefix "${prefix_dir}" "${package_name}@${previous_version}" --ignore-scripts
          PATH="${prefix_dir}/node_modules/.bin:${PATH}" create-sentinelayer --version
          echo "Rollback readiness validated against ${package_name}@${previous_version}."

  publish:
    name: Publish
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: [resolve-release-flags, verify-required-checks, preflight, rollback-readiness]
    environment: production
    env:
      NPM_TOKEN_VALUE: ${{ secrets.NPM_TOKEN }}
      NPM_TOKEN_PRESENT: ${{ secrets.NPM_TOKEN != '' }}
      PUBLISH_REQUESTED: ${{ needs.resolve-release-flags.outputs.publish_requested }}
      DRY_RUN: ${{ needs.resolve-release-flags.outputs.dry_run }}
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      GITHUB_REF_NAME: ${{ github.ref_name }}
      GITHUB_REF_TYPE: ${{ github.ref_type }}
    steps:
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20.11.1"
          registry-url: "https://registry.npmjs.org"

      - name: Pin npm CLI version
        shell: bash
        run: |
          set -euo pipefail
          npm install --global "npm@${NPM_VERSION_PIN}"
          npm --version

      - name: Download immutable release artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: create-sentinelayer-release-bundle
          path: release-bundle

      - name: Verify artifact digest
        shell: bash
        run: |
          set -euo pipefail
          TARBALL_NAME="$(cat release-bundle/create-sentinelayer.tarball)"
          test -f "release-bundle/${TARBALL_NAME}" || (echo "::error::Tarball '${TARBALL_NAME}' missing from artifact bundle." && exit 1)
          (cd release-bundle && sha256sum -c create-sentinelayer.sha256)

      - name: Verify deterministic rebuild proof
        shell: bash
        run: |
          set -euo pipefail
          test -f release-bundle/create-sentinelayer.rebuild.sha256 || (echo "::error::Missing create-sentinelayer.rebuild.sha256 in release bundle." && exit 1)
          baseline_hash="$(awk 'NF {print $1; exit}' release-bundle/create-sentinelayer.sha256)"
          rebuild_hash="$(awk 'NF {print $1; exit}' release-bundle/create-sentinelayer.rebuild.sha256)"
          test -n "${baseline_hash}" || (echo "::error::Unable to parse baseline release hash." && exit 1)
          test -n "${rebuild_hash}" || (echo "::error::Unable to parse rebuild release hash." && exit 1)
          if [[ "${baseline_hash}" != "${rebuild_hash}" ]]; then
            echo "::error::Deterministic rebuild proof failed (baseline=${baseline_hash}, rebuild=${rebuild_hash})."
            exit 1
          fi

      - name: Validate packaged CLI install
        shell: bash
        run: |
          set -euo pipefail
          TARBALL_NAME="$(cat release-bundle/create-sentinelayer.tarball)"
          TARBALL_PATH="release-bundle/${TARBALL_NAME}"
          prefix_dir="$(mktemp -d)"
          npm install --prefix "${prefix_dir}" "${TARBALL_PATH}" --ignore-scripts
          PATH="${prefix_dir}/node_modules/.bin:${PATH}" create-sentinelayer --version
          PATH="${prefix_dir}/node_modules/.bin:${PATH}" sentinel --version

      - name: Enforce tag-only semver publish source
        if: env.PUBLISH_REQUESTED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "::error::Publish is only permitted from semver tags."
            exit 1
          fi
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Publish tag '${GITHUB_REF_NAME}' is not a valid semver tag (expected vX.Y.Z)."
            exit 1
          fi

      - name: Validate production environment protection rules
        if: env.PUBLISH_REQUESTED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          env_json="$(gh api "repos/${REPO}/environments/production" -H "Accept: application/vnd.github+json")"
          reviewer_count="$(echo "${env_json}" | jq -r '[.protection_rules[]? | select(.type == "required_reviewers") | ((.reviewers // []) | length)] | add // 0')"
          branch_policy_enabled="$(echo "${env_json}" | jq -r '((.deployment_branch_policy.protected_branches // false) or (.deployment_branch_policy.custom_branch_policies // false))')"
          if [[ "${reviewer_count}" -lt 1 ]]; then
            echo "::error::Production environment must require at least one reviewer."
            exit 1
          fi
          if [[ "${branch_policy_enabled}" != "true" ]]; then
            echo "::error::Production environment must enforce deployment branch policy."
            exit 1
          fi

      - name: Enforce NPM token when publish is requested
        if: env.PUBLISH_REQUESTED == 'true' && env.NPM_TOKEN_PRESENT != 'true' && env.DRY_RUN != 'true'
        run: |
          echo "::error::NPM_TOKEN is required when publish is requested."
          exit 1

      - name: Publish skipped (dry-run)
        if: env.PUBLISH_REQUESTED == 'true' && env.DRY_RUN == 'true'
        run: echo "Dry-run enabled. Skipping npm publish."

      - name: Publish to npm
        if: env.PUBLISH_REQUESTED == 'true' && env.NPM_TOKEN_PRESENT == 'true' && env.DRY_RUN != 'true'
        shell: bash
        run: |
          set -euo pipefail
          TARBALL_NAME="$(cat release-bundle/create-sentinelayer.tarball)"
          npm publish "release-bundle/${TARBALL_NAME}" --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN_VALUE }}

      - name: Emit rollback runbook guidance
        shell: bash
        run: |
          set -euo pipefail
          echo "## Rollback" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger rollback workflow: \`gh workflow run rollback.yml -f version=<previous-version> -f execute=true\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Runbook: \`docs/RELEASE_ROLLBACK.md\`" >> "$GITHUB_STEP_SUMMARY"
