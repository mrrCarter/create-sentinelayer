name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm (requires NPM_TOKEN)"
        required: false
        default: false
        type: boolean
      dry_run:
        description: "Run release validation without attempting npm publish"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-create-sentinelayer
  cancel-in-progress: false

jobs:
  preflight:
    name: Release Preflight (Verify + Security)
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20.11.1"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate package
        run: npm run verify

      - name: Run npm audit (prod deps only)
        run: npm audit --omit=dev --audit-level=high

      - name: Build immutable release tarball + digest
        shell: bash
        run: |
          set -euo pipefail
          npm pack
          tarball="$(ls -1 create-sentinelayer-*.tgz | head -n 1)"
          sha256sum "${tarball}" > create-sentinelayer.sha256

      - name: Upload immutable release artifact
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: create-sentinelayer-release-bundle
          path: |
            create-sentinelayer-*.tgz
            create-sentinelayer.sha256

  publish:
    name: Publish
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: [preflight]
    environment: production
    env:
      NPM_TOKEN_VALUE: ${{ secrets.NPM_TOKEN }}
      NPM_TOKEN_PRESENT: ${{ secrets.NPM_TOKEN != '' }}
      PUBLISH_REQUESTED: ${{ startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish == 'true' }}
      DRY_RUN: ${{ github.event.inputs.dry_run == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20.11.1"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Download immutable release artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: create-sentinelayer-release-bundle
          path: release-bundle

      - name: Verify artifact digest
        shell: bash
        run: |
          set -euo pipefail
          cd release-bundle
          sha256sum -c create-sentinelayer.sha256

      - name: Validate packaged CLI install
        shell: bash
        run: |
          set -euo pipefail
          TARBALL="$(ls -1 release-bundle/create-sentinelayer-*.tgz | head -n 1)"
          npm install --global "${TARBALL}"
          create-sentinelayer --version
          sentinel --version

      - name: Enforce NPM token when publish is requested
        if: env.PUBLISH_REQUESTED == 'true' && env.NPM_TOKEN_PRESENT != 'true' && env.DRY_RUN != 'true'
        run: |
          echo "::error::NPM_TOKEN is required when publish is requested."
          exit 1

      - name: Publish skipped (dry-run)
        if: env.PUBLISH_REQUESTED == 'true' && env.DRY_RUN == 'true'
        run: echo "Dry-run enabled. Skipping npm publish."

      - name: Publish to npm
        if: env.PUBLISH_REQUESTED == 'true' && env.NPM_TOKEN_PRESENT == 'true' && env.DRY_RUN != 'true'
        shell: bash
        run: |
          set -euo pipefail
          TARBALL="$(ls -1 release-bundle/create-sentinelayer-*.tgz | head -n 1)"
          npm publish "${TARBALL}" --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN_VALUE }}

      - name: Emit rollback runbook guidance
        shell: bash
        run: |
          set -euo pipefail
          echo "## Rollback" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger rollback workflow: \`gh workflow run rollback.yml -f version=<previous-version> -f execute=true\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Runbook: \`docs/RELEASE_ROLLBACK.md\`" >> "$GITHUB_STEP_SUMMARY"
