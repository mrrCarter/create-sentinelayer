name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm (requires NPM_TOKEN and environment approval)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: release-prod
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality_preflight:
    name: Quality Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: release-approval
    outputs:
      quality_run_id: ${{ steps.preflight.outputs.quality_run_id }}
      release_artifact_name: ${{ steps.preflight.outputs.release_artifact_name }}
    permissions:
      contents: read
      checks: read
      actions: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Validate release preflight gates
        id: preflight
        shell: bash
        run: |
          set -euo pipefail

          read_check_conclusion() {
            local sha="$1"
            local check_name="$2"
            gh api \
              -H 'Accept: application/vnd.github+json' \
              "/repos/${GITHUB_REPOSITORY}/commits/${sha}/check-runs" \
              --jq ".check_runs[] | select(.name==\"${check_name}\") | .conclusion" \
              | head -n 1 || true
          }

          quality_conclusion="$(gh api \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/check-runs" \
            --jq '.check_runs[] | select(.name=="Quality Summary") | .conclusion' | head -n 1 || true)"

          if [[ "${quality_conclusion}" != "success" ]]; then
            echo "::error::Quality Summary is not successful for commit ${GITHUB_SHA}. Found conclusion='${quality_conclusion:-missing}'."
            exit 1
          fi

          pr_head_sha="$(gh api \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
            --jq '.[0].head.sha' 2>/dev/null || true)"

          if [[ -n "${pr_head_sha}" && "${pr_head_sha}" != "null" ]]; then
            omar_conclusion="$(read_check_conclusion "${pr_head_sha}" "Omar Gate")"
            if [[ "${omar_conclusion}" != "success" ]]; then
              echo "::error::Omar Gate is not successful for PR head commit ${pr_head_sha}. Found conclusion='${omar_conclusion:-missing}'."
              exit 1
            fi
          else
            omar_on_sha="$(read_check_conclusion "${GITHUB_SHA}" "Omar Gate")"
            security_on_sha="$(read_check_conclusion "${GITHUB_SHA}" "Security Scan")"
            if [[ "${omar_on_sha}" != "success" && "${security_on_sha}" != "success" ]]; then
              echo "::error::Direct-main release requires Omar Gate or Security Scan success on ${GITHUB_SHA}. Found Omar='${omar_on_sha:-missing}', Security='${security_on_sha:-missing}'."
              exit 1
            fi
          fi

          quality_run_id="$(gh api \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${GITHUB_REPOSITORY}/actions/workflows/quality-gates.yml/runs?head_sha=${GITHUB_SHA}&branch=main&status=completed&per_page=20" \
            --jq '.workflow_runs[] | select(.conclusion=="success") | .id' | head -n 1 || true)"

          if [[ -z "${quality_run_id}" || "${quality_run_id}" == "null" ]]; then
            echo "::error::Could not find a successful quality-gates workflow run for ${GITHUB_SHA}."
            exit 1
          fi

          release_artifact_name="create-sentinelayer-release-${GITHUB_SHA}"
          artifact_id="$(gh api \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${GITHUB_REPOSITORY}/actions/runs/${quality_run_id}/artifacts" \
            --jq ".artifacts[] | select(.name==\"${release_artifact_name}\") | .id" | head -n 1 || true)"

          if [[ -z "${artifact_id}" || "${artifact_id}" == "null" ]]; then
            echo "::error::Missing release artifact '${release_artifact_name}' in quality run ${quality_run_id}."
            exit 1
          fi

          echo "quality_run_id=${quality_run_id}" >> "${GITHUB_OUTPUT}"
          echo "release_artifact_name=${release_artifact_name}" >> "${GITHUB_OUTPUT}"
          echo "Release preflight passed (Quality Summary + Omar Gate/Security Scan + release artifact promotion)."

  verify:
    name: Release Verify
    needs: quality_preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Download promoted release artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run download "${{ needs.quality_preflight.outputs.quality_run_id }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name "${{ needs.quality_preflight.outputs.release_artifact_name }}" \
            --dir .

      - name: Verify artifact commit binding and digest
        shell: bash
        run: |
          set -euo pipefail
          test -f release-commit-sha.txt || (echo "Missing release-commit-sha.txt" && exit 1)
          packed_sha="$(cat release-commit-sha.txt | tr -d '\r' | xargs)"
          if [[ "${packed_sha}" != "${GITHUB_SHA}" ]]; then
            echo "::error::Promoted artifact commit mismatch: expected ${GITHUB_SHA}, got ${packed_sha:-missing}."
            exit 1
          fi
          sha256sum --check release-sha256.txt

      - name: Validate packaged CLI install
        run: |
          set -euo pipefail
          TARBALL="$(ls -1 create-sentinelayer-*.tgz | head -n 1)"
          npm install --global "${TARBALL}"
          create-sentinelayer --version
          sentinel --version

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: create-sentinelayer-*.tgz

      - name: Upload release tarball artifact
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: create-sentinelayer-tarball
          path: |
            create-sentinelayer-*.tgz
            release-sha256.txt
          if-no-files-found: error

  omar_release_gate:
    name: Omar Release Gate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish == true }}
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: security-review
    permissions:
      contents: read
      checks: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate Sentinelayer token secret
        shell: bash
        env:
          SENTINELAYER_TOKEN: ${{ secrets.SENTINELAYER_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${SENTINELAYER_TOKEN}" || (echo "Missing SENTINELAYER_TOKEN" && exit 1)

      - name: Validate OpenAI key secret for Omar LLM scan
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          test -n "${OPENAI_API_KEY}" || (echo "Missing OPENAI_API_KEY" && exit 1)

      - name: Run Omar Gate
        uses: mrrCarter/sentinelayer-v1-action@14ca51c75ca81fdb6e6b7668d417d6a5abc39018
        with:
          github_token: ${{ github.token }}
          sentinelayer_token: ${{ secrets.SENTINELAYER_TOKEN }}
          sentinelayer_spec_id: fbe281812ebeeedcffcfe0442a94407bd4fb64ae78f3c21606512c9b94825afb
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          sentinelayer_managed_llm: "false"
          scan_mode: deep
          severity_gate: P1
          model: gpt-5.3-codex
          codex_model: gpt-5.3-codex
          model_fallback: gpt-4.1-mini
          use_codex: "true"
          codex_only: "false"
          llm_failure_policy: block

  publish:
    name: Publish To npm
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish == true }}
    needs: [verify, omar_release_gate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download verified tarball artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: create-sentinelayer-tarball
          path: .

      - name: Validate NPM publish token secret
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${NPM_TOKEN}" || (echo "Missing NPM_TOKEN" && exit 1)

      - name: Verify tarball digest before publish
        shell: bash
        run: |
          set -euo pipefail
          sha256sum --check release-sha256.txt

      - name: Resolve tarball path
        id: tarball
        shell: bash
        run: |
          set -euo pipefail
          TARBALL="$(ls -1 create-sentinelayer-*.tgz | head -n 1)"
          test -n "${TARBALL}" || (echo "Missing tarball artifact" && exit 1)
          echo "path=${TARBALL}" >> "${GITHUB_OUTPUT}"

      - name: Publish to npm
        run: npm publish "${{ steps.tarball.outputs.path }}" --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
