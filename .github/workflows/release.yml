name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm (requires NPM_TOKEN)"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NPM_TOKEN_VALUE: ${{ secrets.NPM_TOKEN }}
      NPM_TOKEN_PRESENT: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate package
        run: npm run verify

      - name: Build release tarball
        run: npm pack

      - name: Upload release tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: create-sentinelayer-tarball
          path: create-sentinelayer-*.tgz

      - name: Publish skipped (missing NPM_TOKEN)
        if: (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish == 'true') && env.NPM_TOKEN_PRESENT != 'true'
        run: |
          echo "NPM_TOKEN is not configured. Skipping npm publish."
          echo "Set repository/org secret NPM_TOKEN and rerun with publish=true."

      - name: Publish to npm
        if: (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish == 'true') && env.NPM_TOKEN_PRESENT == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN_VALUE }}
