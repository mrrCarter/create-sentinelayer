name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm (requires NPM_TOKEN)"
        required: false
        default: false
        type: boolean
      dry_run:
        description: "Run release validation without attempting npm publish"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write
  checks: read
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-create-sentinelayer
  cancel-in-progress: false

jobs:
  verify-required-checks:
    name: Verify Required Checks
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish == 'true' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 12
    permissions:
      contents: read
      checks: read
    steps:
      - name: Verify release commit checks
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          required_checks=("Omar Gate" "Quality Summary")
          deadline=$((SECONDS + 600))
          while (( SECONDS < deadline )); do
            response="$(gh api "repos/${REPO}/commits/${TARGET_SHA}/check-runs" -H "Accept: application/vnd.github+json")"
            all_success=true
            for check in "${required_checks[@]}"; do
              match="$(echo "${response}" | jq -c --arg name "${check}" --arg sha "${TARGET_SHA}" '
                [
                  .check_runs[]
                  | select(.name == $name and .head_sha == $sha)
                  | {
                      status: .status,
                      conclusion: .conclusion,
                      started_at: (.started_at // .created_at)
                    }
                ]
                | sort_by(.started_at)
                | last // empty
              ')"
              if [[ -z "${match}" ]]; then
                all_success=false
                continue
              fi
              status="$(echo "${match}" | jq -r '.status')"
              conclusion="$(echo "${match}" | jq -r '.conclusion')"
              if [[ "${status}" != "completed" ]]; then
                all_success=false
                continue
              fi
              if [[ "${conclusion}" != "success" ]]; then
                echo "::error::Required check '${check}' concluded '${conclusion}'."
                exit 1
              fi
            done
            if [[ "${all_success}" == "true" ]]; then
              echo "Required checks validated for ${TARGET_SHA}."
              exit 0
            fi
            sleep 10
          done
          echo "::error::Timed out waiting for required checks on ${TARGET_SHA}."
          exit 1

  preflight:
    name: Release Preflight (Verify + Security)
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20.11.1"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate package
        run: npm run verify

      - name: Run npm audit (prod deps only)
        run: npm audit --omit=dev --audit-level=high

      - name: Build immutable release tarball + digest
        shell: bash
        run: |
          set -euo pipefail
          npm pack
          tarball="$(ls -1 create-sentinelayer-*.tgz | head -n 1)"
          sha256sum "${tarball}" > create-sentinelayer.sha256

      - name: Upload immutable release artifact
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: create-sentinelayer-release-bundle
          path: |
            create-sentinelayer-*.tgz
            create-sentinelayer.sha256

      - name: Attest immutable release artifact provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: create-sentinelayer-*.tgz

  publish:
    name: Publish
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: [verify-required-checks, preflight]
    environment: production
    env:
      NPM_TOKEN_VALUE: ${{ secrets.NPM_TOKEN }}
      NPM_TOKEN_PRESENT: ${{ secrets.NPM_TOKEN != '' }}
      PUBLISH_REQUESTED: ${{ startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish == 'true' }}
      DRY_RUN: ${{ github.event.inputs.dry_run == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20.11.1"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Download immutable release artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: create-sentinelayer-release-bundle
          path: release-bundle

      - name: Verify artifact digest
        shell: bash
        run: |
          set -euo pipefail
          cd release-bundle
          sha256sum -c create-sentinelayer.sha256

      - name: Validate packaged CLI install
        shell: bash
        run: |
          set -euo pipefail
          TARBALL="$(ls -1 release-bundle/create-sentinelayer-*.tgz | head -n 1)"
          npm install --global "${TARBALL}"
          create-sentinelayer --version
          sentinel --version

      - name: Enforce NPM token when publish is requested
        if: env.PUBLISH_REQUESTED == 'true' && env.NPM_TOKEN_PRESENT != 'true' && env.DRY_RUN != 'true'
        run: |
          echo "::error::NPM_TOKEN is required when publish is requested."
          exit 1

      - name: Publish skipped (dry-run)
        if: env.PUBLISH_REQUESTED == 'true' && env.DRY_RUN == 'true'
        run: echo "Dry-run enabled. Skipping npm publish."

      - name: Publish to npm
        if: env.PUBLISH_REQUESTED == 'true' && env.NPM_TOKEN_PRESENT == 'true' && env.DRY_RUN != 'true'
        shell: bash
        run: |
          set -euo pipefail
          TARBALL="$(ls -1 release-bundle/create-sentinelayer-*.tgz | head -n 1)"
          npm publish "${TARBALL}" --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN_VALUE }}

      - name: Emit rollback runbook guidance
        shell: bash
        run: |
          set -euo pipefail
          echo "## Rollback" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger rollback workflow: \`gh workflow run rollback.yml -f version=<previous-version> -f execute=true\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Runbook: \`docs/RELEASE_ROLLBACK.md\`" >> "$GITHUB_STEP_SUMMARY"
