name: Release Rollback

on:
  workflow_dispatch:
    inputs:
      target_version:
        description: Version to restore as latest (v prefix optional)
        required: false
        type: string
      release_version:
        description: Version being rolled back/deprecated (v prefix optional)
        required: false
        type: string
      confirm:
        description: Type ROLLBACK to execute dist-tag change
        required: true
        default: ""
        type: string
      deprecate_release:
        description: Deprecate release_version after rollback
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-publish-prod
  cancel-in-progress: false

jobs:
  rollback:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    environment: package-release
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Require explicit rollback confirmation
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.confirm }}" != "ROLLBACK" ]; then
            echo "::error::Rollback confirmation missing. Re-run with confirm=ROLLBACK."
            exit 1
          fi

      - name: Resolve rollback target and release context
        shell: bash
        env:
          INPUT_TARGET_VERSION: ${{ inputs.target_version }}
          INPUT_RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          set -euo pipefail
          normalize_version() {
            local value
            value="$(echo "${1:-}" | xargs || true)"
            value="${value#v}"
            echo "${value}"
          }

          target_version="$(normalize_version "${INPUT_TARGET_VERSION}")"
          release_version="$(normalize_version "${INPUT_RELEASE_VERSION}")"
          if [ -z "${target_version}" ]; then
            versions_json="$(npm view sentinelayer-cli versions --json)"
            target_version="$(echo "${versions_json}" | jq -r '
              if type == "array" then
                if length >= 2 then .[-2]
                elif length == 1 then .[-1]
                else empty
                end
              elif type == "string" then .
              else empty
              end
            ')"
          fi
          if [ -z "${target_version}" ]; then
            echo "::error::Unable to resolve rollback target version."
            exit 1
          fi
          if ! echo "${target_version}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "::error::Rollback target must be semver-like. Received ${target_version}."
            exit 1
          fi

          resolved_version="$(npm view "sentinelayer-cli@${target_version}" version --json | jq -r 'if type=="string" then . else empty end')"
          if [ "${resolved_version}" != "${target_version}" ]; then
            echo "::error::Rollback target sentinelayer-cli@${target_version} is not resolvable."
            exit 1
          fi

          echo "ROLLBACK_TARGET_VERSION=${target_version}" >> "$GITHUB_ENV"
          echo "ROLLBACK_RELEASE_VERSION=${release_version}" >> "$GITHUB_ENV"

      - name: Validate rollback readiness (execution mode)
        shell: bash
        env:
          PACKAGE_NAME: sentinelayer-cli
          ROLLBACK_MODE: execute
          RELEASE_VERSION: ${{ env.ROLLBACK_RELEASE_VERSION }}
          ROLLBACK_TARGET_OVERRIDE: ${{ env.ROLLBACK_TARGET_VERSION }}
          NON_BLOCKING_DIAGNOSTICS: "0"
        run: bash .github/scripts/release-rollback-readiness.sh

      - name: Enforce trusted rollback auth context
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "::error::OIDC token exchange requires id-token runtime permissions."
            exit 1
          fi

      - name: Exchange OIDC token for ephemeral npm credential
        id: npm_exchange
        shell: bash
        env:
          NPM_TOKEN_EXCHANGE_URL: ${{ vars.NPM_TOKEN_EXCHANGE_URL || '' }}
          NPM_TOKEN_EXCHANGE_AUDIENCE: ${{ vars.NPM_TOKEN_EXCHANGE_AUDIENCE || 'npmjs.org' }}
          NPM_TOKEN_EXCHANGE_TIMEOUT_SECONDS: ${{ vars.NPM_TOKEN_EXCHANGE_TIMEOUT_SECONDS || '20' }}
          NPM_TOKEN_EXCHANGE_CLIENT_ID: ${{ vars.NPM_TOKEN_EXCHANGE_CLIENT_ID || '' }}
          NPM_TOKEN_EXCHANGE_CLIENT_SECRET: ${{ secrets.NPM_TOKEN_EXCHANGE_CLIENT_SECRET || '' }}
        run: |
          set -euo pipefail
          if [ -z "${NPM_TOKEN_EXCHANGE_URL}" ]; then
            echo "::error::Missing NPM_TOKEN_EXCHANGE_URL repository variable for OIDC npm token exchange."
            exit 1
          fi
          if ! [[ "${NPM_TOKEN_EXCHANGE_TIMEOUT_SECONDS}" =~ ^[0-9]+$ ]] || [ "${NPM_TOKEN_EXCHANGE_TIMEOUT_SECONDS}" -lt 5 ]; then
            echo "::error::Invalid NPM_TOKEN_EXCHANGE_TIMEOUT_SECONDS value: ${NPM_TOKEN_EXCHANGE_TIMEOUT_SECONDS}"
            exit 1
          fi
          oidc_payload="$(curl -fsSL \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${NPM_TOKEN_EXCHANGE_AUDIENCE}")"
          oidc_jwt="$(echo "${oidc_payload}" | jq -r '.value // empty')"
          if [ -z "${oidc_jwt}" ]; then
            echo "::error::Failed to acquire GitHub OIDC identity token for rollback exchange."
            exit 1
          fi
          exchange_request="$(jq -n \
            --arg token "${oidc_jwt}" \
            --arg audience "${NPM_TOKEN_EXCHANGE_AUDIENCE}" \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg actor "${GITHUB_ACTOR}" \
            --arg run_id "${GITHUB_RUN_ID}" \
            --arg run_attempt "${GITHUB_RUN_ATTEMPT}" \
            --arg ref "${GITHUB_REF}" \
            --arg sha "${GITHUB_SHA}" \
            --arg workflow "${GITHUB_WORKFLOW}" \
            --arg client_id "${NPM_TOKEN_EXCHANGE_CLIENT_ID}" \
            --arg client_secret "${NPM_TOKEN_EXCHANGE_CLIENT_SECRET}" \
            '{
              oidc_token: $token,
              audience: $audience,
              repository: $repository,
              actor: $actor,
              run_id: $run_id,
              run_attempt: $run_attempt,
              ref: $ref,
              sha: $sha,
              workflow: $workflow,
              client_id: (if ($client_id | length) > 0 then $client_id else null end),
              client_secret: (if ($client_secret | length) > 0 then $client_secret else null end)
            }')"
          exchange_response="$(curl -fsSL \
            --max-time "${NPM_TOKEN_EXCHANGE_TIMEOUT_SECONDS}" \
            -H "Content-Type: application/json" \
            -d "${exchange_request}" \
            "${NPM_TOKEN_EXCHANGE_URL}")"
          npm_ephemeral_token="$(echo "${exchange_response}" | jq -r '.npm_token // .token // .access_token // empty')"
          if [ -z "${npm_ephemeral_token}" ]; then
            echo "::error::OIDC token exchange did not return an npm token."
            echo "${exchange_response}" | jq -c '.'
            exit 1
          fi
          npm_token_expires_at="$(echo "${exchange_response}" | jq -r '.expires_at // .expiresAt // empty')"
          if [ -z "${npm_token_expires_at}" ]; then
            npm_token_expires_at="unknown"
          fi
          echo "::add-mask::${npm_ephemeral_token}"
          echo "npm_token=${npm_ephemeral_token}" >> "$GITHUB_OUTPUT"
          echo "npm_token_expires_at=${npm_token_expires_at}" >> "$GITHUB_OUTPUT"

      - name: Execute rollback dist-tag update
        shell: bash
        env:
          NPM_EPHEMERAL_TOKEN: ${{ steps.npm_exchange.outputs.npm_token }}
        run: |
          set -euo pipefail
          if [ -z "${NPM_EPHEMERAL_TOKEN}" ]; then
            echo "::error::Missing exchanged ephemeral npm token."
            exit 1
          fi
          npm_userconfig="$(mktemp)"
          cleanup_npmrc() {
            rm -f "${npm_userconfig}"
          }
          trap cleanup_npmrc EXIT
          chmod 600 "${npm_userconfig}"
          printf '//registry.npmjs.org/:_authToken=%s\n' "${NPM_EPHEMERAL_TOKEN}" > "${npm_userconfig}"
          export NPM_CONFIG_USERCONFIG="${npm_userconfig}"
          npm dist-tag add "sentinelayer-cli@${ROLLBACK_TARGET_VERSION}" latest

      - name: Verify rollback result and emit report
        shell: bash
        run: |
          set -euo pipefail
          dist_tags_json="$(npm view sentinelayer-cli dist-tags --json)"
          latest_tag="$(echo "${dist_tags_json}" | jq -r '.latest // empty')"
          if [ "${latest_tag}" != "${ROLLBACK_TARGET_VERSION}" ]; then
            echo "::error::Rollback verification failed. latest=${latest_tag} expected=${ROLLBACK_TARGET_VERSION}."
            exit 1
          fi
          jq -n \
            --arg package "sentinelayer-cli" \
            --arg rollback_target "${ROLLBACK_TARGET_VERSION}" \
            --arg release_version "${ROLLBACK_RELEASE_VERSION}" \
            --arg latest_tag "${latest_tag}" \
            --arg triggered_by "${GITHUB_ACTOR}" \
            --arg run_id "${GITHUB_RUN_ID}" \
            --arg run_url "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{
              package: $package,
              rollback_target: $rollback_target,
              release_version: ($release_version | if length > 0 then . else null end),
              latest_dist_tag: $latest_tag,
              triggered_by: $triggered_by,
              run_id: $run_id,
              run_url: $run_url
            }' > release-rollback-execution.json
          {
            echo "## Rollback Execution"
            echo "- package: \`sentinelayer-cli\`"
            echo "- rollback_target: \`${ROLLBACK_TARGET_VERSION}\`"
            echo "- latest_dist_tag: \`${latest_tag}\`"
            echo "- auth_mode: \`oidc-exchange\`"
            echo "- token_expires_at: \`${{ steps.npm_exchange.outputs.npm_token_expires_at }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deprecate rolled-back release version
        if: ${{ inputs.deprecate_release && inputs.release_version != '' }}
        shell: bash
        env:
          NPM_EPHEMERAL_TOKEN: ${{ steps.npm_exchange.outputs.npm_token }}
        run: |
          set -euo pipefail
          if [ -z "${ROLLBACK_RELEASE_VERSION}" ]; then
            echo "::error::Cannot deprecate release: release_version input is empty after normalization."
            exit 1
          fi
          if [ -z "${NPM_EPHEMERAL_TOKEN}" ]; then
            echo "::error::Missing exchanged ephemeral npm token."
            exit 1
          fi
          npm_userconfig="$(mktemp)"
          cleanup_npmrc() {
            rm -f "${npm_userconfig}"
          }
          trap cleanup_npmrc EXIT
          chmod 600 "${npm_userconfig}"
          printf '//registry.npmjs.org/:_authToken=%s\n' "${NPM_EPHEMERAL_TOKEN}" > "${npm_userconfig}"
          export NPM_CONFIG_USERCONFIG="${npm_userconfig}"
          npm deprecate \
            "sentinelayer-cli@${ROLLBACK_RELEASE_VERSION}" \
            "Superseded by rollback to ${ROLLBACK_TARGET_VERSION}"

      - name: Upload rollback execution artifact
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: release-rollback-execution
          path: |
            release-rollback-readiness.json
            release-rollback-execution.json
          if-no-files-found: error
          retention-days: 14
