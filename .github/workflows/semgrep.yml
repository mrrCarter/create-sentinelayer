name: Semgrep

on:
  workflow_call:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  semgrep-scan:
    name: Semgrep Scan
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # digest-pinned (actions/setup-python)
        with:
          python-version: "3.11.15"

      - name: Install Semgrep
        run: |
          set -euo pipefail
          export PIP_DEFAULT_TIMEOUT=30
          export PIP_RETRIES=5
          policy_file=".github/policies/tool-digests.json"
          expected_requirements_sha="$(jq -r '.semgrep.requirements_sha256 // empty' "${policy_file}")"
          expected_semgrep_version="$(jq -r '.semgrep.version // empty' "${policy_file}")"
          expected_python_version="$(jq -r '.semgrep.python_toolchain.python // empty' "${policy_file}")"
          expected_pip_version="$(jq -r '.semgrep.python_toolchain.pip // empty' "${policy_file}")"
          expected_setuptools_version="$(jq -r '.semgrep.python_toolchain.setuptools // empty' "${policy_file}")"
          expected_wheel_version="$(jq -r '.semgrep.python_toolchain.wheel // empty' "${policy_file}")"
          if [ -z "${expected_requirements_sha}" ] || [ -z "${expected_semgrep_version}" ] || [ -z "${expected_python_version}" ] || [ -z "${expected_pip_version}" ] || [ -z "${expected_setuptools_version}" ] || [ -z "${expected_wheel_version}" ]; then
            echo "::error::Missing semgrep digest policy in ${policy_file}."
            exit 1
          fi
          if ! echo "${expected_requirements_sha}" | grep -Eq '^[a-f0-9]{64}$'; then
            echo "::error::Invalid semgrep requirements SHA256 in ${policy_file}."
            exit 1
          fi
          actual_requirements_sha="$(sha256sum .github/policies/semgrep-requirements.txt | awk '{print $1}')"
          if [ "${actual_requirements_sha}" != "${expected_requirements_sha}" ]; then
            echo "::error::Semgrep requirements digest mismatch."
            echo "::error::expected=${expected_requirements_sha} actual=${actual_requirements_sha}"
            exit 1
          fi
          pip_version="$(python -m pip --version | awk '{print $2}' | tr -d '\r' | xargs || true)"
          setuptools_version="$(python -c 'import setuptools; print(setuptools.__version__)')"
          wheel_version="$(python -c 'import wheel; print(wheel.__version__)')"
          setuptools_version="$(echo "${setuptools_version}" | tr -d '\r' | xargs || true)"
          wheel_version="$(echo "${wheel_version}" | tr -d '\r' | xargs || true)"
          if [ "${pip_version}" != "${expected_pip_version}" ]; then
            echo "::error::pip version mismatch. expected=${expected_pip_version} actual=${pip_version}"
            echo "::error::Update .github/policies/tool-digests.json and setup-python runtime pin together."
            exit 1
          fi
          if [ "${setuptools_version}" != "${expected_setuptools_version}" ]; then
            echo "::error::setuptools version mismatch. expected=${expected_setuptools_version} actual=${setuptools_version}"
            echo "::error::Update .github/policies/tool-digests.json and setup-python runtime pin together."
            exit 1
          fi
          if [ "${wheel_version}" != "${expected_wheel_version}" ]; then
            echo "::error::wheel version mismatch. expected=${expected_wheel_version} actual=${wheel_version}"
            echo "::error::Update .github/policies/tool-digests.json and setup-python runtime pin together."
            exit 1
          fi
          python -m pip install --disable-pip-version-check \
            --timeout "${PIP_DEFAULT_TIMEOUT}" \
            --retries "${PIP_RETRIES}" \
            --require-hashes \
            -r .github/policies/semgrep-requirements.txt
          semgrep_version="$(semgrep --version | tr -d '\r' | xargs || true)"
          if [ "${semgrep_version}" != "${expected_semgrep_version}" ]; then
            echo "::error::Semgrep version mismatch."
            echo "::error::expected=${expected_semgrep_version} actual=${semgrep_version}"
            exit 1
          fi
          python_version="$(python --version | awk '{print $2}' | tr -d '\r' | xargs || true)"
          if [ "${python_version}" != "${expected_python_version}" ]; then
            echo "::error::Python version mismatch. expected=${expected_python_version} actual=${python_version}"
            exit 1
          fi
          semgrep --version
          jq -n \
            --arg python_version "${python_version}" \
            --arg pip_version "${pip_version}" \
            --arg setuptools_version "${setuptools_version}" \
            --arg wheel_version "${wheel_version}" \
            --arg semgrep_version "${semgrep_version}" \
            --arg requirements_sha256 "${actual_requirements_sha}" \
            '{
              python_version: $python_version,
              pip_version: $pip_version,
              setuptools_version: $setuptools_version,
              wheel_version: $wheel_version,
              semgrep_version: $semgrep_version,
              requirements_sha256: $requirements_sha256
            }' > semgrep-toolchain-manifest.json

      - name: Run Semgrep custom policy pack
        run: |
          set -euo pipefail
          semgrep scan \
            --config .semgrep/rules/sentinelayer-cli.yml \
            --error \
            --metrics=off \
            --json \
            --output semgrep-results.json

      - name: Upload Semgrep artifact
        if: always()
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: semgrep-results
          path: |
            semgrep-results.json
            semgrep-toolchain-manifest.json
          if-no-files-found: warn
          retention-days: 7

  semgrep-summary:
    name: Semgrep Summary
    runs-on: ubuntu-22.04
    needs: [semgrep-scan]
    if: >-
      ${{
        always() &&
        needs.semgrep-scan.result == 'success'
      }}
    steps:
      - name: Confirm Semgrep scan passed
        run: echo "Semgrep scan completed successfully."
